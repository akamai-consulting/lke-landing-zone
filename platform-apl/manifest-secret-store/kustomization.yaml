# Dedicated, env-agnostic kustomize tree for the `openbao` ClusterSecretStore.
#
# Applied by its OWN Argo CD Application (`llz-secret-store`, created in
# terraform-iac-bootstrap/cluster-bootstrap/main.tf), pinned to the same
# apps_repo_revision as platform-bootstrap. Deliberately NOT referenced by any
# env's apl-values/<env>/manifest overlay (that overlay = the platform-bootstrap
# tree) — keeping the store out of the monolith is the whole point (blast-radius
# isolation; see cluster-secret-store-openbao.yaml header). Template-managed.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster-secret-store-openbao.yaml
  # Write-scoped sibling store (eso-pusher role) used by the generated-secrets
  # PushSecrets to seed grafana/admin + otel/ingress into OpenBao.
  - cluster-secret-store-openbao-push.yaml
