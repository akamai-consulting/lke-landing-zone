# ClusterSecretStore — points ESO at the in-cluster OpenBao instance.
#
# This is the single binding that EVERY ExternalSecret in the platform
# depends on (cert-automation, loki/harbor object-storage creds, the DNS-01
# solver token). Without it ESO cannot resolve any secret and the whole secrets
# pipeline is dead.
#
# BLAST-RADIUS ISOLATION: this object lives in its OWN Argo CD Application
# (`llz-secret-store`, created by `llz ci bootstrap-cluster`),
# NOT in the platform-bootstrap kustomize tree. Rationale: on first boot the store
# cannot go Ready until OpenBao is unsealed. When it shared the platform-bootstrap Application, the
# store's not-ready health FAILED that app's entire sync wave (the exact hook that
# wedged the first lab bootstrap), stranding unrelated wave-5 resources. As its own
# Application it converges on its own retry loop without gating anything else, and
# nothing else gates it. The ExternalSecrets that reference it stay in their
# components (cluster-scoped store is resolved by ESO at runtime regardless of which
# Application applied it) and are de-risked by the lenient health customizations in
# apl-values/_shared/values.yaml.
#
# Auth: Kubernetes auth — ESO authenticates with its own in-cluster
# ServiceAccount token against the `eso` OpenBao role (read-only `platform-ci`
# policy), configured by `llz ci bao-configure`. No AppRole secret_id, no
# `eso-approle-secret`, no `gh secret set` rotation, no manual seeding step.
#
# Naming derives from the published charts/modules:
#   - store name `openbao` — referenced verbatim by llz-openbao-platform and
#     llz-cert-automation ExternalSecrets (secretStoreRef.name: openbao).
#   - server `platform-openbao.llz-openbao.svc…` — the OpenBao client Service
#     (platform.releaseName=platform-openbao, namespace llz-openbao).
#   - caProvider Secret `openbao-tls` in llz-openbao (the chart's TLS cert).
#   - OpenBao k8s role `eso` -> read-only `platform-ci` policy (llz ci bao-configure).
#   - ESO controller SA `external-secrets` in ns `external-secrets` — apl-core 6.x
#     ships ESO as a core app there; the landing zone no longer runs its own
#     controller. OpenBao's `eso` role binds that SA (ci_openbao_configure.go).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  # How often ESO re-validates the provider config (seconds — a SecretStore int,
  # NOT an ExternalSecret duration string). On first boot the store sits
  # Ready=False/InvalidProviderConfig until OpenBao is unsealed and the `eso`
  # k8s-auth role exists; at the controller default cadence it took ~11m to flip
  # Ready after OpenBao was actually usable. 60s revalidates promptly so the store
  # (and every ExternalSecret gated on it) goes Ready within ~1m. Trivial steady-
  # state cost: one auth probe to OpenBao per minute.
  refreshInterval: 60
  provider:
    vault:
      server: https://platform-openbao.llz-openbao.svc.cluster.local:8200
      path: secret
      version: v2
      caProvider:
        type: Secret
        name: openbao-tls
        namespace: llz-openbao
        key: ca.crt
      auth:
        # Kubernetes auth: ESO authenticates with its own in-cluster
        # ServiceAccount token (no AppRole secret_id seeded from a GitHub secret,
        # no `gh secret set` rotation). The `eso` OpenBao role (llz ci bao-configure)
        # binds the external-secrets SA -> read-only platform-ci policy. ESO
        # mints the SA token via TokenRequest (it already carries the
        # serviceaccounts/token RBAC), so serviceAccountRef points at its own SA.
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: external-secrets
            # namespace is REQUIRED for a ClusterSecretStore (cluster-scoped — no
            # implicit namespace). apl-core 6.x runs ESO's controller SA here.
            namespace: external-secrets
