# Kyverno ClusterPolicy: point apl-core's DNS token consumers at the ROTATING
# narrow in-cluster PAT instead of the static values token.
#
# apl-core v6 wires `dns.provider.linode.apiToken` (a values STRING the
# landing zone fills from TF_VAR_linode_dns_token) through its own chain:
# values → SealedSecret `dns-secrets` (ns apl-secrets) → `core-secrets-store`
# ClusterSecretStore → two apl-core-managed ExternalSecrets, both reading
# property `provider_linode_apiToken`:
#   * `external-dns` (ns cert-manager)      → Secret `external-dns`, key
#     `secret` — the token cert-manager-webhook-linode solves DNS-01 with
#     (POD_SECRET_NAME/POD_SECRET_KEY in its Deployment);
#   * `linode-dns-api-token` (ns external-dns) → Secret `linode-dns-api-token`,
#     key `LINODE_TOKEN` — ExternalDNS's provider credential.
# A values string cannot rotate, so the token that actually authorizes DNS-01
# and record management would stay static forever (the InfoSec gap
# docs/designs/linode-pat-dns-consolidation.md exists to close). apl-core v6.0.0
# has no existingSecret option for dns.provider.linode (schema: apiToken is a
# required string), so the values layer can't express this.
#
# THE MUTATION: rewrite each ExternalSecret's source — secretStoreRef →
# the landing zone's `openbao` ClusterSecretStore, remoteRef →
# `linode/api-token` property `token`: the narrow in-cluster PAT
# (domains:read_write among its scopes) minted at bootstrap and re-minted
# monthly by llz-secret-rotation.yml. The target templates are untouched
# (each still maps its own secretKey), so the consumer Secrets keep their
# shapes; only the token VALUE changes source. Deterministic and idempotent:
# apl-operator re-applies its original spec on every reconcile and admission
# re-mutates it identically — no ownership flap (the same
# beats-a-non-Argo-system pattern as the sibling policies).
#
# Two rule pairs per ExternalSecret:
#   * admission (CREATE/UPDATE) — re-asserts the rewrite every time
#     apl-operator's helmfile (re)applies the resource;
#   * mutate-existing (mutateExistingOnPolicyUpdate) — catches the
#     ALREADY-APPLIED ExternalSecrets the moment this policy first lands. On
#     first bootstrap apl-core's helmfile creates them BEFORE Argo (and this
#     policy) exists; without the catch-up they would idle on the static token
#     until apl-operator's next values reconcile. Needs the background
#     controller RBAC in the sibling kyverno-dns-rotating-token-rbac.yaml.
#
# Degradation: failurePolicy Ignore — an unmutated ExternalSecret still syncs
# the static values token, which stays valid (TF_VAR_linode_dns_token remains
# the schema-required first-boot fallback), so DNS-01/ExternalDNS never break
# while the policy converges; they just use the static token until it does.
#
# Removal is coupled to apl-core gaining an existingSecret (or secretStoreRef)
# option for dns.provider.linode — point the values there and delete this.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: dns-rotating-token
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
    policies.kyverno.io/title: Rotate the DNS token via the in-cluster PAT
    policies.kyverno.io/category: Secrets
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: ExternalSecret
    policies.kyverno.io/description: >-
      Repoints apl-core's two DNS ExternalSecrets (the
      cert-manager-webhook-linode token and ExternalDNS's provider credential)
      from the static values token at core-secrets-store/dns-secrets to the
      rotating narrow in-cluster PAT at the openbao ClusterSecretStore
      (linode/api-token). Target templates are untouched; only the token's
      source changes.
spec:
  # NO mutateExistingOnPolicyUpdate here: Kyverno's policy webhook REJECTS a
  # policy that sets it while any mutate rule lacks `targets` — and admission
  # rules patch the INCOMING resource, so they must not have targets. The
  # catch-up lives in the sibling `dns-rotating-token-existing` policy below
  # (this exact mix wedged the platform-bootstrap sync at wave -15 on
  # 2026-07-04: "spec.mutateExistingOnPolicyUpdate: Forbidden:
  # rules[0].mutate.targets has to be specified").
  #
  # Best-effort: never block an apl-operator apply on a webhook hiccup — the
  # static-token fallback keeps DNS working and the next reconcile re-mutates.
  failurePolicy: Ignore
  rules:
    # ── cert-manager-webhook-linode's token (Secret external-dns, key `secret`) ──
    - name: rewrite-webhook-token-source
      match:
        any:
          - resources:
              kinds: [ExternalSecret]
              names: [external-dns]
              namespaces: [cert-manager]
              operations: [CREATE, UPDATE]
      mutate:
        patchesJson6902: |-
          - op: replace
            path: /spec/secretStoreRef/name
            value: openbao
          - op: replace
            path: /spec/data/0/remoteRef/key
            value: linode/api-token
          - op: replace
            path: /spec/data/0/remoteRef/property
            value: token
    # ── ExternalDNS's provider credential (Secret linode-dns-api-token) ─────────
    - name: rewrite-externaldns-token-source
      match:
        any:
          - resources:
              kinds: [ExternalSecret]
              names: [linode-dns-api-token]
              namespaces: [external-dns]
              operations: [CREATE, UPDATE]
      mutate:
        patchesJson6902: |-
          - op: replace
            path: /spec/secretStoreRef/name
            value: openbao
          - op: replace
            path: /spec/data/0/remoteRef/key
            value: linode/api-token
          - op: replace
            path: /spec/data/0/remoteRef/property
            value: token
---
# Catch-up half of dns-rotating-token: patch the ALREADY-APPLIED ExternalSecrets
# the moment the policy pair first lands (background controller; RBAC in
# kyverno-dns-rotating-token-rbac.yaml). Split from the admission policy above
# because Kyverno requires every mutate rule to carry `targets` when
# mutateExistingOnPolicyUpdate is set — mixing both rule kinds in one policy is
# rejected at admission.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: dns-rotating-token-existing
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
    policies.kyverno.io/title: Rotate the DNS token via the in-cluster PAT (catch-up)
    policies.kyverno.io/category: Secrets
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: ExternalSecret
    policies.kyverno.io/description: >-
      Mutate-existing catch-up for the dns-rotating-token admission policy:
      rewrites apl-core's two already-applied DNS ExternalSecrets when the
      policy first lands, so they don't idle on the static token until
      apl-operator's next reconcile.
spec:
  mutateExistingOnPolicyUpdate: true
  failurePolicy: Ignore
  rules:
    - name: rewrite-webhook-token-source-existing
      match:
        any:
          - resources:
              kinds: [ExternalSecret]
              names: [external-dns]
              namespaces: [cert-manager]
      mutate:
        targets:
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            name: external-dns
            namespace: cert-manager
        patchesJson6902: |-
          - op: replace
            path: /spec/secretStoreRef/name
            value: openbao
          - op: replace
            path: /spec/data/0/remoteRef/key
            value: linode/api-token
          - op: replace
            path: /spec/data/0/remoteRef/property
            value: token
    - name: rewrite-externaldns-token-source-existing
      match:
        any:
          - resources:
              kinds: [ExternalSecret]
              names: [linode-dns-api-token]
              namespaces: [external-dns]
      mutate:
        targets:
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            name: linode-dns-api-token
            namespace: external-dns
        patchesJson6902: |-
          - op: replace
            path: /spec/secretStoreRef/name
            value: openbao
          - op: replace
            path: /spec/data/0/remoteRef/key
            value: linode/api-token
          - op: replace
            path: /spec/data/0/remoteRef/property
            value: token
