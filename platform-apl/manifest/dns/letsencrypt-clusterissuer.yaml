# Let's Encrypt ClusterIssuers — production + staging.
#
# The `llz-` prefix avoids collision with apl-core's bundled cert-manager
# auto-creating a `letsencrypt` ClusterIssuer when
# `apps.cert-manager.issuer: letsencrypt` is set in apl-core values. Any
# Certificate that needs LE explicitly targets `llz-letsencrypt-*` so the
# landing zone owns the issuer config (email, account key, solver target).
#
# DNS-01 is solved by the cert-manager-webhook-linode that apl-core deploys as
# part of its cert-manager integration. That chart registers the `acme.slicen.me`
# API group (the slicen chart default) and holds its own Linode API token, so the
# solvers below target `groupName: acme.slicen.me` + `solverName: linode`. The
# landing zone does NOT ship its own webhook Application — apl-core's is canonical.
#
# ACME contact email is OPTIONAL: Let's Encrypt accepts registration with no
# contact, and cert-manager omits the contact for an empty string — so the default
# `email: ""` below registers a valid, contact-less account and the issuers work out
# of the box (and can issue certs once the DNS-01 token is present). Set an ops
# contact — `llz spec set dns.acmeEmail=ops@example.com` — to receive Let's Encrypt
# expiry notices; `llz render` fills it in here. NEVER hand-edit a bare placeholder
# into `email:`: an unparseable value makes LE reject registration (`invalidContact:
# unable to parse email address`), leaving both issuers permanently Ready=False.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: llz-letsencrypt-production
  annotations:
    # Wave -5: after ESO (-15) and external-secrets NPs (-10), before any
    # Certificate/Gateway annotation that references the issuer by name.
    #
    # The account now registers by default (email is optional — see the header),
    # so this issuer normally reaches Ready=True on its own. But until ACME
    # registration completes (or if LE is briefly unreachable) Argo's built-in
    # ClusterIssuer health check grades a transient Ready=False as Degraded, which
    # would fail this sync wave and wedge the whole platform-bootstrap sync BEFORE
    # OpenBao (wave 0) is ever applied. The
    # cert-manager.io_ClusterIssuer health override in apl-values/values.yaml
    # (apps.argocd._rawValues) neutralizes that; `llz ci health` (which defers
    # llz-letsencrypt-* via ExternalDepIssuers) owns readiness visibility.
    # (An argocd.argoproj.io/ignore-healthcheck annotation is NOT sufficient —
    # it only excludes the resource from the app health rollup, not from
    # operation-level wave gating; verified the hard way on 2026-07-04.)
    argocd.argoproj.io/sync-wave: "-5"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ""   # optional — `llz spec set dns.acmeEmail=ops@example.com` for LE expiry notices
    privateKeySecretRef:
      name: llz-letsencrypt-production-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.slicen.me
            solverName: linode
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: llz-letsencrypt-staging
  annotations:
    # See llz-letsencrypt-production above: deferred ACME must not health-gate
    # the platform-bootstrap waves (handled by the ClusterIssuer health
    # override in apl-values/values.yaml).
    argocd.argoproj.io/sync-wave: "-5"
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ""   # optional — `llz spec set dns.acmeEmail=ops@example.com` for LE expiry notices
    privateKeySecretRef:
      name: llz-letsencrypt-staging-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.slicen.me
            solverName: linode
