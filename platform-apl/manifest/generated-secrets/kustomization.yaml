# Self-generated, in-cluster-only secrets — grafana admin password + otel
# ingress bearer — minted and stored entirely by External Secrets Operator,
# replacing the imperative `llz ci bao-seed` of secret/grafana/admin and
# secret/otel/ingress (root token + `kubectl exec ... bao kv put`).
#
# Per secret the kube-native flow is three objects:
#   1. Password generator (shared: password-generator.yaml) mints a random value.
#   2. An ExternalSecret (refreshInterval 0 = generate once, never rotate a live
#      credential) materializes it into an intermediate K8s Secret in this
#      namespace, shaping the keys via target.template.
#   3. A PushSecret (updatePolicy: IfNotExists) writes it into OpenBao via the
#      write-scoped `openbao-push` ClusterSecretStore — the declarative
#      equivalent of the old generate-once + skip-if-present guard: it never
#      overwrites an existing value, so reruns can't rotate a live credential.
#
# The platform consumers (apl-core's grafana-admin-credentials ExternalSecret,
# the otel collector) still READ these paths from OpenBao through the read-only
# `openbao` store — unchanged. OpenBao stays the source of truth; only the
# producer moved from CI to in-cluster ESO.
#
# Applied by the platform-bootstrap Argo CD Application. SkipDryRunOnMissingResource
# rides out the window before ESO installs the generator/pushsecret CRDs; a
# PushSecret that can't write until OpenBao is unsealed is reclassified
# Progressing (not Degraded) by the resource.customizations health check in
# apl-values/values.yaml, so it never fails the bootstrap wave.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - password-generator.yaml
  - grafana-admin.yaml
  - otel-ingress.yaml
