# Shared platform base — referenced by every env's apl-values/<env>/manifest/
# overlay (resources: ../../platform-apl/manifest). LLZ runs exclusively on Linode's
# MANAGED App Platform (apl_enabled): Linode owns the cluster foundation, its own
# cert-manager + DNS/public-cert, kyverno, gitea, and the grafana/otel secrets — so
# this base holds ONLY the pieces LLZ owns regardless of apl-core:
#   - platform-support-project.yaml : the AppProject LLZ's own (carved + plain) Apps
#     live in.
#   - instance-custom-project.yaml  : the operator escape-hatch ApplicationSet project
#     (scopes the per-env instance-custom ApplicationSet that syncs the operator-owned
#     kubernetes-custom/ tree — see docs/extending-llz.md).
#   - admission/                    : the llz-wave-health-guard ValidatingAdmissionPolicy
#     (admission-time twin of `llz ci wave-health-guard`; sync-wave -19).
# LLZ's Kyverno image-signature control lives in the `imageSignature` component
# (conditional on the operator enabling Kyverno via managedApps), NOT here — a
# CRD-less ClusterPolicy in the always-on base would wedge platform-bootstrap.
# Toggleable pieces live as kustomize Components under platform-apl/components/<name>/;
# per-env files (the thin overlay, env-revision) are generated by `llz render`.
# Template-managed — edit upstream.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - platform-support-project.yaml
  - instance-custom-project.yaml
  - admission
