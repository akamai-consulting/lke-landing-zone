# Linode API token for the firewall-controller + the discover CronJob.
#
# Replaces the former CI-seeded kube-system/linode Secret (`llz ci
# bootstrap-cloud-firewall` wrote it once per terraform apply). ESO now syncs
# the Secret from OpenBao so the credential rides the standard secrets pipeline
# — the same transition the volume-labeler token made
# (components/volumeLabeler/.../externalsecret.yaml).
#
# CREDENTIAL SCOPE — default vs least-privilege (see
# docs/consume-lke-landing-zone-internal.md → "Least-privilege token"):
#   Default: reads secret/linode/api-token, the BROAD provisioning PAT
#   (LKE/VPC/NB/OBJ read-write) that the daily rotation keeps fresh. Zero extra
#   credential to manage, consistent with the sibling volume-labeler /
#   cred-rotator components — but it does mount a broad token in kube-system.
#   The old least-privilege CLOUD_FIREWALL_TOKEN fell back to this same broad
#   PAT when unset, and that fallback copy went stale at the first rotation;
#   reading the canonical rotating path directly avoids that.
#
#   Least-privilege (opt-in): seed a scoped token into
#   secret/linode/cloud-firewall (scope: linodes:read_only + vpcs:read_only for
#   the discover CronJob, firewall:read_write for the controller) and repoint
#   the remoteRef.key below to `linode/cloud-firewall` via a kustomize patch.
#   That token is operator-managed (manual rotation, ≤90d) — the same posture
#   the old CLOUD_FIREWALL_TOKEN had, now delivered through OpenBao/ESO instead
#   of a GitHub Actions secret. Both discover pod and controller read this one
#   Secret, so the scoped token is the union of their needs.
#
# Secret name `linode`, key `token`: the contract the private
# llz-linode-cidr-firewall chart's Deployment reads (env LINODE_TOKEN via
# secretKeyRef) — unchanged from the CI-seeded shape.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready, matching
# every other ExternalSecret. The controller tolerates a brief gap on first
# boot (it starts once the Secret materialises).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linode
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # ≤5m: bounds rotation propagation + post-blip staleness (secrets-before-apps
  # Phase 1 invariant, guard-enforced by `llz ci externalsecret-paths`).
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # Default: the broad, auto-rotated provisioning PAT. For least-privilege,
        # repoint this to `linode/cloud-firewall` (see the header + the
        # consume-internal guide) after seeding that scoped path.
        key: linode/api-token
        property: token
