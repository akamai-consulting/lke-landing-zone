# Loki object-store credentials — synced from OpenBao to a K8s Secret that
# apl-core's Loki references via `extraEnvFrom` (set per-env in
# apl-values/<env>/values.yaml under apps.loki._rawValues).
#
# Bootstrap path:
#   terraform-iac-bootstrap/object-storage/        ── provisions the Linode bucket + scoped
#       access key per region, outputs LOKI_S3_*
#   .github/workflows/bootstrap-openbao.yml ── writes secret/loki/object-store
#       with AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
#   THIS FILE                        ── ESO syncs into `monitoring` as Secret
#       `loki-object-store`
#   apl-values/<env>/values.yaml     ── Loki chart references it via
#       singleBinary.extraEnvFrom
#
# NAMESPACE — must be `monitoring`: apl-core 5.x deploys Loki (and the rest of
# the prometheus/loki stack) into `monitoring`. A Secret is namespace-scoped,
# so it MUST live in Loki's namespace for singleBinary.extraEnvFrom to mount it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-object-store
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m, not 1h: on first boot the `openbao` ClusterSecretStore only goes Ready
  # AFTER OpenBao is unsealed + seeded, and ESO does NOT re-trigger an
  # ExternalSecret when its store recovers — the secret idles until its own
  # refreshInterval. At 1h that stranded loki-0 (CreateContainerConfigError) for
  # ~14m post-store-Ready and dominated convergence time. 1m bounds that gap;
  # steady-state load is trivial (one cached OpenBao read/min). The post-seed
  # `llz ci nudge-argo` force-syncs immediately on top of this.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: loki-object-store
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: loki/object-store
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: loki/object-store
        property: AWS_SECRET_ACCESS_KEY
