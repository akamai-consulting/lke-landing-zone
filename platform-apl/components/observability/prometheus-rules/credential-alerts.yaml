# Credential single-pane alerts — fire BEFORE a token or cert expires, so rotation
# is never missed. Two signal sources feed them:
#   - llz_token_* : the CI token-inventory job measures GitHub/Linode PAT expiry
#     (only a holder of the token can) and writes the llz-token-inventory ConfigMap;
#     the reconciler (reconcile_tokens.go) re-exposes it. namespace="llz-reconciler".
#   - certmanager_certificate_expiration_timestamp_seconds : scraped straight from
#     cert-manager (cert-manager-servicemonitor.yaml + the allow-netpol).
#
# The reconciler already ships LLZCredentialRotationOverdue (age>90d, object-store
# keys) and LLZCertificatesNotReady (already-broken); these add the LEAD-TIME half.
#
# REQUIRED label `prometheus: system` — apl-core's ruleSelector matches it (same as
# the reconciler/openbao rules); without it the rule is never loaded.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: credential-alerts
  namespace: llz-observability
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    prometheus: system
    app.kubernetes.io/part-of: platform
spec:
  groups:
    - name: credential-tokens
      interval: 60s
      rules:
        # A token still has an expiry set but is inside the 14-day window. Warning:
        # rotate it soon. `> 0` excludes an already-expired token (that is an audit
        # breach, below — not a lead-time warning).
        - alert: LLZTokenExpiringSoon
          expr: |
            (llz_token_expiry_timestamp_seconds - time()) > 0
            and (llz_token_expiry_timestamp_seconds - time()) < (14 * 86400)
          for: 1h
          labels:
            severity: warning
            service: llz-reconciler
          annotations:
            summary: 'CI token {{ $labels.provider }}/{{ $labels.token }} expires soon'
            runbook_url: "https://github.com/akamai-consulting/lke-landing-zone/blob/main/docs/runbooks/linode-credential-rotation.md"
            description: '{{ $labels.provider }} token {{ $labels.token }} expires in under 14 days ({{ $value | humanizeDuration }}). Rotate it before it lapses.'
        # Inside 3 days — critical, page.
        - alert: LLZTokenExpiringCritical
          expr: |
            (llz_token_expiry_timestamp_seconds - time()) > 0
            and (llz_token_expiry_timestamp_seconds - time()) < (3 * 86400)
          for: 30m
          labels:
            severity: critical
            service: llz-reconciler
          annotations:
            summary: 'CI token {{ $labels.provider }}/{{ $labels.token }} expires imminently'
            runbook_url: "https://github.com/akamai-consulting/lke-landing-zone/blob/main/docs/runbooks/linode-credential-rotation.md"
            description: '{{ $labels.provider }} token {{ $labels.token }} expires in under 3 days. Rotate NOW to avoid a CI/bootstrap outage.'
        # Policy breach: no-expiry (never-expiring PAT), already expired, over the
        # 90-day lifetime, or invalid/revoked — the token-inventory writer set
        # audit_ok=0. Critical regardless of the countdown.
        - alert: LLZTokenAuditBreach
          expr: llz_token_audit_ok == 0
          for: 30m
          labels:
            severity: critical
            service: llz-reconciler
          annotations:
            summary: 'CI token {{ $labels.provider }}/{{ $labels.token }} violates the expiry policy'
            runbook_url: "https://github.com/akamai-consulting/lke-landing-zone/blob/main/docs/runbooks/linode-credential-rotation.md"
            description: '{{ $labels.provider }} token {{ $labels.token }} has no expiry, is already expired, or exceeds the 90-day lifetime. Recreate it with a ≤90-day expiry.'
        # The funnel itself stalled: the scheduled token-inventory job stopped
        # writing (or the reconciler stopped reading), so every token metric is now
        # stale. Absent-or-old covers both. The writer runs daily; 26h is one grace day.
        - alert: LLZTokenInventoryStale
          expr: |
            absent(llz_token_inventory_updated_timestamp_seconds)
            or (time() - llz_token_inventory_updated_timestamp_seconds) > (26 * 3600)
          for: 1h
          labels:
            severity: warning
            service: llz-reconciler
          annotations:
            summary: 'token inventory is stale — expiry alerting is blind'
            runbook_url: "https://github.com/akamai-consulting/lke-landing-zone/blob/main/docs/runbooks/linode-credential-rotation.md"
            description: 'The token-inventory ConfigMap has not been refreshed in >26h (or is absent). Token-expiry alerts can no longer be trusted — check the scheduled token-inventory job and the reconciler.'
    - name: credential-certs
      interval: 60s
      rules:
        # cert-manager renews automatically, but a stuck DNS-01/HTTP-01 challenge
        # leaves a cert un-renewed — catch it a week out, before pods reject TLS.
        - alert: LLZCertificateExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) > 0
            and (certmanager_certificate_expiration_timestamp_seconds - time()) < (7 * 86400)
          for: 1h
          labels:
            severity: warning
            service: cert-manager
          annotations:
            summary: 'certificate {{ $labels.namespace }}/{{ $labels.name }} expires within 7 days'
            runbook_url: "https://github.com/akamai-consulting/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in {{ $value | humanizeDuration }} and cert-manager has not renewed it — check the Certificate/Order/Challenge.'
        - alert: LLZCertificateExpiringCritical
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) > 0
            and (certmanager_certificate_expiration_timestamp_seconds - time()) < (2 * 86400)
          for: 30m
          labels:
            severity: critical
            service: cert-manager
          annotations:
            summary: 'certificate {{ $labels.namespace }}/{{ $labels.name }} expires within 48h'
            runbook_url: "https://github.com/akamai-consulting/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in under 48h and is not renewed. Intervene now.'
