# Credential single-pane-of-glass — one Grafana view of every CI token + platform
# certificate and how long until each expires. Fed by the reconciler's llz_token_*
# gauges (token-inventory funnel) and cert-manager's expiry metric
# (cert-manager-servicemonitor.yaml). The grafana_dashboard: "1" label is what the
# apl-core Grafana sidecar watches to auto-load it. Template-managed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llz-credential-inventory-dashboard
  namespace: llz-observability
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: platform
data:
  llz-credential-inventory.json: |
    {
      "title": "LLZ Credentials — single pane (tokens + certs)",
      "uid": "llz-credentials",
      "tags": ["llz", "platform", "credentials", "security"],
      "schemaVersion": 39,
      "editable": true,
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "5m",
      "templating": {
        "list": [
          { "name": "DS_PROMETHEUS", "type": "datasource", "query": "prometheus", "current": {}, "hide": 0 }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "Token audit breaches", "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [ { "expr": "count(llz_token_audit_ok == 0) or vector(0)", "legendFormat": "breaches" } ],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "green" }, { "value": 1, "color": "red" } ] } } }
        },
        {
          "id": 2, "title": "Tokens expiring < 14d", "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [ { "expr": "count((llz_token_expiry_timestamp_seconds - time()) > 0 and (llz_token_expiry_timestamp_seconds - time()) < (14*86400)) or vector(0)", "legendFormat": "soon" } ],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "green" }, { "value": 1, "color": "orange" } ] } } }
        },
        {
          "id": 3, "title": "Certs expiring < 7d", "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "targets": [ { "expr": "count((certmanager_certificate_expiration_timestamp_seconds - time()) > 0 and (certmanager_certificate_expiration_timestamp_seconds - time()) < (7*86400)) or vector(0)", "legendFormat": "soon" } ],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "green" }, { "value": 1, "color": "orange" } ] } } }
        },
        {
          "id": 4, "title": "Inventory freshness (age)", "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" },
          "targets": [ { "expr": "time() - max(llz_token_inventory_updated_timestamp_seconds)", "legendFormat": "age" } ],
          "fieldConfig": { "defaults": { "unit": "s", "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "green" }, { "value": 93600, "color": "red" } ] } } }
        },
        {
          "id": 5, "title": "CI tokens — days until expiry", "type": "table",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [ { "expr": "(llz_token_expiry_timestamp_seconds - time()) / 86400", "legendFormat": "{{ provider }} / {{ token }}", "instant": true, "format": "table" } ],
          "fieldConfig": { "defaults": { "unit": "d", "custom": { "displayMode": "color-background" }, "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "red" }, { "value": 3, "color": "orange" }, { "value": 14, "color": "green" } ] } } }
        },
        {
          "id": 6, "title": "Certificates — days until expiry", "type": "table",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [ { "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400", "legendFormat": "{{ namespace }} / {{ name }}", "instant": true, "format": "table" } ],
          "fieldConfig": { "defaults": { "unit": "d", "custom": { "displayMode": "color-background" }, "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "red" }, { "value": 2, "color": "orange" }, { "value": 7, "color": "green" } ] } } }
        },
        {
          "id": 7, "title": "Object-storage / OpenBao credential age (days)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [ { "expr": "llz_credential_age_days{namespace=\"llz-reconciler\"}", "legendFormat": "{{ cred }}" } ],
          "fieldConfig": { "defaults": { "unit": "d", "thresholds": { "mode": "absolute", "steps": [ { "value": null, "color": "green" }, { "value": 90, "color": "red" } ] } } }
        }
      ]
    }
