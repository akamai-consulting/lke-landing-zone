# Managed platform object-storage SECRET half — synced from OpenBao into the k8s
# Secret apl-core's own obj ExternalSecrets read for `provider_linode_secretAccessKey`.
#
# On MANAGED App Platform, LLZ configures object storage the platform way
# (env/settings/obj.yaml, AplObjectStorage, provider.type=linode). apl-core would
# normally SEAL the settings `secretAccessKey` into a SealedSecret named `obj-secrets`
# in `apl-secrets`; its `core-secrets-store` (an ESO kubernetes-provider reading
# `apl-secrets`) then projects `obj-secrets.provider_linode_secretAccessKey` into each
# obj-consuming app (loki, harbor, …). We keep the secret OUT of git by leaving
# obj.yaml.secretAccessKey blank (apl-core emits no SealedSecret for an empty x-secret)
# and instead materializing the SAME Secret here from LLZ's OpenBao (the broad
# platform-obj key, secret/obj/platform, minted by ci_mint_objkeys / rotated in-cluster).
# apl-core resolves it with ZERO apl-core changes.
#
# NAMESPACE — must be `apl-secrets`: that is the namespace `core-secrets-store` reads
# (remoteNamespace: apl-secrets) and the SealedSecret would have been written to.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: obj-secrets
  namespace: apl-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m for the same reason as loki-object-store: the `openbao` ClusterSecretStore only
  # goes Ready after OpenBao is unsealed + seeded, and ESO doesn't re-trigger on store
  # recovery — 1m bounds the post-Ready gap before the obj creds resolve.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: obj-secrets
    creationPolicy: Owner
  data:
    - secretKey: provider_linode_secretAccessKey
      remoteRef:
        key: obj/platform
        property: AWS_SECRET_ACCESS_KEY
