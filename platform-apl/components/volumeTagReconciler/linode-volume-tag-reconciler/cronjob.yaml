# Linode Volume tag-reconciler CronJob.
#
# Hourly backstop behind provision-time tagging: `llz ci reconcile-volume-tags`
# reads the desired tag set from the block-storage-retain StorageClass's
# volumeTags parameter, lists the cluster's Linode-CSI PVs, and PUTs any missing
# tags onto their backing Volumes (labels untouched — Volumes keep pvc-<uuid>).
# Exists for Volumes born untagged: a clone/snapshot PVC admitted while
# admission control was degraded (the Linode CloneVolume API takes no tags), or
# any future born-untagged path. Also REPORTS (never deletes) this cluster's
# abandoned Retain Volumes — tagged lke<id> but referenced by no PV. Idempotent.
#
# Hourly (not the old labeler's 15m): an untagged Volume is harmless until
# reap-time and reap KEEPS untagged Volumes by default (fail-safe), so healing
# latency costs nothing but census noise. ~2 API calls per PV per run keeps
# far under Linode's 800-req/2-min cap.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: linode-volume-tag-reconciler
  namespace: llz-volume-tag-reconciler
  annotations:
    # kube-linter can't resolve the linode-api-token Secret (created at runtime by
    # ESO from externalsecret.yaml, not a static manifest in this tree).
    ignore-check.kube-linter.io/env-value-from: "linode-api-token Secret is created at runtime by ESO (externalsecret.yaml); not a static manifest the linter can resolve"
    ignore-check.kube-linter.io/read-secret-from-env-var: "llz reads LINODE_TOKEN via env-var; no file-mount alternative without a CLI rewrite"
    ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "TTL + history-limits are intentional and complementary — failed runs retained for triage; successful runs reaped at the limit OR after 1h"
spec:
  schedule: "7 * * * *"
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          # Static label so the NetworkPolicy can podSelector-match it.
          labels:
            app.kubernetes.io/name: linode-volume-tag-reconciler
        spec:
          restartPolicy: OnFailure
          serviceAccountName: linode-volume-tag-reconciler
          # First-party slim image (llz + kubectl, distroless/nonroot uid 65532 —
          # matches the securityContext below). ENTRYPOINT is `llz`. Must be
          # PUBLIC on ghcr (as the first-party charts are) so the pod pulls it
          # anonymously — the ghcr pull-secret only exists in kube-system.
          # <@ llz_image_ref @> is the copier-rendered ref (default
          # ghcr.io/<org>/llz:latest; release-e2e renders it to the signed @sha256
          # digest) — the SAME placeholder the sibling CronJobs use, so this pod
          # runs the verified, pinned image the verify-llz-image-signature policy
          # gates on rather than a bare :latest tag.
          containers:
            - name: reconcile
              image: <@ llz_image_ref @>
              args: ["ci", "reconcile-volume-tags"]
              env:
                # HOME on a writable tmpfs so kubectl's cache has somewhere to go
                # under readOnlyRootFilesystem (distroless HOME is read-only).
                - name: HOME
                  value: /tmp
                - name: LINODE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: linode-api-token
                      key: token
              resources:
                limits:   { cpu: 200m, memory: 128Mi }
                requests: { cpu: 50m,  memory: 64Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile: { type: RuntimeDefault }
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 16Mi
