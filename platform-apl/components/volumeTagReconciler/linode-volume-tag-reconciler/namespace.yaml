# llz-volume-tag-reconciler namespace — Argo-owned, like the rest of this tree
# (one owner, no TF→kube crossing; the linode-api-token Secret arrives via ESO).
# Argo applies Namespace kinds before namespaced resources, so the ExternalSecret
# + CronJob land into it on the same sync.
#
# Pod Security `restricted` is baked in: the reconciler pod's securityContext
# already satisfies it (runAsNonRoot, drop ALL caps, readOnlyRootFilesystem,
# seccomp RuntimeDefault, no privilege escalation), so enforce locks the posture
# against future image regressions.
apiVersion: v1
kind: Namespace
metadata:
  name: llz-volume-tag-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
