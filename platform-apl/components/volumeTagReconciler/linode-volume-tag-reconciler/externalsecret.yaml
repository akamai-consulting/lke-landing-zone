# Linode API token for the volume-tag-reconciler CronJob.
#
# ESO syncs it from OpenBao at secret/linode/api-token — the SAME canonical path
# the daily rotation pipeline (secret-rotation.yml → propagate-linode-pat) keeps
# fresh. So the reconciler reads a rotating credential through the standard
# secrets pipeline instead of a static token that goes stale the moment rotation
# first runs. Bootstrap seeds the path via `llz ci mint-bootstrap-pat` (the
# narrow in-cluster PAT); platform-ci policy grants the read.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready, matching
# every other ExternalSecret. The CronJob is a backstop (provision-time CSI
# volumeTags is the primary tagging path) and retries hourly, so a brief gap
# before the Secret materialises is benign.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linode-api-token
  namespace: llz-volume-tag-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode-api-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/api-token
        property: token
