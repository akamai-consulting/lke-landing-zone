# ServiceAccount for the Harbor robot provisioner CronJob.
#
# It bears NO Kubernetes RBAC: the provisioner talks only to the Harbor API
# (harbor-core, same namespace), OpenBao, and api.github.com. Its only
# privileged action is authenticating to OpenBao — done with this SA's
# projected token against the `harbor-provisioner` Kubernetes-auth role
# (bound to this SA's name + namespace in `llz ci bao-configure`), which
# grants read/write on exactly secret/harbor/{robot,pull-robot}.
#
# Lives in the apl-core-owned `harbor` namespace so the CronJob can mount the
# Helm-generated harbor-admin-password Secret — the same placement precedent
# as the harbor-registry-s3 ExternalSecret in this component.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-robot-provisioner
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "5"
