# ClusterIP Service fronting the reconciler's metrics port. The ServiceMonitor
# selects this Service (not the pod directly), and the NetworkPolicy ingress rule
# admits the Prometheus scrape to :8080.
apiVersion: v1
kind: Service
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
  labels:
    app.kubernetes.io/name: llz-reconciler
spec:
  selector:
    app.kubernetes.io/name: llz-reconciler
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
