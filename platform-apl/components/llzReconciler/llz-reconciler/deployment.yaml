# llz-reconciler Deployment — the long-lived `llz reconcile` process.
#
# Runs the observe-only gauges + the enabled reconcilers (see the args below). It
# samples/serves over the in-cluster ServiceAccount (KUBERNETES_SERVICE_HOST + the
# auto-mounted SA token/CA that kube.NewInCluster reads), publishes :8080/metrics,
# and — for the enabled driving reconcilers — holds a coordination.k8s.io Lease so
# only one replica writes. Single replica + never-two-pods rollout (below).
#
# Image is the slim distroless llz (dockerfiles/llz), the same artifact the
# CronJobs run; rendered by copier and pinned to the signed sha image for the
# commit under test by release-e2e. No new deps over that image (the reconciler is
# stdlib net/http + internal/kube + internal/metrics — no client-go).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
  annotations:
    # Wave 0 (was 6): the linode-api-token Secret is now an OPTIONAL volume with
    # a lazy per-pass file read (secrets-before-apps Phase 2), so the pod goes
    # Ready with or without it and the old wave-6 inversion workaround (a hard
    # env secretKeyRef that held the pod in CreateContainerConfigError until the
    # OpenBao store served — starving the whole wave when ordered wrong) is
    # retired. Starting BEFORE the store is the point: the argo-nudge and
    # es-store-recovery lanes must be live during bootstrap, exactly when the
    # store recovers. The linode-dependent lanes no-op cleanly until the token
    # file appears (kubelet syncs the mounted Secret, which ALSO picks up
    # rotations — the env ref never did without a pod restart).
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  # Never run two pods at once: the old pod terminates before the new starts.
  # Phase 0 is observe-only so overlap would be harmless, but this keeps the
  # single-writer invariant the Phase 1 reconcilers need without depending on
  # leader election during a rollout — at the cost of a few seconds' metrics gap
  # on redeploy, immaterial for a 30s sampler.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: llz-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llz-reconciler
    spec:
      serviceAccountName: llz-reconciler
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: reconcile
          image: ghcr.io/akamai-consulting/llz:latest
          # ENABLED: observe-only gauges + the leader-gated driving reconcilers that
          # need no per-env secrets — argo-nudge, sc-demote (batch 1) — plus the
          # read-only openbao-gauges (batch 2: seal-status + credential-age; its
          # OpenBao :8200 egress is in the NetworkPolicy and its ingress is opened
          # by the chart's allowedClientPods entry; the `reconciler` k8s-auth role
          # ships from bao-configure). Idempotent/read-only alongside the CronJobs,
          # which stay until each proves out.
          # volume-labels: renames bound Linode-CSI Volumes to
          # <REGION_SHORT>-<ns>-<pvc>. Needs LINODE_TOKEN (ESO Secret) + REGION_SHORT
          # (per-env, filled by the render-patch). Leader-gated + idempotent
          # alongside the linode-volume-labeler CronJob.
          # cidr-firewall (this batch): the discover-firewall-config logic — reads
          # NODE_NAME (downward API) → the node's Linode instance → its firewall/VPC,
          # plus LINODE_TOKEN. Leader-gated + idempotent alongside the cidrFirewall
          # CronJob. NOTE: the private firewall controller is absent on e2e, so this
          # is exercised but not end-to-end proven there (harmless no-op).
          # linode-creds: the rotate-linode-creds logic — rotates the in-cluster
          # object-storage keys and writes them to OpenBao (Kubernetes-auth `reconciler`
          # role, granted the linode-rotator policy in bao-configure). Needs REGION +
          # OBJ_CLUSTER (per-env, render-patch) + OPENBAO_* + LINODE_TOKEN. Due-based: a
          # no-op until a key is within its rotation window. Leader-gated; the sole owner
          # now that the linodeCredRotator CronJob is retired.
          # NOT a reconciler: --reconcile-harbor. Harbor provisioning talks to the
          # mesh-protected harbor-core Service, which a pod in llz-reconciler (outside
          # the harbor Istio mesh) cannot reach — so it stays the in-namespace
          # harbor-robot-provisioner CronJob (components/harbor/).
          args:
            - reconcile
            - --metrics-addr=:8080
            - --sample-interval=30
            - --reconcile-argo-nudge
            - --reconcile-sc-demote
            - --reconcile-openbao-gauges
            - --reconcile-token-inventory
            - --reconcile-volume-labels
            - --reconcile-cidr-firewall
            - --reconcile-linode-creds
            # es-store-recovery: force-sync every ExternalSecret/PushSecret when
            # the openbao ClusterSecretStore transitions to Ready — the
            # in-cluster, event-driven owner of what `llz ci nudge-argo`'s
            # force-sync half does from CI (secrets-before-apps Phase 2; the CI
            # half stays until Phase 3 validates this lane end-to-end).
            - --reconcile-es-store-recovery
          env:
            # Leader-election identity + Lease namespace (downward API). Only used
            # when a driving reconciler is enabled; harmless otherwise.
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # OpenBao endpoint for the openbao-gauges sampler. VAULT_SKIP_VERIFY-style
            # posture: OpenBao's serving cert is signed by its private CA, so the
            # in-cluster consumers connect insecure (the code's HTTPClientInsecure);
            # traffic stays on the pod network. OPENBAO_ADDR has a code default but
            # is set explicitly for legibility.
            - name: OPENBAO_ADDR
              value: "https://platform-openbao.llz-openbao.svc.cluster.local:8200"
            # (LINODE_TOKEN is no longer an env secretKeyRef: the linode lanes
            # lazily read the optional linode-api-token volume below — env would
            # hold the pod hostage pre-store AND never see a rotation.)
            # volume-labels reconciler: the per-env label prefix. REGION_SHORT is
            # a placeholder overwritten per-env by llz-reconciler-env-patch.yaml
            # (llz render).
            - name: REGION_SHORT
              value: "REPLACE_ME"
            # cidr-firewall reconciler: the node this pod lands on identifies the
            # Linode instance (→ providerID → firewall/VPC) to discover. Downward
            # API, so no per-env render needed.
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            # linode-creds reconciler: REGION (= env name) + OBJ_CLUSTER (= spec
            # object-storage cluster) are per-env placeholders overwritten by
            # llz-reconciler-env-patch.yaml (llz render), same as REGION_SHORT.
            - name: REGION
              value: "REPLACE_ME"
            - name: OBJ_CLUSTER
              value: "REPLACE_ME"
            # OpenBao serving cert is signed by its private CA; in-cluster writers
            # connect insecure (traffic stays on the pod network), matching the
            # linodeCredRotator CronJob's posture.
            - name: OPENBAO_SKIP_VERIFY
              value: "true"
            # linode-creds logs into OpenBao via Kubernetes auth. rotate-linode-creds
            # defaults the role to `linode-rotator` (the CronJob's SA-bound role), but
            # THIS pod runs as the llz-reconciler SA, which is bound to the `reconciler`
            # role (now carrying the linode-rotator policy). Override so the login
            # resolves to a role this SA is actually bound to — otherwise it 403s.
            - name: OPENBAO_KUBERNETES_ROLE
              value: "reconciler"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            limits: { cpu: 200m, memory: 128Mi }
            requests: { cpu: 25m, memory: 48Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile: { type: RuntimeDefault }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - name: linode-api-token
              mountPath: /var/run/secrets/llz/linode-api-token
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        # optional: the ESO-synced token lands only after the OpenBao store is
        # Ready; the pod starts (and the argo-nudge + es-store-recovery lanes
        # run) without it, and kubelet materializes/refreshes the file when the
        # Secret appears or rotates. Consumed via linode_token.go's lazy read.
        - name: linode-api-token
          secret:
            secretName: linode-api-token
            optional: true
