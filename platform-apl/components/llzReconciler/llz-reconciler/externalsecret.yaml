# The in-cluster Linode token for the reconciler's Linode-touching reconcilers
# (volume-labels renames Volumes; later cidr-firewall/linode-creds). ESO syncs it
# from secret/linode/api-token — the canonical in-cluster Linode token, the same
# path the volume-labeler CronJob and linode-cred-rotator read. Only synced into
# a Secret here; the reconcilers read it as the LINODE_TOKEN env.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linode-api-token
  namespace: llz-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m, not 1h: on first boot the `openbao` ClusterSecretStore only goes Ready
  # AFTER OpenBao is unsealed + seeded, and ESO does NOT re-trigger an
  # ExternalSecret when its store recovers — the secret idles until its own
  # refreshInterval. At 1h that strands the reconciler pod
  # (CreateContainerConfigError) for up to ~1h post-store-Ready. 1m bounds that
  # gap; steady-state load is trivial (one cached OpenBao read/min). The post-seed
  # `llz ci nudge-argo` force-syncs immediately on top of this. Matches the
  # harbor-registry-s3 / loki-object-store ExternalSecrets.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode-api-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/api-token
        property: token
