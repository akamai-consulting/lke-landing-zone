# The in-cluster Linode token for the reconciler's Linode-touching reconcilers
# (volume-labels renames Volumes; later cidr-firewall/linode-creds). ESO syncs it
# from secret/linode/api-token — the canonical in-cluster Linode token, the same
# path the volume-labeler CronJob and linode-cred-rotator read. Only synced into
# a Secret here; the reconcilers read it as the LINODE_TOKEN env.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linode-api-token
  namespace: llz-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m, not 1h: on first boot the `openbao` ClusterSecretStore only goes Ready
  # AFTER OpenBao is unsealed + seeded, and ESO does NOT re-trigger an
  # ExternalSecret when its store recovers — the secret idles until its own
  # refreshInterval. At 1h that strands the reconciler pod
  # (CreateContainerConfigError) for up to ~1h post-store-Ready. 1m bounds that
  # gap; steady-state load is trivial (one cached OpenBao read/min). The post-seed
  # `llz ci nudge-argo` force-syncs immediately on top of this. Matches the
  # harbor-registry-s3 / loki-object-store ExternalSecrets.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode-api-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/api-token
        property: token
---
# The Contents:write PAT the apl-overlay reconciler (--reconcile-apl-overlay) uses
# to git-sync the overlay onto apl-<env> over the GitHub git-data API. ESO syncs it
# from secret/infra/apl-values-repo-token — the SAME token apl-core's otomi.git +
# the argocd repo Secrets use (already seeded there; also read by the
# token-inventory writer CronJob). Read-only into a Secret here; the reconciler
# reads it as APL_VALUES_REPO_TOKEN. Sync-wave 5 (before the wave-6 Deployment that
# has a hard secretKeyRef on it — same ordering as linode-api-token above).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apl-values-repo-token
  namespace: llz-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m for the same first-boot store-Ready reason as linode-api-token above.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: apl-values-repo-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: infra/apl-values-repo-token
        property: token
