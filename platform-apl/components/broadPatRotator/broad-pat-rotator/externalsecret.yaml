# The two credentials the rotator holds, both ESO-synced from OpenBao (the openbao
# ClusterSecretStore reads via the `eso` k8s-auth role):
#   1. the CURRENT broad Linode PAT (account:read_write) it mints the successor with,
#      and re-writes on each rotation (secret/linode/broad-pat, seeded once at bootstrap);
#   2. the GitHub token with Actions env-secrets:write to publish the new value
#      (secret/infra/github-dispatch-token — the same token the harbor provisioner uses;
#      OPENBAO_SECRETS_WRITE_TOKEN, which carries env-secrets:write).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: broad-pat-rotator-linode-token
  namespace: llz-pat-rotator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: broad-pat-rotator-linode-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/broad-pat
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: broad-pat-rotator-gh-token
  namespace: llz-pat-rotator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: broad-pat-rotator-gh-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: infra/github-dispatch-token
        property: token
