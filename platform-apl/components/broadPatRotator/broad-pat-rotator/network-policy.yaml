# Default-deny for the new namespace + the rotator's minimal egress. It holds an
# account:read_write Linode token and a GitHub secrets-write token — unconstrained
# egress would let a compromised image exfiltrate them. Allow only DNS + OpenBao
# (8200) + outbound HTTPS (443) for the Linode + GitHub APIs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llz-pat-rotator-default-deny
  namespace: llz-pat-rotator
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: broad-pat-rotator-egress
  namespace: llz-pat-rotator
  annotations:
    # -10, with the default-deny it complements and with every other
    # per-namespace NetworkPolicy in the tree. It sat at 5 — the same wave as the
    # CronJob it exists to unblock — so a tick landing before the allow rule
    # would fail CLOSED against the default-deny already in force since -10.
    # The schedule is weekly, which is exactly why nobody would have noticed.
    argocd.argoproj.io/sync-wave: "-10"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: broad-pat-rotator
  policyTypes: [Egress, Ingress]
  ingress: []
  egress:
    # DNS. Match kube-system by NAMESPACE only, NOT a `k8s-app: kube-dns`
    # podSelector: LKE-Enterprise runs CoreDNS labeled `k8s-app: coredns` (the
    # `workload-coredns` deployment) — there is no `kube-dns`-labeled pod, so a
    # kube-dns podSelector silently matches nothing and every lookup times out.
    # That blocked the rotator's OpenBao Service resolution (login hung "awaiting
    # headers") plus api.linode.com / api.github.com. Only DNS listens on :53 in
    # kube-system, so a namespace-scoped :53 grant is both correct and safe.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # OpenBao (Kubernetes-auth login + KV read/write of secret/linode/broad-pat).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llz-openbao
      ports:
        - { protocol: TCP, port: 8200 }
    # api.linode.com + api.github.com (HTTPS). Port-restricted 0.0.0.0/0 — same
    # posture as the linode-cred-rotator + harbor-provisioner API egress.
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { protocol: TCP, port: 443 }
