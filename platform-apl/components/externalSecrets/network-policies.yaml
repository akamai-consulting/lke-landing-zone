# Default-deny + allow rules for apl-core's `external-secrets` namespace.
# apl-core 6.x ships ESO as a core app there but supplies NO NetworkPolicies for
# it (its apl-network-policies chart only covers gitea/git-server/otomi-api), so
# the landing zone gap-fills them here — the same pattern cluster-foundation uses
# for the other apl-managed namespaces (cert-manager/harbor/istio-system/…).
# ESO controller pods need egress to OpenBao (8200) and the Kubernetes API.
#
# ORDERING: this namespace is created by apl-core's helmfile (not pre-created at
# wave -20 like the llz-* namespaces), so on first boot these -10 NPs can't apply
# until apl-core creates `external-secrets`. Argo CD retries with backoff and they
# self-heal once the namespace exists — expect transient "namespace not found".
#
# LKE-Enterprise note: the in-cluster `kubernetes` Service maps port 443 to
# targetPort 6443 (the real apiserver port). Cilium evaluates NetworkPolicy
# *after* the kube-proxy-replacement DNAT, so the egress rule must allow
# port 6443 in addition to 443 — otherwise connections to 10.x.x.1:443 are
# silently dropped and ESO times out trying to list API resources.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-default-deny
  namespace: external-secrets
  annotations:
    # Apply before any external-secrets workload — see project-np-sync-wave-race.
    argocd.argoproj.io/sync-wave: "-10"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow all external-secrets pods to resolve DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-allow-dns
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow ESO controller to reach OpenBao (port 8200) and the Kubernetes API.
# ESO uses Kubernetes auth against OpenBao and calls the K8s API to create/update Secrets.
# Port 6443 covers LKE-Enterprise where the `kubernetes` Service DNATs 443→6443
# and Cilium evaluates policy on the post-DNAT port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-allow-egress
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llz-openbao
      ports:
        - port: 8200
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
---
# Allow the kube-apiserver to reach the ESO validating webhook (port 10250)
# so ClusterSecretStore/SecretStore/ExternalSecret create+update operations
# don't 5s-timeout. The default-deny above blocks every Ingress; without
# this allow, any kubectl mutation of an ESO CR fails with:
#   "failed calling webhook validate.clustersecretstore.external-secrets.io:
#    … context deadline exceeded"
# On LKE-E the apiserver reaches webhooks via konnectivity-agent tunnels
# rather than direct pod IPs, so an open ingress is the simplest cover.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-allow-ingress-webhook
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 10250
          protocol: TCP
