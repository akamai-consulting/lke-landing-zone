# copier.yml — makes this repo a Copier template for LKE landing-zone instances.
#
#   copier copy   gh:<org>/lke-landing-zone <dst>   # scaffold a new instance
#   copier update                                   # pull template changes into
#                                                   #   an instance (3-way merge —
#                                                   #   conflicts only where the
#                                                   #   instance diverged)
#
# This is the apply-side of "pull template updates cleanly": Copier renders the
# instance from instance-template/, records answers in .copier-answers.yml, and
# on `copier update` re-renders the old + new template versions and 3-way-merges
# the delta onto the instance. Ownership mirrors instance-template/.template-manifest:
#   managed → re-rendered/overwritten on update
#   merge   → carries <@ token @> substitutions; 3-way-merged (conflicts only on
#             lines the instance changed beyond the token)
#   owned   → seeded once via _skip_if_exists, never touched again
# `llz ci template-manifest` keeps that manifest complete in CI.

# Only instance-template/ is the scaffold; the rest of the repo (modules, charts,
# reusable workflows, this file) is template machinery, not copied into instances.
_subdirectory: instance-template

# This scaffold is bash- and GitHub-Actions-heavy: `{{ }}` (Helm / Actions ${{ }})
# and `[[ ]]` (bash tests) appear ~600 / ~38 times. The default Jinja delimiters
# would corrupt them, so use delimiters verified absent from the entire tree.
_envops:
  variable_start_string: "<@"
  variable_end_string: "@>"
  block_start_string: "<%"
  block_end_string: "%>"
  comment_start_string: "<#"
  comment_end_string: "#>"
  keep_trailing_newline: true

# Render every file in-place (not just *.jinja) so the <@ token @> substitutions
# resolve without renaming files. Safe because the delimiters above collide with
# nothing in the scaffold.
_templates_suffix: ""

# Files under the scaffold that instances must NOT receive. Setting _exclude
# REPLACES Copier's built-in default, so the usual junk patterns are re-listed.
# `.github/actions` is template-INTERNAL: the reusable `llz-*` workflows source
# the composite actions from a template checkout (docs/templatization-plan.md
# §"Keeping instances in sync"), so an instance no longer copies them — every
# instance workflow is a thin caller now. The actions stay physically under
# instance-template/.github/actions/ (this scaffold dir) for the reusable
# workflows to reference; this rule just keeps them out of generated instances.
_exclude:
  - "copier.yml"
  - "copier.yaml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"
  - ".github/actions"
  - ".github/actions/**"

# Answers tracker that `copier update` reads. Shipped (templated) at
# instance-template/.copier-answers.yml.
_answers_file: .copier-answers.yml

# Seed once on `copier copy`, never overwrite on `copier update` (= manifest
# `owned`): the provider lockfile each instance regenerates, and the operator's
# control-plane ACL allow-list. Per-env tfvars and apl-values/<env> overlays are
# created by `llz env add` and never exist in the template, so Copier
# leaves them alone without needing a rule here.
#
# EVERY `owned` file the template actually SHIPS must appear here (or under
# `_exclude`), or `copier update` re-renders + 3-way-merges it onto the instance's
# own content and can leave conflict markers behind — the failure that shipped
# invalid YAML in the gsap-apl v0.0.24 upgrade. `llz ci template-manifest`
# asserts this manifest↔copier consistency in CI (see
# docs/designs/cross-org-reuse-pattern.md Phase 0), so an owned file added to
# .template-manifest without a rule here fails the build.
_skip_if_exists:
  - "terraform-iac-bootstrap/*/.terraform.lock.hcl"
  - "terraform-iac-bootstrap/cluster/extra-acl-cidrs.txt"
  # The operator-owned custom/ escape hatch (shipped once as an empty starter) and
  # the one shared file `llz render` fills in place with the operator's ACME email:
  # both are `owned`, so an update must never re-render + merge them.
  - "apl-values/_shared/custom/**"
  - "apl-values/_shared/manifest/dns/letsencrypt-clusterissuer.yaml"

# ── Content delivered from OUTSIDE the scaffold ──────────────────────────────
# docs/ lives at the repo root — NOT under instance-template/ — so the scaffold a
# human audits stays trim and there is one source of truth shared by the
# template's own CI/README AND every instance:
#   * docs/ — the operator-facing runbooks/playbooks/architecture the README
#             calls "knowledge an adopter inherits", landed at the instance's
#             docs/. The pure template-build docs (templatization-plan.md =
#             extraction design, agents.md = contributor convention,
#             designs/cross-org-reuse-pattern.md = the reuse-pattern extraction
#             design) are dropped — they describe building the template, not
#             operating an instance (and the last carries literal <@ … @> delimiter
#             examples that must never reach the instance's rendered docs/).
# `_subdirectory` would otherwise never copy docs/, so this task pulls it in from
# the cloned template (`_copier_conf.src_path`). Tasks run on BOTH `copier copy`
# and `copier update`, so docs/ refreshes on update exactly like a `managed` file
# (.template-manifest classifies docs/** as managed to match) — verified with
# copier 9.x. (Requires `copier copy --trust`, since this runs a shell command.)
# docs/ carries no <@ token @>s, so a raw cp loses no rendering.
#
# Operational tooling is deliberately NOT delivered here. Like .github/actions
# (see `_exclude` above), it is template-INTERNAL: the former instance-scripts/
# were assimilated into the llz CLI (tools/cmd/llz), which is baked into the
# ci-terraform CI image (dockerfiles/terraform/Dockerfile) the reusable `llz-*`
# workflows run in, so an instance never carries its own copy.
_tasks:
  # Deliver docs/: copy the template's full set in, then `llz ci deliver-docs`
  # prunes to the day-to-day operator set (quickstart + runbooks + playbooks) and
  # writes docs/README.md pointing at the rest in the (public) template repo,
  # version-pinned to <@ llz_version @>. The keep-set lives ONCE in the verb, so
  # this and release-e2e can't drift (the drift that leaked a template-build doc
  # into the e2e instance). No-op fallback if llz isn't on PATH (full docs kept).
  - "mkdir -p docs && cp -a <@ _copier_conf.src_path @>/docs/. docs/ && (command -v llz >/dev/null 2>&1 && llz ci deliver-docs --docs docs --org <@ upstream_org @> --ref <@ llz_version @> || echo \"(llz not on PATH — full docs/ kept; run 'llz ci deliver-docs --docs docs' to slim it)\")"
  # Slim the copied-in workflow surface: strip YAML-level comments from the big
  # reusable bodies (llz-*.yml) AND the apl-values PLATFORM manifests
  # (components/ + _shared/manifest/ — RBAC, Deployments, Kyverno, PrometheusRules)
  # so an instance carries the machinery, not the maintainer rationale it never
  # reads (the template SOURCE keeps its comments; rationale lives in docs/designs).
  # SAFE — only true YAML comments outside `run:`/`|`/`>` block scalars are removed
  # (bash/markdown/heredoc content preserved), each file's header kept. Deliberately
  # EXCLUDES apl-values/**/values.yaml and _shared/custom/ (operator-tuned config
  # whose comments explain what to change). Idempotent; no-op if llz is absent.
  # See docs/designs/instance-slimming.md.
  - "command -v llz >/dev/null 2>&1 && llz ci strip-comments .github/workflows/llz-*.yml $(find apl-values/components apl-values/_shared/manifest -type f \\( -name '*.yaml' -o -name '*.yml' \\) 2>/dev/null) $(find terraform-iac-bootstrap -type f -name '*.tf' 2>/dev/null) || echo \"(llz not on PATH — skipping comment-strip; run 'llz ci strip-comments .github/workflows/llz-*.yml ...')\""
  # Prune the apl-values trees an instance fetches REMOTELY from the template repo
  # instead of vendoring: the token-free platform components (all but the pinned-local
  # clusterHealthWorkflow) and the whole _shared/manifest base. `llz render` emits each
  # env overlay with pinned remote refs (github.com/<org>/lke-landing-zone//…?ref=<ver>)
  # into these trees, so an instance carries them ONCE upstream — the footprint half of
  # the remote-refs refactor (docs/designs/instance-slimming.md). Registry-driven +
  # idempotent; never touches _shared/values.yaml, _shared/custom, or the local components.
  - "command -v llz >/dev/null 2>&1 && llz ci prune-remote-apl-values --apl-values apl-values || echo \"(llz not on PATH — skipping remote-tree prune; run 'llz ci prune-remote-apl-values')\""
  # Arm the pre-commit hook via `llz hooks` (secrets guard + `llz lint`). git init
  # needs a repo: on `copier update` the instance already is one; on the initial
  # `copier copy` it isn't yet, so init first. Test for `.git` in THIS dir (not
  # `git rev-parse`, which walks UP and finds a parent repo when the instance is
  # scaffolded inside one — e.g. the template checkout or a git-tracked $HOME —
  # leaving the instance un-init'd so `gh repo create --source` later fails).
  # `llz hooks` is per-clone and idempotent; if llz isn't on PATH, fall back to a
  # reminder (run it yourself).
  - "[ -e .git ] || git init -q; command -v llz >/dev/null 2>&1 && llz hooks || echo \"run 'llz hooks' in this instance to arm the pre-commit hook\""

# ── Questions ────────────────────────────────────────────────────────────────
upstream_org:
  type: str
  help: >-
    GitHub org that hosts the LKE landing-zone template — its tagged Terraform
    modules, OCI Helm charts, CI images, and reusable workflows that this
    instance consumes. Keep the default to track upstream directly, or set it to
    your fork's org if you publish your own.
  default: akamai-consulting

instance_repo:
  type: str
  help: >-
    This instance's own GitHub repository as <owner>/<name> — used for ArgoCD
    repo URLs, `gh` CLI targeting, and the SSH deploy-key wiring.
  default: your-org/your-instance-repo

llz_version:
  type: str
  help: >-
    The landing-zone release this instance pins to — the git tag rendered into the
    Terraform module `?ref=` sources and the reusable-workflow `uses:@` /
    `template-ref:` refs, so a scaffold references the very release it was cut from.
    Normally set automatically by `llz new` / `llz upgrade` to a published release
    (the CLI is the version anchor; a dev build resolves the latest tag). For a
    manual `copier copy`, pass `-d llz_version=vX.Y.Z` to pin a release.
  # Fail closed: there is no safe default. An unpinned `main`/`master`/`HEAD` ref
  # floats the first-party module `?ref=` sources on a branch, which the template's
  # own tflint gate (terraform_module_pinned_source) rejects and Renovate cannot
  # bump. `llz new`/`llz upgrade` always pass a concrete tag via -d; a raw `copier
  # copy` must too. (`main` is still the pre-filled default an interactive prompt
  # shows — the validator forces it to be replaced.)
  default: main
  # Uses the custom _envops delimiters (<% %> blocks, <@ @> vars), not stock Jinja.
  validator: >-
    <% if llz_version in ["", "main", "master", "HEAD"] %>llz_version must be a
    pinned release tag like v0.0.18, not "<@ llz_version @>". `llz new` / `llz
    upgrade` set it for you; for a manual `copier copy` pass -d llz_version=vX.Y.Z.
    An unpinned ref fails the template's own tflint pinned-source gate and Renovate
    cannot bump it.<% endif %>

llz_image_ref:
  type: str
  default: "ghcr.io/<@ upstream_org @>/llz:latest"
  when: false
  help: >-
    Fully-qualified in-cluster llz image reference for CronJobs that run the llz
    CLI. Hidden from adopters: release-e2e renders it to the signed sha image for
    the commit under test, while normal copier scaffolds keep the signed latest
    image unless explicitly overridden by automation.
