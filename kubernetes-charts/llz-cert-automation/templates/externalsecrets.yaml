# ExternalSecrets — provisions workflow credentials from the secret backend.
#   <githubToken.remoteKey> — from GITHUB_DISPATCH_TOKEN environment secret, seeded
#       by .github/workflows/bootstrap-openbao.yml.
#   harbor docker config.json — DERIVED in-cluster: ESO reads the robot
#       username/password/registry_host from <harborDockerConfig.robotKey>
#       (secret/harbor/robot, seeded by `llz ci provision-harbor-robots`) and
#       renders the dockerconfigjson via configTemplate. No separate
#       secret/harbor/docker-config path or seed step.
# NOTE: remoteRef keys below omit the mount prefix (cert-automation/...,
# NOT secret/cert-automation/...) — the ClusterSecretStore is mounted at `secret/`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.githubToken.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llz-cert-automation.labels" . | nindent 4 }}
spec:
  data:
    - remoteRef:
        key: {{ .Values.externalSecrets.githubToken.remoteKey }}
        property: {{ .Values.externalSecrets.githubToken.remoteProperty }}
      secretKey: {{ .Values.externalSecrets.githubToken.remoteProperty }}
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStore.kind }}
    name: {{ .Values.externalSecrets.secretStore.name }}
  target:
    creationPolicy: Owner
    name: {{ .Values.externalSecrets.githubToken.secretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.harborDockerConfig.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llz-cert-automation.labels" . | nindent 4 }}
spec:
  data:
    - remoteRef:
        key: {{ .Values.externalSecrets.harborDockerConfig.robotKey }}
        property: username
      secretKey: username
    - remoteRef:
        key: {{ .Values.externalSecrets.harborDockerConfig.robotKey }}
        property: password
      secretKey: password
    - remoteRef:
        key: {{ .Values.externalSecrets.harborDockerConfig.robotKey }}
        property: registry_host
      secretKey: registry_host
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStore.kind }}
    name: {{ .Values.externalSecrets.secretStore.name }}
  target:
    creationPolicy: Owner
    name: {{ .Values.externalSecrets.harborDockerConfig.secretName }}
    # config.json is built by ESO at sync time from the robot creds fetched above;
    # configTemplate's {{ "{{ }}" }} are ESO's, not Helm's (injected verbatim).
    template:
      engineVersion: v2
      data:
        config.json: {{ .Values.externalSecrets.harborDockerConfig.configTemplate | toJson }}
