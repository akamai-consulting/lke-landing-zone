apiVersion: v2
name: llz-cert-automation
description: >-
  Event-driven TLS-certificate renewal for the edge HAProxy. Argo Events watches
  the cert-manager `haproxy-tls` Secret; when cert-manager rotates it, a Sensor
  submits an Argo Workflow that re-extracts the cert, rebuilds the HAProxy image
  via buildah, pushes it to Harbor, and dispatches the GitHub Actions deploy. This
  bridges the gap that the HAProxy container has no SIGHUP TLS-reload — without it
  the edge keeps serving the OLD cert after every ~80-day cert-manager rotation.
type: application
# Chart version — bump on any template/values change. Published to
# oci://ghcr.io/<org>/charts/llz-cert-automation by .github/workflows/publish-charts.yml.
# 0.1.1: strip internal fingerprints from comments for open-sourcing (no rendered change).
# 0.1.2: pin the EventBus JetStream version (was `latest`) to 2.10.10 for reproducibility.
# 0.1.3: externalSecrets.refreshInterval 1h -> 1m so cert-automation's ExternalSecrets
#        re-sync within ~1m of the OpenBao store going Ready on first boot (was ~14m idle).
# 0.1.4: derive the harbor docker config.json in-cluster — the harborDockerConfig
#        ExternalSecret now reads the robot creds (username/password/registry_host)
#        from secret/harbor/robot and renders the dockerconfigjson via an ESO v2
#        template, replacing the separate secret/harbor/docker-config seed.
# 0.1.5: fix the harborDockerConfig configTemplate — `{"auths":{{{ .registry_host`
#        was an unparseable Go template (`{{{` = `{{` delimiter + literal `{` →
#        "unexpected \"{\" in command"), so the ExternalSecret never rendered and the
#        harbor-docker-config Secret was never created. Separate the brace: `{ {{- `.
# 0.1.6: bump the ExternalSecret apiVersion external-secrets.io/v1beta1 → v1.
#        apl-core 6.x's bundled ESO (external-secrets 2.4.1) dropped the v1beta1
#        served version, so a v1beta1 manifest fails to apply ("no matches for kind
#        … in version external-secrets.io/v1beta1") and the harbor-docker-config
#        ExternalSecret never syncs.
version: 0.1.6
# appVersion tracks the HAProxy base image the rebuild Workflow builds FROM
# (workflow.build-image step: FROM haproxy:2.9-alpine).
appVersion: "2.9-alpine"
keywords:
  - argo-events
  - argo-workflows
  - cert-manager
  - haproxy
  - tls-rotation
  - cert-renewal
home: https://github.com/akamai-consulting/lke-landing-zone
maintainers:
  - name: lke-landing-zone platform team
annotations:
  artifacthub.io/license: Apache-2.0
