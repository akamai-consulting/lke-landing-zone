apiVersion: v2
name: llz-cluster-foundation
description: >-
  The secure-by-default baseline every namespace on a Linode LKE-E + apl-core
  cluster needs: the namespaces apl-core does NOT manage (openbao,
  observability, grafana, argo-workflows/events, external-secrets), default-deny
  NetworkPolicies + the minimum-viable allows for apl-core-managed namespaces
  (cert-manager, harbor, istio-system, observability), the CoreDNS `*.internal`
  rewrite to the platform Istio gateway, the one-shot CoreDNS rollout-restart,
  and the default-StorageClass demotion PostSync hook. The NetworkPolicy scars
  (istiod xDS egress, CNPG operator/Prometheus allows, Gateway-API pod
  selectors, the LKE-E 443+6443 apiserver pair) ship as correct-by-default.
type: application
# Chart version — bump on any template/values change. Published to
# oci://ghcr.io/<org>/charts/llz-cluster-foundation by .github/workflows/publish-charts.yml.
# 0.1.2: strip internal fingerprints from comments for open-sourcing (no rendered change).
# 0.1.3: add cert-manager-allow-webhook-linode-ingress NP so the apiserver can
#        reach the Linode DNS-01 webhook's :443 (else acme.slicen.me APIService
#        stays Available=False and convergence hangs).
# 0.1.4: drop the llz-linode-volume-labeler namespace from .namespaces — the
#        volume-labeler tree in apl-values (platform-bootstrap) is its sole
#        owner now, so declaring it here too raised a SharedResourceWarning that
#        pinned platform-bootstrap OutOfSync.
# 0.1.5: add a durable sc-default-patcher CronJob backstop (every 2m) so a Flux
#        re-promotion of linode-block-storage-retain that slips past the Kyverno
#        admission policy is re-demoted even after Flux goes quiet — the PostSync
#        Job + admission-only policy could leave 2 defaults wedging `llz ci converge`.
# 0.1.6: v6 migration — drop the llz-external-secrets namespace (apl-core 6.x runs
#        ESO as a core app in `external-secrets`; the gap-fill NPs now ship from the
#        externalSecrets apl-values component) and refresh the apl-network-policies
#        coverage note for 6.x; also document in coredns-custom.yaml that the
#        *.internal rewrite stays required on 6.x (the oauth2-proxy init container
#        still resolves keycloak.<domainSuffix>) and that narrowing to a per-host
#        allowlist is lab-gated — comment-only, no rendered resource change.
# 0.1.7: retire the durable sc-default-patcher CronJob backstop (added in 0.1.5) —
#        the sc-demote reconciler (llz reconcile --reconcile-sc-demote, default-on)
#        provides the same starvation-proof re-demote via a StorageClass watch +
#        resync floor. The PostSync Job + Kyverno admission policy remain.
# 0.1.8: FIX otelcol_* never scraped — add a monitoring→:8888 ingress rule to
#        observability-allow-ingress. The otel-collector-monitoring ServiceMonitor
#        selects the target, but observability-default-deny had no rule for
#        apl-core's Prometheus (monitoring ns), so every scrape of the OTel
#        Collector's :8888 telemetry port timed out (context-deadline-exceeded,
#        confirmed live) and otelcol_* was absent. Scoped to :8888, not all ingress.
# 0.1.9: add harbor-allow-metrics — a monitoring→harbor:8001 ingress rule so
#        Prometheus can scrape Harbor's metrics endpoints once metrics are enabled
#        (issue #183). Scoped to harbor app pods on :8001; mesh is PERMISSIVE so the
#        plaintext scrape needs no PeerAuthentication exception.
# 0.1.10: doc-only — retarget stale apl-values/_shared/… comment path refs to the
#         platform-apl/ layout the custom-gitops-layout branch moved to (a template
#         comment in network-policies.yaml; behavior unchanged, bumped so the guard
#         republishes the corrected artifact).
version: 0.1.12
# appVersion tracks the alpine/k8s kubectl image tag default in values.yaml
# (used by the CoreDNS-restart and StorageClass-patcher Jobs).
appVersion: "1.32.4"
keywords:
  - networkpolicy
  - default-deny
  - coredns
  - storageclass
  - apl-core
  - linode
  - lke-enterprise
  - istio
home: https://github.com/akamai-consulting/lke-landing-zone
maintainers:
  - name: lke-landing-zone platform team

