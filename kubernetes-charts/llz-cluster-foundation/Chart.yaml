apiVersion: v2
name: llz-cluster-foundation
description: >-
  The secure-by-default baseline every namespace on a Linode LKE-E + apl-core
  cluster needs: the namespaces apl-core does NOT manage (openbao,
  observability, grafana, argo-workflows/events, external-secrets), default-deny
  NetworkPolicies + the minimum-viable allows for apl-core-managed namespaces
  (cert-manager, harbor, istio-system, observability), the CoreDNS `*.internal`
  rewrite to the platform Istio gateway, the one-shot CoreDNS rollout-restart,
  and the default-StorageClass demotion PostSync hook. The NetworkPolicy scars
  (istiod xDS egress, CNPG operator/Prometheus allows, Gateway-API pod
  selectors, the LKE-E 443+6443 apiserver pair) ship as correct-by-default.
type: application
# Chart version — bump on any template/values change. Published to
# oci://ghcr.io/<org>/charts/llz-cluster-foundation by .github/workflows/publish-charts.yml.
# 0.1.2: strip internal fingerprints from comments for open-sourcing (no rendered change).
# 0.1.3: add cert-manager-allow-webhook-linode-ingress NP so the apiserver can
#        reach the Linode DNS-01 webhook's :443 (else acme.slicen.me APIService
#        stays Available=False and convergence hangs).
# 0.1.4: drop the llz-linode-volume-labeler namespace from .namespaces — the
#        volume-labeler tree in apl-values (platform-bootstrap) is its sole
#        owner now, so declaring it here too raised a SharedResourceWarning that
#        pinned platform-bootstrap OutOfSync.
# 0.1.5: add a durable sc-default-patcher CronJob backstop (every 5m) so a Flux
#        re-promotion of linode-block-storage-retain that slips past the Kyverno
#        admission policy is re-demoted even after Flux goes quiet — the PostSync
#        Job + admission-only policy could leave 2 defaults wedging `llz ci converge`.
version: 0.1.5
# appVersion tracks the alpine/k8s kubectl image tag default in values.yaml
# (used by the CoreDNS-restart and StorageClass-patcher Jobs).
appVersion: "1.32.4"
keywords:
  - networkpolicy
  - default-deny
  - coredns
  - storageclass
  - apl-core
  - linode
  - lke-enterprise
  - istio
home: https://github.com/akamai-consulting/lke-landing-zone
maintainers:
  - name: lke-landing-zone platform team

annotations:
  artifacthub.io/license: Apache-2.0
