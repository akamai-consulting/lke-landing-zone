{{- if .Values.storageClassPatcher.enabled }}
{{- $np := .Values.networkPolicies }}
{{- $sc := .Values.storageClassPatcher }}
# Default StorageClass demotion — keep block-storage-retain the SOLE cluster default.
#
# WHY THIS EXISTS:
#   LKE's `workload` HelmRelease (Flux-managed) installs `{{ $sc.demote }}` with
#   `storageclass.kubernetes.io/is-default-class: "true"`. That SC has no
#   encryption parameter and no block-storage Volume tags, so any apl-core workload
#   that doesn't explicitly set `storageClassName` (gitea, keycloak, eventual
#   argo-cd/Prometheus/Loki PVCs) provisions unencrypted, untagged Volumes — and
#   untagged Volumes can't be reaped by the tag-filtered destroy hook, leaving
#   Linode account-quota orphans. Two defaults also hard-fail `llz ci converge`
#   ("2 default StorageClasses … non-deterministic selection").
#
# THREE LAYERS, because no single one self-recovers:
#   1. Kyverno admission policy (cluster-bootstrap TF, sibling
#      manifests/kyverno-sc-default-demote.yaml) rewrites is-default-class→"false"
#      on every SC write — FAST, but `failurePolicy: Ignore` means a write can slip
#      through when the webhook is briefly unready, and it only acts on admission
#      events. Once a `true` write slips through, the live SC matches Flux's desired
#      state, so Flux STOPS reconciling it → no more admission events → the policy
#      is starved and never re-demotes. (Observed: 2 defaults stuck across an entire
#      30-min `llz ci converge` budget.)
#   2. PostSync Job (below) — demotes once after each Argo sync. But cluster-foundation
#      stays Synced, so it does NOT re-fire on its own; it only covers the initial demote.
#   3. sc-demote reconciler (llz reconcile --reconcile-sc-demote, default-on) — the
#      DURABLE backstop that replaced this chart's former CronJob: it re-demotes on a
#      StorageClass watch + resync floor, so a slipped-through Flux re-promotion is
#      corrected even after Flux goes quiet (no more admission events), independent of
#      admission events and Argo syncs. This is what guarantees convergence.
#
#   The SC itself is rendered by Terraform (cluster-bootstrap module), NOT by Argo —
#   it must land before apl-operator's helmfile starts creating PVCs.
#
# The shared PodTemplateSpec (demote + verify script) is the `scPatcher.podTemplate`
# helper in _helpers.tpl, used by both the Job and the CronJob below.
---
# Isolating NetworkPolicy. Same pattern as the coredns-restart Job. The patcher
# pod only needs egress to the K8s apiserver (kubectl) + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sc-default-patcher-isolate
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.syncWaves.corednsRestart | quote }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sc-default-patcher
  policyTypes: [Ingress, Egress]
  egress:
    # kube-apiserver — LKE-E dual-port: 443 (in-cluster Service) + 6443 (DNAT'd
    # apiserver address Cilium sees post-rewrite). Both required.
    #
    # NO `to:` selector. On LKE-E the control plane is managed/external — there is
    # NO in-cluster pod labeled `component: kube-apiserver`, so a podSelector here
    # matches nothing and silently blocks ALL apiserver egress: kubectl can't
    # reach the apiserver, `kubectl get sc` fails, and the script misreports it as
    # "{{ $sc.desiredDefault }} not found" → exit 1 → CrashLoopBackOff (duplicate
    # default never demoted, convergence stalls). Allow 443/6443 to any
    # destination, matching every other foundation NP.
    - ports:
        {{- range $np.apiserverPorts }}
        - { port: {{ . }}, protocol: TCP }
        {{- end }}
    # DNS resolution.
    - ports:
        {{- range $np.dnsPorts }}
        - { port: {{ .port }}, protocol: {{ .protocol }} }
        {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sc-default-patcher
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sc-default-patcher
rules:
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: [get, list, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sc-default-patcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sc-default-patcher
subjects:
  - kind: ServiceAccount
    name: sc-default-patcher
    namespace: kube-system
---
# Initial demote — PostSync hook. Runs after every successful sync; gives the fast
# first demote on bootstrap. Durable re-assertion is now the sc-demote reconciler
# (this Job does not re-fire while cluster-foundation stays Synced).
apiVersion: batch/v1
kind: Job
metadata:
  name: sc-default-patcher
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    # Replace lets the next sync re-create the Job cleanly even if a previous run
    # is still in TTL.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 1500
  template:
    {{- include "scPatcher.podTemplate" . | nindent 4 }}
# (The durable-backstop CronJob that re-demotes {{ $sc.demote }} on a fixed cadence
# was retired: the sc-demote reconciler [llz reconcile --reconcile-sc-demote,
# default-on] re-demotes on a StorageClass watch + resync floor — the same
# starvation-proof durability the CronJob provided — proven in the #161 e2e. The
# PostSync Job above (fast initial demote) + the Kyverno admission policy remain.)
{{- end }}
