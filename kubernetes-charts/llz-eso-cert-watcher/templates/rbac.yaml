apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
---
# Role in the ESO namespace: trigger a rollout restart by patching the target
# Deployment's pod template (kubectl writes
# .spec.template.metadata.annotations.kubectl.kubernetes.io/restartedAt →
# fresh ReplicaSet). Tight: only the named Deployment, only get+patch.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-restart
  namespace: {{ include "llz-eso-cert-watcher.targetNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: [{{ .Values.target.deployment.name | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-restart
  namespace: {{ include "llz-eso-cert-watcher.targetNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-restart
subjects:
  - kind: ServiceAccount
    name: {{ include "llz-eso-cert-watcher.fullname" . }}
    namespace: {{ .Values.namespace }}
---
# Role in the watched Certificate's namespace: read the cert-manager Certificate
# status only. Reading the Certificate (public material — notBefore) gives the
# rotation signal WITHOUT granting access to the backing Secret, which holds
# tls.key. (Kubernetes RBAC doesn't gate on Accept headers, so `get secrets`
# would still expose .data.tls.key — reading the sibling Certificate is the
# actual narrowing.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-read
  namespace: {{ .Values.watch.certificate.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    resourceNames: [{{ .Values.watch.certificate.name | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-read
  namespace: {{ .Values.watch.certificate.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-read
subjects:
  - kind: ServiceAccount
    name: {{ include "llz-eso-cert-watcher.fullname" . }}
    namespace: {{ .Values.namespace }}
{{- if .Values.watch.store.name }}
---
# Cluster-scoped read of the watched ClusterSecretStore's status (signal 2).
# ClusterSecretStore is cluster-scoped, so this must be a ClusterRole, but
# resourceNames pins it to the single named store and `get` only — the watcher
# reads .status.conditions (public), never any Secret data.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-store-read
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["clustersecretstores"]
    resourceNames: [{{ .Values.watch.store.name | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-store-read
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rbacSyncWave | quote }}
  labels:
    {{- include "llz-eso-cert-watcher.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "llz-eso-cert-watcher.fullname" . }}-store-read
subjects:
  - kind: ServiceAccount
    name: {{ include "llz-eso-cert-watcher.fullname" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
