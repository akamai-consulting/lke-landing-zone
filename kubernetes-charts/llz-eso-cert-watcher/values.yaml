# Default values for eso-cert-watcher.
#
# These defaults capture the operational scar this chart exists to fix
# (project_eso_caprovider_stale_after_rotation): ESO's Vault/OpenBao provider
# caches the `caProvider` CA once at client creation, so after cert-manager
# rotates the backing TLS Secret ESO keeps serving the OLD CA and every
# ExternalSecret reconcile fails. This watcher polls the cert-manager
# Certificate's `.status.notBefore` and rolling-restarts ESO when it changes.
#
# A sibling deployment overrides only what differs (namespaces, names, image).

# nameOverride / fullnameOverride follow the standard Helm idiom. Left empty,
# resources are named "eso-cert-watcher" (the chart name).
nameOverride: ""
fullnameOverride: ""

image:
  # alpine/k8s ships a current kubectl + busybox shell — all this watcher needs.
  repository: alpine/k8s
  tag: "1.32.4"
  pullPolicy: IfNotPresent

# Namespace the watcher Deployment + its restart RBAC run in. This is the
# namespace ESO itself is installed in (the watcher restarts ESO in-place).
namespace: llz-external-secrets

# The ESO Deployment to rolling-restart on rotation.
target:
  deployment:
    name: llz-external-secrets
    # Defaults to .namespace when empty.
    namespace: ""

# The cert-manager Certificate whose rotation we watch. We read the Certificate
# (public material — `.status.notBefore`) rather than the backing Secret, so the
# watcher never needs read access to tls.key. Every issuance bumps notBefore.
watch:
  certificate:
    name: openbao-tls
    namespace: llz-openbao
  # ClusterSecretStore whose Ready condition we watch (signal 2 — recover a
  # store that wedged at bootstrap because ESO validated it before its inputs
  # existed and never re-validates on its own). The watcher reads only
  # `.status.conditions` (public), gated by a name-pinned cluster-scoped get.
  # Set `name: ""` to disable signal 2 entirely (e.g. a watcher not fronting an
  # OpenBao-backed store) — the ClusterRole/Binding and the signal-2 loop are
  # then omitted. `cooldownSeconds` rate-limits the recovery restart so a
  # genuinely-misconfigured store can't thrash ESO.
  store:
    name: openbao
    cooldownSeconds: 120

# Polling interval in seconds. Worst-case rotation-detection lag == this value.
# 60s is functionally indistinguishable from a true watch for a CA that rotates
# every ~80 days, and keeps the watcher to ~5 lines of shell.
pollIntervalSeconds: 60

# Argo CD sync-wave for the RBAC (ServiceAccount/Role/RoleBinding). They must
# exist before the Deployment (wave 0) starts. Matches the original raw manifest.
rbacSyncWave: "-5"

resources:
  limits:
    cpu: "100m"
    memory: "64Mi"
  requests:
    cpu: "10m"
    memory: "16Mi"

# Pod-level scheduling knobs (sibling deployments rarely change these).
nodeSelector: {}
tolerations: []
affinity: {}
