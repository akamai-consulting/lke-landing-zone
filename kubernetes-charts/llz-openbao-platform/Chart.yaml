apiVersion: v2
name: llz-openbao-platform
description: >-
  Opinionated "OpenBao on Kubernetes, done right" wrapper. Wraps the upstream
  OpenBao Helm chart (HA integrated-Raft, 3 replicas) and adds the cluster
  integration the bare chart omits: a cert-manager-issued serving cert with the
  per-pod raft SANs, default-deny + explicit-allow NetworkPolicies, a Prometheus
  ServiceMonitor, and a Promtail audit-log shipper sidecar config. Every
  non-obvious value is a default that captures an operational scar (raft join
  ordering, PSS securityContexts, the LKE-E 443→6443 NetworkPolicy DNAT, audit
  HCL `type =` requirement) so a sibling deployment overrides only what differs.
type: application
# Chart version — bump on any template/values change. Published to
# oci://ghcr.io/<org>/charts/llz-openbao-platform by .github/workflows/publish-charts.yml.
# 0.1.4: strip internal fingerprints from comments for open-sourcing (no rendered change).
# 0.1.5: doc-only — correct stale apl-values paths in README (no rendered change).
# 0.1.6: doc-only — point the openbao-tls cert-watcher references at openbao-cert-watcher
#        (the eso-cert-watcher chart was removed; no rendered change).
# 0.1.7: drop the retired secret-propagator AppRole rotation pipeline from the
#        approle-rotation CronWorkflow (GitHub CI now authenticates via GitHub-OIDC).
# 0.1.8: retire the AppRole-rotation subsystem — ESO now uses Kubernetes auth and
#        GitHub CI uses GitHub-OIDC, so the platform-ci AppRole, the rotation
#        CronWorkflow + its NetworkPolicy/ESO, and the in-cluster PAT are gone.
# 0.1.9: doc-only — drop the stale AppRole-rotation CronWorkflow mention from the
#        chart description/keywords/README (the subsystem was removed in 0.1.8;
#        no rendered change).
# 0.1.10: static-key auto-unseal — add a `seal "static"` stanza (key mounted from
#        the openbao-unseal-key Secret at file:///openbao/seal/unseal.key) so
#        pods unseal themselves at boot. Replaces the Shamir submit-keys flow and
#        the openbao-auto-unseal re-unseal cron. The key Secret is created by
#        `llz ci bao-seed-seal-key` before bootstrap.
# 0.1.11: fix the promtail audit-shipper sidecar — add `-config.expand-env=true`
#         (+ a downward-API HOSTNAME env) so the `pod: ${HOSTNAME}` label resolves
#         to the pod name instead of shipping the literal string `${HOSTNAME}` to
#         Loki on every OpenBao audit line.
# 0.1.12: allow the in-cluster harbor + cred-rotator CronJobs through OpenBao's
#         ingress NetworkPolicy (they authenticate at :8200 to seed/read secrets).
# 0.1.13: v6 migration — swap the retired `llz-external-secrets` client namespace
#         for apl-core 6.x's core ESO namespace `external-secrets` in the OpenBao
#         :8200 allow list (the self-managed ESO controller is gone).
version: 0.1.13
# appVersion tracks the OpenBao server image tag default in values.yaml.
appVersion: "2.5.0"
keywords:
  - openbao
  - vault
  - secrets
  - raft
  - cert-manager
home: https://github.com/akamai-consulting/lke-landing-zone
maintainers:
  - name: lke-landing-zone platform team
dependencies:
  - name: openbao
    version: 0.13.0
    repository: https://openbao.github.io/openbao-helm
    condition: openbao.enabled

annotations:
  artifacthub.io/license: Apache-2.0
