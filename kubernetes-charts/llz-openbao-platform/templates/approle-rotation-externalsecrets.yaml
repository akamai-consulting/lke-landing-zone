{{- if ne (toString .Values.approleWorkflow.approleRotationEnabled) "false" }}
# ExternalSecrets — provisions workflow credentials for the AppRole rotation
# CronWorkflow from OpenBao.
# Bootstrap: automated by .github/workflows/bootstrap-openbao.yml from GITHUB_DISPATCH_TOKEN environment secret.
# Note: the remoteRef key below omits the mount prefix (approle/rotation-secrets, not secret/approle/...).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: approle-rotation-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: approle-rotation-secrets
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        key: approle/rotation-secrets
        property: github_token
{{- end }}
