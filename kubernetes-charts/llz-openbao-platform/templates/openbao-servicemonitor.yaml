{{- if .Values.platform.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-openbao
  namespace: {{ .Release.Namespace }}
  labels:
    # The Prometheus Operator selects ServiceMonitors by this release label.
    release: {{ .Values.platform.serviceMonitor.releaseLabel }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  endpoints:
    - port: http
      scheme: https
      path: /v1/sys/metrics
      params:
        format:
          - prometheus
      interval: 30s
      scrapeTimeout: 10s
      tlsConfig:
        insecureSkipVerify: true
{{- end }}
