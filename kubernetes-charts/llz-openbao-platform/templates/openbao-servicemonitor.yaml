{{- if .Values.platform.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-openbao
  namespace: {{ .Release.Namespace }}
  labels:
    # Labels the Prometheus Operator's serviceMonitorSelector matches. apl-core's
    # kube-prometheus-stack selects on `prometheus: system` (NOT a release label),
    # so a ServiceMonitor without it is silently ignored and vault_* never scrapes.
    {{- toYaml (.Values.platform.serviceMonitor.selectorLabels | default (dict "prometheus" "system")) | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  endpoints:
    # The OpenBao Service exposes 8200 as a port named `https` (TLS listener); the
    # old `http` name matched no Service port, so the operator generated no target.
    - port: https
      scheme: https
      path: /v1/sys/metrics
      params:
        format:
          - prometheus
      interval: 30s
      scrapeTimeout: 10s
      tlsConfig:
        insecureSkipVerify: true
{{- end }}
