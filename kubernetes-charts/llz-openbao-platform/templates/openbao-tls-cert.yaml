# cert-manager Certificate — provisions the TLS cert for in-cluster OpenBao
# HTTPS. The Secret (platform.tls.secretName, default `openbao-tls`) is mounted
# into OpenBao pods via openbao.server.volumes.
#
# Issued by a STABLE self-signed cert-manager issuer (platform.tls.issuerRef,
# default ClusterIssuer `openbao-ca`) with no OpenBao dependency, so cert-manager
# issues this cert BEFORE OpenBao starts (the pod waits in ContainerCreating for
# the mount) and the serving CA never changes. The dnsNames below cover the
# per-pod raft FQDNs, so raft TLS forms on first boot — they MUST match the
# retry_join blocks in openbao.server.ha.raft.config.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.platform.tls.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.platform.tls.secretName }}
  duration: {{ .Values.platform.tls.duration }}
  renewBefore: {{ .Values.platform.tls.renewBefore }}
  isCA: false
  usages:
    - server auth
  dnsNames:
    - {{ .Values.platform.releaseName }}
    - {{ .Values.platform.releaseName }}.{{ .Release.Namespace }}
    - {{ .Values.platform.releaseName }}.{{ .Release.Namespace }}.svc
    - {{ .Values.platform.releaseName }}.{{ .Release.Namespace }}.svc.cluster.local
    {{- $count := int .Values.openbao.server.ha.replicas }}
    {{- range $i := until $count }}
    - {{ $.Values.platform.releaseName }}-{{ $i }}.{{ $.Values.platform.internalServiceName }}.{{ $.Release.Namespace }}.svc.cluster.local
    {{- end }}
  issuerRef:
    name: {{ .Values.platform.tls.issuerRef.name }}
    kind: {{ .Values.platform.tls.issuerRef.kind }}
