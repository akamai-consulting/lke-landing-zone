apiVersion: v2
name: llz-argo-bootstrap-apps
description: >-
  App-of-apps generator. Renders the ordered set of bootstrap Argo CD
  `Application` CRs (and optionally the `AppProject`) from a values-driven
  component list, encoding the cluster's hard-won sync-wave ordering as
  defaults so a sibling system team gets a correctly-ordered bootstrap by
  setting values instead of hand-authoring Application YAML. Captures the
  wave-ordering scars (AppProject before any App that references it, ESO
  before its consumers, EventBus before EventSource) so the next adopter
  doesn't re-discover them.
type: application
# Chart version — bump on any template/values change. Published to
# oci://ghcr.io/<org>/charts/llz-argo-bootstrap-apps by
# .github/workflows/publish-charts.yml.
# 0.1.4: drop the stale llz-openbao app-of-apps entry (OpenBao now ships as the
#        apl-values/components/openbao kustomize Component; the duplicate collided).
# 0.1.6: drop the eso-cert-watcher app-of-apps entry (ESO >=0.10.7 re-reads the
#        openbao-tls CA via --store-requeue-interval; the watcher was retired).
# 0.1.7: bump the llz-cert-automation pin to 0.1.2 (JetStream version pin).
# 0.1.8: bump the llz-cert-automation pin to 0.1.3 (ExternalSecret refreshInterval 1h->1m).
# 0.1.9: doc-only — drop the stale AppRole-rotation CronWorkflow mention from the
#        Argo Workflows comment (the subsystem was retired; no rendered change).
# 0.1.10: bump the llz-cluster-foundation pin to 0.1.4 (drops the duplicate
#         llz-linode-volume-labeler namespace that raised a SharedResourceWarning).
# 0.1.11: bump the llz-cert-automation pin to 0.1.4 (harbor docker-config derived in-cluster via ESO).
# 0.1.12: bump the llz-cluster-foundation pin to 0.1.5 (durable sc-default-patcher
#         CronJob backstop so a slipped-through Flux re-promotion can't leave 2
#         default StorageClasses wedging `llz ci converge`).
# 0.1.13: bump the llz-cert-automation pin to 0.1.5 (fix the unparseable
#         harborDockerConfig configTemplate so its ExternalSecret renders).
# 0.1.14: v6 migration — remove the llz-external-secrets-operator bootstrap
#         Application (apl-core 6.x ships ESO as a core app in `external-secrets`;
#         a second cluster-scoped controller would fight it), retarget the
#         AppProject destination namespace to `external-secrets`, bump the
#         llz-cluster-foundation pin to 0.1.6, and drop the now-dead
#         charts.external-secrets.io sourceRepos allowlist entry (the ESO App
#         that consumed it is gone).
# 0.1.15: bump the llz-cluster-foundation pin to 0.1.7 (that chart retired its
#         sc-default-patcher CronJob; the PostSync Job + Kyverno policy remain).
# 0.1.16: bump the llz-cluster-foundation pin to 0.1.8 (adds a monitoring→:8888
#         ingress rule so apl-core's Prometheus can scrape the OTel Collector).
# 0.1.17: bump the llz-cluster-foundation pin to 0.1.9 (adds harbor-allow-metrics
#         so Prometheus can scrape Harbor's :8001 metrics endpoints, issue #183).
version: 0.1.17
# appVersion is nominal here — this chart renders Argo CD CRs and pins no
# single upstream image; it tracks the bootstrap layout, not a binary.
appVersion: "0.1.0"
keywords:
  - argocd
  - app-of-apps
  - bootstrap
  - sync-wave
  - gitops
home: https://github.com/akamai-consulting/lke-landing-zone
maintainers:
  - name: lke-landing-zone platform team

annotations:
  artifacthub.io/license: Apache-2.0
