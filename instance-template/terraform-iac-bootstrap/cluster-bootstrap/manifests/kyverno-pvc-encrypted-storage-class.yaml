# Kyverno ClusterPolicy: narrow safety net for the two apl-core charts that
# hardcode `storageClass: linode-block-storage` on the linode provider and
# can't be overridden via `cluster.defaultStorageClass`:
#
#   - gitea-valkey            → namespace `gitea`             (PVC: valkey-data-gitea-valkey-primary-0)
#   - oauth2-proxy redis-HA   → namespace `istio-system`      (PVC: data-oauth2-proxy-redis-ha-server-0)
#
# The hardcoded line lives in apl-core's value templates:
#   values/gitea/gitea-valkey.gotmpl
#       global.defaultStorageClass: {{ if eq $v.cluster.provider "linode" }}linode-block-storage{{ ... }}
#   values/oauth2-proxy/oauth2-proxy.gotmpl
#       redis.storageClass:         {{ if eq $v.cluster.provider "linode" }}linode-block-storage{{ ... }}
#
# Every other PVC-creating chart respects `cluster.defaultStorageClass`
# (apl-values/<env>/values.yaml), so this policy used to span all namespaces
# but no longer needs to. Narrowing reduces the admission-webhook blast
# radius and the chart-PVC-create vs Kyverno-webhook-ready race surface to
# just two well-known StatefulSets.
#
# If/when apl-core stops hardcoding linode-block-storage for the linode
# provider in those two templates, this policy can be removed entirely.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pvc-force-encrypted-storage-class
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
    policies.kyverno.io/title: Force encrypted Retain StorageClass on PVCs (narrow)
    policies.kyverno.io/category: Storage / Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: PersistentVolumeClaim
    policies.kyverno.io/description: >-
      Rewrites storageClassName=linode-block-storage to
      block-storage-retain on PVCs in the gitea and istio-system
      namespaces only — those host the two charts that hardcode the LKE
      default class on the linode provider and can't be overridden via
      apl-core's cluster.defaultStorageClass knob.
spec:
  # Apply at admission only — do NOT touch existing PVCs (they're already
  # bound; rewriting storageClassName would have no effect anyway and the
  # background scanner would log spurious failures).
  background: false
  # Best-effort: if the webhook fails, allow the PVC through rather than
  # blocking the entire workload. Logging will still surface the failure
  # so we can react. (Kyverno's webhook failurePolicy default is Fail —
  # we override to Ignore for safety during cluster bootstrap.)
  failurePolicy: Ignore
  rules:
    - name: rewrite-to-encrypted-retain-class
      match:
        any:
          - resources:
              kinds: [PersistentVolumeClaim]
              operations: [CREATE]
              namespaces: [gitea, istio-system]
      preconditions:
        all:
          # Match the LKE-shipped classes and the empty-string fallthrough.
          # Use `|| ''` to map missing field → "" so the AnyIn check works.
          - key: "{{ request.object.spec.storageClassName || '' }}"
            operator: AnyIn
            value:
              - ""
              - linode-block-storage
              - linode-block-storage-retain
      mutate:
        patchStrategicMerge:
          spec:
            storageClassName: block-storage-retain
