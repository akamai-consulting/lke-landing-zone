# .checkov.yaml — Checkov IaC security scan configuration.
# Scans: kubernetes/cluster (Linode LKE), kubernetes/argocd-bootstrap (Helm + K8s).
# Run via: make checkov
#
# Adding per-resource suppressions in .tf files (preferred over global skips):
#   resource "linode_lke_cluster" "this" {
#     #checkov:skip=CKV_LIN_1:reason why this specific resource is exempt
#   }
#
# Adding project-wide skips (use only for structural false positives, document reason):
#   skip-check:
#     - CKV_XYZ

# Resolve Terraform variable defaults where possible; reduces false positives
# that arise from conditional expressions and variable-driven resource configs.
evaluate-variables: true

skip-check:
  # The argocd namespace is created by Terraform solely to give the Helm release
  # a pre-existing namespace. ArgoCD's own pod security is enforced by its Helm
  # chart values; we do not set PSA labels on it via Terraform because ArgoCD
  # manages its own workload security model.
  - CKV_K8S_30

  # local_sensitive_file writes the LKE kubeconfig to runner.temp with mode 0600.
  # The file is deleted in the cleanup step. Checkov flags local file writes for
  # secrets generally; this is a documented, time-limited credential path.
  - CKV_TF_2
