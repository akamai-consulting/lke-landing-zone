# Grafana admin credentials — generated in-cluster, pushed to secret/grafana/admin.
# Replaces the `secret/grafana/admin` entry in bootstrapSeeds (ci_bao_seed_all.go).
# apl-core's grafana-admin-credentials ExternalSecret reads this OpenBao path
# (username + password) through the read-only `openbao` store, unchanged.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-generated
  namespace: external-secrets
spec:
  # 0 = generate exactly once and never refresh: ESO mints the password on first
  # reconcile and leaves the intermediate Secret stable, so the value can't churn
  # under a live Grafana. (The PushSecret's IfNotExists is the second guard.)
  refreshInterval: "0"
  target:
    name: grafana-admin-generated
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # username is the chart-default local admin; password is the generated value.
        username: admin
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: random-secret
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grafana-admin-push
  namespace: external-secrets
spec:
  # Retry roughly every minute until OpenBao is unsealed + the eso-pusher role
  # exists; once written, IfNotExists makes every subsequent reconcile a no-op.
  refreshInterval: 1m
  # Never overwrite an existing value — the declarative form of the seed's
  # skip-if-present guard (never rotate a live credential on a rerun).
  updatePolicy: IfNotExists
  # Keep the OpenBao value if this PushSecret/Secret is pruned — the platform
  # consumers still depend on it; an Argo prune must not wipe the credential.
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao-push
      kind: ClusterSecretStore
  selector:
    secret:
      name: grafana-admin-generated
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: grafana/admin
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: grafana/admin
          property: password
