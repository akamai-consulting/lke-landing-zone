# Shared ESO Password generator for the self-generated platform secrets. Each
# referencing ExternalSecret gets its own independent random output (the
# generator is config, not a stored value), so one object serves both the
# grafana admin password and the otel ingress bearer.
#
# Alphanumeric (symbols: 0): both values flow through shells, env vars and URLs
# downstream (grafana admin login, OTLP Authorization bearer), where special
# characters invite quoting bugs. 32 chars of [A-Za-z0-9] is ~190 bits — ample,
# and at least as strong as the old gen:base64:24 / gen:hex:32 it replaces.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: random-secret
  namespace: llz-external-secrets
spec:
  length: 32
  digits: 8
  symbols: 0
  symbolCharacters: "-_"
  noUpper: false
  allowRepeat: true
