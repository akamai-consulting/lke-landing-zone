# Kyverno ClusterPolicy: force Loki's chunk store onto S3.
#
# Applied by the platform-bootstrap Argo CD Application (sync-wave -15) so the
# policy is enforcing BEFORE apl-core's loki helmfile phase creates the loki
# ConfigMap — the mutation rewrites object_store filesystem->s3 on the cm's
# CREATE admission, so Loki reads the s3 schema from first start. If apl-core
# happens to create the cm first, the rule still fires on the next reconcile's
# UPDATE (apl-operator re-applies the chart-default filesystem cm), self-healing.
#
# WHY A KYVERNO MUTATION INSTEAD OF VALUES
# ----------------------------------------
# The grafana/loki chart does NOT derive the schema's `object_store` from
# `loki.storage.type: s3` — it comes from `loki.schemaConfig.configs[].
# object_store`, which the chart defaults to `filesystem`. Without an override,
# Loki writes chunks to the read-only container filesystem and every flush
# fails ("mkdir … read-only file system"), so zero logs are persisted.
#
# The obvious fix — set `_rawValues.loki.schemaConfig` in apl-values — does NOT
# flip it on apl-core v6: `object_store: s3` is emitted only when the native
# `obj.provider.type: linode` is set in values, which the landing zone
# deliberately does NOT use (it wires Loki S3 via `_rawValues` + in-cluster key
# rotation, not apl-core's static-cred `obj` model — see the obj-storage decision
# in docs/designs/apl-core-v6-migration.md). Through `_rawValues` alone the schema
# `object_store` stays the chart default `filesystem`.
#
# (Historical note: on apl-core ≤5.x this fix ALSO couldn't be a schemaConfig
# override because the values pipeline reserialized the schema `from` date into an
# ISO timestamp Loki rejected. v6 quotes/truncates the date correctly, so that
# specific round-trip is gone — but the object_store gap above remains.)
#
# So we DON'T override schemaConfig at all — the chart's own default schema has
# a valid date-only `from: "2020-09-07"` (it never goes through the pipeline) —
# and instead mutate just the `object_store` field of the rendered ConfigMap
# from `filesystem` to `s3`. The date is untouched; only the storage target
# changes. The chart's `loki.storage.{type:s3,bucketNames,s3}` (set via
# _rawValues) + the `loki-object-store` Secret (singleBinary.extraEnvFrom) then
# carry the S3 client config and credentials.
#
# This mirrors the repo's existing pattern of patching apl-core gaps Kyverno
# can express but values can't (see the sibling kyverno-oauth2-proxy-wait-
# keycloak-trust.yaml and cluster-bootstrap's kyverno-pvc-encrypted-storage-
# class.yaml).
#
# Removal is coupled to the obj-storage decision: this policy goes away only if
# the landing zone adopts apl-core's native `obj.provider.linode` path (which
# emits `object_store: s3` itself), or apl-core lets `object_store` be set safely
# via `_rawValues`/schemaConfig.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: loki-s3-object-store
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
    policies.kyverno.io/title: Force Loki schema object_store=s3
    policies.kyverno.io/category: Storage
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: ConfigMap
    policies.kyverno.io/description: >-
      Rewrites the Loki ConfigMap's schema_config object_store from filesystem
      to s3 so chunks persist to the platform-loki-* buckets instead of the
      read-only container filesystem. The schema `from` date is left untouched
      (apl-core's value pipeline corrupts it; the chart default is already
      valid date-only).
spec:
  # Mutate on admission for both CREATE (fresh install) and UPDATE (helm/
  # apl-operator reconciles re-applying the chart-default filesystem cm), so the
  # s3 setting is re-asserted every time the ConfigMap is written.
  background: false
  # Best-effort: never block the loki ConfigMap write on a webhook hiccup —
  # the bootstrap continues and the next reconcile re-applies the mutation.
  failurePolicy: Ignore
  rules:
    - name: rewrite-object-store-to-s3
      match:
        any:
          - resources:
              kinds: [ConfigMap]
              names: [loki]
              namespaces: [monitoring]
              operations: [CREATE, UPDATE]
      preconditions:
        all:
          # Only mutate when the rendered config still targets filesystem —
          # makes the rule a no-op once it's already s3 (and on any cm whose
          # config we don't recognize).
          - key: "{{ contains(request.object.data.\"config.yaml\" || '', 'object_store: filesystem') }}"
            operator: Equals
            value: true
      mutate:
        patchStrategicMerge:
          data:
            config.yaml: "{{ replace_all(request.object.data.\"config.yaml\", 'object_store: filesystem', 'object_store: s3') }}"
