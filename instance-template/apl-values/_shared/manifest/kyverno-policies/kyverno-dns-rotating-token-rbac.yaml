# RBAC for the dns-rotating-token policy's mutate-existing rules.
#
# Kyverno's BACKGROUND controller executes mutate-existing rules (the
# mutateExistingOnPolicyUpdate catch-up in kyverno-dns-rotating-token.yaml) and
# authorizes them with its own ServiceAccount — which, out of the box, has no
# permissions on external-secrets.io resources. Kyverno aggregates any
# ClusterRole labeled rbac.kyverno.io/aggregate-to-background-controller into
# the controller's role, so this grants exactly the two verbs the catch-up
# needs on ExternalSecrets (list/watch come with Kyverno's generic resource
# handling of targets). Admission-time mutation needs none of this — it
# rewrites the object in the API request stream.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:background-controller:externalsecrets
  labels:
    app.kubernetes.io/component: background-controller
    app.kubernetes.io/part-of: kyverno
    rbac.kyverno.io/aggregate-to-background-controller: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
rules:
  - apiGroups: [external-secrets.io]
    resources: [externalsecrets]
    verbs: [get, list, watch, update, patch]
