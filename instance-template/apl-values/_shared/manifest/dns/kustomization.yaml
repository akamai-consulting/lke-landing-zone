# DNS-bootstrap kustomize tree — applied SEPARATELY from the main manifest tree
# by .github/workflows/bootstrap-dns.yml, NOT included in the parent
# manifest/kustomization.yaml.
#
# Why split out: every resource here depends on a Linode DNS API token
# (LINODE_DNS_TOKEN GH env secret) that is an operator input — it cannot be
# derived from Terraform state or any other secret. Until the operator runs
# bootstrap-dns.yml against a region, this tree must NOT be applied: the
# dns01-solver-token ExternalSecret would fail to sync (no upstream secret at
# secret/certmanager/dns01) and abort the sync of every downstream resource.
#
# Workflow order on a cold bootstrap:
#   1. Operator seeds LINODE_DNS_TOKEN GH env secret for infra-<region>.
#   2. bootstrap-dns.yml seeds OpenBao secret/certmanager/dns01, then
#      `kubectl apply -k` this directory, then waits for ESO to sync.
#   3. dns01-solver-token Secret + llz-letsencrypt ClusterIssuers reach Ready in
#      sequence. The DNS-01 webhook itself is NOT shipped here — apl-core deploys
#      cert-manager-webhook-linode (API group `acme.slicen.me`) as part of its
#      cert-manager integration; the ClusterIssuers below target that group.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - dns01-solver-externalsecret.yaml
  - letsencrypt-clusterissuer.yaml
