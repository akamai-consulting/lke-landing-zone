# ExternalSecret — provisions the Linode DNS API token for cert-manager DNS-01
# challenges. Bootstrap: automated by .github/workflows/bootstrap-dns.yml from
# the LINODE_DNS_TOKEN environment secret (seeded into OpenBao at
# secret/certmanager/dns01).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dns01-solver-token
  namespace: cert-manager
spec:
  # 1m (down from 24h) so a cold-bootstrap reconcile that runs before the store
  # goes Ready (or before the workflow seeds certmanager/dns01) self-heals on its
  # own within ~1m. Matches the other store-gated ExternalSecrets (harbor, loki,
  # cert-automation) so the declarative refresh — not the best-effort
  # `llz ci nudge-argo` force-sync — is what reliably converges store-gated
  # secrets after OpenBao unseal (ESO doesn't re-trigger on store recovery).
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: cert-manager-dns01-solver-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: certmanager/dns01
        property: token
