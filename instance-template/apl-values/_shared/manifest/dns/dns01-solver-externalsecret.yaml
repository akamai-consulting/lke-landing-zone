# ExternalSecret — provisions the Linode DNS API token for cert-manager DNS-01
# challenges. Bootstrap: automated by .github/workflows/bootstrap-dns.yml from
# the LINODE_DNS_TOKEN environment secret (seeded into OpenBao at
# secret/certmanager/dns01).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dns01-solver-token
  namespace: cert-manager
spec:
  # 5m (down from 24h) so a cold-bootstrap reconcile that runs before the
  # workflow seeds certmanager/dns01 self-heals within the verify-window.
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: cert-manager-dns01-solver-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: certmanager/dns01
        property: token
