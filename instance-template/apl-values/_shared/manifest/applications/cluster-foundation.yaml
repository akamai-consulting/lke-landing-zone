# cluster-foundation — wave -20, the FIRST support-plane app to sync.
#
# Creates the namespaces apl-core does NOT manage (llz-openbao, llz-external-secrets,
# llz-observability, llz-argo-workflows/events, grafana, monitoring, …),
# plus the default-deny + component NetworkPolicies, the CoreDNS *.internal
# rewrite + restart Job, and the storage-class default patcher. Argo health-gates
# the wave, so the namespaces + NPs are Healthy before any wave -15+ consumer.
#
# THIS is the app whose absence broke the OpenBao bootstrap: with no
# cluster-foundation, the llz-openbao namespace is never created and the bootstrap
# workflow times out on `namespaces "llz-openbao" not found`.
#
# prune: false — foundation namespaces are load-bearing; an accidental prune would
# cascade-delete every workload in them (same stateful-safety rationale as OpenBao).
# CreateNamespace=false — the chart creates the namespaces it needs; letting Argo
# pre-create the destination would race the chart's own PSS-labeled Namespace
# objects. destination.namespace is only the fallback for the chart's
# cluster-scoped / explicitly-namespaced resources; kube-system is allowed by the
# project and is where the chart's unqualified core resources belong.
#
# Chart defaults already equal this cluster's values; the identity bits a sibling
# would change are pinned in valuesObject for visibility.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llz-cluster-foundation
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: platform-support
  source:
    repoURL: ghcr.io/<@ upstream_org @>/charts
    chart: llz-cluster-foundation
    targetRevision: 0.1.3
    helm:
      releaseName: llz-cluster-foundation
      valuesObject:
        # Must track the LKE-E cluster minor (e2e = v1.33.6+lke7) so the
        # restricted PSS labels pin the matching policy version.
        podSecurityStandardsVersion: "v1.33"
        coreDNS:
          custom:
            matchSuffix: internal
            gatewayTarget: platform-istio.istio-system.svc.cluster.local.
        networkPolicies:
          gateway:
            gatewayName: platform
        storageClassPatcher:
          desiredDefault: block-storage-retain
          demote: linode-block-storage-retain
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      # First-boot ordering races (OpenBao unseal / secret seed) can outlast the
      # old ~5-retry (~5 min) budget; a failed automated sync then terminally pins
      # the revision and Argo will not re-attempt it. ~20 retries @ 3m cap (~1h)
      # rides out the bootstrap window instead.
      limit: 20
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
