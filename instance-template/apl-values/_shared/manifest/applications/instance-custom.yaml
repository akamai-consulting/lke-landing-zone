# instance-custom — wave 10, the operator escape hatch for custom workloads.
#
# Syncs apl-values/_shared/custom/ — an operator-OWNED kustomize tree (the
# template ships it once and never touches it again) — onto the cluster. This is
# how an instance applies its OWN Kubernetes resources without touching Terraform
# or the LLZ-managed bootstrap tree. See docs/extending-llz.md → "Custom
# Kubernetes resources" and the custom/ kustomization.yaml for usage.
#
# BLAST-RADIUS ISOLATION is the whole point of it being a separate Application.
# The platform-bootstrap app-of-apps only syncs THIS Application object (a CR
# that's always valid) plus its AppProject; the operator's actual content is
# health-gated by `instance-custom` itself. A broken manifest in custom/ degrades
# only this app — it cannot fail the platform bootstrap's sync. (Same reasoning
# the llz-secret-store split uses, in the opposite direction.)
#
# Wave 10: lands AFTER the platform support plane is healthy (waves -20..5), so
# custom resources can rely on cert-manager, ESO + the openbao ClusterSecretStore,
# namespaces, and default-deny NetworkPolicies already being up.
#
# prune: false — operator content is theirs to remove deliberately; an accidental
# prune (e.g. a transient empty render) must not cascade-delete their workloads.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: instance-custom
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: instance-custom
  source:
    repoURL: https://github.com/<@ instance_repo @>.git
    path: apl-values/_shared/custom
    # HEAD tracks the values repo's default branch — correct for the common case
    # where apps_repo_revision is that branch. If this instance pins
    # apps_repo_revision to a tag/sha, pin this targetRevision to match so custom
    # resources track the same revision as the rest of the platform.
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    # Fallback namespace for any unnamespaced resource; operator manifests should
    # set their own metadata.namespace (the instance-custom project allows any).
    namespace: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      # An empty custom/ (the shipped default) renders zero resources — don't let
      # that read as "prune everything".
      - ApplyOutOfSyncOnly=true
      # Operators may land a CRD and its CRs together; skip the dry-run on
      # not-yet-registered kinds (same rationale as the root app-of-apps).
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
      - CreateNamespace=false
