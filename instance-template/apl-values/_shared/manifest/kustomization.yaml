# Shared, always-on platform base — referenced by every env's
# apl-values/<env>/manifest/ overlay (resources: ../../_shared/manifest). Holds the
# mandatory pieces: the platform-support AppProject (argocd) and the
# cluster-foundation Application (wave -20). Toggleable pieces live as kustomize
# Components under apl-values/components/<name>/; per-env files (the thin overlay,
# the volume-labeler REGION_SHORT patch, env-revision) are generated by `llz render`.
# Template-managed — edit upstream. (dns/ + post-apl-bootstrap/ here are applied
# separately by their workflows, not part of this base's build.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - platform-support-project.yaml
  - applications/cluster-foundation.yaml
  # Standing safety net: re-triggers any Argo CD Application whose sync terminally
  # failed (Argo won't auto-retry a failed revision). Early wave (-18) so it's
  # running before the consumers that could fail. See argo-resync-nudger/.
  - argo-resync-nudger
  # Low-race Kyverno ClusterPolicies that patch apl-core gaps (loki object_store,
  # oauth2-proxy keycloak trust). Sync-wave -15 lands them before apl-core creates
  # the resources they mutate. The PVC-encryption policy stays a TF null_resource
  # (it must beat apl-operator's non-Argo PVC creation). See kyverno-policies/.
  - kyverno-policies
  # Self-generated, in-cluster-only secrets (grafana admin, otel bearer) minted by
  # an ESO Password generator and pushed into OpenBao — replaces the imperative
  # bao-seed of those two paths. See generated-secrets/.
  - generated-secrets
  # CIS + org-control ClusterComplianceReports (trivy-operator), harvested into
  # the auditor evidence pack by `llz ci cis-evidence`. Late sync-wave so the
  # trivy-operator CRD exists first. See compliance/ and docs/infosec/control-mapping.md.
  - compliance
