# Shared, always-on platform base — referenced by every env's
# apl-values/<env>/manifest/ overlay (resources: ../../_shared/manifest). Holds the
# mandatory pieces: the platform-support AppProject (argocd) and the
# cluster-foundation Application (wave -20). Toggleable pieces live as kustomize
# Components under apl-values/components/<name>/; per-env files (the thin overlay,
# the volume-labeler REGION_SHORT patch, env-revision) are generated by `llz render`.
# Template-managed — edit upstream. (dns/ here holds the llz-letsencrypt
# ClusterIssuers and is Argo-synced as part of this mandatory base; the former
# post-apl-bootstrap/ tree moved into the observability component, Argo-synced.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - platform-support-project.yaml
  - applications/cluster-foundation.yaml
  # Operator escape hatch: the instance-custom AppProject + Application sync the
  # operator-owned apl-values/_shared/custom/ tree (the instance's own resources,
  # no Terraform). Wave 10, isolated blast radius. See docs/extending-llz.md.
  - instance-custom-project.yaml
  # (The argo-resync-nudger CronJob — standing safety net that re-triggered any
  # Argo CD Application whose sync terminally failed — was retired: the argo-nudge
  # reconciler [llz reconcile --reconcile-argo-nudge, default-on] replaces it,
  # watch-driven + resync-floored, proven in the #161 e2e.)
  # Low-race Kyverno ClusterPolicies that patch apl-core gaps (loki object_store,
  # oauth2-proxy keycloak trust). Sync-wave -15 lands them before apl-core creates
  # the resources they mutate. The PVC-encryption policy stays a TF null_resource
  # (it must beat apl-operator's non-Argo PVC creation). See kyverno-policies/.
  - kyverno-policies
  # Self-generated, in-cluster-only secrets (grafana admin, otel bearer) minted by
  # an ESO Password generator and pushed into OpenBao — replaces the imperative
  # bao-seed of those two paths. See generated-secrets/.
  - generated-secrets
  # The llz-letsencrypt-* ClusterIssuers (the real DNS-01 solver, targeting
  # apl-core's cert-manager-webhook-linode / groupName acme.slicen.me). Sync-wave
  # -5; cert-manager CRDs land earlier from apl-core. See dns/.
  - dns
  # Native admission guard: the llz-wave-health-guard ValidatingAdmissionPolicy —
  # the admission-time twin of `llz ci wave-health-guard`, rejecting a negative-wave
  # health-checked kind before it can wedge the sync, regardless of write path
  # (closes the apl-operator out-of-band writeback). Sync-wave -19. See admission/.
  - admission
