# ClusterSecretStore — points ESO at the in-cluster OpenBao instance.
#
# This is the single binding that EVERY ExternalSecret in the platform
# depends on (cert-automation, openbao approle-rotation, loki/harbor object-
# storage creds, the DNS-01 solver token). Without it ESO cannot resolve any
# secret and the whole secrets pipeline is dead.
#
# BLAST-RADIUS ISOLATION: this object lives in its OWN Argo CD Application
# (`llz-secret-store`, created by terraform-iac-bootstrap/cluster-bootstrap/main.tf),
# NOT in the platform-bootstrap kustomize tree. Rationale: on first boot the store
# cannot go Ready until OpenBao is unsealed and bootstrap-openbao.yml has seeded
# `eso-approle-secret`. When it shared the platform-bootstrap Application, the
# store's not-ready health FAILED that app's entire sync wave (the exact hook that
# wedged the first lab bootstrap), stranding unrelated wave-5 resources. As its own
# Application it converges on its own retry loop without gating anything else, and
# nothing else gates it. The ExternalSecrets that reference it stay in their
# components (cluster-scoped store is resolved by ESO at runtime regardless of which
# Application applied it) and are de-risked by the lenient health customizations in
# apl-values/_shared/values.yaml.
#
# Auth: AppRole using the same `platform-ci` role CI uses, with a separate
# secret_id stored in the `eso-approle-secret` Kubernetes Secret (in the
# llz-external-secrets namespace). That Secret is created by
# .github/workflows/bootstrap-openbao.yml (and rotated by the AppRole-rotation
# CronWorkflow shipped in the llz-openbao-platform chart) — no manual step.
#
# Naming derives from the published charts/modules:
#   - store name `openbao` — referenced verbatim by llz-openbao-platform and
#     llz-cert-automation ExternalSecrets (secretStoreRef.name: openbao).
#   - server `platform-openbao.llz-openbao.svc…` — the OpenBao client Service
#     (platform.releaseName=platform-openbao, namespace llz-openbao).
#   - caProvider Secret `openbao-tls` in llz-openbao (the chart's TLS cert).
#   - roleId `platform-ci` — terraform-modules/llz-openbao ci_role_id default.
#   - secretRef in llz-external-secrets — the namespace ESO is installed into.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: https://platform-openbao.llz-openbao.svc.cluster.local:8200
      path: secret
      version: v2
      caProvider:
        type: Secret
        name: openbao-tls
        namespace: llz-openbao
        key: ca.crt
      auth:
        appRole:
          path: approle
          roleId: platform-ci
          secretRef:
            namespace: llz-external-secrets
            name: eso-approle-secret
            key: secretId
