# ClusterSecretStore — the WRITE-scoped binding ESO PushSecrets use to seed the
# two self-generated, in-cluster-only secrets (grafana admin password, otel
# ingress bearer) into OpenBao. See ../manifest/generated-secrets/.
#
# WHY A SECOND STORE: the `openbao` store (cluster-secret-store-openbao.yaml)
# authenticates as the `eso` Kubernetes-auth role → read-only `platform-ci`
# policy, so every ExternalSecret read stays least-privilege. PushSecrets need
# create/update, which would over-privilege that read path. This store
# authenticates as the SEPARATE `eso-pusher` role → `eso-pusher` policy (scoped
# to create/update on exactly secret/data/grafana/admin + secret/data/otel/
# ingress), both configured by `llz ci bao-configure`. Same ESO controller SA,
# same OpenBao server/CA — only the role (and thus the policy) differs.
#
# Lives in the blast-radius-isolated llz-secret-store Application (same as the
# read store) so a not-yet-Ready store never fails the platform-bootstrap wave.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao-push
spec:
  # Re-validate promptly on first boot (same rationale as the read store): the
  # store sits Ready=False until OpenBao is unsealed and the eso-pusher role
  # exists; 60s flips it Ready within ~1m so the PushSecrets can write.
  refreshInterval: 60
  provider:
    vault:
      server: https://platform-openbao.llz-openbao.svc.cluster.local:8200
      path: secret
      version: v2
      caProvider:
        type: Secret
        name: openbao-tls
        namespace: llz-openbao
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          # The write-scoped role — distinct from the read store's `eso` role.
          role: eso-pusher
          serviceAccountRef:
            # apl-core 6.x ESO controller SA (core app in the external-secrets ns).
            name: external-secrets
            namespace: external-secrets
