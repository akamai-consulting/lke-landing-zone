# apl-core values for the `example` environment — TEMPLATE SKELETON.
#
# This is the single reference overlay shipped by the lke-landing-zone template.
# Create a real environment by cloning it with the instantiation script:
#
#     llz env add <env> --template-env example
#
# That copies this directory to apl-values/<env>/ and fills it in. A
# landingzone.yaml spec is REQUIRED — there is no non-spec path. `llz render`
# resolves every non-secret $${...} placeholder below straight from the spec into
# the committed apl-values/<env>/values.yaml: the cluster identity
# (cluster.name/domainSuffix, dns.domainFilters), the platform flags (otomi.has*),
# the object-store wiring (Loki/Harbor bucket names + S3 endpoint/region), and the
# values-repo coordinates (otomi.git repoUrl/username/branch) — all from
# spec.environments.<env> + spec.defaults.platform (single source = the spec).
#
# Only the genuine runtime secrets + the live coredns IP are left as $${...} for
# Terraform's cluster-bootstrap templatefile() to fill: $${loki_admin_password},
# $${apl_values_repo_password}, $${linode_dns_token}, $${coredns_cluster_ip}.
# (The $${...} here are ESCAPED for templatefile() — this whole file is passed
# through it, so a bare (unescaped) placeholder in a comment would be parsed as an
# interpolation and break the render.)
#
# Schema reference: https://raw.githubusercontent.com/linode/apl-core/main/values-schema.yaml

# ── Cluster identity (llz-render-rendered from the spec) ────────────────────────
cluster:
  name:         ${cluster_name}       # llz render ← spec.cluster.bootstrap.name
  provider:     linode
  domainSuffix: ${cluster_domain}     # llz render ← spec.cluster.bootstrap.domainSuffix
  # Promote the encrypted, retain-policy block-storage class shipped by the
  # llz-cluster-foundation chart (kubernetes-charts/llz-cluster-foundation).
  defaultStorageClass: block-storage-retain

# ── Optional apl-core apps we ENABLE ────────────────────────────────────────────
# Core apps (istio, keycloak, cert-manager, argocd, apl-*, …) cannot be disabled
# and are omitted here. Toggle the optional platform apps the landing zone uses.
#
# IMPORTANT: keys MUST be apl-core's canonical app names. apps.additionalProperties
# is `true` in the schema, so a wrong key (e.g. `kube-prometheus-stack`,
# `opentelemetry-operator`, `trivy-operator`) is SILENTLY IGNORED — no schema
# error — and the app falls back to its chart default. Names verified against
# linode/apl-core@v6.0.0 values-schema.yaml.
apps:
  # argocd is a core app (cannot be disabled — no `enabled` key). We only pass
  # _rawValues to override two Argo CD resource health checks. Argo's built-in
  # checks for external-secrets.io resources report Degraded the moment the store
  # isn't Ready; during first boot the `openbao` ClusterSecretStore legitimately
  # can't be Ready until OpenBao is unsealed and bootstrap-openbao.yml has
  # configured the `eso` Kubernetes-auth role. A Degraded resource FAILS the platform-bootstrap sync
  # wave (it was the exact hook that wedged the first lab bootstrap). These
  # overrides reclassify "not ready yet" as Progressing, so Argo waits + retries
  # (see the retry budget in terraform-iac-bootstrap/cluster-bootstrap/main.tf)
  # instead of failing. Genuinely-broken stores/secrets still surface via the
  # converge health check (`llz ci health`), which verifies the synced Secret
  # exists independently of Argo's health rollup.
  argocd:
    _rawValues:
      configs:
        cm:
          resource.customizations.health.external-secrets.io_ClusterSecretStore: |
            local hs = {}
            if obj.status ~= nil and obj.status.conditions ~= nil then
              for _, c in ipairs(obj.status.conditions) do
                if c.type == "Ready" then
                  if c.status == "True" then
                    hs.status = "Healthy"
                  else
                    -- OpenBao not yet reachable/unsealed or the eso role not yet configured:
                    -- still converging, do not fail the sync.
                    hs.status = "Progressing"
                  end
                  hs.message = c.message
                  return hs
                end
              end
            end
            hs.status = "Progressing"
            hs.message = "Waiting for ClusterSecretStore Ready condition"
            return hs
          resource.customizations.health.external-secrets.io_ExternalSecret: |
            local hs = {}
            if obj.status ~= nil and obj.status.conditions ~= nil then
              for _, c in ipairs(obj.status.conditions) do
                if c.type == "Ready" then
                  if c.status == "True" then
                    hs.status = "Healthy"
                  else
                    -- ESO reconciles on refreshInterval; a not-yet-synced secret
                    -- (e.g. OpenBao path not seeded yet) self-heals. Treat as
                    -- Progressing so it never fails the bootstrap wave.
                    hs.status = "Progressing"
                  end
                  hs.message = c.message
                  return hs
                end
              end
            end
            hs.status = "Progressing"
            hs.message = "Waiting for ExternalSecret to sync"
            return hs
          resource.customizations.health.external-secrets.io_PushSecret: |
            local hs = {}
            -- The generated-secrets PushSecrets (grafana/admin, otel/ingress) can't
            -- write until OpenBao is unsealed and the eso-pusher role exists; ESO
            -- retries on refreshInterval. Reclassify "not yet pushed" as Progressing
            -- (same rationale as ExternalSecret above) so a pending push — Argo's
            -- built-in ES health would otherwise call it Degraded — never fails the
            -- platform-bootstrap sync wave. `llz ci health` is the real backstop.
            if obj.status ~= nil and obj.status.conditions ~= nil then
              for _, c in ipairs(obj.status.conditions) do
                if c.type == "Ready" then
                  if c.status == "True" then
                    hs.status = "Healthy"
                  else
                    hs.status = "Progressing"
                  end
                  hs.message = c.message
                  return hs
                end
              end
            end
            hs.status = "Progressing"
            hs.message = "Waiting for PushSecret to sync"
            return hs
  prometheus:
    enabled: true
    # Resource-conscious defaults matching the reference lab: single replica,
    # 7-day retention, 10Gi TSDB volume. apl-core's defaults are heavier and
    # were a factor in the argocd/Prometheus scheduling pressure.
    retention:   7d
    storageSize: 10Gi
    replicas:    1
    _rawValues:
      prometheus:
        prometheusSpec:
          # Empty selectors → scrape ServiceMonitors / PrometheusRules across
          # ALL namespaces (platform components live in many namespaces).
          serviceMonitorNamespaceSelector: {}
          serviceMonitorSelector: {}
          ruleNamespaceSelector: {}
          ruleSelector: {}
          podMonitorNamespaceSelector: {}
          podMonitorSelector: {}
  alertmanager:  { enabled: true }
  grafana:       { enabled: true }
  loki:
    enabled: true
    # Loki gateway HTTP basic-auth admin password. REQUIRED by apl-core's apps.loki
    # values schema on v6 (it is an x-secret with a `randAlphaNum 20` generator, but
    # that generator only runs inside otomi's own bootstrap — our raw `helm install
    # apl/apl` validates the schema first and fails "adminPassword is required" if
    # omitted). Rendered by cluster-bootstrap templatefile() from a stable
    # random_password (TF state), NOT a GitHub secret — nothing on the landing-zone
    # side consumes it; it is loki's internal gateway<->grafana credential.
    adminPassword: ${loki_admin_password}
    # S3 chunk store on Linode Object Storage. The grafana/loki chart reads
    # bucketNames + s3.{endpoint,region} from values (not env); `llz render`
    # writes them in from the spec (env name + spec.cluster.objectStorage.cluster),
    # mirroring the llz-object-storage module's naming. The AWS
    # creds come from the `loki-object-store` ESO Secret (synced from OpenBao)
    # mounted as env vars on the singleBinary pod. The schema's
    # object_store=filesystem→s3 flip is done by the kyverno-loki-s3-object-store
    # policy (_shared/manifest/kyverno-policies/), NOT here — overriding
    # schemaConfig corrupts it.
    _rawValues:
      gateway:
        nginxConfig:
          # nginx's `resolver` needs the cluster DNS Service IP, NOT a hostname.
          # The chart's default (kube-dns/coredns hostname) makes the gateway
          # nginx crashloop ("host not found in resolver"), hanging every proxied
          # request (incl. OTLP log ingestion). Rendered from the live coredns
          # ClusterIP at cluster-bootstrap (data.kubernetes_service.coredns) so
          # the gateway has a usable resolver from first sync. This is the SOLE
          # mechanism: it replaced the kyverno-loki-gateway-resolver admission
          # policy, which crashlooped the gateway when Kyverno's webhook lagged
          # the cm create. (Validated by a full e2e off main.)
          resolver: "${coredns_cluster_ip}"
      singleBinary:
        persistence:
          size: 5Gi
          # Pin the SC so a default-class flip can't land Loki on an
          # unencrypted Volume (Loki is not covered by cluster.defaultStorageClass).
          storageClass: block-storage-retain
        extraEnvFrom:
          - secretRef:
              name: loki-object-store
      loki:
        storage:
          type: s3
          bucketNames:
            chunks: ${loki_bucket_chunks}
            ruler:  ${loki_bucket_ruler}
            admin:  ${loki_bucket_admin}
          s3:
            endpoint:         ${loki_s3_endpoint}
            region:           ${loki_s3_region}
            s3ForcePathStyle: true
            insecure:         false
  otel:          { enabled: true }
  harbor:
    enabled: true
    # Registry image storage on Linode Object Storage (vs a local block PVC).
    # bucket/region/endpoint are written in by `llz render` from the spec; the
    # S3 access/secret keys are injected from the `harbor-registry-s3` ESO Secret
    # as REGISTRY_STORAGE_S3_* env vars (which also override the rendered values
    # at runtime). PVC sizes are for the non-registry components.
    _rawValues:
      persistence:
        imageChartStorage:
          type: s3
          s3:
            bucket:         ${harbor_bucket}
            region:         ${harbor_s3_region}
            regionendpoint: ${harbor_s3_endpoint}
            secure:         true
        persistentVolumeClaim:
          registry:    { size: 20Gi }
          jobservice:  { jobLog: { size: 5Gi } }
          database:    { size: 5Gi }
      registry:
        registry:
          extraEnvVars:
            - name: REGISTRY_STORAGE_S3_ACCESSKEY
              valueFrom: { secretKeyRef: { name: harbor-registry-s3, key: REGISTRY_STORAGE_S3_ACCESSKEY } }
            - name: REGISTRY_STORAGE_S3_SECRETKEY
              valueFrom: { secretKeyRef: { name: harbor-registry-s3, key: REGISTRY_STORAGE_S3_SECRETKEY } }
            - name:  REGISTRY_STORAGE_S3_FORCEPATHSTYLE
              value: "true"
  kyverno:       { enabled: true }
  policy-reporter: { enabled: true }
  trivy:         { enabled: true }
  # external-dns is toggled by otomi.hasExternalDNS below — apl-core's schema
  # does NOT permit an `enabled` property on apps.external-dns.
  # llz-cert-automation runs on Argo Workflows + Argo Events, not Tekton.
  tekton:        { enabled: false }
  # The landing zone provisions the Cloud Firewall in terraform-iac-bootstrap/cluster/ and
  # reconciles drift with the llz-linode-cidr-firewall chart, so disable
  # apl-core's bundled Cloud Firewall chart to avoid conflicts.
  linode-cfw:    { enabled: false }
  # apl-core 6.x: in-cluster Gitea DISABLED. On 5.0.0 gitea had to stay on because
  # apl-core's apl-gitea-operator / `gitops-global` Argo app cloned the in-cluster
  # gitea even though otomi.git points at the external GitHub repo (BYO Git); with
  # gitea off it hard-failed "gitea-http … no such host". In 6.x apl-gitea-operator
  # is gated on gitea.enabled (helmfile-03.init), so disabling gitea removes that
  # clone path entirely. apl-core's lightweight git-server (apps.git-server,
  # enabled by default in 6.x) provides any in-cluster git apl-core still needs;
  # the values repo itself stays the external GitHub repo via otomi.git below.
  gitea:         { enabled: false }
  # Unused optional apps.
  knative:       { enabled: false }
  kserve:        { enabled: false }
  kubeflow-pipelines: { enabled: false }
  rabbitmq:      { enabled: false }

# ── Global platform settings ────────────────────────────────────────────────────
# hasExternalDNS / hasExternalIDP are the literals every env gets by default. A
# spec instance can override them per spec.defaults.platform (externalDNS/
# externalIDP), which `llz render` writes here.
otomi:
  hasExternalDNS: true
  hasExternalIDP: false   # standalone Keycloak
  git:
    # External GitHub repo over HTTPS + a fine-grained PAT (Contents: write —
    # apl-operator PUSHES its rendered values tree here during bootstrap).
    # repoUrl/username/branch are written in by `llz render` from
    # spec.cluster.bootstrap.aplValues (username/branch default to x-access-token/
    # main); only password stays a $${...} placeholder filled by cluster-bootstrap
    # templatefile() from the APL_VALUES_REPO_TOKEN PAT. `path` is intentionally
    # absent — apl-core's otomi.git schema does not permit it.
    repoUrl:  ${apl_values_repo_url}      # https://github.com/<org>/<instance-repo>.git
    username: ${apl_values_repo_username}
    password: ${apl_values_repo_password}
    branch:   ${apl_values_repo_ref}

dns:
  domainFilters:
    - ${cluster_domain}        # the cluster domainSuffix (spec: cluster.bootstrap.domainSuffix)
  provider:
    linode:
      apiToken: ${linode_dns_token}   # rendered from var.linode_dns_token via templatefile()

# ── Instance workloads ──────────────────────────────────────────────────────────
# Application Argo CD Applications and any non-apl-core manifests for THIS
# environment live in ./manifest/ (see ./manifest/README.md). The landing-zone
# template ships none — the instance repo adds them when it instantiates.
