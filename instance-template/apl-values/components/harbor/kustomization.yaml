# spec.components.harbor → this kustomize Component. An env's overlay lists it under
# components: when the component is enabled. Template-managed — edit upstream.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - harbor-registry-s3-externalsecret.yaml
  # Mirrors Harbor's Helm-generated admin password into OpenBao (replaces the
  # imperative secret/harbor/admin bao-seed). See harbor-admin-push.yaml.
  - harbor-admin-push.yaml
  # In-cluster robot provisioner (CronJob + SA + NP + gh-token ExternalSecret) —
  # replaces the bootstrap workflow's harbor job. See harbor-robot-provisioner/.
  - harbor-robot-provisioner/serviceaccount.yaml
  - harbor-robot-provisioner/externalsecret.yaml
  - harbor-robot-provisioner/cronjob.yaml
  - harbor-robot-provisioner/network-policy.yaml
