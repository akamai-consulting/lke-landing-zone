# GitHub dispatch/secrets-write token for the provisioner's repo-secret
# publication. ESO syncs it from secret/infra/github-dispatch-token (seeded by
# `llz ci bao-seed-all` from OPENBAO_SECRETS_WRITE_TOKEN — the same PAT the CI
# steps used for `gh secret set`). The provisioner publishes the robot
# credentials as repo-level HARBOR_* secrets, which are the distribution
# channel a standby bootstrap seeds its OpenBao from
# (`llz ci seed-standby-harbor-robots`).
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-provisioner-gh-token
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: harbor-provisioner-gh-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: infra/github-dispatch-token
        property: token
