# Harbor registry S3 credentials.
#
# Replaces a block-PVC-backed registry with S3 on Linode OBJ. Harbor's bundled
# docker-registry container reads object-storage credentials from environment
# variables (REGISTRY_STORAGE_S3_*) which override /etc/registry/config.yml —
# avoiding ever materialising the access key into a committed values file.
#
# Bootstrap path:
#   terraform-iac-bootstrap/object-storage/        ── provisions the harbor_registry bucket +
#       scoped access key per region, outputs HARBOR_REGISTRY_S3_*
#   .github/workflows/bootstrap-openbao.yml ── writes secret/harbor/registry-s3
#       with access_key_id, secret_access_key, bucket_name, endpoint, region
#   THIS FILE                        ── ESO syncs into `harbor` as Secret
#       `harbor-registry-s3` with the env-var names docker-registry expects
#   apl-values/<env>/values.yaml     ── Harbor chart wires
#       apps.harbor._rawValues.registry.registry.extraEnvVars → this Secret
#
# Sync-wave 5 so the Secret lands after the harbor namespace exists (apl-core
# creates it via apps.harbor.enabled=true) but before the registry pod starts.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-registry-s3
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m, not 1h: on first boot the `openbao` ClusterSecretStore only goes Ready
  # AFTER OpenBao is unsealed + seeded, and ESO does NOT re-trigger an
  # ExternalSecret when its store recovers — the secret idles until its own
  # refreshInterval. At 1h that stranded the registry pod (CreateContainerConfigError)
  # for ~14m post-store-Ready and dominated convergence time. 1m bounds that gap;
  # steady-state load is trivial (one cached OpenBao read/min). The post-seed
  # `llz ci nudge-argo` force-syncs immediately on top of this.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: harbor-registry-s3
    creationPolicy: Owner
    # Map OpenBao's per-field keys to the env-var names docker-registry expects.
    template:
      type: Opaque
      engineVersion: v2
      data:
        REGISTRY_STORAGE_S3_ACCESSKEY: "{{ .access_key_id }}"
        REGISTRY_STORAGE_S3_SECRETKEY: "{{ .secret_access_key }}"
        REGISTRY_STORAGE_S3_BUCKET:    "{{ .bucket_name }}"
        REGISTRY_STORAGE_S3_REGIONENDPOINT: "{{ .endpoint }}"
        REGISTRY_STORAGE_S3_REGION:    "{{ .region }}"
  data:
    - secretKey: access_key_id
      remoteRef:
        key: harbor/registry-s3
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: harbor/registry-s3
        property: secret_access_key
    - secretKey: bucket_name
      remoteRef:
        key: harbor/registry-s3
        property: bucket_name
    - secretKey: endpoint
      remoteRef:
        key: harbor/registry-s3
        property: endpoint
    - secretKey: region
      remoteRef:
        key: harbor/registry-s3
        property: region
