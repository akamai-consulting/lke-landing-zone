# Linode Volume relabeler CronJob.
#
# Runs every 15 minutes. On each run: enumerates Linode-CSI PVs in the cluster,
# derives a human-readable label `<region-short>-<namespace>-<pvc-name>`
# truncated to 32 chars, and PUTs it via the Linode Volumes API. It also stamps
# an `lke<cluster_id>` tag on each Volume (self-discovered from a node's Linode
# instance, or LKE_CLUSTER_ID if set) so `llz reap` can attribute Volumes to
# their owning cluster and never reap a live cluster's detached PVC. Idempotent.
#
# REGION_SHORT injection: this base sets the example region (`exa`). Each env
# overlay strategic-merge-patches the value via the manifest-root
# linode-volume-labeler-region-patch.yaml (llz env add swaps it
# to the target region's REGION_SHORT). The namespace itself is TF-owned
# (terraform-iac-bootstrap/cluster-bootstrap, with its linode-api-token Secret) so the
# credential stays with its consumer.
#
# 15-minute cadence keeps well under Linode's 800-req/2-min API cap (~100
# req/run) while giving new PVCs readable labels within ~10 min.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: linode-volume-labeler
  namespace: llz-linode-volume-labeler
  annotations:
    # kube-linter can't see the linode-api-token Secret (TF-owned, injected via
    # terraform-iac-bootstrap/cluster-bootstrap/main.tf::linode_volume_labeler_token).
    ignore-check.kube-linter.io/env-value-from: "linode-api-token Secret is TF-owned (cluster-bootstrap); not a static manifest the linter can resolve"
    ignore-check.kube-linter.io/read-secret-from-env-var: "Shell script reads LINODE_TOKEN via env-var guard; no file-mount alternative without script rewrite"
    ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "TTL + history-limits are intentional and complementary — failed runs retained for triage; successful runs reaped at the limit OR after 1h"
spec:
  schedule: "*/15 * * * *"
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          # Static label so the NetworkPolicy can podSelector-match it.
          labels:
            app.kubernetes.io/name: linode-volume-labeler
        spec:
          restartPolicy: OnFailure
          serviceAccountName: linode-volume-labeler
          # alpine/k8s ships kubectl + jq + curl + sh. Digest-pinned because
          # this pod mounts a Linode API token Secret; defense-in-depth against
          # tag-mutation supply-chain attacks.
          containers:
            - name: relabel
              image: alpine/k8s:1.32.4@sha256:7e1e7d5b7a9617646650d1bec4422c88cf279fab34d9e1f772391bc7478595d4
              command: ["/bin/sh", "/scripts/relabel.sh"]
              env:
                # Example-env default. Per-env overlays strategic-merge this
                # entry via linode-volume-labeler-region-patch.yaml.
                - name: REGION_SHORT
                  value: "exa"
                # Optional override for the cluster-ownership tag. Empty = the
                # script self-discovers the `lke<id>` tag from a node's Linode
                # instance, so this normally stays unset.
                - name: LKE_CLUSTER_ID
                  value: ""
                - name: LINODE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: linode-api-token
                      key: token
              resources:
                limits:   { cpu: 200m, memory: 128Mi }
                requests: { cpu: 50m,  memory: 64Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile: { type: RuntimeDefault }
              volumeMounts:
                - { name: script, mountPath: /scripts, readOnly: true }
                - { name: tmp,    mountPath: /tmp }
          volumes:
            - name: script
              configMap:
                name: linode-volume-labeler-script
                defaultMode: 0555
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 16Mi
