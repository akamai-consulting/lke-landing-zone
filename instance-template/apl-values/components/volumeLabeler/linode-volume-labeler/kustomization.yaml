# Linode Volume relabeler — fully Argo-owned manifest tree.
#
# Everything reconciles via apl-core's in-cluster Argo CD — the namespace, the
# Linode API token (synced from OpenBao by ESO), and the workload (SA, RBAC,
# ConfigMap with relabel.sh, NetworkPolicy, CronJob). Terraform no longer touches
# this namespace: the former TF-owned namespace + linode-api-token Secret moved
# here (namespace.yaml + externalsecret.yaml), removing two TF→kube crossings.
#
# Per-env REGION_SHORT comes from the manifest-root
# linode-volume-labeler-region-patch.yaml; this base defaults to "exa".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - externalsecret.yaml
  - rbac.yaml
  - network-policy.yaml
  - script-configmap.yaml
  - cronjob.yaml
