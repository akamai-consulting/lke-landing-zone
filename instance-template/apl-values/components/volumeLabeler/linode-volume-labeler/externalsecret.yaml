# Linode API token for the volume-labeler CronJob.
#
# Replaces the former TF-injected `linode-api-token` Secret (a static
# var.linode_token written straight into the cluster by cluster-bootstrap).
# ESO now syncs it from OpenBao at secret/linode/api-token — the SAME canonical
# path the daily rotation pipeline (secret-rotation.yml → propagate-linode-pat)
# keeps fresh. So the labeler reads a rotating credential through the standard
# secrets pipeline instead of a static token that goes stale the moment rotation
# first runs. Bootstrap seeds the path from LINODE_API_TOKEN via
# `llz ci bao-seed-all`; platform-ci policy grants the read.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready, matching
# every other ExternalSecret. The CronJob is non-critical (cosmetic PV labels)
# and retries every 15m, so a brief gap before the Secret materialises is benign.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linode-api-token
  namespace: llz-linode-volume-labeler
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode-api-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/api-token
        property: token
