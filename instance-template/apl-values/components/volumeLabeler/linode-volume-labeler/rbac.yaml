# RBAC for the Linode Volume relabeler CronJob.
#
# The script reads PersistentVolume objects to derive each Volume's PVC
# namespace+name (via `spec.claimRef`), then PUTs human-readable labels to
# the Linode API. It never needs direct access to PVCs themselves. `list` is
# the only verb the script calls (`kubectl get pv -o json` is a list).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: linode-volume-labeler
  namespace: llz-linode-volume-labeler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: linode-volume-labeler
rules:
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: linode-volume-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: linode-volume-labeler
subjects:
  - kind: ServiceAccount
    name: linode-volume-labeler
    namespace: llz-linode-volume-labeler
