# Firewall-config self-discovery CronJob.
#
# Every 10 minutes, runs `llz ci discover-firewall-config` on the slim llz
# image: NODE_NAME (downward API) → Node.spec.providerID → the node's Linode
# instance → its attached Cloud Firewall (Linode caps firewalls at one per
# linode, so the attached one IS the node-pool firewall the llz-node-firewall
# module created), its lke_cluster_id, and its VPC-interface subnet CIDR. The
# values are reconciled into the llz-linode-cidr-firewall-config ConfigMap and
# the controller Deployment is rolled ONLY when something changed — steady
# state is a read-only no-op (4-5 API calls), so the tight cadence is free.
#
# 10-minute cadence bounds two windows: first-boot (controller crashloops on
# the chart's empty placeholders until the first run patches + rolls it) and
# firewall re-creation drift (a TF-replaced node firewall gets a new ID; the
# next run heals the ConfigMap). Replaces the per-apply `llz ci
# bootstrap-cloud-firewall` workflow seed — no tfvars, no TF outputs, no
# control-plane ACL lease.
#
# Fully self-discovering: unlike the volume-labeler / cred-rotator CronJobs,
# no per-env patch is needed — every input comes from the cluster itself.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: llz-cidr-firewall-discover
  namespace: kube-system
  annotations:
    ignore-check.kube-linter.io/env-value-from: "linode Secret is created at runtime by ESO (externalsecret.yaml); not a static manifest the linter can resolve"
    ignore-check.kube-linter.io/read-secret-from-env-var: "llz reads LINODE_TOKEN via env to authenticate to the Linode API; no file-mount path without a binary rewrite"
    ignore-check.kube-linter.io/job-ttl-seconds-after-finished: "TTL + history-limits are intentional and complementary — failed runs retained for triage; successful runs reaped at the limit OR after 1h"
spec:
  schedule: "*/10 * * * *"
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          # Static label so the NetworkPolicy can podSelector-match it.
          labels:
            app.kubernetes.io/name: llz-cidr-firewall-discover
        spec:
          restartPolicy: OnFailure
          serviceAccountName: llz-cidr-firewall-discover
          containers:
            # Slim distroless llz image (dockerfiles/llz). Rendered by copier;
            # release-e2e pins it to the signed sha image for the commit under test.
            - name: discover
              image: <@ llz_image_ref @>
              args: ["ci", "discover-firewall-config"]
              env:
                # The node this pod landed on — any node works; they all share
                # the pool firewall, cluster id, and VPC subnet.
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: LINODE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: linode
                      key: token
              resources:
                limits: { cpu: 200m, memory: 128Mi }
                requests: { cpu: 50m, memory: 64Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile: { type: RuntimeDefault }
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 16Mi
