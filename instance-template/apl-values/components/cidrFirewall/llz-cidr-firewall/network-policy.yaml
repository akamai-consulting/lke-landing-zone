# Egress lockdown for the discover pod. The container holds a Linode API token
# with account read scope — any unconstrained egress would let a compromised
# image exfiltrate it. Restrict to DNS + api.linode.com (TCP/443) +
# kube-apiserver (TCP/443 + TCP/6443 — Cilium-on-LKE-E evaluates policy
# post-DNAT). Mirrors the volume-labeler / cred-rotator egress policies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llz-cidr-firewall-discover-egress
  namespace: kube-system
spec:
  # Static-label match on the pod template's app.kubernetes.io/name label
  # (set on cronjob.yaml's jobTemplate) — kube-linter resolves NP→pod linkage
  # statically and can't follow the runtime-stamped batch.kubernetes.io/job-name.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: llz-cidr-firewall-discover
  policyTypes: [Egress, Ingress]
  ingress: []
  egress:
    # DNS resolution against kube-dns (same namespace here — kube-system).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # api.linode.com (TCP/443) and kube-apiserver (443 + 6443 per the LKE-E
    # Cilium quirk). ipBlock 0.0.0.0/0 is acceptable here because the port
    # restrictions plus the scoped RBAC mean the only thing reachable is HTTPS
    # to apiserver / Linode API.
    - to:
        - ipBlock: { cidr: 0.0.0.0/0 }
      ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 }
