# Linode API token for the firewall-controller + the discover CronJob.
#
# Replaces the former CI-seeded kube-system/linode Secret (`llz ci
# bootstrap-cloud-firewall` wrote LINODE_API_TOKEN — or the optional
# least-privilege CLOUD_FIREWALL_TOKEN — once per terraform apply). That token
# went stale the moment the daily rotation pipeline first replaced the PAT;
# ESO now syncs the Secret from OpenBao at secret/linode/api-token — the SAME
# canonical path the rotation keeps fresh — so the controller reads a rotating
# credential through the standard secrets pipeline. Same transition the
# volume-labeler token made (components/volumeLabeler/.../externalsecret.yaml).
#
# Secret name `linode`, key `token`: the contract the private
# llz-linode-cidr-firewall chart's Deployment reads (env LINODE_TOKEN via
# secretKeyRef) — unchanged from the CI-seeded shape.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready, matching
# every other ExternalSecret. The controller tolerates a brief gap on first
# boot (it starts once the Secret materialises).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linode
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/api-token
        property: token
