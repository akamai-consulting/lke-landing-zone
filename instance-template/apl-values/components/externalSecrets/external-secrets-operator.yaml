# External Secrets Operator — wave -15.
#
# apl-core 5.0.0 does NOT ship ESO, so the cluster has zero external-secrets.io
# CRDs out of the box. -15 places it AFTER the AppProject / cluster-foundation
# (-20) and BEFORE consumers (default wave 0) so the CRDs + webhook exist before
# the ClusterSecretStore (external-secrets/cluster-secret-store-openbao.yaml) and
# every ExternalSecret reconciles. Upstream ESO chart (not the GHCR registry).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llz-external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: platform-support
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.7
    helm:
      releaseName: llz-external-secrets
      valuesObject:
        installCRDs: true
        # Re-validate (Cluster)SecretStores every 1m instead of the 5m default. On
        # each requeue ESO's store reconciler rebuilds the Vault client and re-reads
        # the openbao-tls caProvider CA, so (1) a store wedged at bootstrap (OpenBao
        # not yet unsealed or the eso role not yet configured) recovers and (2) a rotated CA is picked up
        # — both within ~1m, WITHOUT restarting the controller. This natively covers
        # what the retired llz-eso-cert-watcher sidecar did. NOTE: do not enable
        # --enable-vault-token-cache without revisiting; a cached client could serve a
        # stale CA across a CA-only rotation until the store's resourceVersion changes.
        extraArgs:
          store-requeue-interval: 1m
        webhook:
          create: true
        certController:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: llz-external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      # First-boot ordering races (OpenBao unseal / secret seed) can outlast the
      # old ~5-retry (~5 min) budget; a failed automated sync then terminally pins
      # the revision and Argo will not re-attempt it. ~20 retries @ 3m cap (~1h)
      # rides out the bootstrap window instead.
      limit: 20
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      # llz-external-secrets is created (with PSS labels) by cluster-foundation at
      # wave -20; let it be the sole owner of the Namespace object to avoid a
      # second SSA field manager.
      - CreateNamespace=false
      - ServerSideApply=true
