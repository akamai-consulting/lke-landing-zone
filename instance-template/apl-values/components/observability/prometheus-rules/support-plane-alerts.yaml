# Platform scrape-health alerts for the support/observability plane. Deployed
# as a PrometheusRule CR; apl-core's kube-prometheus-stack picks it up via its
# ruleSelector. Namespace selectors reflect the topology (per the
# llz-cluster-foundation namespace map): apl-core's Loki/Prometheus run in
# `monitoring`, Grafana in `grafana`, the landing-zone OTel Collector in
# `llz-observability`, Harbor in `harbor`.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: support-plane-alerts
  namespace: llz-observability
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    # REQUIRED for pickup: apl-core's Prometheus ruleSelector matches
    # {prometheus: system} (NOT permissive/empty — confirmed live on apl-core v6).
    # Without it this PrometheusRule is never loaded and its alerts never fire.
    prometheus: system
    app.kubernetes.io/part-of: platform
spec:
  groups:
    - name: support-plane-alerts
      interval: 30s
      rules:
        - alert: OTelCollectorMetricsTargetDown
          expr: up{namespace="llz-observability", service=~".*otel.*"} == 0
          for: 5m
          labels:
            severity: warning
            service: otel-collector
          annotations:
            summary: OTel Collector metrics target is down
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: Prometheus cannot scrape one or more OTel Collector metrics endpoints.
        - alert: LokiMetricsTargetDown
          expr: up{namespace="monitoring", service=~".*loki.*"} == 0
          for: 5m
          labels:
            severity: warning
            service: loki
          annotations:
            summary: Loki metrics target is down
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: Prometheus cannot scrape one or more Loki metrics endpoints.
        - alert: GrafanaMetricsTargetDown
          expr: up{namespace="grafana", service=~".*grafana.*"} == 0
          for: 5m
          labels:
            severity: warning
            service: grafana
          annotations:
            summary: Grafana metrics target is down
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: Prometheus cannot scrape the Grafana metrics endpoint.
        - alert: HarborMetricsTargetDown
          expr: up{namespace="harbor", service=~".*harbor.*"} == 0
          for: 5m
          labels:
            severity: warning
            service: harbor
          annotations:
            summary: Harbor metrics target is down
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: Prometheus cannot scrape one or more Harbor metrics endpoints.
        # ── Workload availability (distinct from the scrape-health alerts above) ──
        # The `...MetricsTargetDown` alerts fire when Prometheus can't SCRAPE a pod
        # (which can also mean a broken metrics endpoint on a healthy pod). These
        # fire when the workload actually has ZERO available/ready replicas — a
        # pod that is Running-but-NotReady scrapes fine yet serves nothing. Uses
        # kube-state-metrics (shipped by kube-prometheus-stack): a broader default
        # rule (KubeDeploymentReplicasMismatch, 15m) exists, but these are scoped to
        # the load-bearing support Deployments with a tighter window + service label
        # for receiver routing. Deployment/StatefulSet names per the converge topology.
        - alert: SupportPlaneDeploymentUnavailable
          expr: kube_deployment_status_replicas_available{namespace=~"harbor|grafana|llz-observability", deployment=~"harbor-core|harbor-registry|grafana|platform-otel-collector"} == 0
          for: 10m
          labels:
            severity: warning
            service: support-plane
          annotations:
            summary: 'support-plane Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has no available replicas'
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: '{{ $labels.namespace }}/{{ $labels.deployment }} has 0 available replicas for 10m — the workload is down or wedged, not merely unscrapable.'
        - alert: LokiStatefulSetUnavailable
          expr: kube_statefulset_status_replicas_ready{namespace="monitoring", statefulset="loki"} == 0
          for: 10m
          labels:
            severity: warning
            service: loki
          annotations:
            summary: Loki has no ready replicas
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: The Loki StatefulSet has 0 ready replicas for 10m — log ingestion and queries are down.
        # ── Error-rate / saturation (the third + fourth layer) ────────────────────
        # Availability (above) answers "is it up"; these answer "is it healthy while
        # up". The Loki exprs are VERIFIED against the live metric surface (`llz ci
        # prom-metrics --match '^loki_'` on a converged cluster — 271 series): the
        # names, the `namespace="monitoring"` topology, and the `status_code` label
        # convention (numeric for HTTP routes, `success`/`error` for gRPC) are real,
        # not guessed. See docs/alerting.md.
        - alert: LokiRequestErrors
          # HTTP 5xx ratio across all Loki routes. status_code is numeric on HTTP
          # routes; gRPC routes report `success`/`error` and are excluded by `5..`.
          expr: |
            sum(rate(loki_request_duration_seconds_count{namespace="monitoring", status_code=~"5.."}[5m]))
            /
            sum(rate(loki_request_duration_seconds_count{namespace="monitoring"}[5m]))
            > 0.05
          for: 15m
          labels:
            severity: warning
            service: loki
          annotations:
            summary: Loki is serving a high 5xx error rate
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'More than 5% of Loki requests have returned 5xx for 15m — ingestion and/or query paths are erroring, not merely slow.'
        - alert: LokiObjectStoreErrors
          # Loki's S3-compatible backend (Linode Object Storage). loki_s3_* carries
          # `operation` + `status_code` labels. Error RATIO (not raw count) on the
          # data-durability operations only — S3.List is DELIBERATELY excluded: it
          # backs compaction/retention discovery (not the chunk/index write path)
          # and 500s benignly on Linode OBJ (e.g. List on an empty prefix), which a
          # raw-count alert would false-page on for every idle/fresh cluster
          # (verified live: a converged cluster showed 100% of S3 traffic was
          # S3.List 500s at ~0.017/s with zero Put/Get). A sustained >5% failure on
          # Put/Get/Delete is a genuine durability problem.
          expr: |
            sum(rate(loki_s3_request_duration_seconds_count{namespace="monitoring", operation!~"S3.List", status_code=~"5.."}[10m]))
            /
            sum(rate(loki_s3_request_duration_seconds_count{namespace="monitoring", operation!~"S3.List"}[10m]))
            > 0.05
          for: 15m
          labels:
            severity: warning
            service: loki
          annotations:
            summary: Loki object-store (S3) writes/reads are failing
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'More than 5% of Loki object-store Put/Get/Delete ops are returning 5xx for 15m — chunk/index flushes are failing; the WAL backs up and risks data loss if it fills. (S3.List is excluded — it 500s benignly on an idle bucket.)'
        - alert: LokiIngestionDiscarding
          # Saturation: Loki is DROPPING incoming samples (rate limits, per-stream
          # limits, or parse errors). Distinct from a 5xx — the write "succeeds" but
          # data is silently discarded. A sustained nonzero rate = the tenant is over
          # a limit or malformed logs are being shed.
          expr: sum(rate(loki_discarded_samples_total{namespace="monitoring"}[10m])) > 0
          for: 15m
          labels:
            severity: warning
            service: loki
          annotations:
            summary: Loki is discarding ingested samples
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'Loki has discarded samples for 15m ({{ $value | humanize }}/s) — ingestion is hitting a rate/stream limit or rejecting malformed logs; some logs are not being stored.'
        # ── OTel Collector error-rate / saturation ────────────────────────────────
        # PROVISIONAL. Unlike the Loki exprs above, these are NOT yet verified live:
        # until the observability-allow-ingress NetworkPolicy fix in this branch
        # (llz-cluster-foundation 0.1.8) reaches a cluster, otelcol_* is absent (the
        # :8888 scrape times out), so `alert-eval` reports these DEAD? — expected
        # until the fix converges. The names are the canonical OTel Collector
        # internal-telemetry counters (registered per receiver/exporter at startup,
        # so present at 0 once scraped). The collector is currently a placeholder
        # pipeline (OTLP → memory_limiter/batch → debug exporter); these become
        # meaningful once a real downstream exporter (loki/otlp) is wired in.
        - alert: OTelCollectorRefusingData
          # Saturation / backpressure: the memory_limiter (or a full queue) is
          # refusing accepted-but-not-processed data. Summed across signal types
          # (the pipeline handles traces+metrics+logs); absent per-signal series are
          # simply not added.
          expr: |
            sum(rate(otelcol_receiver_refused_spans_total{namespace="llz-observability"}[10m]))
            + sum(rate(otelcol_receiver_refused_metric_points_total{namespace="llz-observability"}[10m]))
            + sum(rate(otelcol_receiver_refused_log_records_total{namespace="llz-observability"}[10m]))
            > 0
          for: 15m
          labels:
            severity: warning
            service: otel-collector
          annotations:
            summary: OTel Collector is refusing incoming telemetry
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'The OTel Collector has refused incoming telemetry for 15m — the memory_limiter is shedding load or a downstream queue is full; senders are being throttled.'
        - alert: OTelCollectorExportFailures
          # Error-rate: the exporter is failing to send downstream. Meaningful once a
          # real exporter replaces the placeholder `debug` exporter.
          expr: |
            sum(rate(otelcol_exporter_send_failed_spans_total{namespace="llz-observability"}[10m]))
            + sum(rate(otelcol_exporter_send_failed_metric_points_total{namespace="llz-observability"}[10m]))
            + sum(rate(otelcol_exporter_send_failed_log_records_total{namespace="llz-observability"}[10m]))
            > 0
          for: 15m
          labels:
            severity: warning
            service: otel-collector
          annotations:
            summary: OTel Collector is failing to export telemetry
            runbook_url: "https://github.com/<@ upstream_org @>/lke-landing-zone/blob/main/docs/runbooks/reconciler-alerts.md"
            description: 'The OTel Collector exporter has failed sends for 15m — telemetry is being dropped downstream; check the exporter endpoint and credentials.'
