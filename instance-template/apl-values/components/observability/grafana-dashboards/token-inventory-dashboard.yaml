# The single pane of glass. A Grafana dashboard delivered as a ConfigMap with the
# `grafana_dashboard` label that apl-core's Grafana sidecar (searchNamespace=ALL)
# auto-loads. Renders the unified credential inventory from the llz_token_*
# metrics (Linode + GitHub PATs, OBJ keys, and the static in-cluster secrets the
# `token-inventory-push` job emits) plus the cert-manager certificate expiries
# scraped natively — one place to inventory and eyeball every token/credential.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llz-token-inventory-dashboard
  namespace: llz-observability
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/part-of: platform
    grafana_dashboard: "1"
data:
  token-inventory.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "schemaVersion": 39,
      "tags": ["llz", "security", "tokens"],
      "title": "LLZ — Token & Credential Inventory",
      "uid": "llz-token-inventory",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Data source",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          },
          {
            "name": "region",
            "label": "Region",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(llz_token_inventory_info, region)",
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Tracked credentials",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [ { "color": "blue", "value": null } ] } } },
          "targets": [ { "expr": "count(llz_token_inventory_info{region=~\"$region\"})", "refId": "A" } ]
        },
        {
          "type": "stat",
          "title": "In breach",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } } },
          "targets": [ { "expr": "sum(llz_token_audit_status{status=\"breach\",region=~\"$region\"}) or vector(0)", "refId": "A" } ]
        },
        {
          "type": "stat",
          "title": "Expiring soon (warn)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 1 } ] } } },
          "targets": [ { "expr": "sum(llz_token_audit_status{status=\"warn\",region=~\"$region\"}) or vector(0)", "refId": "A" } ]
        },
        {
          "type": "stat",
          "title": "Inventory freshness",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "thresholds" }, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 90000 }, { "color": "red", "value": 129600 } ] } } },
          "targets": [ { "expr": "time() - max(llz_token_inventory_push_timestamp_seconds{region=~\"$region\"})", "refId": "A" } ]
        },
        {
          "type": "table",
          "title": "Credential inventory & status",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 4 },
          "targets": [ { "expr": "llz_token_audit_status{region=~\"$region\"}", "format": "table", "instant": true, "refId": "A" } ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Value": true, "__name__": true, "container": true, "endpoint": true, "instance": true, "job": true, "namespace": true, "pod": true, "prometheus": true, "service": true, "exported_job": true, "exported_instance": true }, "renameByName": { "name": "Credential", "kind": "Kind", "source": "Source", "managed_by": "Managed by", "status": "Status", "region": "Region" } } }
          ]
        },
        {
          "type": "table",
          "title": "Expiry countdown — tokens (days left)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "d", "decimals": 1, "custom": { "displayMode": "color-text" }, "thresholds": { "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 14 }, { "color": "green", "value": 30 } ] } } },
          "targets": [ { "expr": "(llz_token_expiry_timestamp_seconds{region=~\"$region\"} - time()) / 86400", "format": "table", "instant": true, "refId": "A" } ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "container": true, "endpoint": true, "instance": true, "job": true, "namespace": true, "pod": true, "prometheus": true, "service": true, "kind": true, "source": true, "managed_by": true, "exported_job": true, "exported_instance": true }, "renameByName": { "name": "Credential", "region": "Region", "Value": "Days left" } } }
          ]
        },
        {
          "type": "table",
          "title": "Expiry countdown — cert-manager certificates (days left)",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "d", "decimals": 1, "custom": { "displayMode": "color-text" }, "thresholds": { "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 14 }, { "color": "green", "value": 30 } ] } } },
          "targets": [ { "expr": "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400", "format": "table", "instant": true, "refId": "A" } ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "container": true, "endpoint": true, "instance": true, "job": true, "pod": true, "prometheus": true, "service": true, "condition": true, "issuer_name": true, "issuer_kind": true, "issuer_group": true, "exported_job": true, "exported_instance": true }, "renameByName": { "name": "Certificate", "namespace": "Namespace", "Value": "Days left" } } }
          ]
        }
      ]
    }
