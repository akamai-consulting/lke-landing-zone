# OpenBao (first-party openbao-platform chart) — wave 0.
#
# Wraps the upstream OpenBao HA Raft Helm chart (vendored as a subchart) plus the
# cluster integration: cert-manager serving cert, NetworkPolicies, ServiceMonitor,
# and Promtail audit-shipper config. Default
# wave: consumes ESO (-15) + the openbao-ca CA chain
# (cert-manager/openbao-bootstrap-ca.yaml) laid down earlier.
#
# Sourced from the OCI chart (self-contained — the StatefulSet identity
# `platform-openbao` and openbao-tls Secret are chart defaults), NOT a git path:
# the bootstrap workflow waits on pod `platform-openbao-0`, which this chart's
# release name produces.
#
# prune: false — OpenBao manages stateful PKI/auth backends; auto-pruning a
# transiently-absent resource could lock out every service. ignoreDifferences:
# the StatefulSet volumeClaimTemplates are immutable post-create (Argo would loop
# trying to patch them), and ESO rewrites the ExternalSecret deletionPolicy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llz-openbao
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: platform-support
  source:
    repoURL: ghcr.io/<@ upstream_org @>/charts
    chart: llz-openbao-platform
    targetRevision: 0.1.9
    helm:
      # LOAD-BEARING: the upstream subchart derives the StatefulSet name
      # (platform-openbao → pod platform-openbao-0, which the bootstrap workflow
      # waits on) from the Helm RELEASE NAME, not from a values field. Must be
      # `platform-openbao`, NOT the Application name. See llz-openbao-platform
      # values.yaml `platform.releaseName`.
      releaseName: platform-openbao
  destination:
    server: https://kubernetes.default.svc
    namespace: llz-openbao
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: platform-openbao
      namespace: llz-openbao
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.target.deletionPolicy
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      # First-boot ordering races (OpenBao unseal / secret seed) can outlast the
      # old ~5-retry (~5 min) budget; a failed automated sync then terminally pins
      # the revision and Argo will not re-attempt it. ~20 retries @ 3m cap (~1h)
      # rides out the bootstrap window instead.
      limit: 20
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      # llz-openbao is created (restricted PSS) by cluster-foundation at wave -20;
      # let it be the sole Namespace owner.
      - CreateNamespace=false
      - ServerSideApply=true
      - Validate=true
