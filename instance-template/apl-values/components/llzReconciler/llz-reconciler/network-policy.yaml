# NetworkPolicy for the reconciler pod. The llz-reconciler namespace inherits the
# platform's default-deny posture, so both directions are stated explicitly:
#
#   Ingress — ONLY the Prometheus scrape, from the `monitoring` namespace (where
#     kube-prometheus-stack runs) to the metrics port. Same source the foundation
#     uses to scrape CNPG :9187 (llz-cluster-foundation network-policies). Without
#     this the ServiceMonitor is discovered but every scrape is silently dropped.
#
#   Egress — DNS + the LKE-E apiserver (dual-port 443 + 6443 DNAT; a bare `ports`
#     rule with no `to:` — there is no in-cluster kube-apiserver pod to select on
#     managed LKE-E). Phase 0 talks to nothing else (no Linode API, no OpenBao);
#     those egress allows are added with the Phase 1 reconcilers that need them.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: llz-reconciler
  policyTypes: [Ingress, Egress]
  ingress:
    # Prometheus (monitoring namespace) scrapes :8080/metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - { protocol: TCP, port: 8080 }
  egress:
    # DNS resolution against kube-dns.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # LKE-E apiserver (dual-port DNAT). Bare ports rule: no in-cluster
    # kube-apiserver pod exists to selector-match on managed LKE-E. Being a bare
    # :443 egress it ALSO covers the Linode API (api.linode.com) the Linode-touching
    # reconcilers (volume-labels; later cidr-firewall/linode-creds) call over HTTPS
    # — so no separate Linode egress rule is needed.
    - ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 }
    # OpenBao API (:8200) for the --reconcile-openbao-gauges sampler (seal-status +
    # credential-age). The OpenBao ingress side is opened by the chart's
    # allowedClientPods entry for this pod (llz-openbao-platform 0.1.14).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llz-openbao
      ports:
        - { protocol: TCP, port: 8200 }
    # Harbor core API for the --reconcile-harbor provisioner, which drives Harbor
    # over its in-cluster Service (HARBOR_API_URL default
    # http://harbor-core.harbor.svc.cluster.local). GitHub API for the repo-secret
    # publication rides the bare :443 egress above.
    # BOTH ports: on LKE's Cilium CNI, NetworkPolicy is evaluated POST-DNAT, so the
    # harbor-core POD targetPort (8080) must be allowed alongside the Service port
    # (80) — otherwise the connection is dropped and the provisioner can never reach
    # Harbor (the apiserver 6443-vs-443 scar; matches the retired CronJob's netpol).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: harbor
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 80 }
