# RBAC for the in-cluster reconciler.
#
# The observe reconciler reads Nodes (get/list/watch — /api/v1/nodes for the
# readiness gauges). The argo-nudge reconciler (Phase 1, off by default) watches
# Argo CD Applications and patches the terminally-failed ones to re-trigger their
# sync, so it needs get/list/watch + patch on argoproj.io/applications. Grants for
# the remaining reconcilers (cidrFirewall Nodes, volumeTagReconciler PVs) are
# added with those reconcilers, not pre-provisioned here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llz-reconciler
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # argo-nudge reconciler: watch Applications and re-trigger the failed ones.
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llz-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llz-reconciler
subjects:
  - kind: ServiceAccount
    name: llz-reconciler
    namespace: llz-reconciler
