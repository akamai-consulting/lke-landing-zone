# RBAC for the in-cluster reconciler.
#
# All grants below back reconcilers that are OFF by default — the ClusterRole is
# the union, but no verb is exercised until its reconciler's flag is set.
#   observe        — Nodes get/list/watch (readiness); argoproj.io/applications
#                    (convergence gauge, shared with argo-nudge); and, for the
#                    health gauges, ClusterSecretStores + Certificates + pods (read).
#   argo-nudge     — argoproj.io/applications get/list/watch/patch (re-trigger the
#                    terminally-failed ones).
#   cidr-firewall  — Nodes (shared) + configmaps get/create/patch + deployments
#                    get/patch: it writes the firewall-config ConfigMap and
#                    rollout-restarts the cidr-firewall controller Deployment.
#                    Cluster-scoped for now (the target namespace is the private
#                    controller's); tightening to a namespaced Role is a follow-up.
#   volume-labels  — persistentvolumes get/list/watch (read-only in-cluster; the
#                    Volume renames go to the Linode API, not Kubernetes).
#   sc-demote      — storageclasses get/list/watch/patch (keep LKE's Flux-promoted
#                    retain class non-default).
#
# Leader election holds a single coordination.k8s.io Lease in THIS namespace, so
# that lives in a namespaced Role (below), not the ClusterRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llz-reconciler
rules:
  # observe (readiness) + cidr-firewall (node → instance → firewall) read Nodes.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # argo-nudge: watch Applications and re-trigger the failed ones.
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
  # volume-labels: read PVs to map bound Linode-CSI volumes (renames go to Linode).
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  # observe health gauges (read-only): ESO store readiness, cert-manager
  # Certificate readiness, and OpenBao pod readiness (the seal proxy).
  - apiGroups: ["external-secrets.io"]
    resources: ["clustersecretstores"]
    verbs: ["get"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # cidr-firewall: write the firewall-config ConfigMap + restart the controller.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  # sc-demote: watch StorageClasses and rewrite is-default-class→false on the
  # Flux-promoted retain class.
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llz-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llz-reconciler
subjects:
  - kind: ServiceAccount
    name: llz-reconciler
    namespace: llz-reconciler
---
# Leader-election Lease — namespaced, so a Role (not the ClusterRole).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llz-reconciler-leader-election
  namespace: llz-reconciler
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llz-reconciler-leader-election
  namespace: llz-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llz-reconciler-leader-election
subjects:
  - kind: ServiceAccount
    name: llz-reconciler
    namespace: llz-reconciler
