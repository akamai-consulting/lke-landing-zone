# llz-reconciler Deployment — the long-lived `llz reconcile` process.
#
# Runs the observe-only gauges + the enabled reconcilers (see the args below). It
# samples/serves over the in-cluster ServiceAccount (KUBERNETES_SERVICE_HOST + the
# auto-mounted SA token/CA that kube.NewInCluster reads), publishes :8080/metrics,
# and — for the enabled driving reconcilers — holds a coordination.k8s.io Lease so
# only one replica writes. Single replica + never-two-pods rollout (below).
#
# Image is the slim distroless llz (dockerfiles/llz), the same artifact the
# CronJobs run; rendered by copier and pinned to the signed sha image for the
# commit under test by release-e2e. No new deps over that image (the reconciler is
# stdlib net/http + internal/kube + internal/metrics — no client-go).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
  annotations:
    ignore-check.kube-linter.io/env-value-from: "linode-api-token Secret is created at runtime by ESO (externalsecret.yaml); not a static manifest the linter can resolve"
    ignore-check.kube-linter.io/read-secret-from-env-var: "the volume-labels reconciler reads LINODE_TOKEN via env to authenticate to the Linode API; no file-mount path without a binary rewrite"
spec:
  replicas: 1
  # Never run two pods at once: the old pod terminates before the new starts.
  # Phase 0 is observe-only so overlap would be harmless, but this keeps the
  # single-writer invariant the Phase 1 reconcilers need without depending on
  # leader election during a rollout — at the cost of a few seconds' metrics gap
  # on redeploy, immaterial for a 30s sampler.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: llz-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llz-reconciler
    spec:
      serviceAccountName: llz-reconciler
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: reconcile
          image: <@ llz_image_ref @>
          # ENABLED: observe-only gauges + the leader-gated driving reconcilers that
          # need no per-env secrets — argo-nudge, sc-demote (batch 1) — plus the
          # read-only openbao-gauges (batch 2: seal-status + credential-age; its
          # OpenBao :8200 egress is in the NetworkPolicy and its ingress is opened
          # by the chart's allowedClientPods entry; the `reconciler` k8s-auth role
          # ships from bao-configure). Idempotent/read-only alongside the CronJobs,
          # which stay until each proves out.
          # volume-labels (this batch): renames bound Linode-CSI Volumes to
          # <REGION_SHORT>-<ns>-<pvc>. Needs LINODE_TOKEN (ESO Secret) + REGION_SHORT
          # (per-env, filled by the render-patch). Leader-gated + idempotent
          # alongside the linode-volume-labeler CronJob.
          # STILL OFF — need more per-env env (a later batch):
          #   --reconcile-cidr-firewall  (NODE_NAME via downward API; targets the
          #                               private cidr-firewall controller, absent on e2e)
          #   --reconcile-linode-creds   (REGION, OBJ_CLUSTER, OPENBAO_*; due-based no-op)
          #   --reconcile-harbor         (HARBOR_HOST + Harbor admin creds)
          args:
            - reconcile
            - --metrics-addr=:8080
            - --sample-interval=30
            - --reconcile-argo-nudge
            - --reconcile-sc-demote
            - --reconcile-openbao-gauges
            - --reconcile-volume-labels
          env:
            # Leader-election identity + Lease namespace (downward API). Only used
            # when a driving reconciler is enabled; harmless otherwise.
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # OpenBao endpoint for the openbao-gauges sampler. VAULT_SKIP_VERIFY-style
            # posture: OpenBao's serving cert is signed by its private CA, so the
            # in-cluster consumers connect insecure (the code's HTTPClientInsecure);
            # traffic stays on the pod network. OPENBAO_ADDR has a code default but
            # is set explicitly for legibility.
            - name: OPENBAO_ADDR
              value: "https://platform-openbao.llz-openbao.svc.cluster.local:8200"
            # volume-labels reconciler: the ESO-synced in-cluster Linode token +
            # the per-env label prefix. REGION_SHORT is a placeholder overwritten
            # per-env by llz-reconciler-env-patch.yaml (llz render).
            - name: LINODE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: linode-api-token
                  key: token
            - name: REGION_SHORT
              value: "REPLACE_ME"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            limits: { cpu: 200m, memory: 128Mi }
            requests: { cpu: 25m, memory: 48Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile: { type: RuntimeDefault }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
