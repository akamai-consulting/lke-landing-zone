# ServiceMonitor for the reconciler's /metrics endpoint.
#
# kube-prometheus-stack here runs with serviceMonitorSelector: {} +
# serviceMonitorNamespaceSelector: {} (apl-values/_shared/values.yaml), i.e. it
# discovers every ServiceMonitor in every namespace — so the `release` label below
# is not strictly required for pickup. It is set to the same value the
# llz-openbao-platform ServiceMonitor uses as belt-and-suspenders, so discovery
# still works if an adopter later tightens the selector to release-scoped.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llz-reconciler
  namespace: llz-reconciler
  labels:
    release: platform-prom
    app.kubernetes.io/name: llz-reconciler
spec:
  namespaceSelector:
    matchNames:
      - llz-reconciler
  selector:
    matchLabels:
      app.kubernetes.io/name: llz-reconciler
  endpoints:
    - port: metrics
      scheme: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
