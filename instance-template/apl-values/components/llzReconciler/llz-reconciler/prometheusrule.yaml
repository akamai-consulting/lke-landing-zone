# Alert rules that make the reconciler's metrics surface actionable. Picked up by
# kube-prometheus-stack's ruleSelector (set permissively in the env values.yaml),
# so the llz-reconciler namespace is fine. These three distinguish the failure
# modes the design calls out:
#
#   LLZReconcilerScrapeDown  — Prometheus can't reach the pod (target down /
#                              NetworkPolicy / pod gone). The metrics are blind.
#   LLZReconcilerReportingDown — the pod is up and scraped, but its own samples
#                              are failing (llz_reconcile_up 0 — e.g. lost API
#                              access). It is reporting, and reporting failure.
#   LLZReconcilerStale       — scraped and up, but the sample loop has not advanced
#                              (wedged goroutine). Timestamp staleness catches what
#                              up=1 alone would miss.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: llz-reconciler-alerts
  namespace: llz-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    # Organizational only; pickup is via the kube-prometheus-stack ruleSelector.
    app.kubernetes.io/part-of: platform
spec:
  groups:
    - name: llz-reconciler
      interval: 30s
      rules:
        - alert: LLZReconcilerScrapeDown
          expr: up{namespace="llz-reconciler"} == 0
          for: 10m
          labels:
            severity: warning
            service: llz-reconciler
          annotations:
            summary: llz reconciler metrics target is down
            description: Prometheus cannot scrape the llz-reconciler /metrics endpoint; the in-cluster convergence signals are blind.
        - alert: LLZReconcilerReportingDown
          # Fires per reconciler (the `reconciler` label rides through): any
          # reconciler whose last pass failed — the observe sampler losing API
          # access, or a Phase 2 timed reconciler erroring.
          expr: llz_reconcile_up{namespace="llz-reconciler"} == 0
          for: 10m
          labels:
            severity: warning
            service: llz-reconciler
          annotations:
            summary: llz reconciler {{ $labels.reconciler }} pass is failing
            description: The {{ $labels.reconciler }} reconciler is scraped but its last pass failed (e.g. lost Kubernetes API access, or a rotation/provisioning error).
        - alert: LLZReconcilerStale
          # Scoped to the observe reconciler: it samples every 30s, so a >5m gap
          # in its success timestamp means the loop is wedged. The timed
          # reconcilers run hourly/daily, so staleness is not a signal for them —
          # LLZReconcilerErroring covers their failures instead.
          expr: time() - max(llz_reconcile_last_success_timestamp_seconds{namespace="llz-reconciler", reconciler="observe"}) > 300
          for: 10m
          labels:
            severity: warning
            service: llz-reconciler
          annotations:
            summary: llz observe reconciler loop is stale
            description: The observe reconciler has not completed a successful pass in over 5 minutes; its sample loop may be wedged.
        - alert: LLZReconcilerErroring
          # A folded timed reconciler (Linode cred rotation / Harbor provisioning)
          # failing repeatedly — distinct from a single transient blip.
          expr: increase(llz_reconcile_errors_total{namespace="llz-reconciler"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
            service: llz-reconciler
          annotations:
            summary: llz reconciler {{ $labels.reconciler }} is erroring repeatedly
            description: The {{ $labels.reconciler }} reconciler has failed more than 3 times in the last hour.
