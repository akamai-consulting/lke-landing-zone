# Harbor admin password for the harbor reconciler (ci harbor-provisioner reads
# /etc/harbor-admin/HARBOR_ADMIN_PASSWORD to authenticate to Harbor's API). ESO
# syncs it from secret/harbor/admin — which is itself only populated AFTER Harbor
# deploys: apl-core's Harbor Helm chart generates the admin Secret, and the
# harbor-admin-push PushSecret mirrors it into OpenBao. So on a fresh bootstrap
# this ExternalSecret sits Ready=False (SecretSyncedError) until Harbor is up.
#
# TWO deliberate choices keep that post-Harbor dependency off the bootstrap
# critical path (and out of the #163 wave-wedge class):
#   1. HIGH sync-wave (20): applied AFTER every other reconciler resource, so its
#      post-Harbor Ready=False gates no earlier wave. Argo never waits on it to
#      advance the reconciler Deployment (wave 6) or anything else.
#   2. The Deployment mounts the resulting Secret OPTIONAL (deployment.yaml
#      harbor-admin volume), so the pod starts without it and the provisioner
#      no-ops until it appears; kubelet refreshes the mount once it syncs.
# It is also deferred at the convergence gate (health/allowlists.go) — same class
# as harbor-docker-config — so its transient Ready=False can't pin converge.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin-password
  namespace: llz-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: harbor-admin-password
    creationPolicy: Owner
    # The provisioner reads the file /etc/harbor-admin/HARBOR_ADMIN_PASSWORD, so
    # the mounted Secret must carry that exact key.
    template:
      type: Opaque
      engineVersion: v2
      data:
        HARBOR_ADMIN_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: harbor/admin
        property: password
