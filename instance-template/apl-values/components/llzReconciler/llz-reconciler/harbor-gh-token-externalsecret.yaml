# GitHub dispatch/secrets-write token for the harbor reconciler's repo-secret
# publication (GH_TOKEN). The reconciler now runs the harbor-robot-provisioner's
# work, so it reads the SAME path (secret/infra/github-dispatch-token, seeded by
# `llz ci bao-seed-all`) — this just syncs it into the llz-reconciler namespace,
# where the reconciler pod mounts it as the GH_TOKEN env.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready, and
# BEFORE the reconciler Deployment (wave 6) that hard-references it. The
# dispatch token is seeded early in bootstrap (before Harbor), so a hard
# secretKeyRef at wave 5 < 6 never wedges — wave-dependency-guard verifies this.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-provisioner-gh-token
  namespace: llz-reconciler
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # 1m, not 1h: on first boot the `openbao` ClusterSecretStore only goes Ready
  # after OpenBao is seeded, and ESO does not re-trigger on store recovery, so a
  # 1h refresh would strand the reconciler pod (CreateContainerConfigError) until
  # its next refresh. 1m bounds that gap; nudge-argo force-syncs on top. Matches
  # the linode-api-token / harbor-registry-s3 ExternalSecrets.
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: harbor-provisioner-gh-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: infra/github-dispatch-token
        property: token
