# Velero — cluster backup / DR (wave -14).
#
# Deploys the UPSTREAM Velero Helm chart directly (like the ESO Application),
# rather than republishing it as a first-party chart — Velero's broad RBAC
# (cluster-admin, wildcard verbs, secret access) is correct-by-design for a backup
# tool but would trip the repo's kube-linter if rendered as a first-party chart.
# The llz glue (namespace, Linode CSI VolumeSnapshotClass, NetworkPolicies, the
# velero-cloud-credentials ExternalSecret) ships as raw manifests in this
# component dir. -14 places it AFTER ESO (-15, for the credentials Secret) and the
# AppProject/cluster-foundation (-20).
#
# Per-env BackupStorageLocation bucket/region/s3Url are overlaid by
# `llz render` via velero-backup-location-patch.yaml (the manifest tree is not
# per-env-rendered, so the placeholders below are replaced per deployment).
# Volume data uses CSI VolumeSnapshots (in-region); backup metadata goes to the
# Linode OBJ bucket. For cross-region DR, enable CSI snapshot data movement — see
# docs/runbooks/velero-dr.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llz-velero
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-14"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: platform-support
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: 12.1.0
    helm:
      releaseName: llz-velero
      valuesObject:
        # The AWS object-store plugin (Linode OBJ is S3-compatible), fetched into
        # the shared plugins emptyDir by this initContainer.
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.13.1
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              capabilities:
                drop: [ALL]
              seccompProfile:
                type: RuntimeDefault
        configuration:
          # Snapshot PVCs via CSI VolumeSnapshots (the VolumeSnapshotClass in this
          # component), not the legacy in-tree snapshotter.
          features: EnableCSI
          # PLACEHOLDER — `llz render` replaces this whole list per-env via
          # velero-backup-location-patch.yaml (RenderVeleroBSLPatch).
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: REPLACED_BY_LLZ_RENDER
              default: true
              config:
                region: REPLACED_BY_LLZ_RENDER
                s3Url: https://REPLACED_BY_LLZ_RENDER
                s3ForcePathStyle: "true"
          # CSI snapshots use the VolumeSnapshotClass, not a VolumeSnapshotLocation.
          volumeSnapshotLocation: []
        # Credentials Secret is created by the velero-cloud-credentials
        # ExternalSecret (OpenBao→ESO), not this chart.
        credentials:
          useSecret: true
          existingSecret: velero-cloud-credentials
        # CSI snapshots don't need the node-agent (that's file-system backup /
        # data movement, which would require a privileged DaemonSet).
        deployNodeAgent: false
        backupsEnabled: true
        snapshotsEnabled: true
        # CRDs install from the chart's crds/; skip the upgrade-CRDs Hook Job (a
        # bare kubectl Job without restricted-PSS securityContext).
        upgradeCRDs: false
        cleanUpCRDs: false
        # Daily backup of every namespace, 30-day retention, with CSI snapshots.
        schedules:
          daily-backup:
            disabled: false
            schedule: "0 2 * * *"
            useOwnerReferencesInBackup: false
            template:
              ttl: "720h"
              snapshotVolumes: true
              includedNamespaces:
                - "*"
              storageLocation: default
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
        # Restricted-PSS-compliant (the velero namespace enforces restricted).
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 65534
          fsGroup: 65534
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        # /tmp on an emptyDir so readOnlyRootFilesystem doesn't break Velero's
        # backup-tarball temp writes.
        extraVolumes:
          - name: tmp
            emptyDir: {}
        extraVolumeMounts:
          - name: tmp
            mountPath: /tmp
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      # First-boot ordering (ESO seeding the credentials Secret) can outlast a
      # short retry budget; ~20 retries @ 3m cap rides out the bootstrap window.
      limit: 20
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      # The velero namespace is created (with PSS labels) by velero-namespace.yaml
      # at wave -20; let it be the sole owner of the Namespace object.
      - CreateNamespace=false
      - ServerSideApply=true
