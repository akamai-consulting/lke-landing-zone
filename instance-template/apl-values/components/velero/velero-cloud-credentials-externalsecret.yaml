# Syncs the Velero S3 credentials from OpenBao (secret/velero/object-store, seeded
# by bootstrap-openbao.yml's bao-seed-all step) into the velero-cloud-credentials
# Secret the Velero chart reads. Velero's AWS plugin wants a single `cloud` key
# holding an AWS credentials *file* (INI), so the template assembles one from the
# two OpenBao fields. Wave 5: after ESO + the openbao ClusterSecretStore are ready.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-cloud-credentials
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: velero-cloud-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: velero/object-store
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: velero/object-store
        property: secret_access_key
