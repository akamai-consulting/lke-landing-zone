# RBAC for the CI-agnostic cluster-health job — least-privilege, read-only.
#
# The llz-cluster-health ServiceAccount (llz-argo-workflows) is the health
# WORKLOAD's identity. `llz ci health-incluster` reads Argo Applications, ESO
# stores, cert-manager Certificates, OpenBao pods, nodes, and JOBS — all reads.
# Kube-ONLY: authenticated purely by this SA's projected token (in-cluster kube
# config). No OpenBao, no GitHub secret. (A future rotation-style day-2 job that
# DOES need OpenBao gets its own SA + a scoped bao-configure role + an OpenBao
# :8200 egress rule, and uses `llz ci openbao-login`.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llz-cluster-health
  namespace: llz-argo-workflows
---
# Read-only, cluster-scoped — the signals `llz ci health` inspects platform-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llz-cluster-health
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["external-secrets.io"]
    resources: ["clustersecretstores", "externalsecrets"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services"]
    verbs: ["get", "list"]
  # `llz ci health` does `kubectl get jobs -A` (the bootstrap Job checks) — without
  # this the jobs check 403s. batch/jobs was the RBAC gap the round-2 review found.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llz-cluster-health
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llz-cluster-health
subjects:
  - kind: ServiceAccount
    name: llz-cluster-health
    namespace: llz-argo-workflows
