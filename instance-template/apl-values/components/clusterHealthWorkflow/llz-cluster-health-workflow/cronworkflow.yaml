# Self-driving trigger — the cluster checks its own health on a schedule with NO
# external CI in the loop. This is the fully-decoupled default: nothing outside
# the cluster is required for day-2 health. (The continuous, finer-grained form is
# the llz-reconciler; this is the periodic full `llz ci health` pass, report-only.)
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: llz-cluster-health
  namespace: llz-argo-workflows
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  workflowSpec:
    workflowTemplateRef:
      name: llz-cluster-health
    arguments:
      parameters:
        # Scheduled runs are report-only (the report is the deliverable); set true
        # for an env where a failing scheduled check should page.
        - name: fail-on-unhealthy
          value: "false"
