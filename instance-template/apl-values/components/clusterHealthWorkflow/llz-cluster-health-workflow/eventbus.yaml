# Argo Events requires an EventBus in the Sensor/EventSource namespace — it is the
# transport the Sensor subscribes to and the EventSource publishes on. None ships
# by default (the argoEvents component installs only the controller + CRDs;
# cert-automation runs its own bus in its own namespace), so the webhook trigger
# path is DEAD without this — the round-2 review's finding. `default` is the name a
# Sensor/EventSource binds to when `eventBusName` is unset. The argoEvents
# controller reconciles this into a NATS StatefulSet, so this depends on that
# component (declared on clusterHealthWorkflow.DependsOn).
#
# NOTE (WIP): native NATS at 3 replicas is the documented HA default and this is
# the SHARED bus for the llz-argo-events namespace. If nothing else uses it, a
# single replica is fine for a non-critical health trigger — tune before merge.
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: llz-argo-events
spec:
  nats:
    native:
      replicas: 3
      auth: token
