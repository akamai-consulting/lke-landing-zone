# The health job itself — a WorkflowTemplate the CronWorkflow and the Sensor both
# reference. Runs `llz ci health` on the slim llz image (same artifact the
# reconciler / CronJobs run), authenticated ONLY by the llz-cluster-health
# ServiceAccount (in-cluster kube config). No secrets, no OpenBao needed for the
# read-only health surface; a day-2 job that DID need OpenBao would add a
# `llz ci openbao-login --method kubernetes` step against this same SA.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: llz-cluster-health
  namespace: llz-argo-workflows
spec:
  serviceAccountName: llz-cluster-health
  entrypoint: health
  # Reap finished runs; keep a few for triage.
  ttlStrategy:
    secondsAfterCompletion: 3600
  podGC:
    strategy: OnWorkflowSuccess
  # tmp scratch for the read-only-rootfs container (the llz image is distroless
  # with readOnlyRootFilesystem; give it a writable /tmp, like the reconciler).
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
        sizeLimit: 16Mi
  arguments:
    parameters:
      - name: fail-on-unhealthy
        value: "false"
  templates:
    - name: health
      inputs:
        parameters:
          - name: fail-on-unhealthy
      metadata:
        labels:
          app.kubernetes.io/name: llz-cluster-health
      container:
        image: <@ llz_image_ref @>
        # Run llz DIRECTLY — the distroless image has no /bin/sh, so report-vs-gate
        # is a value flag (llz ci health --fail-on-unhealthy=<bool>), not a shell
        # conditional. Matches the reconciler / harbor-provisioner invocation shape.
        args:
          - ci
          - health
          - --fail-on-unhealthy={{inputs.parameters.fail-on-unhealthy}}
        resources:
          limits:   { cpu: 200m, memory: 128Mi }
          requests: { cpu: 25m,  memory: 48Mi }
        volumeMounts:
          - { name: tmp, mountPath: /tmp }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile: { type: RuntimeDefault }
