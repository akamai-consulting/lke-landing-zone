# The health job itself — a WorkflowTemplate the CronWorkflow references,
# authenticated ONLY by the llz-cluster-health ServiceAccount (in-cluster kube
# config). No secrets, kube-only.
#
# Runs `llz ci health-incluster` — the KUBECTL-FREE convergence check
# (internal/kube, no kubectl, no shell) so it works on the slim distroless llz
# image, unlike `llz ci health` (a kubectl orchestrator). See
# docs/designs/day2-incluster-health.md.
#
# WIP: still needs a LIVE-CLUSTER run (CronWorkflow runs the health job green)
# before merge — structure/lint checks can't substitute for it (round-2 lesson).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: llz-cluster-health
  namespace: llz-argo-workflows
spec:
  serviceAccountName: llz-cluster-health
  entrypoint: health
  # Reap finished runs; keep a few for triage.
  ttlStrategy:
    secondsAfterCompletion: 3600
  podGC:
    strategy: OnWorkflowSuccess
  # tmp scratch for the read-only-rootfs container (the llz image is distroless
  # with readOnlyRootFilesystem; give it a writable /tmp, like the reconciler).
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
        sizeLimit: 16Mi
  arguments:
    parameters:
      - name: fail-on-unhealthy
        value: "false"
  templates:
    - name: health
      inputs:
        parameters:
          - name: fail-on-unhealthy
      metadata:
        labels:
          app.kubernetes.io/name: llz-cluster-health
      container:
        image: <@ llz_image_ref @>
        # Run llz DIRECTLY — the distroless image has no /bin/sh, so report-vs-gate
        # is a value flag (--fail-on-unhealthy=<bool>), not a shell conditional.
        # Matches the reconciler / harbor-provisioner invocation shape.
        args:
          - ci
          - health-incluster
          - --fail-on-unhealthy={{inputs.parameters.fail-on-unhealthy}}
        resources:
          limits:   { cpu: 200m, memory: 128Mi }
          requests: { cpu: 25m,  memory: 48Mi }
        volumeMounts:
          - { name: tmp, mountPath: /tmp }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile: { type: RuntimeDefault }
