# The health job itself — a WorkflowTemplate the CronWorkflow and the Sensor both
# reference, authenticated ONLY by the llz-cluster-health ServiceAccount
# (in-cluster kube config). No secrets, kube-only.
#
# ┌─ WIP / DO-NOT-MERGE — the substrate is not resolved ─────────────────────────┐
# │ `llz ci health` is a KUBECTL ORCHESTRATOR (it shells out to `kubectl`), but   │
# │ <@ llz_image_ref @> is distroless/static — NO kubectl. So this cannot run as  │
# │ written. The follow-up must pick ONE (see docs/designs/day2-incluster-health.md): │
# │   1. run in a kube-capable image (KUBE_IMAGE/TF_IMAGE — but no such image is   │
# │      published for in-cluster use today), OR                                   │
# │   2. add a kubectl-FREE exit-code health verb built on internal/kube (reuse    │
# │      the reconciler's reconcile_convergence.go / reconcile_health.go), which   │
# │      runs in the slim image as-is. This is the intended direction.             │
# │ The args below are left pointing at `llz ci health` as the placeholder until   │
# │ that verb exists; do not ship until it does + a live-cluster run proves it.    │
# └──────────────────────────────────────────────────────────────────────────────┘
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: llz-cluster-health
  namespace: llz-argo-workflows
spec:
  serviceAccountName: llz-cluster-health
  entrypoint: health
  # Reap finished runs; keep a few for triage.
  ttlStrategy:
    secondsAfterCompletion: 3600
  podGC:
    strategy: OnWorkflowSuccess
  # tmp scratch for the read-only-rootfs container (the llz image is distroless
  # with readOnlyRootFilesystem; give it a writable /tmp, like the reconciler).
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
        sizeLimit: 16Mi
  arguments:
    parameters:
      - name: fail-on-unhealthy
        value: "false"
  templates:
    - name: health
      inputs:
        parameters:
          - name: fail-on-unhealthy
      metadata:
        labels:
          app.kubernetes.io/name: llz-cluster-health
      container:
        image: <@ llz_image_ref @>
        # Run llz DIRECTLY — the distroless image has no /bin/sh, so report-vs-gate
        # is a value flag (llz ci health --fail-on-unhealthy=<bool>), not a shell
        # conditional. Matches the reconciler / harbor-provisioner invocation shape.
        args:
          - ci
          - health
          - --fail-on-unhealthy={{inputs.parameters.fail-on-unhealthy}}
        resources:
          limits:   { cpu: 200m, memory: 128Mi }
          requests: { cpu: 25m,  memory: 48Mi }
        volumeMounts:
          - { name: tmp, mountPath: /tmp }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile: { type: RuntimeDefault }
