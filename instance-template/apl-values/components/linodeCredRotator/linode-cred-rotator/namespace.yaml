# llz-linode-cred-rotator namespace — Argo-owned.
#
# Home for the in-cluster Linode credential rotator CronJob + its ESO-synced
# minting token. Pod Security `restricted` is baked in: the rotator pod's
# securityContext satisfies it (runAsNonRoot, drop ALL, readOnlyRootFilesystem,
# seccomp RuntimeDefault), so enforce locks the posture against image regressions.
apiVersion: v1
kind: Namespace
metadata:
  name: llz-linode-cred-rotator
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
