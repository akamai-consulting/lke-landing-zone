# ServiceAccount for the Linode credential rotator CronJob.
#
# It bears NO Kubernetes RBAC: the rotator talks only to the Linode API and
# OpenBao (both over HTTPS, off-cluster / pod-network). Its only privileged
# action is authenticating to OpenBao — done with this SA's projected token
# against the `linode-rotator` Kubernetes-auth role (bound to this SA's name +
# namespace in `llz ci bao-configure`), which grants the scoped write policy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: linode-cred-rotator
  namespace: llz-linode-cred-rotator
