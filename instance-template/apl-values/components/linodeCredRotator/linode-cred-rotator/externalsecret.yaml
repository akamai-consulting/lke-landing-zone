# The MINTING Linode token for the rotator — the token it authenticates with to
# create replacement credentials. ESO syncs it from secret/linode/api-token (the
# canonical in-cluster Linode token, same path the volume-labeler reads). The
# rotator writes the ROTATED creds (OBJ keys, DNS token) back to OpenBao directly
# via the linode-rotator Kubernetes-auth role — not through this Secret.
#
# Sync-wave 5: after ESO + the `openbao` ClusterSecretStore are Ready.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linode-api-token
  namespace: llz-linode-cred-rotator
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: linode-api-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: linode/api-token
        property: token
