# Linode credential rotator CronJob.
#
# Daily, runs `llz ci rotate-linode-creds --apply` on the slim llz image. The
# command rotates only the credentials that are DUE (OpenBao `rotated_at` older
# than the threshold), so a daily schedule with idempotent no-ops is fine. See
# docs/designs/linode-credential-rotator.md.
#
# REGION + OBJ_CLUSTER are per-env: this base ships placeholders that `llz render`
# strategic-merge-patches via the manifest-root linode-cred-rotator-env-patch.yaml
# (REGION = deployment name, OBJ_CLUSTER = spec object-storage cluster).
#
# OPENBAO_SKIP_VERIFY=true matches the established in-cluster OpenBao posture
# (every `baoExec` uses VAULT_SKIP_VERIFY); mount the openbao CA + set
# OPENBAO_CA_FILE instead once a CA-distribution path exists.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: linode-cred-rotator
  namespace: llz-linode-cred-rotator
  annotations:
    ignore-check.kube-linter.io/env-value-from: "linode-api-token Secret is created at runtime by ESO (externalsecret.yaml); not a static manifest the linter can resolve"
    ignore-check.kube-linter.io/read-secret-from-env-var: "llz reads LINODE_TOKEN via env to authenticate to the Linode API; no file-mount path without a binary rewrite"
spec:
  schedule: "30 3 * * *"
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          # Static label so the NetworkPolicy can podSelector-match it.
          labels:
            app.kubernetes.io/name: linode-cred-rotator
        spec:
          restartPolicy: OnFailure
          serviceAccountName: linode-cred-rotator
          containers:
            # Slim distroless llz image (dockerfiles/llz). Pin :latest to a
            # :sha-... tag in your instance for reproducibility.
            - name: rotate
              image: ghcr.io/<@ upstream_org @>/llz:latest
              args: ["ci", "rotate-linode-creds", "--apply"]
              env:
                # Per-env; patched by `llz render` (see header).
                - name: REGION
                  value: "REPLACE_ME"
                - name: OBJ_CLUSTER
                  value: "REPLACE_ME"
                - name: OPENBAO_ADDR
                  value: "https://platform-openbao.llz-openbao.svc.cluster.local:8200"
                - name: OPENBAO_SKIP_VERIFY
                  value: "true"
                - name: LINODE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: linode-api-token
                      key: token
              resources:
                limits: { cpu: 200m, memory: 128Mi }
                requests: { cpu: 50m, memory: 64Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile: { type: RuntimeDefault }
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 16Mi
