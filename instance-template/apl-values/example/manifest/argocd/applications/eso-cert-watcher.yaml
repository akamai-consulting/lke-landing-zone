# eso-cert-watcher (first-party chart) — wave -5.
#
# AFTER the ESO install (-15), BEFORE default-wave consumers — it rollout-restarts
# the ESO controller when the OpenBao serving CA (openbao-tls) rotates, so ESO
# re-reads the new CA bundle (the operator caches it at startup). ESO must already
# be installed. Chart defaults already target llz-external-secrets / openbao-tls
# in llz-openbao; pinned in valuesObject for visibility.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llz-eso-cert-watcher
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  revisionHistoryLimit: 3
  project: platform-support
  source:
    repoURL: ghcr.io/<@ upstream_org @>/charts
    chart: llz-eso-cert-watcher
    targetRevision: 0.2.1
    helm:
      releaseName: llz-eso-cert-watcher
      valuesObject:
        namespace: llz-external-secrets
        target:
          deployment:
            name: llz-external-secrets
        watch:
          certificate:
            name: openbao-tls
            namespace: llz-openbao
          store:
            name: openbao
            cooldownSeconds: 120
        pollIntervalSeconds: 60
  destination:
    server: https://kubernetes.default.svc
    namespace: llz-external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
    syncOptions:
      # llz-external-secrets is created by cluster-foundation at wave -20 (single
      # Namespace owner).
      - CreateNamespace=false
      - ServerSideApply=true
