# Per-env override: REGION_SHORT for the volume labeler. The example overlay
# carries the placeholder "exa"; llz env add rewrites it to the
# target env's --region-short on `llz env add <env>`. Strategic-merge
# patch keyed by the CronJob name + container name.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: linode-volume-labeler
  namespace: llz-linode-volume-labeler
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: relabel
              env:
                - name: REGION_SHORT
                  value: "exa"
