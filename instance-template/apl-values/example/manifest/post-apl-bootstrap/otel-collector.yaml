# Minimal OpenTelemetry Collector instance.
#
# Applied SEPARATELY from the main manifest tree — see kustomization.yaml in
# this dir for the rationale (the opentelemetry.io/v1beta1 CRD is registered by
# apl-core's otel-operator helmfile, which may not be done at main-tree
# lint/apply time). Operator step: .github/workflows/bootstrap-openbao.yml's
# "Apply post-apl-bootstrap" step runs `kubectl apply -k` on this directory
# once OpenBao is configured.
#
# Why this exists: apl-core installs the otel-OPERATOR but does NOT create a
# Collector instance. Without this CR the Service `otel-collector` doesn't
# exist, and the `support-plane-alerts` OTelCollector scrape-health alert has
# no target. An env that fronts the collector with an Istio Gateway routes to
# `otel-collector.llz-observability.svc.cluster.local:4318`.
#
# Naming: the otel-operator creates the Service from the CR's metadata.name
# with a `-collector` suffix. To get Service `otel-collector` the CR name MUST
# be `otel`.
#
# Pipeline: OTLP-HTTP receiver → memory_limiter + batch → debug exporter
# (stdout). INTENTIONALLY a no-op exporter for first bring-up — it makes the
# Service exist and exercises the receive path without committing to a
# downstream. Extend `exporters:` (loki / prometheusremotewrite / otlp) when a
# real destination is wired. To enforce client auth, add a `bearertokenauth`
# extension to the otlp receiver.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  # NAME MUST BE `otel` so the operator creates Service `otel-collector`.
  name: otel
  namespace: llz-observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: otlp-ingress
spec:
  mode: deployment
  replicas: 1
  config:
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
            include_metadata: true
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50
      batch:
        timeout: 5s
        send_batch_size: 8192
    exporters:
      # Placeholder — emits to stdout (`kubectl logs deploy/otel-collector`).
      # Replace/extend with real destinations when clients start sending data.
      debug:
        verbosity: detailed
        sampling_initial: 5
        sampling_thereafter: 200
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # PSS restricted compliance (llz-observability ships restricted).
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
