name: llz-cluster-health (reusable)

# Reusable (`workflow_call`) cluster-health check. Vendored verbatim into every
# instance; the caller stub owns the trigger surface. Two modes: report-only
# (all defaults) and gate mode (fail-on-unhealthy + assert-loki).
# Maintainer rationale (incidents, PR archaeology, why-not-X) lives in the
# TEMPLATE repo: docs/workflows/llz-cluster-health.md

on:
  workflow_call:
    inputs:
      region:
        description: 'Deployment (matches an infra-<region> Environment in the caller repo)'
        required: true
        type: string
      verbose:
        description: 'VERBOSE=1 — dump describe/logs even when nothing is failing'
        required: false
        type: boolean
        default: false
      fail-on-unhealthy:
        description: 'Fail the job when `llz ci health` exits non-zero. Leave false for recovery/diagnostic runs, where the report is the deliverable.'
        required: false
        type: boolean
        default: false
      assert-loki:
        description: 'Also assert Loki is bootstrapped and S3-backed (`llz ci assert-loki`) — the E2E validation gate.'
        required: false
        type: boolean
        default: false
      template-ref:
        description: 'The template release this instance is rendered from — `llz upgrade` re-pins it. Unused by this workflow''s jobs (everything resolves locally); declared only because the caller stub passes it and workflow_call rejects undeclared inputs.'
        required: false
        type: string
        default: main
    secrets:
      TF_STATE_ACCESS_KEY:
        required: true
      TF_STATE_SECRET_KEY:
        required: true
      LINODE_API_TOKEN:
        description: 'Linode API token used to open/revoke this runner''s egress IP in the LKE-E control-plane ACL for the kubectl steps.'
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  health:
    name: cluster-health (${{ inputs.region }})
    runs-on: ubuntu-latest
    environment: infra-${{ inputs.region }}
    container:
      image: ${{ vars.TF_IMAGE }}
    timeout-minutes: 20
    env:
      REGION:               ${{ inputs.region }}
      TF_STATE_BUCKET:      ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3:  ${{ vars.TF_STATE_ENDPOINT }}
      TF_IN_AUTOMATION:     'true'
      VERBOSE:              ${{ inputs.verbose && '1' || '0' }}
    steps:
      # Single checkout at the workspace root — the vendored composite actions
      # resolve their working-directory against it.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Kubeconfig + opens this runner's egress IP in the LKE-E control-plane
      # ACL (revoked by the always() step at job end) + installs llz.
      - name: Cluster access (kubeconfig + runner ACL + llz)
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ inputs.region }}

      - name: Cluster health
        env:
          FAIL_ON_UNHEALTHY: ${{ inputs.fail-on-unhealthy && 'true' || 'false' }}
        # Always write the summary before honoring the exit code, so a failing
        # health run still leaves its report in the job summary.
        run: |
          set +e
          export KUBECONFIG="$HOME/.kube/config"
          # Wait for the just-opened control-plane ACL to propagate before
          # probing, else health trips its exit-3 on a cluster that is up.
          # Wall-clock bounded so a dead apiserver still fails fast.
          deadline=$(( SECONDS + 180 ))
          until kubectl version --request-timeout=10s >/dev/null 2>&1; do
            if (( SECONDS >= deadline )); then
              echo "::warning::apiserver still unreachable after ~180s — running health to capture the failure."
              break
            fi
            echo "apiserver not reachable yet — waiting for the control-plane ACL to propagate…"
            sleep 5
          done
          # Gate mode polls (converge) so a transient can't fail the gate;
          # report-only keeps the one-shot snapshot. See the sidecar doc.
          if [[ "$FAIL_ON_UNHEALTHY" == "true" ]]; then
            llz ci converge --budget 300 --interval 20 | tee /tmp/health.txt
            EC=${PIPESTATUS[0]}
          else
            llz ci health | tee /tmp/health.txt
            EC=${PIPESTATUS[0]}
          fi
          echo
          echo "Exit: $EC"
          {
            printf '## cluster-health (%s) — exit %s\n\n' "$REGION" "$EC"
            printf '```\n'
            tail -200 /tmp/health.txt
            printf '\n```\n'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$FAIL_ON_UNHEALTHY" == "true" ]]; then
            exit "$EC"
          fi
          exit 0   # Report-only: the summary is the deliverable.

      # Best-effort Argo CD sync diagnostics — the operationState / failed-resource
      # data `llz ci health` doesn't surface. Never alters the outcome.
      - name: Argo CD sync diagnostics (best-effort)
        if: always()
        # Caps the unbounded kubectl loop below against a hung apiserver.
        timeout-minutes: 10
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          llz ci diagnose-argocd || true
          for app in platform-bootstrap llz-cluster-foundation; do
            echo "== ${app} operationState =="
            kubectl -n argocd get application "${app}" -o jsonpath='{.status.operationState}' 2>/dev/null | head -c 6000 || true
            echo
            echo "== ${app} conditions =="
            kubectl -n argocd get application "${app}" -o jsonpath='{.status.conditions}' 2>/dev/null || true
            echo
          done
          # Live alert + metric-surface snapshot (report-only).
          llz ci alert-eval || true
          llz ci prom-metrics --match '^(loki_|cortex_|otelcol_|harbor_|vault_|llz_)' || true

      - name: Assert Loki is bootstrapped
        if: ${{ inputs.assert-loki }}
        run: |
          set -euo pipefail
          export KUBECONFIG="$HOME/.kube/config"
          llz ci assert-loki

      # E2E validation gate (same assert-loki input): asserts the observability
      # pipeline is WIRED, and --strict fails on DEAD?/BROKEN alerts. Unlike the
      # best-effort alert-eval above, these are gating.
      - name: Assert observability + reconciler + wave-health (E2E gate)
        if: ${{ inputs.assert-loki }}
        run: |
          set -euo pipefail
          export KUBECONFIG="$HOME/.kube/config"
          llz ci assert-scrape-targets
          llz ci assert-reconciler
          llz ci alert-eval --strict
          llz ci assert-wave-health-vap

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ inputs.region }}
