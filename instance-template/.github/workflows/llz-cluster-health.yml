name: llz-cluster-health (reusable)

# Reusable (`workflow_call`) cluster-health check. One body serves both uses of
# the instance's cluster-health.yml caller — they differ only by flags:
#   - recovery / diagnostic (the all-defaults dispatch):
#     report-only; the job summary is the deliverable, the job never fails.
#   - E2E validation (dispatched by the template repo's release-e2e gate):
#     fail-on-unhealthy + assert-loki.
#
# This is the canonical surface-reduction pattern (docs/adr/0003-vendor-actions-and-bodies-into-instances.md): an instance ships a ~20-line caller stub that
# owns the trigger surface, and vendors this body + the composite actions it
# calls; the health tooling (`llz ci health`) is baked into vars.TF_IMAGE.
# Single checkout: the instance at the workspace root (so the fetch-kubeconfig
# action's terraform-iac-bootstrap/cluster working-dir resolves), and the
# composite actions resolve from the instance's own vendored .github/actions/ —
# self-contained, with no separate template checkout.
#
# vars (TF_IMAGE, TF_STATE_BUCKET, TF_STATE_ENDPOINT) resolve from the CALLER's
# repo/org variables automatically; secrets are passed by the caller via
# `secrets: inherit`. The CI image is pulled with the built-in GITHUB_TOKEN
# (github.actor) — no GHCR PAT — so the images must be public or grant the
# caller repo package-read access.

on:
  workflow_call:
    inputs:
      region:
        description: 'Deployment (matches an infra-<region> Environment in the caller repo)'
        required: true
        type: string
      verbose:
        description: 'VERBOSE=1 — dump describe/logs even when nothing is failing'
        required: false
        type: boolean
        default: false
      fail-on-unhealthy:
        description: 'Fail the job when `llz ci health` exits non-zero. Leave false for recovery/diagnostic runs, where the report is the deliverable.'
        required: false
        type: boolean
        default: false
      assert-loki:
        description: 'Also assert Loki is bootstrapped and S3-backed (`llz ci assert-loki`) — the E2E validation gate.'
        required: false
        type: boolean
        default: false
      template-ref:
        description: 'The template release this instance is rendered from — `llz upgrade` re-pins it. Unused by this workflow''s jobs (everything resolves locally); declared only because the caller stub passes it and workflow_call rejects undeclared inputs.'
        required: false
        type: string
        default: main
    secrets:
      TF_STATE_ACCESS_KEY:
        required: true
      TF_STATE_SECRET_KEY:
        required: true
      LINODE_API_TOKEN:
        description: 'Linode API token used to open/revoke this runner''s egress IP in the LKE-E control-plane ACL for the kubectl steps.'
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  health:
    name: cluster-health (${{ inputs.region }})
    runs-on: ubuntu-latest
    environment: infra-${{ inputs.region }}
    container:
      image: ${{ vars.TF_IMAGE }}
    timeout-minutes: 20
    env:
      REGION:               ${{ inputs.region }}
      TF_STATE_BUCKET:      ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3:  ${{ vars.TF_STATE_ENDPOINT }}
      TF_IN_AUTOMATION:     'true'
      VERBOSE:              ${{ inputs.verbose && '1' || '0' }}
    steps:
      # Single checkout. The fetch-kubeconfig composite action hard-codes
      # `working-directory: terraform-iac-bootstrap/cluster` — the INSTANCE's TF
      # layout — and a composite action's working-directory is resolved against
      # the workspace root and cannot be overridden by the caller. The caller
      # instance is at the workspace root and vendors .github/actions/, so the
      # composite actions resolve locally with no separate template checkout.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fetch the kubeconfig, open this hosted-runner's dynamic egress IP in the
      # LKE-E control-plane ACL before the kubectl steps (revoked at job end,
      # if: always()), and install llz.
      - name: Cluster access (kubeconfig + runner ACL + llz)
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ inputs.region }}

      - name: Cluster health
        env:
          FAIL_ON_UNHEALTHY: ${{ inputs.fail-on-unhealthy && 'true' || 'false' }}
        # Always write the summary before honoring the exit code, so a failing
        # health run still leaves its report in the job summary.
        run: |
          set +e
          export KUBECONFIG="$HOME/.kube/config"
          # Wait for the apiserver to answer before the one-shot health check.
          # The cluster-access step opened THIS runner's egress IP in the LKE-E
          # control-plane ACL moments ago, and a fresh ACL change takes tens of
          # seconds to take effect — so probing immediately spuriously trips
          # `llz ci health`'s exit-3 ("apiserver unreachable") gate on a cluster
          # that is actually up. The provisioning gate (`llz ci converge`) already
          # absorbs this transient by retrying exit-3 against its budget; this
          # gives the one-shot validate gate the same tolerance so the two agree.
          # Bounded by wall clock (SECONDS) so a genuinely dead apiserver still
          # fails fast enough, well inside the job timeout and before assert-loki.
          deadline=$(( SECONDS + 180 ))
          until kubectl version --request-timeout=10s >/dev/null 2>&1; do
            if (( SECONDS >= deadline )); then
              echo "::warning::apiserver still unreachable after ~180s — running health to capture the failure."
              break
            fi
            echo "apiserver not reachable yet — waiting for the control-plane ACL to propagate…"
            sleep 5
          done
          # Gate mode polls (converge) instead of taking a one-shot snapshot, so a
          # transient — an ephemeral CronJob pod caught mid-ContainerCreating (e.g.
          # argo-resync-nudger firing on schedule), or a phase/ACL blip — can't fail
          # the gate moments after the provisioning converge already passed. Same
          # tolerance the provisioning gate has; short budget so a genuinely broken
          # cluster still fails well inside the job timeout. Report-only mode keeps
          # the one-shot snapshot: a point-in-time diagnostic, not a gate.
          if [[ "$FAIL_ON_UNHEALTHY" == "true" ]]; then
            llz ci converge --budget 300 --interval 20 | tee /tmp/health.txt
            EC=${PIPESTATUS[0]}
          else
            llz ci health | tee /tmp/health.txt
            EC=${PIPESTATUS[0]}
          fi
          echo
          echo "Exit: $EC"
          {
            printf '## cluster-health (%s) — exit %s\n\n' "$REGION" "$EC"
            printf '```\n'
            tail -200 /tmp/health.txt
            printf '\n```\n'
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$FAIL_ON_UNHEALTHY" == "true" ]]; then
            exit "$EC"
          fi
          exit 0   # Report-only: the summary is the deliverable.

      # Best-effort Argo CD sync diagnostics — the operationState / failed-resource
      # data `llz ci health` doesn't surface. Never alters the outcome.
      - name: Argo CD sync diagnostics (best-effort)
        if: always()
        # Cap the diagnostics' own runtime — diagnose-argocd itself gates on apiserver
        # reachability (~10s clean skip when unreachable), but the follow-up kubectl loop
        # below is unbounded, so keep a hung apiserver from stacking per-probe dial
        # timeouts against the job budget.
        timeout-minutes: 10
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          llz ci diagnose-argocd || true
          for app in platform-bootstrap llz-cluster-foundation; do
            echo "== ${app} operationState =="
            kubectl -n argocd get application "${app}" -o jsonpath='{.status.operationState}' 2>/dev/null | head -c 6000 || true
            echo
            echo "== ${app} conditions =="
            kubectl -n argocd get application "${app}" -o jsonpath='{.status.conditions}' 2>/dev/null || true
            echo
          done
          # Live alert + metric-surface snapshot: which deployed alerts are
          # FIRING/ARMED/DEAD?/BROKEN right now, and the exporter metric surface.
          # Surfaces silent never-fire rules on prod day-2, not just in the e2e.
          llz ci alert-eval || true
          llz ci prom-metrics --match '^(loki_|cortex_|otelcol_|harbor_|vault_|llz_)' || true

      - name: Assert Loki is bootstrapped
        if: ${{ inputs.assert-loki }}
        run: |
          set -euo pipefail
          export KUBECONFIG="$HOME/.kube/config"
          llz ci assert-loki

      # E2E validation gate (same assert-loki input): assert the observability
      # pipeline is WIRED — every landing-zone ServiceMonitor has a live `up`
      # target and every PrometheusRule group is loaded — and that no deployed
      # alert is DEAD?/BROKEN (--strict). The best-effort alert-eval above (in the
      # always() diagnostics block) stays report-only for recovery dispatches;
      # these two are gating and run only under the E2E validation input.
      - name: Assert observability + reconciler + wave-health (E2E gate)
        if: ${{ inputs.assert-loki }}
        run: |
          set -euo pipefail
          export KUBECONFIG="$HOME/.kube/config"
          llz ci assert-scrape-targets
          llz ci assert-reconciler
          llz ci alert-eval --strict
          llz ci wave-health-audit --fail-on-unvetted

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ inputs.region }}
