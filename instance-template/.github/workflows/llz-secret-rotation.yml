name: llz-secret-rotation (reusable)

# Monthly out-of-band rotation for two policy-tracked credentials:
#
#   1. `lke-admin-token` — per LKE-Enterprise Guidelines, rotated via the
#      Linode delete-kubeconfig API. Per region: build the tool → fetch
#      kubeconfig → resolve cluster ID → rotate (the tool hard-asserts the
#      cluster is LKE-Enterprise) → terraform apply -refresh-only so the
#      regenerated kubeconfig is repopulated into Terraform state (the single
#      propagation point for every CI consumer) → a bounded post-rotation
#      health gate.
#
#   2. `LINODE_API_TOKEN` (shared Linode PAT, label
#      `gha-platform-platform_LINODE_API_TOKEN`) — PAT-rotation policy enforcement. Creates a
#      new PAT and updates the GHA env secrets. CI/Terraform-ONLY: the broad
#      PAT is no longer pushed into any cluster. The previous PAT drains daily
#      via `linode-pat-revoke.yml` (companion workflow on a 7-day grace window).
#      Alongside it, each region's job mints the NARROW in-cluster PAT (label
#      `llz-incluster-<region>`, the token every in-cluster Linode consumer
#      reads) and writes it to that region's OpenBao
#      (`secret/linode/api-token`) — `llz ci rotate-incluster-pat`, which also
#      drains older same-labeled siblings past a 7-day grace window.
#
# Triggers:
#   * Monthly schedule — runs both rotations across all regions.
#   * workflow_dispatch — `scope` chooses what to run (lke-admin / linode-pat
#     / all). lke-admin emergencies still require region + `rotate:<region>`
#     confirmation; PAT runs require `rotate:linode-pat`; full runs require
#     `rotate:all`. A non-empty reason is required for any dispatch.
#
# Auth: the shared LINODE_API_TOKEN (the broad token Terraform uses) lives in
# infra-<region> Environments, so lke-admin per-region rotations are gated by
# Environment approval. The guidelines' recommendation of a Kubernetes-scoped
# PAT is satisfied by the narrow in-cluster PAT (the closed tier-2 deviation:
# in-cluster consumers no longer reuse the Terraform token) — see
# docs/designs/linode-pat-dns-consolidation.md and
# docs/runbooks/lke-admin-rotation.md.

# Reusable (`workflow_call`) version of the monthly LKE-E + Linode credential
# rotation. Surface-reduction pattern (docs/templatization-plan.md §"Keeping
# instances in sync"): the instance ships a thin caller stub (owning the
# schedule crons + dispatch inputs) instead of this body, the composite
# actions, and the Go tools/ module. Dual checkout (Option A) — instance at the
# workspace root (its TF state for the rotate job), template into _llz-template/.
# github.event_name / github.event.schedule are inherited from the caller, so the
# setup-job routing (schedule cron vs dispatch scope) is unchanged; dispatch
# inputs are forwarded by the caller as workflow_call inputs.
on:
  workflow_call:
    inputs:
      scope:
        description: "What to rotate (forwarded from the caller's dispatch; ignored on schedule)."
        required: false
        type: string
        default: lke-admin
      region:
        description: "Region (scope=lke-admin only; ignored otherwise)."
        required: false
        type: string
        default: primary
      confirm:
        description: "Emergency-rotation confirmation token (dispatch only)."
        required: false
        type: string
        default: ""
      reason:
        description: "Why this emergency rotation is being run (audit log; dispatch only)."
        required: false
        type: string
        default: ""
      pat-apply:
        description: "Arm Linode PAT create+propagate? (false = dry-run)."
        required: false
        type: boolean
        default: false
      revoke-apply:
        description: "Arm Linode PAT revoke-old? (false = dry-run)."
        required: false
        type: boolean
        default: false
      tf-state-apply:
        description: "Arm TF-state OBJ key rotate? (false = dry-run)."
        required: false
        type: boolean
        default: false
      tf-state-revoke-apply:
        description: "Arm TF-state OBJ key revoke-old? (false = dry-run)."
        required: false
        type: boolean
        default: false
      instance_repo:
        description: "This instance's GitHub repo (<owner>/<name>) for `gh secret set` targeting."
        required: true
        type: string
      template-ref:
        description: 'LLZ template ref to source the composite actions + tools/ from. Pin to the same tag as this workflow''s @<ref>.'
        required: false
        type: string
        default: main
    # All required: false. TF_STATE_*/LINODE_API_TOKEN are infra-<env> ENVIRONMENT
    # secrets, resolved by the rotate jobs via their `environment: infra-<region>`
    # block — not passed across the workflow_call boundary (`secrets: inherit`
    # forwards only repo/org secrets). Declaring them `required: true` makes GitHub
    # reject the whole call (every job, before any step) whenever they aren't
    # repo-level — which is the case for env-scoped instances, and always before the
    # first cluster exists. false lets the call through; the cluster-bound jobs then
    # no-op on a missing cluster.
    secrets:
      TF_STATE_ACCESS_KEY:
        required: false
      TF_STATE_SECRET_KEY:
        required: false
      LINODE_API_TOKEN:
        required: false
      OPENBAO_SECRETS_WRITE_TOKEN:
        required: false

permissions:
  contents: read

# Workflow-level env: identical across every job that talks to the TF state
# backend (rotate + propagate); job env blocks keep only what differs per job
# (REGION is matrix-derived, so it cannot live here — the matrix context is not
# available at workflow level).
env:
  TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
  AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}

defaults:
  run:
    shell: bash

jobs:

  # ── Discover deployments (the per-deployment matrix source of truth) ─────────
  # Single source of truth for this rotation's per-deployment matrices — see
  # llz-discover-deployments.yml. `setup` consumes the `deployments` output for
  # the lke-admin `rotate` matrix and `propagate-linode-pat` fans out over it
  # directly. The scheduled health checks call the SAME reusable workflow, so the
  # set this rotation writes tokens into can never drift from the set those
  # checks verify.
  discover:
    uses: <@ upstream_org @>/lke-landing-zone/.github/workflows/llz-discover-deployments.yml@<@ llz_version @>

  # ── Resolve scope + regions + validate emergency confirmation ───────────────
  # Routes on event_name + (schedule cron expr OR dispatch scope) to outputs
  # the downstream jobs consume:
  #   * run-lke-admin       — gate for the `rotate` matrix
  #   * run-pat-create      — gate for create-linode-pat (+ propagate-linode-pat)
  #   * run-pat-revoke      — gate for revoke-linode-pat
  #   * run-tf-state-create — gate for create-tf-state-key
  #   * run-tf-state-revoke — gate for revoke-tf-state-key
  #   * regions             — JSON array consumed by the `rotate` matrix; the
  #                           deployments discovered from the instance tfvars
  #                           (`discover` job) on the monthly/`all` paths, or a
  #                           single deployment on an lke-admin dispatch
  #   * pat-apply           — passed to linode-credentials pat/create (true on schedule)
  #   * revoke-apply        — passed to linode-credentials pat/revoke-old (true on schedule)
  #   * tf-state-apply      — passed to linode-credentials obj-key/create (true on schedule)
  #   * tf-state-revoke-apply — passed to linode-credentials obj-key/revoke-old (true on schedule)
  setup:
    name: Setup
    needs: discover
    runs-on: ubuntu-latest
    container:
      # llz is baked into TF_IMAGE — the routing step is `llz ci rotation-plan`.
      image: ${{ vars.TF_IMAGE }}
    timeout-minutes: 5
    outputs:
      run-lke-admin:           ${{ steps.route.outputs.run-lke-admin }}
      run-pat-create:          ${{ steps.route.outputs.run-pat-create }}
      run-pat-propagate-only:  ${{ steps.route.outputs.run-pat-propagate-only }}
      run-pat-revoke:          ${{ steps.route.outputs.run-pat-revoke }}
      run-tf-state-create:     ${{ steps.route.outputs.run-tf-state-create }}
      run-tf-state-revoke:     ${{ steps.route.outputs.run-tf-state-revoke }}
      regions:                 ${{ steps.route.outputs.regions }}
      pat-apply:               ${{ steps.route.outputs.pat-apply }}
      revoke-apply:            ${{ steps.route.outputs.revoke-apply }}
      tf-state-apply:          ${{ steps.route.outputs.tf-state-apply }}
      tf-state-revoke-apply:   ${{ steps.route.outputs.tf-state-revoke-apply }}
    steps:
      - name: Route scope + validate emergency confirmation
        id: route
        env:
          EVENT:                 ${{ github.event_name }}
          CRON:                  ${{ github.event.schedule }}
          SCOPE:                 ${{ inputs.scope }}
          REGION:                ${{ inputs.region }}
          CONFIRM:               ${{ inputs.confirm }}
          REASON:                ${{ inputs.reason }}
          PAT_APPLY:             ${{ inputs.pat-apply }}
          REVOKE_APPLY:          ${{ inputs.revoke-apply }}
          TF_STATE_APPLY:        ${{ inputs.tf-state-apply }}
          TF_STATE_REVOKE_APPLY: ${{ inputs.tf-state-revoke-apply }}
          ACTOR:                 ${{ github.actor }}
          # Deployments discovered from the instance tfvars (llz env list). The
          # monthly + `all` lke-admin rotations fan out over this set — the SAME
          # set the scheduled lke-admin-rotation-health check audits — so every
          # cluster that is checked is also rotated (and vice versa).
          DEPLOYMENTS:           ${{ needs.discover.outputs.deployments }}
        run: llz ci rotation-plan

  # ── Rotate lke-admin → TF state refresh → health gate ────────────────────────
  rotate:
    name: Rotate lke-admin (${{ matrix.region }})
    needs: setup
    if: needs.setup.outputs.run-lke-admin == 'true'
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ matrix.region }}
    permissions:
      contents: read
    timeout-minutes: 30
    # Serialize against terraform.yml / release.yml for the same region so the
    # rotate→refresh window cannot race another apply against stale state.
    concurrency:
      group: terraform-infra-${{ matrix.region }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.setup.outputs.regions) }}
    env:
      REGION:                          ${{ matrix.region }}
      AWS_ACCESS_KEY_ID:               ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:           ${{ secrets.TF_STATE_SECRET_KEY }}
      LINODE_TOKEN:                    ${{ secrets.LINODE_API_TOKEN }}
      TF_VAR_linode_token:             ${{ secrets.LINODE_API_TOKEN }}
      TF_VAR_github_token:             ${{ secrets.GITHUB_TOKEN }}
      TF_VAR_github_api_url:           ${{ github.api_url }}
      TF_VAR_eaa_firewall_template_id: ${{ vars.EAA_FIREWALL_TEMPLATE_ID }}
      KUBECONFIG:                      ${{ github.workspace }}/.kube/config
    steps:
      # Dual checkout (Option A): instance at the workspace root (so the
      # terraform-init/fetch-kubeconfig actions' terraform-iac-bootstrap/<module>
      # working-dir + the rotate job's instance TF state resolve) + the LLZ
      # template into _llz-template/ for the composite actions and tools/.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Terraform init — cluster
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/terraform-init@<@ llz_version @>
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      # Shared cluster-access preamble: fetch kubeconfig from TF state + open
      # this hosted-runner's dynamic egress IP in the LKE-E control-plane ACL
      # before any kubectl; revoked at job end (if: always()).
      - name: Cluster access (kubeconfig + runner ACL)
        id: kubeconfig
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/cluster-access@<@ llz_version @>
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       ${{ github.workspace }}/.kube/config
          # allow-missing: a deployment with no cluster yet (fresh instance, or a
          # peer not provisioned) is a no-op, not a failure — there is nothing to
          # rotate until the cluster exists.
          allow-missing:         'true'

      # No cluster for this deployment yet: cluster-access set available=false.
      # Make the no-op explicit and skip the cluster-bound rotation steps below.
      - name: No cluster yet — nothing to rotate
        if: always() && steps.kubeconfig.outputs.available != 'true'
        run: |
          echo "::notice title=No-op (no cluster yet)::lke-admin rotation for ${REGION} is a no-op until your first cluster is built — run 'llz build ${REGION} --yes' (or 'llz up ${REGION} --yes'). Nothing to rotate."
          echo "### lke-admin rotation — no-op: no cluster for ${REGION} yet. Build it ('llz build ${REGION} --yes') and rotation runs on the next schedule." >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve LKE cluster ID
        id: cid
        if: steps.kubeconfig.outputs.available == 'true'
        working-directory: terraform-iac-bootstrap/cluster
        run: echo "id=$(terraform output -raw cluster_id)" >> "$GITHUB_OUTPUT"

      # The rotation prints its JSON audit record on stdout and appends it to
      # the step summary itself (formerly the standalone secret-rotation binary
      # plus an inline tee).
      - name: Rotate lke-admin
        if: steps.kubeconfig.outputs.available == 'true'
        env:
          LKE_CLUSTER_ID: ${{ steps.cid.outputs.id }}
        run: |
          echo "Rotating lke-admin on cluster ${LKE_CLUSTER_ID} (${REGION})"
          llz credentials lke-admin rotate --apply

      # delete-kubeconfig regenerates the kubeconfig, invalidating the copy in
      # TF state. Refresh-only re-reads the new one from the LKE API into state
      # so every downstream consumer (fetch-kubeconfig) gets the live one.
      - name: Refresh Terraform state (repopulate kubeconfig_raw)
        if: steps.kubeconfig.outputs.available == 'true'
        working-directory: terraform-iac-bootstrap/cluster
        run: |
          set -euo pipefail
          TFVARS="${REGION}.tfvars"
          test -f "$TFVARS" || TFVARS="${REGION}.tfvars.example"
          terraform apply -refresh-only -auto-approve -var-file="$TFVARS"

      - name: Post-rotation health gate
        if: steps.kubeconfig.outputs.available == 'true'
        working-directory: terraform-iac-bootstrap/cluster
        run: |
          set -euo pipefail
          # Re-fetch the now-refreshed kubeconfig and wait (bounded) for the
          # control plane to accept it — regeneration takes time to sync.
          mkdir -p "$(dirname "$KUBECONFIG")"
          terraform output -raw kubeconfig_raw > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          llz ci wait-cluster-ready --timeout 360 --interval 15
          echo "> Post-rotation health gate passed for \`${REGION}\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$KUBECONFIG"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/lke-runner-acl@<@ llz_version @>
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── Linode PAT (broad, CI/Terraform-only): create new + update GHA secrets ───
  # The rotated token reaches downstream jobs via the just-rewritten GHA env
  # secrets (GHA refetches secrets at each job start) — NOT as a job output:
  # the linode-credentials (pat create) action registers ::add-mask:: on the
  # value, and the runner redacts masked values when serializing job outputs.
  # The broad PAT is no longer pushed into any cluster; the per-region matrix
  # below mints the NARROW in-cluster PAT with it instead.
  create-linode-pat:
    name: Create LINODE_API_TOKEN
    needs: [setup, discover]
    # Skip when no deployments exist yet (fresh instance) — discover emits []; the
    # environment: infra-<first deployment> below would otherwise be invalid.
    if: needs.setup.outputs.run-pat-create == 'true' && needs.discover.outputs.deployments != '[]'
    runs-on: ubuntu-latest
    # The account-wide LINODE_API_TOKEN + the OPENBAO_SECRETS_WRITE_TOKEN that
    # writes it back are infra-<env> ENVIRONMENT secrets (the main-only injection
    # boundary), not repo-level — so read them from the first deployment's env. llz
    # then writes the rotated token into EVERY deployment's env (gha-secret-deployments).
    environment: infra-${{ fromJSON(needs.discover.outputs.deployments)[0] }}
    container:
      # llz is baked into TF_IMAGE (dockerfiles/terraform/Dockerfile), so the
      # linode-credentials action needs no Go toolchain — run in TF_IMAGE.
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 30
    concurrency:
      group: linode-pat-rotation
      cancel-in-progress: false
    env:
      # gh secret set targets the instance repo on github.com (default host).
      GH_REPO: ${{ inputs.instance_repo }}
    steps:
      # Dual checkout (Option A): instance at the workspace root (so the
      # terraform-init/fetch-kubeconfig actions' terraform-iac-bootstrap/<module>
      # working-dir + the rotate job's instance TF state resolve) + the LLZ
      # template into _llz-template/ for the composite actions and tools/.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Rotate PAT + write the new token to each deployment's env secret
        id: rotate
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/linode-credentials@<@ llz_version @>
        with:
          credential-type: pat
          operation:       create
          linode-token:    ${{ secrets.LINODE_API_TOKEN }}
          label:           "gha-platform-platform_LINODE_API_TOKEN"
          # Write the rotated token into LINODE_API_TOKEN for every deployment's
          # infra-<name> environment (the env-scoped copies the workflows read).
          gha-secret-deployments: ${{ join(fromJSON(needs.discover.outputs.deployments), ' ') }}
          # Scopes must cover a full apply AND a full destroy (incl. orphan
          # sweeps), or the rotated token silently re-introduces the destroy
          # failures we keep chasing:
          #   events:read_only        — cluster-delete waiter polls /account/events;
          #                             its absence is the recurring [401] that
          #                             aborts `terraform destroy` mid-teardown
          #                             (and leaks the orphans that later quota-block
          #                             the next apply).
          #   volumes:read_write      — orphan block-volume sweep (TF destroy-time
          #                             provisioner + `llz ci reap-volumes` +
          #                             `llz ci preflight`).
          #   nodebalancers:read_write — orphan CCM NodeBalancer cleanup
          #                             (`llz ci reap-nodebalancers`).
          # The rotator plumbs this string straight to /v4/profile/tokens (no
          # allowlist), so anything listed here is granted verbatim.
          scopes:          "linodes:read_write object_storage:read_write lke:read_write firewall:read_write vpc:read_write volumes:read_write nodebalancers:read_write events:read_only account:read_write"
          validity-days:   "90"
          gha-secret-name: "LINODE_API_TOKEN"
          gha-token:       ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
          apply:           ${{ needs.setup.outputs.pat-apply }}

  # ── In-cluster narrow PAT: mint + write to each region's OpenBao ─────────────
  # Replaces the broad-PAT propagation: each region's job mints its OWN narrow
  # in-cluster PAT (label llz-incluster-<region>) with the broad token, writes
  # it to that region's OpenBao, and drains older same-labeled siblings — the
  # token never crosses a job boundary and never touches a GitHub secret (the
  # old propagate flow had to round-trip the broad PAT through the GHA secret
  # because ::add-mask::'d values cannot ride job outputs).
  propagate-linode-pat:
    name: Rotate the in-cluster PAT on ${{ matrix.region }}
    needs: [setup, create-linode-pat, discover]
    # Two entry paths:
    #  1. Normal: create-linode-pat just succeeded (full rotation) — the fresh
    #     broad PAT mints the narrow one.
    #  2. Recovery (`linode-pat-propagate-only`): create-linode-pat is skipped;
    #     we mint a fresh narrow PAT with whatever broad token
    #     `secrets.LINODE_API_TOKEN` currently holds. `always()` is required so
    #     the skipped create dependency does not auto-skip this job in the
    #     recovery path.
    if: |
      always() && (
        (needs.create-linode-pat.result == 'success' && needs.setup.outputs.run-pat-create == 'true' && needs.setup.outputs.pat-apply == 'true')
        || needs.setup.outputs.run-pat-propagate-only == 'true'
      )
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
      # Mint a GitHub Actions OIDC token to authenticate to OpenBao's jwt auth
      # (role secret-propagator) — replaces the long-lived AppRole secret_id that
      # used to be stashed in this environment's secrets and rotated in-cluster
      # via `gh secret set`. `llz ci rotate-incluster-pat` exchanges the OIDC
      # token for a short-lived OpenBao token bound to the secret-propagator policy.
      id-token: write
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # The deployments discovered from the instance tfvars (llz env list) —
        # the same set the scheduled checks verify and the lke-admin rotation
        # covers. A deployment without an OpenBao/cluster yet is skipped
        # internally (allow-missing + the probe step's pod check).
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_VERSION:          '1.9.8'
      REGION:              ${{ matrix.region }}
    steps:
      # Dual checkout (Option A): instance at the workspace root (so the
      # terraform-init/fetch-kubeconfig actions' terraform-iac-bootstrap/<module>
      # working-dir + the rotate job's instance TF state resolve) + the LLZ
      # template into _llz-template/ for the composite actions and tools/.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Shared cluster-access preamble: fetch kubeconfig + open this runner's
      # egress IP in the control-plane ACL before kubectl; the ACL open is
      # guarded on `available` inside the action (this job tolerates an
      # unbootstrapped region via allow-missing). Revoked at job end
      # (if: always()).
      # Step id stays `kubeconfig` so the available-gates below keep working.
      - name: Cluster access (kubeconfig + runner ACL)
        id: kubeconfig
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/cluster-access@<@ llz_version @>
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          allow-missing:         'true'

      # Skip cleanly when a region is not yet bootstrapped or its
      # secret-propagator GitHub-OIDC role is not configured (operator hasn't run
      # bootstrap-openbao.yml on this region yet — see
      # docs/runbooks/linode-credential-rotation.md). GHA refetches secrets at
      # the start of each job, so LINODE_API_TOKEN here is the broad token the
      # create job just rotated (or the current one in recovery mode) — the
      # MINTING credential; the narrow token it mints is what gets written.
      - name: Mint the in-cluster PAT + write secret/linode/api-token
        if: steps.kubeconfig.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci rotate-incluster-pat

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/lke-runner-acl@<@ llz_version @>
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── Linode PAT: drain old PATs (daily reaper) ────────────────────────────────
  # Stateless — the label IS the drain record. Lists every PAT matching
  # `gha-platform-platform_LINODE_API_TOKEN`, keeps the newest (the live one), and
  # revokes any sibling older than `grace-days` (default 7). On the monthly
  # schedule the newly-created PAT is the newest, so the previous month's PAT
  # — now ~30d old — is eligible for the next day's daily run.
  revoke-linode-pat:
    name: Revoke old LINODE_API_TOKEN PATs
    needs: [setup, discover]
    # Skip when no deployments exist yet (fresh instance) — discover emits []; the
    # environment: infra-<first deployment> below would otherwise be invalid.
    if: needs.setup.outputs.run-pat-revoke == 'true' && needs.discover.outputs.deployments != '[]'
    runs-on: ubuntu-latest
    # Read-only (revokes Linode-side PATs, no GHA secret write) but still needs the
    # account token, which is an infra-<env> ENVIRONMENT secret — read it from the
    # first deployment's env.
    environment: infra-${{ fromJSON(needs.discover.outputs.deployments)[0] }}
    container:
      # llz baked into TF_IMAGE — see create-linode-pat.
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 15
    concurrency:
      group: linode-pat-revoke
      cancel-in-progress: false
    steps:
      # Dual checkout (Option A): instance at the workspace root (so the
      # terraform-init/fetch-kubeconfig actions' terraform-iac-bootstrap/<module>
      # working-dir + the rotate job's instance TF state resolve) + the LLZ
      # template into _llz-template/ for the composite actions and tools/.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Revoke old PATs
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/linode-credentials@<@ llz_version @>
        with:
          credential-type: pat
          operation:       revoke-old
          linode-token:    ${{ secrets.LINODE_API_TOKEN }}
          label:           "gha-platform-platform_LINODE_API_TOKEN"
          grace-days:      "7"
          apply:           ${{ needs.setup.outputs.revoke-apply }}

  # ── TF-state OBJ key: create new pair + update repo-level GHA secrets ───────
  # Consumers are GHA-only (Terraform backend), so no in-cluster propagation
  # needed. The Linode OBJ keys API exposes no `created` timestamp, so the
  # companion drain (`revoke-tf-state-key`) uses a keep-newest-N strategy
  # against the monotonic `id` field rather than the PAT's grace-by-age.
  create-tf-state-key:
    name: Create TF_STATE_ACCESS_KEY pair
    needs: [setup, discover]
    # Skip when no deployments exist yet (fresh instance) — discover emits []; the
    # environment: infra-<first deployment> below would otherwise be invalid.
    if: needs.setup.outputs.run-tf-state-create == 'true' && needs.discover.outputs.deployments != '[]'
    runs-on: ubuntu-latest
    # LINODE_API_TOKEN + OPENBAO_SECRETS_WRITE_TOKEN are infra-<env> environment
    # secrets — read them from the first deployment's env; llz writes the rotated
    # TF_STATE_* pair into EVERY deployment's env (gha-secret-deployments).
    environment: infra-${{ fromJSON(needs.discover.outputs.deployments)[0] }}
    container:
      # llz baked into TF_IMAGE — see create-linode-pat.
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 30
    concurrency:
      group: linode-tf-state-key-rotation
      cancel-in-progress: false
    env:
      # gh secret set targets the instance repo on github.com (default host).
      GH_REPO: ${{ inputs.instance_repo }}
    steps:
      # Dual checkout (Option A): instance at the workspace root (so the
      # terraform-init/fetch-kubeconfig actions' terraform-iac-bootstrap/<module>
      # working-dir + the rotate job's instance TF state resolve) + the LLZ
      # template into _llz-template/ for the composite actions and tools/.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Rotate OBJ key + write TF_STATE_* to each deployment's env secrets
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/linode-credentials@<@ llz_version @>
        with:
          credential-type:            obj-key
          operation:                  create
          linode-token:               ${{ secrets.LINODE_API_TOKEN }}
          label:                      "gha-platform-platform_TF_STATE_KEY"
          bucket-cluster:             "us-ord-10"
          bucket-name:                ${{ vars.TF_STATE_BUCKET }}
          bucket-permissions:         "read_write"
          gha-access-key-secret-name: "TF_STATE_ACCESS_KEY"
          gha-secret-key-secret-name: "TF_STATE_SECRET_KEY"
          # Write the rotated pair into TF_STATE_* for every deployment's env.
          gha-secret-deployments:     ${{ join(fromJSON(needs.discover.outputs.deployments), ' ') }}
          gha-token:                  ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
          apply:                      ${{ needs.setup.outputs.tf-state-apply }}

  # ── TF-state OBJ key: drain old keys (daily reaper) ─────────────────────────
  # Keeps the 2 most recent same-labeled OBJ keys by id (Linode IDs are
  # monotonically increasing, so highest id == newest). With monthly rotation,
  # this gives a ~30-day overlap: the previous key drains the day after the
  # new one is minted, mirroring the PAT 7-day-grace overlap.
  revoke-tf-state-key:
    name: Revoke old TF_STATE_ACCESS_KEY pairs
    needs: [setup, discover]
    # Skip when no deployments exist yet (fresh instance) — discover emits []; the
    # environment: infra-<first deployment> below would otherwise be invalid.
    if: needs.setup.outputs.run-tf-state-revoke == 'true' && needs.discover.outputs.deployments != '[]'
    runs-on: ubuntu-latest
    # Read-only drain, but the LINODE_API_TOKEN it lists keys with is an
    # infra-<env> environment secret — read it from the first deployment's env.
    environment: infra-${{ fromJSON(needs.discover.outputs.deployments)[0] }}
    container:
      # llz baked into TF_IMAGE — see create-linode-pat.
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 15
    concurrency:
      group: linode-tf-state-key-revoke
      cancel-in-progress: false
    steps:
      # Dual checkout (Option A): instance at the workspace root (so the
      # terraform-init/fetch-kubeconfig actions' terraform-iac-bootstrap/<module>
      # working-dir + the rotate job's instance TF state resolve) + the LLZ
      # template into _llz-template/ for the composite actions and tools/.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Revoke old OBJ keys
        uses: <@ upstream_org @>/lke-landing-zone/instance-template/.github/actions/linode-credentials@<@ llz_version @>
        with:
          credential-type: obj-key
          operation:       revoke-old
          linode-token:    ${{ secrets.LINODE_API_TOKEN }}
          label:           "gha-platform-platform_TF_STATE_KEY"
          keep-newest:     "2"
          apply:           ${{ needs.setup.outputs.tf-state-revoke-apply }}
