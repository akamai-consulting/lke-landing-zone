name: LKE-E + Linode credential rotation

# Thin caller for the reusable LLZ workflow — the full body (scope routing,
# lke-admin rotation via delete-kubeconfig + TF-state refresh + health gate,
# Linode PAT create/propagate/revoke, TF-state OBJ key rotate/revoke), the six
# composite actions, and the Go tools/ module all live in the template and are
# sourced there (see docs/templatization-plan.md §"Keeping instances in sync").
# The reusable workflow checks THIS instance back out (its terraform-iac-bootstrap
# TF state for the rotate job), so the instance copies only this stub.
# ADOPTERS: no fork needed for secrets — the reusable ./.github/workflows/llz-*.yml is
# sourced from the template repo at the pinned @<ref> (same org/enterprise, so `secrets: inherit` still flows; cross-org adopters rely on the environment-scoped secrets the reusable's jobs resolve themselves). Pin template-ref to
# a template release tag (Renovate keeps both current — instance-template/renovate.json).
#
# Triggers:
#   * Monthly schedule — full rotation across all regions.
#   * workflow_dispatch — `scope` chooses what to run; emergencies require the
#     matching `confirm:` token and a non-empty `reason`.

on:
  schedule:
    # 1st of the month, 04:00 UTC — full rotation (lke-admin across every
    # deployment + Linode PAT create + per-deployment propagate). The deployment
    # set is discovered from the instance tfvars (`llz env list`), not hardcoded.
    - cron: "0 4 1 * *"
    # Daily, 03:30 UTC — PAT + TF-state OBJ key revoke-old reapers. 7-day grace.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      scope:
        description: "What to rotate"
        required: true
        type: choice
        options: [lke-admin, linode-pat, linode-pat-propagate-only, linode-pat-revoke, tf-state-key, tf-state-key-revoke, all]
        default: lke-admin
      region:
        # Free-form deployment string, NOT a fixed choice list: deployments are
        # created dynamically by `llz env add` (there is no hardcoded env list —
        # see terraform.yml). An emergency lke-admin rotation can target any
        # scaffolded deployment (e.g. itest, staging); the reusable workflow's
        # `rotate:<deployment>` confirm gate validates the exact value.
        description: "Deployment to rotate (scope=lke-admin only; ignored otherwise), e.g. primary | secondary | staging"
        required: false
        type: string
        default: primary
      confirm:
        description: >
          Type 'rotate:<region>' (lke-admin), 'rotate:linode-pat',
          'rotate:linode-pat-propagate-only', 'rotate:linode-pat-revoke',
          'rotate:tf-state-key', 'rotate:tf-state-key-revoke', or
          'rotate:all' to confirm.
        required: true
        type: string
      reason:
        description: "Why this emergency rotation is being run (audit log)"
        required: true
        type: string
      pat-apply:
        description: "Arm Linode PAT create+propagate? (false = dry-run; ignored unless scope ∈ {linode-pat, all})"
        required: false
        type: boolean
        default: false
      revoke-apply:
        description: "Arm Linode PAT revoke-old? (false = dry-run; ignored unless scope ∈ {linode-pat-revoke, all})"
        required: false
        type: boolean
        default: false
      tf-state-apply:
        description: "Arm TF-state OBJ key rotate? (false = dry-run; ignored unless scope ∈ {tf-state-key, all})"
        required: false
        type: boolean
        default: false
      tf-state-revoke-apply:
        description: "Arm TF-state OBJ key revoke-old? (false = dry-run; ignored unless scope ∈ {tf-state-key-revoke, all})"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  call:
    # Pinned to an immutable LLZ template release tag (not @main) so updates
    # arrive as reviewable Renovate PRs. ADOPTERS: no fork needed — local reusable, `secrets: inherit` is same-repo (#201).
    uses: <@ upstream_org @>/lke-landing-zone/.github/workflows/llz-secret-rotation.yml@<@ llz_version @>
    with:
      # Empty on `schedule` (inputs is null) → the reusable defaults apply and
      # the setup job routes on the cron expression instead.
      scope:                 ${{ inputs.scope || 'lke-admin' }}
      region:                ${{ inputs.region || 'primary' }}
      confirm:               ${{ inputs.confirm || '' }}
      reason:                ${{ inputs.reason || '' }}
      pat-apply:             ${{ inputs.pat-apply || false }}
      revoke-apply:          ${{ inputs.revoke-apply || false }}
      tf-state-apply:        ${{ inputs.tf-state-apply || false }}
      tf-state-revoke-apply: ${{ inputs.tf-state-revoke-apply || false }}
      instance_repo:         <@ instance_repo @>
      # renovate: datasource=github-tags depName=<@ upstream_org @>/lke-landing-zone
      template-ref:          <@ llz_version @>
    secrets: inherit
