name: llz-discover-deployments (reusable)

# Reusable (`workflow_call`) single source of truth for the per-deployment CI
# matrix. SHARED: scheduled-checks, secret-rotation and the Terraform PR plan
# all fan out over this workflow's `deployments` output, so their matrices
# cannot drift. Read-only — no secrets, no cluster access; the caller owns the
# event gating with its own `if:`.
# Maintainer rationale (incidents, PR archaeology, why-not-X) lives in the
# TEMPLATE repo: docs/workflows/llz-discover-deployments.md

on:
  workflow_call:
    outputs:
      deployments:
        description: >
          Sorted JSON array of deployment names (one per
          terraform-iac-bootstrap/cluster/<name>.tfvars), e.g. ["itest"] or
          ["primary","secondary"]. Emits [] (not null) when none exist, so a
          fromJSON()-fed matrix degrades to an empty fan-out rather than failing.
        value: ${{ jobs.discover.outputs.deployments }}

permissions:
  contents: read

# Required: the step below uses `set -o pipefail`, a bashism the container's
# /bin/sh (dash) rejects. Enforced by `llz ci check-workflow-shells`.
defaults:
  run:
    shell: bash

jobs:
  discover:
    name: Discover deployments
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      deployments: ${{ steps.list.outputs.deployments }}
    steps:
      - name: Checkout the instance (tfvars)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: List deployments
        id: list
        run: |
          set -euo pipefail
          DEPLOYMENTS="$(llz env list --json)"
          echo "deployments=${DEPLOYMENTS}" >> "$GITHUB_OUTPUT"
          echo "Discovered deployments: ${DEPLOYMENTS}"
