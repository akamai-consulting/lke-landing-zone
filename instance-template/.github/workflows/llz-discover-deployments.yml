name: llz-discover-deployments (reusable)

# Reusable (`workflow_call`) single source of truth for the per-deployment CI
# matrix. `llz env list --json` emits the deployment set — from the LandingZone
# spec (`environments/<env>.yaml`) on spec-driven instances, unioned with any
# committed `cluster/<name>.tfvars` on legacy instances. (The per-env tfvars are
# gitignored build artifacts on spec instances, so this reads the spec, not them.)
# The scheduled health/audit checks, the credential
# rotation, and the Terraform PR plan all fan their matrices out over THIS
# workflow's `deployments` output. Because every matrix derives from the same
# call, they cannot drift from one another (or from Terraform) — a rotation run
# can never leave a checked-but-unrotated (or rotated-but-unchecked) deployment,
# and `llz env add` extends CI coverage everywhere at once.
#
# Read-only: it only reads the CALLER's checked-out spec/tfvars — no secrets, no
# cluster access. llz is baked into vars.TF_IMAGE (resolved from the caller's
# repo/org variables); the CI image is pulled with the built-in GITHUB_TOKEN
# (github.actor), so the image must be public or grant the caller repo
# package-read access.
#
# The caller owns the event gating: it puts its own `if:` on the job that
# `uses:` this workflow (e.g. schedule/dispatch-only, or same-repo-PR-only). A
# skipped discover skips its dependent matrix jobs by default (skipped `needs`
# propagate), which is the intended behaviour off the gated events.

on:
  workflow_call:
    outputs:
      deployments:
        description: >
          Sorted JSON array of deployment names (one per
          terraform-iac-bootstrap/cluster/<name>.tfvars), e.g. ["itest"] or
          ["primary","secondary"]. Emits [] (not null) when none exist, so a
          fromJSON()-fed matrix degrades to an empty fan-out rather than failing.
        value: ${{ jobs.discover.outputs.deployments }}

permissions:
  contents: read

# The List-deployments step runs inside the ci-terraform container and uses
# `set -o pipefail` (a bashism). Without this default GitHub falls back to the
# container's /bin/sh (dash), which rejects `-o pipefail` ("Illegal option") and
# fails the job on every scheduled run — taking auto-unseal / scheduled-checks /
# secret-rotation down with it. Enforced repo-wide by `llz ci check-workflow-shells`.
defaults:
  run:
    shell: bash

jobs:
  discover:
    name: Discover deployments
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      deployments: ${{ steps.list.outputs.deployments }}
    steps:
      - name: Checkout the instance (tfvars)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: List deployments
        id: list
        run: |
          set -euo pipefail
          DEPLOYMENTS="$(llz env list --json)"
          echo "deployments=${DEPLOYMENTS}" >> "$GITHUB_OUTPUT"
          echo "Discovered deployments: ${DEPLOYMENTS}"
