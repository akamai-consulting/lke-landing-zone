name: llz-scheduled-checks (reusable)

# Reusable (`workflow_call`) version of the scheduled health/audit checks.
# Surface-reduction pattern
# (docs/adr/0003-vendor-actions-and-bodies-into-instances.md): an instance ships a thin caller stub (which owns the `schedule:` crons)
# and vendors this body plus the composite actions it calls, so every job runs
# self-contained with no cross-repo checkout — which is what lets it run on an
# air-gapped GitHub Enterprise. `github.event_name` / `github.event.schedule` are
# inherited from the caller, so every job's schedule/dispatch `if:` gate is
# unchanged.
on:
  workflow_call:
    inputs:
      fuzz_seconds:
        description: "Seconds to run each fuzz target (forwarded from the caller's dispatch input)."
        required: false
        type: string
        default: "60"
      template-ref:
        description: 'The template release this instance is rendered from — `llz upgrade` re-pins it. Unused by this workflow''s jobs (everything resolves locally); declared only because the caller stub passes it and workflow_call rejects undeclared inputs.'
        required: false
        type: string
        default: main
      drift_branch:
        description: 'Template branch the monthly template-drift job compares .template-version against (NOT template-ref — drift measures distance to the moving branch head).'
        required: false
        type: string
        default: main
      drift_strict:
        description: 'Fail the template-drift job if the instance is behind the template (report-only by default).'
        required: false
        type: boolean
        default: false
    secrets:
      TF_STATE_ACCESS_KEY:
        required: true
      TF_STATE_SECRET_KEY:
        required: true
      LINODE_API_TOKEN:
        required: false
      OPENBAO_ROOT_TOKEN:
        required: false
      OPENBAO_SECRETS_WRITE_TOKEN:
        required: false
      APL_VALUES_REPO_TOKEN:
        description: 'github.com fine-grained PAT (Contents: write) for apl-core otomi.git + the argocd repo Secrets. Checked for expiry by the credential single-pane job (token-inventory).'
        required: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:

  # ── Discover deployments (the per-env matrix source of truth) ────────────────
  # Single source of truth for every per-env matrix below — see
  # llz-discover-deployments.yml. The credential rotation and the Terraform PR
  # plan call the SAME reusable workflow, so the set these checks verify cannot
  # drift from the set the rotation propagates into (no checked-but-unrotated, or
  # rotated-but-unchecked, deployment).
  discover:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    uses: ./.github/workflows/llz-discover-deployments.yml

  # ── OpenBao + ESO health checks ──────────────────────────────────────────────
  # Checks each cluster for:
  #   • OpenBao pod seal state (all 3 Raft pods)
  #   • ESO ClusterSecretStore readiness
  #   • Any unhealthy ExternalSecrets across all namespaces
  # Warning-only (continue-on-error) — a sealed pod pages the operator via the
  # job summary warning annotations but does not block other scheduled work.
  #
  # DEMOTED to WEEKLY (was daily): the in-cluster llz-reconciler now samples these
  # continuously and fires them as Prometheus alerts — OpenBaoSealed /
  # OpenBaoNoActiveLeader (observability openbao-alerts) and LLZESOStoreNotReady
  # (llz-reconciler PrometheusRule) — so a daily hosted-runner probe (fetch-
  # kubeconfig + runner-ACL, the CIDR-fragile port-forward path this migration set
  # out to retire) is redundant. This weekly run stays as belt-and-suspenders: it
  # catches a cluster whose operator has not wired an Alertmanager receiver
  # (spec.alerting.receivers: [none]) and re-proves the probe path itself. Still
  # on-demand via workflow_dispatch.
  # ── Weekly cluster checks — ONE job, four checks ─────────────────────────────
  # Was four separate jobs (openbao-health, loki-objkey-rotation-health,
  # certmanager-health, wave-health-vap), each on the same weekly cron and each
  # paying its own container-init + checkout + kubeconfig fetch + control-plane
  # ACL open/revoke. Folding them saves three of those cycles per region per
  # week, and — the part that matters more than runner minutes — it makes three
  # fewer read-modify-write mutations of the SHARED LKE-E ACL object, which four
  # concurrent jobs were racing on every week.
  #
  # FAILURE SEMANTICS ARE PRESERVED EXACTLY, per check, because they were NOT
  # uniform across the four jobs (an audit that proposed this fold assumed they
  # were — they differ, and folding naively would have either silenced a real
  # gate or made three warn-only checks newly fatal):
  #
  #   openbao-health          job-level continue-on-error  →  step-level, warn-only
  #   certmanager-health      job-level continue-on-error  →  step-level, warn-only
  #   wave-health-vap         job-level continue-on-error  →  step-level, warn-only
  #   loki-objkey-rotation    NO continue-on-error (a GATE) →  no step-level either
  #
  # The gate runs LAST so that a genuine SLA breach fails the job without
  # skipping the three warn-only checks ahead of it. The cleanup + ACL revoke
  # below are if: always(), so they still run when it fails.
  weekly-cluster-checks:
    name: Weekly cluster checks (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * 0'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      - name: Check OpenBao seal + ESO readiness
        if: steps.kubeconfig.outputs.available == 'true'
        continue-on-error: true
        run: llz ci health-openbao

      - name: Check cert-manager Certificate readiness
        if: always() && steps.kubeconfig.outputs.available == 'true'
        continue-on-error: true
        run: llz ci health-certmanager

      # tee -a, not tee. As its own job this truncated $GITHUB_STEP_SUMMARY, which
      # was harmless only because nothing else in that job wrote to it. Sharing a
      # job with three other checks makes that a live bug: it would clobber
      # whatever the steps above had written.
      - name: Assert the wave-health guard VAP is bound and enforcing
        if: always() && steps.kubeconfig.outputs.available == 'true'
        continue-on-error: true
        run: llz ci assert-wave-health-vap | tee -a "$GITHUB_STEP_SUMMARY"

      # THE GATE — deliberately no continue-on-error, and last.
      - name: Check secret/loki/object-store age
        if: always() && steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-loki-objkey-rotation

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}


  lke-admin-rotation-health:
    name: lke-admin Rotation SLA (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fetch the kubeconfig, open this hosted-runner's dynamic egress IP in the
      # LKE-E control-plane ACL so the kubectl checks below are permitted
      # (revoked at job end), and install llz. allow-missing — these checks
      # tolerate a torn-down cluster: the ACL open + llz install are skipped
      # internally and the check steps gate on the `available` output.
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      # Native port — newest-token age vs warn/critical SLA is health.ClassifyRotationAge;
      # the cluster-unreachable skip lives in the command.
      - name: Check lke-admin-token age
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-lke-admin-rotation
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── Credential single pane of glass ──────────────────────────────────────────
  # Runs daily. Replaces the former per-provider probe jobs (Linode cred-audit +
  # gh-pat-expiry-health) with a cluster-as-source-of-truth flow (two steps, one
  # kubeconfig):
  #   1. token-inventory (WRITER) — measures every CI token's expiry this job holds:
  #      GitHub service PATs (token-expiration header) + Linode account PATs (API) —
  #      and writes the llz-token-inventory ConfigMap the in-cluster reconciler
  #      re-exposes as llz_token_expiry_* metrics. Only metadata leaves; never a token.
  #   2. alert-eval (READER) — asks LIVE Prometheus whether any credential alert
  #      (LLZToken* / LLZCertificate*) is firing or BROKEN. The cluster is the single
  #      pane; the actual expiry pages via Alertmanager. --strict fails the job if a
  #      credential alert can't evaluate (a missing metric — e.g. the funnel is down),
  #      catching a broken pipeline the per-provider probes used to mask.
  # Per-region: Linode PATs are per-env, GitHub PATs instance-wide, so each cluster's
  # reconciler exposes that region's view. Self-skips a not-bootstrapped deployment
  # (cluster-access allow-missing + the writer's own token skip).
  credential-single-pane:
    name: Credential Single Pane (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      REGION:                      ${{ matrix.region }}
      LINODE_TOKEN:                ${{ secrets.LINODE_API_TOKEN }}
      OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
      APL_VALUES_REPO_TOKEN:       ${{ secrets.APL_VALUES_REPO_TOKEN }}
      TF_STATE_BUCKET:             ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3:         ${{ vars.TF_STATE_ENDPOINT }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      # WRITER: measure token expiry and push the inventory ConfigMap the reconciler
      # reads. kubectl defaults to the $HOME/.kube/config the cluster-access step wrote,
      # and the default GitHub shell (-eo pipefail) fails the step if either side does.
      - name: Write token inventory to the cluster
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci token-inventory | kubectl apply -f -

      # READER: the cluster is the single pane — evaluate the credential alerts against
      # live Prometheus. --strict fails on a BROKEN alert (missing metric / dead funnel);
      # --summary writes the verdict table to the job summary (see `llz ci alert-eval`).
      - name: Read cluster credential alert status
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci alert-eval --match '^LLZ(Token|Certificate|Credential)' --strict --summary "Credential single pane (${REGION})"
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── Loki OBJ key 120-day rotation SLA ────────────────────────────────────────
  # Linode Object Storage keys have no native expiry; the Guidelines mandate
  # revoking bucket access keys after 120 days. The object-storage Terraform
  # module force-rotates the key declaratively (time_rotating), but the OpenBao
  # reseed hop is manual — this check reads the age of the current
  # secret/loki/object-store version and alerts if the live credential has fallen
  # behind the 120-day clock.
  #
  # DEMOTED to WEEKLY (was daily): the in-cluster llz-reconciler samples the same
  # OpenBao rotation age continuously (llz_credential_age_days{cred=...}) and fires
  # the LLZCredentialRotationOverdue alert (>90d) for both the Loki and Harbor
  # object-storage keys — so the daily hosted-runner probe is redundant. Weekly
  # stays as belt-and-suspenders (covers a receiver-less cluster + re-proves the
  # probe path). Still on-demand via workflow_dispatch.
  prometheusrule-health:
    name: PrometheusRule Health (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fetch the kubeconfig and open this hosted-runner's dynamic egress IP in
      # the LKE-E control-plane ACL so the kubectl checks below are permitted
      # (revoked at job end). allow-missing — these checks tolerate a torn-down
      # cluster: the ACL open is skipped internally and the check steps gate on
      # `available`.
      - name: Cluster access (kubeconfig + runner ACL)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      - name: Check PrometheusRule CRs present
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          set -euo pipefail
          EXPECTED_RULES="openbao-alerts support-plane-alerts"
          MISSING=0

          {
            echo "## PrometheusRule Health — ${REGION} — $(date -u +%Y-%m-%dT%H:%MZ)"
            echo ""
            echo "| Rule | Found |"
            echo "|------|-------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for RULE in $EXPECTED_RULES; do
            if kubectl -n llz-observability get prometheusrule "$RULE" >/dev/null 2>&1; then
              echo "PrometheusRule ${RULE} (${REGION}): present"
              printf '| %s | yes |\n' "$RULE" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::PrometheusRule ${RULE} not found in llz-observability namespace on ${REGION}"
              printf '| **%s** | **missing** |\n' "$RULE" >> "$GITHUB_STEP_SUMMARY"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::${MISSING} PrometheusRule(s) missing on ${REGION} — check ArgoCD sync status"
            echo "> **Action required:** ${MISSING} PrometheusRule(s) not found — verify ArgoCD has synced." \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All expected PrometheusRules present on ${REGION}."
            echo "> All PrometheusRules present." >> "$GITHUB_STEP_SUMMARY"
          fi

      # health-prom-rules queries Prometheus /api/v1/rules and reports any rule
      # group with lastError set — evaluation failures promtool's syntax check
      # cannot catch. Warn-only in the sense that findings are annotations, but it
      # no longer passes vacuously: an unreachable Prometheus fails the step (the
      # job is continue-on-error, so it surfaces without blocking siblings). It
      # used to look for the pod in llz-observability, which holds the LLZ CRs
      # while apl-core Prometheus runs in monitoring — so it skipped clean on every
      # run and nothing validated the live rules.
      - name: Check Prometheus has loaded rules (no evaluation errors)
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-prom-rules

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # NOTE: the former `go-vuln-audit` job (govulncheck of the template's Go tools
  # module) was REMOVED here: it checked out the central template repo, which a
  # self-contained instance cannot reach on an air-gapped GitHub Enterprise, and it
  # audited template code rather than instance config. CVE-auditing the tools module
  # belongs in the TEMPLATE repo's own CI — see docs/designs/cross-org-reuse-pattern.md.

  # ── cert-manager Certificate health ─────────────────────────────────────────
  # Checks every cert-manager Certificate across all namespaces for Ready=True. A
  # stuck ACME renewal (e.g. DNS-01 challenge failure for otel.<env>.internal)
  # leaves the Certificate in Ready=False indefinitely — this surfaces it before
  # pods start rejecting connections.
  #
  # DEMOTED to WEEKLY (was daily): the in-cluster llz-reconciler now samples
  # cert-manager Certificate readiness continuously (llz_certificates_not_ready)
  # and fires the LLZCertificatesNotReady Prometheus alert, so the daily hosted-
  # runner probe is redundant. Weekly stays as belt-and-suspenders (covers a
  # receiver-less cluster + re-proves the probe path). Still on-demand via
  # workflow_dispatch.
  template-drift:
    name: Template drift
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 1 * *'
    steps:
      # Instance at the workspace root — its .template-version is what we compare.
      - name: Checkout the instance
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compare .template-version against the template head
        env:
          # `llz drift` resolves the template head via `git ls-remote`, which
          # needs auth when the template repo is private; route github.com
          # fetches through the token.
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          llz drift \
            --branch "${{ inputs.drift_branch || 'main' }}" \
            ${{ (inputs.drift_strict && '--strict') || '' }}
