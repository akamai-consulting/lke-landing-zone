name: llz-scheduled-checks (reusable)

# Reusable (`workflow_call`) body of the scheduled health/audit checks. Vendored
# verbatim into every instance; the caller stub owns the `schedule:` crons.
# Maintainer rationale (incidents, PR archaeology, why-not-X) lives in the
# TEMPLATE repo: docs/workflows/llz-scheduled-checks.md
on:
  workflow_call:
    inputs:
      template-ref:
        description: 'The template release this instance is rendered from — `llz upgrade` re-pins it. Unused by this workflow''s jobs (everything resolves locally); declared only because the caller stub passes it and workflow_call rejects undeclared inputs.'
        required: false
        type: string
        default: main
      drift_branch:
        description: 'Template branch the monthly template-drift job compares .template-version against (NOT template-ref — drift measures distance to the moving branch head).'
        required: false
        type: string
        default: main
      drift_strict:
        description: 'Fail the template-drift job if the instance is behind the template (report-only by default).'
        required: false
        type: boolean
        default: false
    secrets:
      TF_STATE_ACCESS_KEY:
        required: true
      TF_STATE_SECRET_KEY:
        required: true
      LINODE_API_TOKEN:
        required: false
      OPENBAO_ROOT_TOKEN:
        required: false
      OPENBAO_SECRETS_WRITE_TOKEN:
        required: false
      APL_VALUES_REPO_TOKEN:
        description: 'github.com fine-grained PAT (Contents: write) for apl-core otomi.git + the argocd repo Secrets. Checked for expiry by the credential single-pane job (token-inventory).'
        required: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:

  # ── Discover deployments (the per-env matrix source of truth) ────────────────
  # Single source of truth for every per-env matrix below. The credential
  # rotation and the Terraform PR plan call the SAME reusable workflow, so the
  # set these checks verify cannot drift from the set the rotation covers.
  discover:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    uses: ./.github/workflows/llz-discover-deployments.yml

  # ── Weekly cluster checks — ONE job, four checks ─────────────────────────────
  # Folded from four jobs on the same cron so they share one container init,
  # checkout, kubeconfig and control-plane ACL open/revoke (four jobs raced the
  # SHARED LKE-E ACL object weekly). Daily→weekly: the in-cluster llz-reconciler
  # now alerts on all of this continuously; this run is belt-and-suspenders.
  #
  # NO continue-on-error, anywhere — deliberately. The openbao/certmanager checks
  # are warn-only in Go, so it could only ever hide a probe-path failure (dead
  # checkout, failed ACL open, bad image pull) — the thing this run proves.
  # `if: always()` on each check so one failure does not skip its siblings.
  weekly-cluster-checks:
    name: Weekly cluster checks (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * 0'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      - name: Check OpenBao seal + ESO readiness
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-openbao

      - name: Check cert-manager Certificate readiness
        if: always() && steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-certmanager

      # tee -a, not tee — plain tee truncates $GITHUB_STEP_SUMMARY and would
      # clobber what the checks above wrote.
      - name: Assert the wave-health guard VAP is bound and enforcing
        if: always() && steps.kubeconfig.outputs.available == 'true'
        run: llz ci assert-wave-health-vap | tee -a "$GITHUB_STEP_SUMMARY"

      # Self-heal the team-OIDC device-flow client. keycloak-configure runs once at
      # bootstrap; if that run raced ahead of apl-core's Keycloak convergence it
      # warns + exits 0, leaving the `llz` client absent or missing the openid
      # scope (login would 403). This weekly re-run reconciles it (idempotent,
      # best-effort, no-op when spec.teams is empty) so a raced bootstrap heals
      # without a manual step. See docs/runbooks/openbao-team-login.md.
      - name: Reconcile Keycloak team device-flow client
        if: always() && steps.kubeconfig.outputs.available == 'true'
        continue-on-error: true
        run: llz ci keycloak-configure --region "${{ matrix.region }}"

      # THE GATE — deliberately no continue-on-error, and last.
      - name: Check secret/loki/object-store age
        if: always() && steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-loki-objkey-rotation

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}


  lke-admin-rotation-health:
    name: lke-admin Rotation SLA (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Opens this runner's dynamic egress IP in the LKE-E control-plane ACL
      # (revoked at job end). allow-missing — a torn-down cluster is skipped
      # internally and the checks below gate on the `available` output.
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      # Age-vs-SLA classification is health.ClassifyRotationAge; the
      # cluster-unreachable skip lives in the command, not here.
      - name: Check lke-admin-token age
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-lke-admin-rotation
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── Credential single pane of glass ──────────────────────────────────────────
  # Daily. Cluster-as-source-of-truth: a WRITER step publishes token expiry into
  # the cluster, a READER step asks live Prometheus what is firing. Per-region
  # because Linode PATs are per-env (GitHub PATs are instance-wide). Self-skips a
  # not-bootstrapped deployment.
  credential-single-pane:
    name: Credential Single Pane (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      REGION:                      ${{ matrix.region }}
      LINODE_TOKEN:                ${{ secrets.LINODE_API_TOKEN }}
      OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
      APL_VALUES_REPO_TOKEN:       ${{ secrets.APL_VALUES_REPO_TOKEN }}
      TF_STATE_BUCKET:             ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3:         ${{ vars.TF_STATE_ENDPOINT }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      # WRITER: measure token expiry, push the llz-token-inventory ConfigMap the
      # reconciler re-exposes as metrics. Only metadata leaves; never a token.
      - name: Write token inventory to the cluster
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci token-inventory | kubectl apply -f -

      # READER: evaluate the credential alerts against live Prometheus. --strict
      # fails on a BROKEN alert (missing metric / dead funnel), not just a firing
      # one — that is what catches a dead pipeline.
      - name: Read cluster credential alert status
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci alert-eval --match '^LLZ(Token|Certificate|Credential)' --strict --summary "Credential single pane (${REGION})"
      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── PrometheusRule health ────────────────────────────────────────────────────
  # Two layers: the expected LLZ rule CRs exist, and Prometheus has actually
  # loaded its rules without evaluation errors.
  prometheusrule-health:
    name: PrometheusRule Health (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Opens this runner's dynamic egress IP in the LKE-E control-plane ACL
      # (revoked at job end). allow-missing — a torn-down cluster is skipped
      # internally and the checks below gate on `available`.
      - name: Cluster access (kubeconfig + runner ACL)
        id: kubeconfig
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      - name: Check PrometheusRule CRs present
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          set -euo pipefail
          EXPECTED_RULES="openbao-alerts support-plane-alerts"
          MISSING=0

          {
            echo "## PrometheusRule Health — ${REGION} — $(date -u +%Y-%m-%dT%H:%MZ)"
            echo ""
            echo "| Rule | Found |"
            echo "|------|-------|"
          } >> "$GITHUB_STEP_SUMMARY"

          for RULE in $EXPECTED_RULES; do
            if kubectl -n llz-observability get prometheusrule "$RULE" >/dev/null 2>&1; then
              echo "PrometheusRule ${RULE} (${REGION}): present"
              printf '| %s | yes |\n' "$RULE" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::PrometheusRule ${RULE} not found in llz-observability namespace on ${REGION}"
              printf '| **%s** | **missing** |\n' "$RULE" >> "$GITHUB_STEP_SUMMARY"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::${MISSING} PrometheusRule(s) missing on ${REGION} — check ArgoCD sync status"
            echo "> **Action required:** ${MISSING} PrometheusRule(s) not found — verify ArgoCD has synced." \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All expected PrometheusRules present on ${REGION}."
            echo "> All PrometheusRules present." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Reports rule groups with lastError set — evaluation failures promtool
      # cannot catch. Findings are annotations, but an unreachable Prometheus
      # FAILS: the check cannot report on rules it never read.
      - name: Check Prometheus has loaded rules (no evaluation errors)
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci health-prom-rules

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}

  # ── Template drift ───────────────────────────────────────────────────────────
  # Its own job, not a step: monthly cron rather than daily/weekly, and no
  # `environment:` — it touches no cluster and no per-region secrets.
  template-drift:
    name: Template drift
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 1 * *'
    steps:
      # Instance at the workspace root — its .template-version is what we compare.
      - name: Checkout the instance
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compare .template-version against the template head
        env:
          # `llz drift` resolves the head via `git ls-remote`, which needs auth
          # when the template repo is private (hence the insteadOf rewrite).
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          llz drift \
            --branch "${{ inputs.drift_branch || 'main' }}" \
            ${{ (inputs.drift_strict && '--strict') || '' }}
