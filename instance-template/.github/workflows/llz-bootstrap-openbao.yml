name: llz-bootstrap-openbao (reusable)

# Reusable (`workflow_call`) version of the OpenBao bootstrap. LOCAL to the
# instance (docs/designs/cross-org-reuse-pattern.md, #201): copier delivers this
# file into each instance's .github/workflows/; both the standalone
# bootstrap-openbao.yml caller and llz-terraform.yml's bootstrap-openbao job invoke
# it as `uses: ./.github/workflows/llz-bootstrap-openbao.yml` + `secrets: inherit`
# — same-repo, so the instance's environment secrets actually resolve. The body
# runs in the `llz` container image and calls the cluster-access / fetch-kubeconfig
# / lke-runner-acl composite actions from <upstream_org>/lke-landing-zone at the
# pinned tag; the single instance checkout brings in terraform-iac-bootstrap/cluster
# (fetch-kubeconfig's working-dir). `inputs.*` are workflow_call inputs forwarded
# by the caller.

# Initializes, unseals, and configures an OpenBao cluster for a given region.
#
# CONVERGENCE CONTRACT — see docs/architecture/convergence-contract.md.
#
# The first-init / wait-for-unseal / re-configure mode selection is the same
# detect → choose a path → re-verify shape the cluster-health contract uses,
# applied to OpenBao seal state — and it lives in ONE place now: the
# `llz ci bao-ensure-ready` command (tools/cmd/llz/ci_bao_ensure_ready.go),
# run as a single step below. Under the chart's `seal "static"` auto-unseal each
# pod unseals itself at boot from the static seal key (created by the
# `bao-seed-seal-key` step before the pods start), so there is no submit-keys
# flow and no scheduled re-unseal cron — bao-ensure-ready just runs `bao operator
# init` on a fresh cluster and waits for the pods to converge to unsealed.
#
# Likewise the generic KV seeds run from one data-driven step
# (`llz ci bao-seed-all`, table in ci_bao_seed_all.go) rather than one inline
# `bao-seed` step per secret.
#
# When adding new steps: classify failures into the 3 contract codes (poll
# vs hard-fail vs converged) rather than dropping a 13th BOOTSTRAP_ERRORS=
# true soft-fail flag. The aggregated-soft-fail pattern is the one we're
# explicitly trying to remove.
#
# Two modes depending on cluster state:
#
#   First-time bootstrap (uninitialized cluster):
#     • Seeds the 32-byte static auto-unseal key Secret so the pods can start +
#       auto-unseal (bao-seed-seal-key; key backed up to infra-<region>)
#     • Runs bao operator init → 5 RECOVERY keys + root token (recovery keys
#       authorize generate-root; they do NOT unseal — the static seal key does)
#     • Stores recovery keys 1–3 as infra-<region> environment secrets
#     • Prints all 5 recovery keys + root token to job summary (copy offline)
#     • Waits for all 3 pods to auto-unseal (followers join via retry_join)
#     • Configures KV v2, Kubernetes auth, GitHub-OIDC auth, policies, roles, audit log
#     • Seeds secret/infra/github-dispatch-token and the other env-sourced KV paths
#       (secret/harbor/admin, grafana/admin, otel/ingress now arrive via ESO PushSecrets)
#     • Revokes the root token on completion
#
#   Re-seal recovery (initialized but sealed, e.g. after pod restart):
#     • Pods self-unseal from the static seal key; this path just waits for them
#     • Skips all configuration steps
#
#   Re-configure (initialized + unsealed, configuration incomplete):
#     • Set OPENBAO_ROOT_TOKEN as an infra-<region> environment secret
#     • Workflow detects it and runs configuration + seed steps
#     • Delete OPENBAO_ROOT_TOKEN secret immediately after the run
#
# Required secrets (infra-<region> environment):
#   LINODE_API_TOKEN         — Linode API token
#   TF_STATE_ACCESS_KEY      — S3 backend access key
#   TF_STATE_SECRET_KEY      — S3 backend secret key
#   OPENBAO_SEAL_KEY         — set automatically on first bootstrap; the 32-byte static
#                              auto-unseal key (restored into the cluster on a rebuild)
#   OPENBAO_RECOVERY_KEY_1/2/3 — set automatically on first bootstrap; authorize generate-root
#   OPENBAO_ROOT_TOKEN       — (optional) set manually to trigger re-configuration
#   OPENBAO_SECRETS_WRITE_TOKEN    — fine-grained PAT (github.com), this repo, Actions + Secrets: write; used by gh secret set for
#                              seal/recovery/Harbor credentials and seeds the harbor-ready
#                              dispatch token
#
# Required repository variables:
#   TF_STATE_BUCKET   — S3 bucket name for Terraform state
#   TF_STATE_ENDPOINT — S3-compatible endpoint URL

on:
  workflow_call:
    inputs:
      region:
        description: 'Deployment to bootstrap (any scaffolded deployment; its HA role is read from the cluster tfvars).'
        required: true
        type: string
      reprovision_ca_only:
        description: 'Re-provision a standby deployment''s CA into its active peer only (skips full bootstrap). Run with region = the standby deployment.'
        required: false
        type: boolean
        default: false
      preserve_root_on_failure:
        description: 'DEBUG ONLY. Skip the post-bootstrap root-token revoke when bootstrap FAILS, so the operator can iterate. Default false (revoke runs unconditionally).'
        required: false
        type: boolean
        default: false
      instance_repo:
        description: "This instance's GitHub repo (<owner>/<name>) for `gh` targeting."
        required: true
        type: string
      template-ref:
        description: 'LLZ template ref to source the fetch-kubeconfig action + scripts from. Pin to the same tag as this workflow''s @<ref>.'
        required: false
        type: string
        default: main
      assert_loki:
        description: 'After converge, also assert Loki is bootstrapped + S3-backed (`llz ci assert-loki`) in the bootstrap job. Default false (normal instances); the release-e2e gate sets it true so the check runs inside the converge that already holds cluster access, instead of a separate validate pass dispatching cluster-health.yml.'
        required: false
        type: boolean
        default: false
    secrets:
      # required: false even though a green bootstrap genuinely needs these.
      # This workflow is reached via a nested `workflow_call` under
      # `secrets: inherit` (llz-terraform.yml -> here). `secrets: inherit`
      # forwards only repository/org secrets across the call boundary —
      # environment-scoped secrets (the instance keeps TF_STATE_* in its
      # infra-<region> Environment) are NOT inheritable, and a `required: true`
      # declaration is validated statically at the call boundary BEFORE any job
      # enters `environment: infra-<region>`. With `required: true` that yields a
      # cryptic call-time "required, but not provided" failure on the very first
      # job (Resolve HA role), which doesn't even use these secrets. The
      # `bootstrap` job declares `environment: infra-<region>` and resolves them
      # at runtime; `llz ci require-secret` preflights presence with a friendly
      # error. Same rationale as APL_VALUES_REPO_TOKEN in llz-terraform.yml.
      TF_STATE_ACCESS_KEY:
        required: false
      TF_STATE_SECRET_KEY:
        required: false
      LINODE_API_TOKEN:
        required: false
      OPENBAO_ROOT_TOKEN:
        required: false
      OPENBAO_SECRETS_WRITE_TOKEN:
        required: false
      OPENBAO_RECOVERY_KEY_1:
        required: false
      OPENBAO_RECOVERY_KEY_2:
        required: false
      OPENBAO_RECOVERY_KEY_3:
        required: false
      OPENBAO_SEAL_KEY:
        required: false
      HARBOR_PASSWORD:
        required: false
      HARBOR_PULL_PASSWORD:
        required: false
      HARBOR_PULL_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      # (LOKI_S3_* / HARBOR_REGISTRY_S3_* were RETIRED: the object-storage keys
      # are minted by `llz ci mint-bootstrap-objkeys` below and rotated
      # in-cluster — the credentials never transit GitHub.)

permissions:
  contents: read

concurrency:
  group: openbao-bootstrap-${{ inputs.region }}
  cancel-in-progress: false

env:
  TF_VERSION:          '1.9.8'
  TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
  AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
  REGION:              ${{ inputs.region }}
  KUBECTL_VERSION:     "1.31.0"

defaults:
  run:
    shell: bash

jobs:

  # ── Resolve this deployment's HA role + peer ─────────────────────────────────
  # role (active|standby|standalone) and peer (the other member of its ha_group)
  # are read from the cluster tfvars via `llz env` (baked into vars.TF_IMAGE) and
  # drive: the Harbor seed direction (standby seeds from its active peer), the
  # github-dispatch-token standby skip, and the cross-region CA
  # provisioning (standby ships its CA to infra-<peer>). Replaces the former
  # hardcoded primary/secondary string branches. peer is empty for standalone.
  resolve:
    name: Resolve HA role
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      role: ${{ steps.r.outputs.role }}
      peer: ${{ steps.r.outputs.peer }}
    steps:
      - name: Checkout the instance (tfvars)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve role + peer
        id: r
        # Emits role=/peer= to $GITHUB_OUTPUT (peer empty for a standalone
        # deployment). The former inline case-guard against a stale binary
        # corrupting the output file is unnecessary now: an llz too old to know
        # `env resolve` fails cleanly with "unknown command".
        run: llz env resolve "$REGION"

  bootstrap:
    name: Bootstrap OpenBao (${{ inputs.region }})
    needs: resolve
    if: inputs.reprovision_ca_only == false
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ inputs.region }}
    # 45m = the old bootstrap 30m + the converge gate's 15m: the final
    # convergence poll (formerly its own `converge` job) now runs at the tail of
    # THIS job, reusing the one cluster-access/ACL cycle instead of paying a fresh
    # container-init + checkout + kubeconfig fetch. See "Final convergence gate".
    timeout-minutes: 45
    env:
      # github.com is the default host, so GH_TOKEN alone authenticates.
      # GH_REPO lets gh target the repo directly instead of shelling out to git
      # (which fails on "dubious ownership" in the container's checkout dir).
      # OPENBAO_SECRETS_WRITE_TOKEN is a fine-grained PAT (Actions + Secrets: write).
      GH_REPO: ${{ inputs.instance_repo }}
      GH_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
      HARBOR_URL: ${{ vars.HARBOR_URL }}
      # HA role/peer resolved from the cluster tfvars (see the `resolve` job).
      # HA_ROLE drives the Harbor seed direction (ci_harbor reads it), the
      # github-dispatch-token standby skip, and the cross-region CA extract gate below.
      HA_ROLE: ${{ needs.resolve.outputs.role }}
      HA_PEER: ${{ needs.resolve.outputs.peer }}
      # S3 backend creds for the merged convergence gate's cluster-access
      # terraform-init (the former `converge` job set these at job level).
      AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
    outputs:
      ca_available: ${{ steps.secondary_ca.outputs.ca_available }}
      ca_b64: ${{ steps.secondary_ca.outputs.ca_b64 }}
      # available gates the parallel `harbor` + `converge` jobs: both need OpenBao
      # initialized/unsealed (the seeds + root token) before they can do anything.
      available: ${{ steps.ensure.outputs.available }}

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # ── Pre-flight: required infra-<region> env secrets ────────────────────────
      # Surface missing GHA env secrets in seconds rather than 30+ min into the
      # workflow when a seed step exits 0 with an `::error::` and
      # BOOTSTRAP_ERRORS=true. Each missing secret produces its own error
      # annotation so all of them show up in the run UI at once. Secrets
      # already verified by later step-scoped preflights
      # (OPENBAO_SECRETS_WRITE_TOKEN line 295 + 473, HARBOR_URL line 482) are
      # NOT re-checked here to avoid duplicate annotations; this preflight
      # covers the ones whose absence would otherwise only surface at the
      # seed step itself.
      # (The LOKI_S3_* / HARBOR_REGISTRY_S3_* env-secret preflight was RETIRED
      # with the secrets themselves: `llz ci mint-bootstrap-objkeys` below mints
      # the keys directly — the bucket preflight next is the remaining gate.)

      # ── Pre-flight: object-storage buckets/keys actually exist ──────────────────
      # The check above only confirms the S3 GH secrets are PRESENT — not that
      # they are VALID. If object-storage was never applied (or was reverted),
      # those secrets can be stale, pointing at a deleted key, and seeding them
      # produces InvalidAccessKeyId at runtime (no logs in Loki, Harbor pushes
      # fail) with no signal. terraform.yml's apply-object-storage now runs on
      # every cluster bootstrap, so this is defense-in-depth: confirm the
      # platform-loki-<region> / platform-harbor-registry-<region> scoped keys exist
      # on Linode before seeding. Non-fatal on a transient API hiccup.
      - name: Pre-flight — verify object-storage buckets/keys exist
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci verify-object-storage --region "$REGION"

      # ── Kubeconfig + control-plane ACL ─────────────────────────────────────────
      # github.com hosted runners have a dynamic egress IP not pre-included in
      # the LKE-E control-plane ACL; open it before any kubectl, revoke at end.
      # register-runner-lease leases the IP in the firewall-runner-acl ConfigMap so
      # the EAA controller doesn't evict it mid-run — required because the merged
      # convergence gate at the tail of this job polls for up to 10m (formerly the
      # separate `converge` job set this lease on its own cluster-access).
      - name: Cluster access (kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ env.REGION }}
          register-runner-lease: 'true'

      # ── OpenBao serving TLS — issued by cert-manager, no bootstrap seed ─────────
      # The out-of-band self-signed openbao-tls seed that used to live here has
      # been REMOVED. openbao-tls is now issued by the stable, self-signed
      # cert-manager CA `openbao-ca`
      # (platform-apl/manifest/cert-manager/raw/openbao-bootstrap-ca.yaml),
      # which has no OpenBao dependency. cert-manager issues openbao-tls before
      # OpenBao starts — the StatefulSet pod simply waits in ContainerCreating
      # for the Secret mount — and the serving CA never changes, so there is no
      # mid-bootstrap CA rotation, no OpenBao reload, and no ESO CA re-read.
      #
      # Deliberately NOT re-seeding a self-signed cert here: doing so would race
      # cert-manager and re-introduce the very rotation this change removes (the
      # seed's self-signed CA would later be replaced by openbao-ca). If OpenBao
      # is stuck ContainerCreating on openbao-tls, the fix is to ensure the
      # openbao-ca ClusterIssuer is Ready, not to hand-seed a cert.
      #
      # (The raft retry_join pod-FQDN SAN requirement is satisfied by the
      # dnsNames in openbao-tls-cert.yaml, so raft TLS forms on first boot.)

      # ── OTel Collector serving TLS — issued by cert-manager, no bootstrap seed ──
      # The `llz ci gen-bootstrap-tls` step that used to hand-seed
      # `platform-otel-collector-tls` here (a throwaway runner-generated CA + cert,
      # replaced in-place by the custom-ca issuer later) has been REMOVED — the
      # same anti-pattern the openbao-tls seed removal above fixed. The cert is
      # now issued from FIRST boot by the stable, self-signed cert-manager CA
      # `otel-bootstrap-ca` (platform-apl/components/observability/
      # otel-bootstrap-ca.yaml, synced by the platform-bootstrap Application),
      # with the per-env otel.<env>.internal SAN rendered by `llz render`. No
      # workflow step, no mid-bootstrap CA rotation. If the Secret is missing,
      # the fix is to ensure the otel-bootstrap-ca ClusterIssuer is Ready, not
      # to hand-seed a cert.

      # ── Seed the static auto-unseal key (must precede the pod wait) ────────────
      # The chart's `seal "static"` stanza mounts the openbao-unseal-key Secret at
      # /openbao/seal/unseal.key; without it the StatefulSet pods sit in
      # ContainerCreating (a missing Secret volume waits, it does not crash-loop),
      # so this must run BEFORE "Wait for OpenBao pods to be running" below.
      # Idempotent + never-rotating: an existing Secret is left untouched; on a
      # namespace rebuild the key is restored from the infra-<region>
      # OPENBAO_SEAL_KEY secret; a first-ever bootstrap generates it, persists it
      # to infra-<region> for DR (needs GH_TOKEN, the job-level secrets-write PAT),
      # and prints an offline-backup banner — losing this key loses the data
      # (recovery keys authorize generate-root but cannot decrypt the root key).
      - name: Seed OpenBao static auto-unseal key
        env:
          OPENBAO_SEAL_KEY: ${{ secrets.OPENBAO_SEAL_KEY }}
        run: llz ci bao-seed-seal-key --region "$REGION"

      # ── Wait and status check ───────────────────────────────────────────────────
      # `kubectl rollout status` waits for pods to be Ready, but a freshly
      # deployed OpenBao comes up uninitialized — and an uninitialized pod reports
      # sealed, which the readiness probe correctly marks as not-Ready (keeps it
      # out of Service endpoints). Readiness only happens AFTER this workflow runs
      # `bao operator init` (the pods then auto-unseal from the static seal key) —
      # so rollout status would time out on every first bootstrap. The init step
      # below only `kubectl exec`s into the pods, which just needs them Running —
      # hence wait-pods polls phase, not readiness.
      #
      # 600s budget. Cold-bootstrap path: PVC binds → Linode Volume create
      # (~30s/PVC × 3 raft pods serially = 90s under WaitForFirstConsumer
      # binding) → image pull (~20s) → cert mount → Running. StatefulSet
      # default podManagementPolicy is OrderedReady so pods come up one at
      # a time; pod 0 reaching Running has to clear its Volume create before
      # pod 1 starts. 300s was borderline on slow-Linode days and produced
      # spurious failures we then had to retry.
      # Fail-fast gate: on every wedge of the 2026-07-04 outage (PR #142) the
      # OpenBao Application was never created — the platform-bootstrap sync was
      # stuck waves earlier — and the 600s pod wait below burned its full budget
      # with nothing to say. Assert the Application exists first (a healthy sync
      # creates it within ~2 min); when it doesn't, this fails in ≤4 min WITH the
      # parent sync's operationState message. Terminal parent failures
      # short-circuit immediately; a Running-but-retrying sync (by-design
      # first-boot transients) gets the full window.
      #
      # The Argo Application is `llz-openbao` (its name in llz-cluster-foundation /
      # llz-argo-bootstrap-apps values). NOT `platform-openbao` — that is only the
      # Helm RELEASE / StatefulSet identity (pods platform-openbao-0..2 in the
      # llz-openbao namespace, below). The gate polled the release name for its
      # first three releases (added PR #143), so it never matched an Application
      # and timed out on every full e2e — the last green run predated the gate.
      - name: Assert the OpenBao Application reached the cluster
        run: llz ci assert-argo-app --app llz-openbao --within 240

      - name: Wait for OpenBao pods to be running
        run: |
          llz ci wait-pods --namespace llz-openbao --timeout 600 \
            platform-openbao-0 platform-openbao-1 platform-openbao-2

      # ── Seal/token lifecycle — one command (CONVERGENCE CONTRACT) ──────────────
      # `llz ci bao-ensure-ready` collapses the former steps (status probe,
      # first-init preflight, init, wait-for-auto-unseal, load-root,
      # regen-root-if-revoked, availability check) into one detect → choose-a-path
      # → re-verify command:
      #   uninitialized        → init (recovery keys) + wait for the pods to
      #                          auto-unseal from the static seal key
      #   initialized + sealed → wait for the pod(s) to self-unseal (no keys)
      #   initialized          → validate the loaded root token, regen via the
      #                          recovery-key quorum if a prior run revoked it
      # It writes available=<bool> to $GITHUB_OUTPUT (the gate every step below
      # checks) and re-exports the effective OPENBAO_ROOT_TOKEN to $GITHUB_ENV.
      # The first-init secrets-write-token preflight is folded in (it fails fast
      # if GH_TOKEN is unset on an uninitialized cluster). bao-init's no-manual-
      # raft-join contract (chart retry_join handles membership; a duplicate join
      # 500s) and the VAULT_SKIP_VERIFY local-hop rationale live in the command.
      # GH_TOKEN/GH_REPO come from the job-level env; the recovery keys + loaded
      # root token are the infra-<region> secrets (empty on a first bootstrap —
      # init mints and persists them).
      - name: Ensure OpenBao initialized + unsealed + root token
        id: ensure
        env:
          OPENBAO_ROOT_TOKEN: ${{ secrets.OPENBAO_ROOT_TOKEN }}
          RECOVERY_K1: ${{ secrets.OPENBAO_RECOVERY_KEY_1 }}
          RECOVERY_K2: ${{ secrets.OPENBAO_RECOVERY_KEY_2 }}
          RECOVERY_K3: ${{ secrets.OPENBAO_RECOVERY_KEY_3 }}
        run: llz ci bao-ensure-ready --region "$REGION"

      - name: Pre-flight — verify GitHub secrets-write token for configuration
        if: steps.ensure.outputs.available == 'true'
        env:
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
        run: |
          llz ci require-secret OPENBAO_SECRETS_WRITE_TOKEN \
            --hint "required for OpenBao configuration runs; writes Harbor and pull-robot credentials back to GitHub Actions secrets."

      # HARBOR_URL is the registry hostname buildah pushes to / images pull
      # from (stored in OpenBao as registry_host) — NOT how this job reaches
      # Harbor's API (that's the kubectl port-forward below). It is NOT an
      # operator-required input: apl-core already serves Harbor at
      # harbor.<cluster_domain> (the gateway HTTPRoute host), so the command
      # defaults to that, read from the cluster-bootstrap tfvars. vars.HARBOR_URL
      # (the job-level env) still overrides; fails only if neither is available.
      - name: Pre-flight — resolve Harbor URL for configuration
        if: steps.ensure.outputs.available == 'true'
        run: llz ci resolve-harbor-url --region "$REGION"

      # ── Configure: mounts, auth, policies, roles ───────────────────────────────
      # All enable commands are idempotent (|| true). Write commands are upserts.
      - name: Configure OpenBao
        if: steps.ensure.outputs.available == 'true'
        run: llz ci bao-configure --region "$REGION"

      # ── post-apl-bootstrap tree — MOVED into the Argo-synced tree ──────────────
      # The `kubectl apply -k post-apl-bootstrap` step that used to run here
      # (OpenTelemetryCollector, whose CRD apl-core's helmfile registers) has
      # been REMOVED: the CR now rides the observability component
      # (platform-apl/components/observability/otel-collector.yaml) at a late
      # sync-wave. The platform-bootstrap App's SkipDryRunOnMissingResource +
      # retry budget absorb the CRD-registration race the imperative step
      # existed to sidestep; the server-side dry-run lint path that motivated
      # the split no longer exists (CI builds the manifest tree client-side).

      # ── Seed: generic OpenBao KV bootstrap paths (data-driven) ─────────────────
      # One step runs every generic `bao-seed` path from the bootstrapSeeds()
      # table in `llz ci bao-seed-all` (tools/cmd/llz/ci_bao_seed_all.go):
      #   secret/infra/github-dispatch-token   (harbor-ready PostSync hook)
      #   secret/cert-automation/github-token  (cert-automation ExternalSecret)
      # (secret/harbor/admin, secret/grafana/admin + secret/otel/ingress are no
      #  longer seeded here — ESO writes them in-cluster via PushSecrets.
      #  secret/loki/object-store + secret/harbor/registry-s3 moved to the
      #  mint-bootstrap-objkeys step below: the keys are minted, not relayed.
      #  secret/linode/api-token moved to the mint-bootstrap-pat step below: it
      #  now holds the NARROW in-cluster PAT, minted — the broad provisioning
      #  PAT never enters the cluster.)
      # Per-seed on-missing modes, idempotency guards, and summary notes are
      # UNCHANGED — they moved from these flags into the table. A missing env:/k8s:
      # source defers per its mode (BOOTSTRAP_ERRORS for github-dispatch-token on
      # active/standalone; the rest skip with a summary note); a kv-put failure
      # aborts before the remaining seeds, exactly as a failed inline step did.
      # HA_ROLE (job env) drives the github-dispatch-token standby skip.
      # OPENBAO_ROOT_TOKEN comes from $GITHUB_ENV (the ensure step).
      - name: Seed OpenBao KV bootstrap paths
        if: steps.ensure.outputs.available == 'true'
        env:
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci bao-seed-all --region "$REGION"

      # ── Mint + seed: object-storage keys (Loki + Harbor registry) ──────────────
      # `llz ci mint-bootstrap-objkeys` mints the region's scoped keys via the
      # Linode API (labels/buckets mirror the rotation table:
      # platform-loki-<region> spanning the chunks/ruler/admin buckets,
      # platform-harbor-registry-<region> on its bucket) and seeds
      # secret/loki/object-store + secret/harbor/registry-s3 directly,
      # rotated_at-stamped so the in-cluster linodeCredRotator adopts them on
      # its own cadence. REPLACES the TF-minted keys and the whole GitHub relay
      # (stash-env-secret → LOKI_S3_*/HARBOR_REGISTRY_S3_* → bao-seed /
      # seed-harbor-registry-s3): the credentials never transit GitHub, and key
      # lifecycle has one owner (mint here, rotate in-cluster). Idempotent —
      # already-seeded paths are skipped, so a re-bootstrap never clobbers a
      # rotator-minted key. obj_cluster comes from the object-storage tfvars —
      # the source of truth for which OBJ cluster TF provisioned the buckets
      # into (NOT derivable from the env name). The downstream ESO wiring
      # (harbor-registry-s3 / loki-object-store ExternalSecrets → K8s Secrets →
      # REGISTRY_STORAGE_S3_* env vars / singleBinary extraEnvFrom) is unchanged.
      - name: Mint + seed object-storage keys
        if: steps.ensure.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci mint-bootstrap-objkeys --region "$REGION"

      # ── Mint + seed: the narrow in-cluster Linode PAT ───────────────────────────
      # Same one-owner shape as the object-storage keys: `llz ci mint-bootstrap-pat`
      # mints the NARROW in-cluster PAT (domains/object_storage/volumes rw +
      # linodes/vpcs ro + firewall rw — label llz-incluster-<region>) with the
      # broad provisioning PAT and seeds secret/linode/api-token directly,
      # rotated_at-stamped. Every in-cluster Linode consumer (volume-labeler,
      # the cred-rotator's minting credential, cidr-firewall, and apl-core's
      # DNS-01 webhook + ExternalDNS via the kyverno-dns-rotating-token
      # mutation) reads this one rotating token; the broad PAT is CI/Terraform-
      # only and never enters the cluster. Monthly rotation:
      # llz-secret-rotation.yml → `llz ci rotate-incluster-pat`. Idempotent —
      # an already-seeded path is skipped (a rotation-minted token, or the
      # legacy broad-PAT seed on a pre-split cluster, is never clobbered; the
      # next rotation converges the path to a narrow token).
      - name: Mint + seed the in-cluster Linode PAT
        if: steps.ensure.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci mint-bootstrap-pat --region "$REGION"

      # ── Broad-PAT rotator seed (ONLY when the broadPatRotator component is enabled) ─
      # The in-cluster broad-PAT rotator (platform-apl/components/broadPatRotator) mints
      # its successor with the CURRENT broad PAT, which it reads from
      # secret/linode/broad-pat via ESO. Seed that path here from LINODE_API_TOKEN — the
      # account:read_write CI token, i.e. the minting privilege the rotator needs —
      # rotated_at=0 so the first tick is due; --skip-if-present keeps re-runs from
      # clobbering a value the rotator has since rotated. Gated on the rendered carved
      # App file so ONLY the one deployment that enables the component (the broad PAT is
      # account-wide) ever holds the token: every other instance renders no such file
      # and skips, so no cluster carries the broad PAT unless it owns the rotation. This
      # also unwedges convergence — without the seed the rotator's ExternalSecret sits
      # in SecretSyncError and its carved App (llz-broad-pat-rotator) stays Degraded.
      - name: Seed broad-PAT rotator token (when enabled)
        if: steps.ensure.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci seed-broad-pat --region "$REGION"

      # ── Standby: replicate the active's Harbor robot credentials ───────────────
      # A standby peer has no in-cluster Harbor (the active/standalone path is the
      # in-cluster harbor-robot-provisioner CronJob — see the MOVED note where the
      # `harbor` job used to be). It seeds secret/harbor/{robot,pull-robot} from
      # the repo-level HARBOR_* secrets the active's provisioner published; each
      # not-published-yet state is a summary note + clean exit (re-run after the
      # active's provisioner has run). Sits before the nudge so the force-sync
      # below picks the fresh seeds up immediately.
      - name: Seed standby Harbor robot credentials (standby only)
        if: steps.ensure.outputs.available == 'true' && env.HA_ROLE == 'standby'
        env:
          HARBOR_URL:           ${{ vars.HARBOR_URL }}
          EXISTING_ROBOT:       ${{ secrets.HARBOR_ROBOT_NAME }}
          EXISTING_SECRET:      ${{ secrets.HARBOR_PASSWORD }}
          EXISTING_PULL_ROBOT:  ${{ secrets.HARBOR_PULL_ROBOT_NAME }}
          EXISTING_PULL_SECRET: ${{ secrets.HARBOR_PULL_PASSWORD }}
        run: llz ci seed-standby-harbor-robots

      # ── Nudge Argo CD to converge the secrets pipeline now ─────────────────────
      # The `openbao` ClusterSecretStore and its ExternalSecrets (loki/harbor obj-
      # storage) could not reach Ready until OpenBao was unsealed and the object-storage KV
      # paths above were seeded. nudge-argo (1) forces an immediate sync of the two
      # apps that own them — re-triggering the sync if an earlier first-boot race
      # already drove it to a terminally-failed state (Argo CD does NOT auto-retry a
      # failed sync to the same revision; selfHeal only corrects drift after a
      # successful one) — then (2) WAITS for the ClusterSecretStore to actually go
      # Ready and force-syncs every ExternalSecret. ESO doesn't re-trigger an
      # ExternalSecret when its store recovers, so without (2) the registry/log
      # Secrets idle until their own refreshInterval (observed: ~14m of
      # CreateContainerConfigError after the store was already Ready). The standing
      # safety net is the in-cluster nudger CronJob
      # (platform-apl/manifest/argo-resync-nudger); this collapses the latency
      # at the exact moment seeding unblocks them. Never fails the bootstrap.
      - name: Nudge Argo CD to converge secrets (post-seed)
        if: steps.ensure.outputs.available == 'true'
        continue-on-error: true
        run: llz ci nudge-argo

      # ── Gate: Harbor registry rollout (post-S3-seed) ───────────────────────────
      # harbor-registry mounts the harbor-registry-s3 Secret via secretKeyRef, so it
      # stays in CreateContainerConfigError until that Secret exists. It only appears
      # after the registry-S3 KV path is seeded (above) AND nudge-argo force-syncs the
      # ExternalSecret — which is why it's checked HERE rather than in the earlier
      # control-plane "Wait for Harbor readiness" gate (gating on it there always hit
      # the 2m rollout timeout on fresh bootstraps). continue-on-error matches the
      # control-plane gate: a real registry stall is surfaced (and the release-e2e
      # image push exercises the registry plane proper) without failing the bootstrap.
      - name: Wait for Harbor registry rollout
        if: steps.ensure.outputs.available == 'true'
        continue-on-error: true
        run: |
          if ! kubectl -n harbor get svc harbor-core >/dev/null 2>&1; then
            echo "harbor-core absent — Harbor not deployed here; skipping registry wait." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          llz ci wait-harbor --registry-only

      # NOTE — the "Seed Gitea backup S3 credentials in OpenBao" step that
      # wrote secret/gitea/backup-s3 was removed in the apl-core anti-
      # pattern cleanup. The corresponding bucket + key + outputs +
      # ExternalSecret + CronJob are all gone too. See
      # apl-values/primary/values.yaml apps.gitea for the rationale (apl-
      # core extraVolumes list-replace clobbered custom-ca; integration
      # blocked pending a kustomize post-renderer follow-up).

      # ── Extract the standby CA cert for cross-cluster rotation ─────────────────
      # When bootstrapping a standby cluster, extract its OpenBao TLS CA cert and
      # pass it as a job output so the provision-peer-ca job can create the
      # openbao-peer-tls Secret in the active peer's cluster, establishing
      # cross-cluster trust so VAULT_SKIP_VERIFY can be false for standby
      # operations. Standalone/active deployments have no peer, so this is skipped.
      #
      # The CA cert is deliberately NOT ::add-mask::'d: it is public material
      # (the certificate, not the key), and the runner empties masked values in
      # JOB outputs — the same constraint documented in linode-credentials/
      # action.yml ("raw token cannot cross job boundaries"). Masking here would
      # hand provision-peer-ca an empty ca_b64 and silently provision an empty
      # ca.crt.
      - name: Extract standby CA cert
        id: secondary_ca
        if: env.HA_ROLE == 'standby'
        # Non-fatal: a standby whose openbao-tls isn't up yet just skips peer-CA
        # provisioning (ca_available=false) rather than failing the bootstrap.
        run: llz ci extract-openbao-ca

      # NOTE — the `Verify ExternalSecrets synced` step (and its backing
      # template-scripts/verify-externalsecrets.sh) was deleted in the convergence-
      # contract anti-pattern cleanup. It existed to `kubectl annotate ...
      # force-sync=$(date +%s)` every ExternalSecret because ESO's 24h
      # refresh cache could hold a Ready=False from before the workflow
      # seeded the source path. Replaced by Argo CD health.lua for
      # ClusterSecretStore + ExternalSecret (set via apl-core values at
      # apl-values/<env>/values.yaml::apps.argocd._rawValues.configs.cm)
      # plus retry: backoff on every Argo Application. The
      # `llz ci converge` polling gate at the end of `terraform.yml::Bootstrap
      # Cluster` is what now confirms ESO has caught up. See
      # docs/architecture/convergence-contract.md anti-pattern #3.

      # ── Audit: PVCs that escaped the Kyverno encryption mutation ──────────────
      # The Kyverno ClusterPolicy at
      # terraform-iac-bootstrap/cluster-bootstrap/manifests/kyverno-pvc-encrypted-storage-class.yaml
      # rewrites linode-block-storage(-retain) → block-storage-retain
      # at admission. The TF install (wait_for_kyverno_crd → kubectl_manifest)
      # races apl-core's helmfile that creates harbor/gitea/keycloak/CNPG PVCs;
      # the policy's mutating webhook has a 30-90s readiness lag after CRD
      # registration. Any PVC admitted during that window lands on
      # linode-block-storage (unencrypted, Delete reclaim) and persists
      # silently — Kyverno does NOT background-migrate existing resources.
      #
      # This step lists every PVC not on block-storage-retain.
      # Emits ::warning:: lines so the operator can decide whether to
      # delete+recreate the affected workloads (forcing PVC re-admission with
      # the policy now active). Does NOT fail the workflow — the cluster is
      # still functional, just less secure than intended.
      - name: Audit PVCs against encrypted-Retain StorageClass
        if: steps.ensure.outputs.available == 'true' && env.HA_ROLE != 'standby'
        run: llz ci audit-pvc-storageclass

      # ── Revoke root token ────────────────────────────────────────────────────────
      # Defaults to `always()`-equivalent: revoke on success AND failure (cleanup
      # is unconditional — fail-closed for credential hygiene). An explicit
      # `preserve_root_on_failure=true` dispatch input lets the operator opt into
      # leaving the token usable across iterative bootstrap retries, so they
      # don't have to burn a fresh quorum-regenerate per failed attempt. Success
      # always revokes regardless of the flag.
      - name: Revoke root token
        if: |
          always() && (success() || inputs.preserve_root_on_failure != true)
        run: |
          if [ -z "${OPENBAO_ROOT_TOKEN:-}" ]; then
            exit 0
          fi
          llz openbao exec -- token revoke -self \
          && echo "Root token revoked." \
          || echo "::warning::Root token revocation failed — delete OPENBAO_ROOT_TOKEN from the infra-${REGION} environment secrets manually to prevent credential reuse"

      # ── Final convergence gate (formerly the separate `converge` job) ──────────
      # MERGED here from its own job: convergence runs serially after this
      # bootstrap on the same cluster with the same infra-<region> environment, so
      # a standalone job only bought a second container-init + checkout + kubeconfig
      # fetch (~1.5m of pure overhead on the e2e critical path). Running it inline
      # reuses THIS job's cluster-access/ACL/lease. `llz ci converge` exits 0
      # (converged) or 1 (budget exhausted / check error); per
      # docs/architecture/convergence-contract.md this gate is what makes "the
      # workflow passed" mean "the cluster works". All steps use the container's
      # default kubeconfig ($HOME/.kube/config, written by cluster-access above) —
      # the same one the bootstrap kubectl steps use.
      #
      # NOTE (behavior change vs. the old split): a convergence failure now fails
      # THIS job, so the standby-only provision-peer-ca (which `needs: bootstrap`)
      # is skipped on a converge failure instead of still running. That HA path is
      # not exercised by release-e2e (standalone); deferring peer-CA provisioning
      # until a clean bootstrap is the intended trade.

      # PREFLIGHT — clear the verify-llz-image-signature race before the gate.
      # verify-llz-image-signature (Enforce, sync-wave -15) blocks the in-cluster
      # llz CronJobs until Kyverno can verify the keyless cosign signature on the
      # llz image; on a freshly-built main sha the Sigstore/Rekor + GHCR signature
      # can lag the cluster's first admission attempt, failing the platform-bootstrap
      # sync (Argo backs off to 5m retries and does not auto-retry a failed sync to
      # the same revision), so confirm the cluster can admit the CronJob, then force
      # platform-bootstrap to re-attempt admission (nudge-argo). The CronJob manifest
      # is read from the RENDERED instance checkout (source of truth). Only nudge once
      # the dry-run admits; best-effort — the converge poll below is the verdict.
      # No `available` gate (unlike the seed/configure steps above): the old
      # standalone converge job ran on bootstrap success REGARDLESS of OpenBao
      # availability, so an OpenBao that never came up still surfaces as a
      # convergence FAILURE here rather than a silently-skipped gate. Default
      # success() gating preserves that — it runs unless an earlier step failed.
      - name: Preflight — confirm the cluster admits the llz CronJob, then re-sync
        run: |
          set -uo pipefail
          # The rendered CronJob manifests that run the in-cluster llz image — the
          # exact workloads Kyverno's autogen-cronjob-verify-llz-keyless rule gates.
          FILES="$(grep -rlE 'ghcr\.io/[A-Za-z0-9._-]+/llz:[A-Za-z0-9._-]+' . \
            --include='*.yaml' --include='*.yml' 2>/dev/null \
            | xargs -r grep -lE '^kind:[[:space:]]*CronJob' 2>/dev/null | sort -u || true)"
          if [ -z "${FILES}" ]; then
            echo "no in-cluster llz CronJob in the instance manifests — nothing to gate; skipping"
            exit 0
          fi
          all_ok=1
          for FILE in ${FILES}; do
            IMAGE="$(grep -oE 'ghcr\.io/[A-Za-z0-9._-]+/llz:[A-Za-z0-9._-]+' "${FILE}" | head -n1)"
            echo "== preflight ${IMAGE} (${FILE}) =="
            ok=0
            for i in $(seq 1 20); do
              # Kyverno admits the real CronJob — server dry-run runs the autogen-cronjob
              # verifyImages rule (and every other admission policy) without persisting.
              if kubectl apply --dry-run=server -f "${FILE}" >/dev/null 2>/tmp/preflight-admit.err; then
                echo "  Kyverno admits the CronJob (attempt ${i})"; ok=1; break
              fi
              echo "  not admissible yet (attempt ${i}/20) — retrying in 15s"; sleep 15
            done
            if [ "${ok}" != 1 ]; then
              all_ok=0
              echo "::warning::${IMAGE} (${FILE}): Kyverno CronJob dry-run still failing — $(tr '\n' ' ' </tmp/preflight-admit.err 2>/dev/null | tail -c 300)"
            fi
          done
          # Argo does not fast-retry a sync that terminally failed on the earlier
          # (pre-signature) admission denial; force platform-bootstrap to re-apply
          # now so the CronJobs are re-admitted. Skip the nudge if admission is still
          # denied (a real Kyverno-side gap: creds/egress) — surfaced above; the
          # converge poll is the verdict.
          if [ "${all_ok}" = 1 ]; then
            llz ci nudge-argo || true
          else
            echo "::warning::skipping the re-sync nudge — llz CronJob admission not confirmed; converge will report the verdict"
          fi

      # ── Realign argocd-redis if its clients drifted onto a new password ─────────
      # argocd-redis bakes `--requirepass $(REDIS_PASSWORD)` from the argocd-redis
      # Secret at *pod start* and never re-reads it; the repo-server and application-
      # controller read the same Secret's `auth` key at *their* start. On a reused
      # (KEEP_CLUSTER) cluster the redis pod can outlive a rewrite of that Secret
      # while the clients roll onto the new value — so every repo-server->redis AUTH
      # fails with WRONGPASS and *all* Applications go Unknown/ComparisonError
      # ("failed to list refs: WRONGPASS ..."), which the converge poll below now
      # classifies as a transient (pending) rather than a hard strike. Restarting
      # redis makes it re-read the current Secret, realigning server and clients so
      # that poll can actually converge. Best-effort + conditional: only fires when
      # the WRONGPASS/NOAUTH signature is actually present, so normal runs never lose
      # the cache. The durable fix lives in apl-core (static redis password, or
      # restart-on-rotation) — tracked separately; this is the e2e-side backstop.
      - name: Realign argocd-redis on repo-server auth split (WRONGPASS)
        run: |
          set -uo pipefail
          split=0
          # Primary signal: the repo-servers are the ones failing AUTH — grep their
          # recent logs. Secondary: an Application condition already carries the code.
          for pod in $(kubectl -n argocd get pods -l app.kubernetes.io/name=argocd-repo-server -o name 2>/dev/null); do
            if kubectl -n argocd logs "${pod}" --since=10m --tail=2000 2>/dev/null | grep -qE 'WRONGPASS|NOAUTH'; then
              split=1; break
            fi
          done
          if [ "${split}" != 1 ] && kubectl get applications.argoproj.io -A \
              -o jsonpath='{range .items[*]}{.status.conditions[*].message}{"\n"}{end}' 2>/dev/null \
              | grep -qE 'WRONGPASS|NOAUTH'; then
            split=1
          fi
          if [ "${split}" != 1 ]; then
            echo "no argocd-redis auth split detected — nothing to realign"
            exit 0
          fi
          echo "::warning::argocd-redis auth split (WRONGPASS/NOAUTH) — restarting argocd-redis to re-read the current password"
          kubectl -n argocd rollout restart deploy/argocd-redis || true
          kubectl -n argocd rollout status  deploy/argocd-redis --timeout=120s || true
          # Force an immediate re-comparison so the converge poll sees the recovered
          # state instead of waiting on the controller's reconcile timer.
          llz ci nudge-argo || true

      # Explicit --budget bounds the convergence poll, well below the job's
      # timeout-minutes (45). NOT "anything longer is a real stall": the tail of a
      # fresh bootstrap is llz-cert-automation legitimately rolling out. It chains
      # on the harbor-robot-provisioner CronJob (schedule */5) seeding
      # secret/harbor/robot → the harbor-docker-config ExternalSecret syncing
      # (refreshInterval 1m) → the cert-automation rollout. In the worst case (the
      # CronJob's first tick up to 5m out) that tail runs ~10-15m after the primary
      # converge, so a 10m ceiling was marginal and flaked the poll on a legit slow
      # rollout (Progressing, not stalled). 20m absorbs the worst-case tail while
      # still catching a genuine stall well inside the 45m job timeout.
      - name: Wait for cluster to converge
        run: llz ci converge --budget 1200

      # E2E validation gate, folded in from release-e2e.yml's former `validate`
      # job: that job dispatched cluster-health.yml only to run `llz ci converge`
      # (redundant with the poll above) + `llz ci assert-loki`. Running assert-loki
      # HERE — inside the converge that already holds cluster access — drops that
      # whole extra job (its container-init + checkout + kubeconfig/ACL cycle) from
      # the e2e critical path. Default-off, so normal instance bootstraps are
      # unchanged; only the release-e2e provision dispatch passes assert_loki=true.
      # Uses the job's default kubeconfig ($HOME/.kube/config), same as the poll.
      - name: Assert Loki is bootstrapped and S3-backed
        if: ${{ inputs.assert_loki }}
        run: llz ci assert-loki

      # E2E gate for the observability-pipeline WIRING. converge/health/assert-loki
      # all stay green when a ServiceMonitor/PrometheusRule regression (a dropped
      # `prometheus: system` label, a renamed Service port, a wrong
      # namespaceSelector) silently leaves the CRs un-scraped/un-loaded — the exact
      # class the recent SM/rule fixes closed. This asserts each landing-zone
      # ServiceMonitor has a live `up` target and each PrometheusRule group is
      # loaded, so that regression fails the e2e instead of shipping a metrics
      # surface that quietly stopped flowing. Gating (no `|| true`); logic lives in
      # the unit-tested `llz ci assert-scrape-targets`. Same assert_loki gate.
      - name: (e2e) assert scrape targets up + rule groups loaded
        if: ${{ inputs.assert_loki }}
        run: llz ci assert-scrape-targets

      # E2E gate for the reconciler's FUNCTIONAL health. converge sees the
      # reconciler Deployment as green the moment its pod is Ready, and
      # alert-eval --strict ignores a FIRING LLZReconcilerReportingDown — so a
      # reconcile loop that is up but silently failing (a permission dropped by
      # the least-privilege RBAC, or lost OpenBao/Linode access) slips through
      # both. This asserts llz_reconcile_up=1 (loop reporting success) and
      # llz_reconcile_leader=1 (a replica holds the driving Lease) directly. Runs
      # after assert-scrape-targets, so the gauge is already fresh. Logic lives in
      # the unit-tested `llz ci assert-reconciler`.
      - name: (e2e) assert reconciler is functionally healthy
        if: ${{ inputs.assert_loki }}
        run: llz ci assert-reconciler

      # E2E gate for the day-2 clusterHealthWorkflow component's RUN path. The
      # release-e2e provision enables the component, so converge already validated
      # it DEPLOYS (kyverno admits the WorkflowTemplate/CronWorkflow/RBAC, Argo
      # syncs them). This submits a one-shot Workflow from the llz-cluster-health
      # WorkflowTemplate and asserts it Succeeds — proving the RUN path a scheduled
      # CronWorkflow would take: the signed llz image passes the kyverno signature
      # policy on the pod, the SA + executor RBAC authorize it, and
      # `llz ci health-incluster` exits clean on the converged cluster. Same
      # assert_loki gate; the verb SKIPS (exit 0) if the WorkflowTemplate is absent,
      # so it stays inert on a normal instance where the component is disabled.
      # Logic lives in the unit-tested `llz ci assert-health-workflow`.
      - name: (e2e) assert day-2 health WorkflowTemplate runs green
        if: ${{ inputs.assert_loki }}
        run: llz ci assert-health-workflow

      # E2E gate that EXERCISES the in-cluster broad-PAT rotator (not just asserts it
      # deployed). converge sees its carved App green once the CronJob + ESO Secrets
      # exist, but the CronJob is weekly — so the mint → verify → OpenBao write →
      # GitHub env-secret publish → revoke path against real OpenBao k8s-auth / Linode
      # / GitHub is unproven until it runs. This forces one Job from the CronJob (--apply,
      # rotated_at=0 seeded by seed-broad-pat makes it due) and asserts action=rotated;
      # an in-cluster failure (bad role, missing scope, GitHub write denied) fails e2e.
      # SAFE: e2e enabled it with an e2e-unique label + broadPATDeployments=e2e, so the
      # mint/revoke touch only the e2e PAT family and only infra-e2e is rewritten.
      # Self-gates on the component being enabled; logic lives in the unit-tested
      # `llz ci assert-broad-pat-rotation`.
      - name: (e2e) exercise the broad-PAT rotator end-to-end
        if: ${{ inputs.assert_loki }}
        run: llz ci assert-broad-pat-rotation --region "$REGION"

      # E2E-only support-plane metric-surface diagnostic. Gated on the same
      # assert_loki input as the check above, so it runs on the release-e2e
      # provision (which holds cluster access) and never on a normal instance
      # bootstrap. Dumps the loki/cortex/otelcol/harbor exporter metric NAMES so
      # error-rate/saturation alerts are written against series that actually
      # exist (promtool checks syntax, not existence). Read-only + best-effort
      # (|| true); a single-line glue invocation of the unit-tested `llz ci
      # prom-metrics` command, so no logic lives in the workflow.
      - name: (e2e) support-plane exporter metric surface
        if: ${{ inputs.assert_loki }}
        run: llz ci prom-metrics --match '^(loki_|cortex_|otelcol_|harbor_)' || true

      # E2E live alert evaluation, surfaced in the job summary. Every PrometheusRule
      # ships promtool-valid (syntax), but promtool can't tell a rule that
      # references a non-existent metric (silent never-fire, DEAD?) from one simply
      # not tripping (ARMED). This runs each deployed alert expr through the live
      # Prometheus and writes the FIRING/ARMED/DEAD?/BROKEN report to the step
      # summary, so DEAD?/BROKEN are visible on the run instead of failing silent in
      # prod. Report-only for now (|| true); the intent is to harden to
      # `alert-eval --strict` (fail on DEAD?/BROKEN) once today's known-DEAD? alerts
      # — real cluster bugs, not rule bugs — are resolved. This branch fixes the
      # OpenBao/OTel scrape path (un-DEADs the vault_*/otelcol_* alerts), but two
      # alerts fed by the opt-in --reconcile-openbao-gauges reconciler stay DEAD?
      # on a default cluster, so the flip to --strict is deferred. Glue over the
      # unit-tested `llz ci alert-eval`. Same assert_loki gate + cluster access.
      - name: (e2e) live alert evaluation
        if: ${{ inputs.assert_loki }}
        run: |
          echo '### alert-eval — live rule evaluation' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          llz ci alert-eval 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # E2E runtime wave-health audit — GATING (--fail-on-unvetted). The static
      # wave-health-guard scans the git tree at PR time and the VAP enforces at
      # admission, but neither sees what a CONVERGED cluster actually runs at
      # negative sync-waves from paths outside the platform-bootstrap kustomize
      # tree (child-App-rendered content, apl-core resources, operator writeback).
      # This enumerates every live negative-wave resource and applies the same
      # decision the VAP makes, failing the e2e on any kind the VAP would DENY —
      # a coverage gap to add to the allowlist, or a latent false-positive to fix —
      # instead of waiting for the weekly scheduled audit to surface it. Logic
      # lives in the unit-tested `llz ci wave-health-audit`.
      - name: (e2e) runtime wave-health audit
        if: ${{ inputs.assert_loki }}
        run: llz ci wave-health-audit --fail-on-unvetted

      # On a convergence hard-fail, snapshot the loki-gateway resolver + nginx logs
      # WHILE the cluster is still up — before the ACL revoke below cuts apiserver
      # access. Every command is `|| true` so it never alters the outcome.
      - name: Capture loki-gateway diagnostics (on convergence failure)
        if: failure()
        run: 'echo "== loki-gateway nginx.conf resolver =="; kubectl -n monitoring get cm loki-gateway -o "jsonpath={.data.nginx\.conf}" 2>/dev/null | grep -i resolver || true; for p in $(kubectl -n monitoring get pods -o name 2>/dev/null | grep loki-gateway); do echo "== $p =="; kubectl -n monitoring logs "$p" -c nginx --tail=50 2>/dev/null || true; kubectl -n monitoring logs "$p" -c nginx --tail=50 --previous 2>/dev/null || true; kubectl -n monitoring describe "$p" 2>/dev/null | tail -30 || true; done'

      # Snapshot the Argo CD Application states + the phase1 platform-app-ca CA chain
      # before teardown. `|| cancelled()` so a cancelled run still captures; all
      # probes are best-effort inside the llz command. Also covers a bootstrap-step
      # failure (this is now one job) — the reason the old standalone Argo-diagnostics
      # step existed in this job at all.
      - name: Diagnose convergence failure (Argo apps + cert-manager CA chain)
        if: failure() || cancelled()
        # Belt-and-suspenders cap: diagnose-argocd gates on apiserver reachability, but
        # bound the step regardless so a hung apiserver can't eat the job budget.
        timeout-minutes: 10
        run: llz ci diagnose-argocd || true

      # ── Fail job if any non-optional secrets were missing ──────────────────────
      # Runs after token revocation so cleanup always happens first. Exits 1 to
      # surface the error in the GitHub Actions UI when BOOTSTRAP_ERRORS was set
      # by a seed step above.
      # Revoke BEFORE the job ends: passes the kubeconfig so the runner-lease in the
      # firewall-runner-acl ConfigMap is released via kubectl before the Linode-API
      # call cuts apiserver access (we register-runner-lease on cluster-access above).
      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ env.REGION }}
          kubeconfig:   $HOME/.kube/config

      - name: Fail on bootstrap errors
        if: always()
        run: |
          if [ "${BOOTSTRAP_ERRORS:-}" = "true" ]; then
            echo "::error::Bootstrap completed with errors — one or more required secrets are missing. See annotations above."
            exit 1
          fi

  # ── Harbor provisioning — MOVED IN-CLUSTER ──────────────────────────────────
  # The `harbor` job that ran here (its own cluster-access + ACL cycle, a
  # root-token re-acquire via the recovery-key quorum, a kubectl port-forward to
  # harbor-core, ensure-project, provision-harbor-robots, smoke) has been
  # REMOVED. The active/standalone path is now the harbor-robot-provisioner
  # CronJob (platform-apl/components/harbor/, `llz ci harbor-provisioner` on the
  # slim llz image): it talks to harbor-core.harbor.svc directly (the
  # port-forward existed only because HARBOR_URL is internal DNS the runner
  # cannot resolve), writes OpenBao through the scoped harbor-provisioner
  # Kubernetes-auth role (no root token), publishes the repo-level HARBOR_*
  # secrets natively over the GitHub API, and smoke-tests every tick. Robot
  # rotation is now "delete the robot in Harbor UI" — the next tick recreates
  # and re-publishes it. The STANDBY half (replicating the active's published
  # credentials) is the "Seed standby Harbor robot credentials" step in the
  # `bootstrap` job above.

  # ── Provision the standby CA cert in its active peer's cluster ───────────────
  # Runs only after a standby bootstrap that successfully extracted the CA cert.
  # Creates (or updates) the openbao-peer-tls Secret in the active peer's openbao
  # namespace so cross-peer clients can verify TLS when connecting
  # to the standby OpenBao without VAULT_SKIP_VERIFY=true. The peer (the active
  # member of this deployment's ha_group) is resolved from the cluster tfvars.
  provision-peer-ca:
    name: Provision standby CA in active peer cluster
    if: >
      needs.resolve.outputs.role == 'standby' &&
      needs.bootstrap.outputs.ca_available == 'true'
    needs: [resolve, bootstrap]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ needs.resolve.outputs.peer }}
    timeout-minutes: 15

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fetch the active peer's kubeconfig and open this runner's egress IP in
      # that cluster's control-plane ACL (revoked at job end). No llz needed here.
      - name: Cluster access (peer kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          region:                ${{ needs.resolve.outputs.peer }}
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}

      - name: Provision openbao-peer-tls Secret in active peer cluster
        env:
          CA_B64: ${{ needs.bootstrap.outputs.ca_b64 }}
        run: llz ci provision-peer-ca

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner (peer)
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ needs.resolve.outputs.peer }}

  # ── Recovery: fetch the standby's CA cert ──────────────────────────────────
  # Triggered via workflow_dispatch with reprovision_ca_only: true and region =
  # the standby deployment. Fetches the CA cert from the standby cluster (self)
  # and passes it to reprovision-peer-ca below without running a full bootstrap.
  # Use this to recover from a failed provision-peer-ca without restarting the
  # entire standby bootstrap. No-op unless the deployment's role is standby.
  fetch-standby-ca:
    name: Fetch standby CA (recovery)
    if: inputs.reprovision_ca_only == true && needs.resolve.outputs.role == 'standby'
    needs: [resolve]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ inputs.region }}
    timeout-minutes: 10
    outputs:
      ca_available: ${{ steps.extract.outputs.ca_available }}
      ca_b64:       ${{ steps.extract.outputs.ca_b64 }}

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fetch the standby cluster's (self) kubeconfig and open this runner's
      # egress IP in its control-plane ACL (revoked at job end). No llz needed.
      - name: Cluster access (standby kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          region:                ${{ inputs.region }}
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}

      - name: Extract standby CA cert
        id: extract
        # --required: this job exists solely to (re)provision the peer CA, so an
        # absent openbao-tls is a hard error here (unlike the bootstrap job's twin).
        run: llz ci extract-openbao-ca --required

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner (standby)
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ inputs.region }}

  # ── Recovery: provision the standby CA in its active peer's cluster ────────
  # Depends on fetch-standby-ca above; runs in the active peer's environment.
  reprovision-peer-ca:
    name: Re-provision standby CA in active peer cluster
    if: >
      inputs.reprovision_ca_only == true &&
      needs.fetch-standby-ca.outputs.ca_available == 'true'
    needs: [resolve, fetch-standby-ca]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ needs.resolve.outputs.peer }}
    timeout-minutes: 10

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fetch the active peer's kubeconfig and open this runner's egress IP in
      # that cluster's control-plane ACL (revoked at job end). No llz needed here.
      - name: Cluster access (peer kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          region:                ${{ needs.resolve.outputs.peer }}
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}

      - name: Provision openbao-peer-tls Secret in active peer cluster
        env:
          CA_B64: ${{ needs.fetch-standby-ca.outputs.ca_b64 }}
        run: llz ci provision-peer-ca

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner (peer)
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ needs.resolve.outputs.peer }}
