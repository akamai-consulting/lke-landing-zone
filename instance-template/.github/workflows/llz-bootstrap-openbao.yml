name: llz-bootstrap-openbao (reusable)

# Reusable (`workflow_call`) OpenBao bootstrap. VENDORED: copier copies this file
# verbatim into every instance, so maintainer rationale lives in the TEMPLATE at
# docs/workflows/llz-bootstrap-openbao.md — read it before changing anything here.
#
# Initializes, unseals, and configures OpenBao for one deployment. With
# bootstrap_cluster=true it also runs the in-cluster bring-up (apl-core, Kyverno,
# the Argo bridge) and the final convergence gate in the same job.
#
# First-init / wait-for-unseal / re-configure are all selected inside
# `llz ci bao-ensure-ready` — to re-configure, set OPENBAO_ROOT_TOKEN as an
# infra-<region> secret and delete it again right after the run.
#
# CONVERGENCE CONTRACT — docs/architecture/convergence-contract.md. New steps must
# classify failures into the 3 contract codes (poll / hard-fail / converged), NOT
# add another BOOTSTRAP_ERRORS soft-fail flag.
#
# Secrets/variables are listed in the sidecar. Note only that OPENBAO_SEAL_KEY and
# OPENBAO_RECOVERY_KEY_1/2/3 are set automatically by the first bootstrap, and that
# losing OPENBAO_SEAL_KEY loses the data.

on:
  workflow_call:
    inputs:
      region:
        description: 'Deployment to bootstrap (any scaffolded deployment; its HA role is read from the cluster tfvars).'
        required: true
        type: string
      reprovision_ca_only:
        description: 'Re-provision a standby deployment''s CA into its active peer only (skips full bootstrap). Run with region = the standby deployment.'
        required: false
        type: boolean
        default: false
      preserve_root_on_failure:
        description: 'DEBUG ONLY. Skip the post-bootstrap root-token revoke when bootstrap FAILS, so the operator can iterate. Default false (revoke runs unconditionally).'
        required: false
        type: boolean
        default: false
      instance_repo:
        description: "This instance's GitHub repo (<owner>/<name>) for `gh` targeting."
        required: true
        type: string
      template-ref:
        description: 'The template release this instance is rendered from — `llz upgrade` re-pins it. Unused by this workflow''s jobs (everything resolves locally); declared only because the caller stub passes it and workflow_call rejects undeclared inputs.'
        required: false
        type: string
        default: main
      assert_loki:
        description: 'After converge, also assert Loki is bootstrapped + S3-backed (`llz ci assert-loki`) in the bootstrap job. Default false (normal instances); the release-e2e gate sets it true so the check runs inside the converge that already holds cluster access, instead of a separate validate pass dispatching cluster-health.yml.'
        required: false
        type: boolean
        default: false
      bootstrap_cluster:
        description: 'Run the in-cluster bootstrap (wait-cluster-ready + `llz ci bootstrap-cluster`: apl-core, Kyverno policies, Argo bridge) at the head of the bootstrap job, before the OpenBao phase. Set by llz-terraform.yml''s chained call so cluster + OpenBao bootstrap share ONE container-init + checkout + cluster-access/ACL cycle (the former standalone bootstrap-cluster job paid its own, ~1.5-2m of pure overhead on the e2e critical path). Default false: a standalone bootstrap-openbao dispatch (retries, re-configuration) assumes the cluster is already bootstrapped.'
        required: false
        type: boolean
        default: false
    secrets:
      # ALL required: false, deliberately — do not "fix" this. `secrets: inherit`
      # cannot forward environment-scoped secrets, and `required: true` is checked
      # statically at the call boundary, so it would fail the run before any job
      # enters `environment: infra-<region>`. Presence is preflighted at runtime by
      # `llz ci require-secret`. Full reasoning in the sidecar doc.
      TF_STATE_ACCESS_KEY:
        required: false
      TF_STATE_SECRET_KEY:
        required: false
      LINODE_API_TOKEN:
        required: false
      OPENBAO_ROOT_TOKEN:
        required: false
      OPENBAO_SECRETS_WRITE_TOKEN:
        required: false
      OPENBAO_RECOVERY_KEY_1:
        required: false
      OPENBAO_RECOVERY_KEY_2:
        required: false
      OPENBAO_RECOVERY_KEY_3:
        required: false
      OPENBAO_SEAL_KEY:
        required: false
      HARBOR_PASSWORD:
        required: false
      HARBOR_PULL_PASSWORD:
        required: false
      HARBOR_PULL_ROBOT_NAME:
        required: false
      HARBOR_ROBOT_NAME:
        required: false
      # Consumed only by the bootstrap_cluster=true phase.
      APL_VALUES_REPO_TOKEN:
        required: false
      LINODE_DNS_TOKEN:
        required: false
      GHCR_READ_TOKEN:
        required: false
      APPS_REPO_REVISION:
        required: false
      # (LOKI_S3_* / HARBOR_REGISTRY_S3_* were RETIRED — see the sidecar doc.)

permissions:
  contents: read

concurrency:
  group: openbao-bootstrap-${{ inputs.region }}
  cancel-in-progress: false

env:
  TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
  AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
  REGION:              ${{ inputs.region }}
  KUBECTL_VERSION:     "1.31.0"

defaults:
  run:
    shell: bash

jobs:

  # ── Resolve this deployment's HA role + peer ─────────────────────────────────
  # role (active|standby|standalone) + peer (the other member of its ha_group),
  # read from the cluster tfvars. peer is empty for standalone. Consumed by the
  # standby jobs below across job boundaries; the bootstrap job resolves its own.
  resolve:
    name: Resolve HA role
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      role: ${{ steps.r.outputs.role }}
      peer: ${{ steps.r.outputs.peer }}
    steps:
      - name: Checkout the instance (tfvars)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve role + peer
        id: r
        # Emits role=/peer= to $GITHUB_OUTPUT (peer empty for standalone).
        run: llz env resolve "$REGION"

  bootstrap:
    name: Bootstrap OpenBao (${{ inputs.region }})
    # No `needs: resolve` on purpose: this job self-resolves HA role/peer in its
    # first step so it isn't serialized behind that job's container spin.
    if: inputs.reprovision_ca_only == false
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ inputs.region }}
    # 45m normally; 70m when bootstrap_cluster adds the apl-core phase at the head.
    # INVARIANT when editing any step budget below: no SINGLE step may exceed this
    # timeout, or GitHub kills the job with no verdict — losing the step's error AND
    # the always()/failure() tail (Argo capture, control-plane ACL revoke). The
    # budgets are NOT expected to sum to less than this; see the sidecar doc.
    timeout-minutes: ${{ inputs.bootstrap_cluster && 70 || 45 }}
    env:
      # GH_REPO makes gh target the repo directly instead of shelling out to git,
      # which fails on "dubious ownership" in the container's checkout dir.
      GH_REPO: ${{ inputs.instance_repo }}
      # Phase-timeline log, read by `llz ci collect-timing` at the job tail.
      LLZ_PHASE_LOG: /tmp/llz-phases.jsonl
      GH_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
      HARBOR_URL: ${{ vars.HARBOR_URL }}
      # HA_ROLE / HA_PEER are NOT set here — the "Export HA role" step below writes
      # them to $GITHUB_ENV, which is why later steps can reference env.HA_ROLE.
      # S3 backend creds for the convergence gate's cluster-access terraform-init.
      AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
    outputs:
      ca_available: ${{ steps.secondary_ca.outputs.ca_available }}
      ca_b64: ${{ steps.secondary_ca.outputs.ca_b64 }}
      available: ${{ steps.ensure.outputs.available }}

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Two steps: the verb emits role=/peer= step outputs; the export promotes them
      # to job-wide env so later steps can use env.HA_ROLE in their `if:`.
      - name: Resolve HA role + peer
        id: ha
        run: llz env resolve "$REGION"
      - name: Export HA role for later steps
        run: |
          { echo "HA_ROLE=${{ steps.ha.outputs.role }}"; echo "HA_PEER=${{ steps.ha.outputs.peer }}"; } >> "$GITHUB_ENV"

      # ── Cluster-bootstrap phase (bootstrap_cluster=true only) ──────────────────
      # Merged in from the former standalone `bootstrap-cluster` job to share this
      # job's container/checkout/cluster-access cycle. These steps use the default
      # $HOME/.kube/config written by the shared cluster-access step below.
      - name: Pre-flight — probe credential validity (fail fast on a dead token)
        if: inputs.bootstrap_cluster
        env:
          LINODE_API_TOKEN:            ${{ secrets.LINODE_API_TOKEN }}
          LINODE_DNS_TOKEN:            ${{ secrets.LINODE_DNS_TOKEN }}
          APL_VALUES_REPO_TOKEN:       ${{ secrets.APL_VALUES_REPO_TOKEN }}
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
          GHCR_READ_TOKEN:             ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME:               ${{ vars.GHCR_USERNAME }}
          TF_STATE_ACCESS_KEY:         ${{ secrets.TF_STATE_ACCESS_KEY }}
          TF_STATE_SECRET_KEY:         ${{ secrets.TF_STATE_SECRET_KEY }}
          TF_STATE_ENDPOINT:           ${{ vars.TF_STATE_ENDPOINT }}
          TF_STATE_BUCKET:             ${{ vars.TF_STATE_BUCKET }}
        run: llz ci validate-tokens

      - name: Pre-flight — verify infra-${{ env.REGION }} env secrets
        if: inputs.bootstrap_cluster
        env:
          APL_VALUES_REPO_TOKEN:       ${{ secrets.APL_VALUES_REPO_TOKEN }}
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
        run: |
          set -u
          FAIL=0
          llz ci require-secret APL_VALUES_REPO_TOKEN \
            --hint "Fine-grained GitHub PAT (Contents: write) for github.com/${{ inputs.instance_repo }}.git — apl-core's otomi.git.password + the argocd repo Secrets render empty without it; apl-operator can't push and Argo can't clone." || FAIL=1
          llz ci require-secret OPENBAO_SECRETS_WRITE_TOKEN \
            --hint "Fine-grained PAT (github.com) scoped to this repo with Actions + Secrets: write — used by bootstrap-openbao (GitHub-token seeds + recovery-key/root-token persistence) and the destroy-time GH-secret cleanup." || FAIL=1
          [ "$FAIL" -eq 0 ]

      # (A "chart pins published to GHCR" preflight ran HERE and was removed — it
      # can't work from an instance checkout. Don't re-add it; sidecar doc explains.)

      # Regenerate the gitignored cluster tfvars so wait-cluster-ready can read
      # node_count (its pool-Ready target).
      - name: Render tfvars from the spec
        if: inputs.bootstrap_cluster
        run: llz render "${REGION}" --tfvars-only

      # ── Pre-flight: object-storage buckets/keys actually exist ──────────────────
      # Secret PRESENCE is not VALIDITY: a stale key pointing at deleted object
      # storage seeds fine and then fails as InvalidAccessKeyId at runtime with no
      # signal (no logs in Loki, Harbor pushes fail). Confirm the scoped keys exist
      # on Linode before seeding. Non-fatal on a transient API hiccup.
      - name: Pre-flight — verify object-storage buckets/keys exist
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci verify-object-storage --region "$REGION"

      # ── Kubeconfig + control-plane ACL ─────────────────────────────────────────
      # Hosted runners have a dynamic egress IP not in the LKE-E control-plane ACL;
      # open it before any kubectl, revoke at job end. register-runner-lease keeps
      # the EAA controller from evicting the IP mid-run — required because the
      # convergence gate at the tail of this job polls for a long time.
      - name: Cluster access (kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ env.REGION }}
          register-runner-lease: 'true'

      # ── Cluster-bootstrap phase, part 2 (bootstrap_cluster=true only) ──────────
      # Split gate, deliberately: this waits for only ONE Ready node (all apl-core's
      # install needs); the FULL pool is asserted after the bootstrap, by which time
      # the rest have had the apl-pipeline wait to join. Don't re-merge them.
      - name: Wait for cluster API ready (first node)
        if: inputs.bootstrap_cluster
        run: |
          llz ci phase-mark wait-cluster-ready
          llz ci wait-cluster-ready --timeout 900 --interval 10 || {
            echo "Persisting failure = control plane still provisioning (re-run later), OR no node ever reached Ready, OR the cluster-access step above did not add this runner's egress IP to the LKE-E control-plane ACL (check its log + LINODE_API_TOKEN scope)."
            exit 1
          }

      # The whole in-cluster bootstrap in one command — see
      # tools/cmd/llz/ci_bootstrap_cluster.go. Idempotent, so a re-run is safe.
      - name: Bootstrap cluster (apl-core + Kyverno + Argo bridge)
        if: inputs.bootstrap_cluster
        env:
          APL_VALUES_REPO_TOKEN: ${{ secrets.APL_VALUES_REPO_TOKEN }}
          LINODE_DNS_TOKEN:      ${{ secrets.LINODE_DNS_TOKEN || 'placeholder-set-LINODE_DNS_TOKEN-to-enable-dns' }}
          GHCR_TOKEN:            ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME:         ${{ vars.GHCR_USERNAME }}
          APPS_REPO_REVISION:    ${{ vars.APPS_REPO_REVISION || secrets.APPS_REPO_REVISION || 'main' }}
        run: |
          llz ci phase-mark apl-core-install
          llz ci bootstrap-cluster \
            --env "${REGION}" \
            --apps-repo-revision "${APPS_REPO_REVISION}" \
            --instance-repo "${{ inputs.instance_repo }}" \
            --template-ref "${{ inputs.template-ref }}"
          llz ci phase-mark foundation-ready

      # The full-pool assert deferred from the split gate above: --tfvars reads
      # node_count. Instant on a healthy run; a wedged pool fails HERE.
      - name: Assert the full node pool joined
        if: inputs.bootstrap_cluster
        run: |
          llz ci wait-cluster-ready --timeout 300 --interval 10 \
            --tfvars "terraform-iac-bootstrap/cluster/${REGION}.tfvars" || {
            echo "The node pool never reached the expected Ready count (Linode capacity/quota for the node type, or a node_pool_label ≥ 16 chars wedging node join) — apl-core is installed but the cluster is under-capacity."
            exit 1
          }

      # ── Serving TLS for OpenBao and the OTel Collector: NO bootstrap seed ───────
      # Both certs are issued from first boot by stable self-signed cert-manager CAs
      # (openbao-ca, otel-bootstrap-ca). Do NOT re-add a hand-seeded cert here — it
      # races cert-manager and re-introduces a mid-bootstrap CA rotation. If a pod is
      # stuck ContainerCreating on its TLS Secret, fix the ClusterIssuer instead.

      # ── Seed the static auto-unseal key (must precede the pod wait) ────────────
      # The chart mounts openbao-unseal-key at /openbao/seal/unseal.key; without it
      # the pods sit in ContainerCreating (a missing Secret volume waits, it does not
      # crash-loop), so this MUST run before the pod wait below. Idempotent and
      # never-rotating; a first bootstrap generates the key and persists it to
      # infra-<region> for DR. Losing this key loses the data — recovery keys
      # authorize generate-root but cannot decrypt the root key.
      - name: Seed OpenBao static auto-unseal key
        env:
          OPENBAO_SEAL_KEY: ${{ secrets.OPENBAO_SEAL_KEY }}
        run: llz ci bao-seed-seal-key --region "$REGION"

      # ── Wait and status check ───────────────────────────────────────────────────
      # Fail-fast gate: if the platform-bootstrap sync is stuck waves earlier the
      # Application never appears, and the 600s pod wait below would burn its whole
      # budget with nothing to say. This fails in ≤4 min WITH the parent sync's
      # operationState message instead.
      #
      # The Argo Application is `llz-openbao`. NOT `platform-openbao` — that is only
      # the Helm release / StatefulSet identity (pods platform-openbao-0..2). Polling
      # the release name here silently never matches. See the sidecar doc.
      - name: Assert the OpenBao Application reached the cluster
        run: llz ci assert-argo-app --app llz-openbao --within 240

      # Polls pod PHASE, not readiness: a fresh OpenBao is uninitialized, therefore
      # sealed, therefore not-Ready, so `rollout status` would time out on every
      # first bootstrap. The init step below only needs the pods Running to exec in.
      # 600s covers the serial Linode Volume creates on a cold start; 300s flaked.
      - name: Wait for OpenBao pods to be running
        run: |
          llz ci wait-pods --namespace llz-openbao --timeout 600 \
            platform-openbao-0 platform-openbao-1 platform-openbao-2

      # ── Seal/token lifecycle — one command (CONVERGENCE CONTRACT) ──────────────
      # Detect → choose-a-path → re-verify, all inside the verb: init, wait-to-
      # self-unseal, or validate/regen the root token via the recovery quorum.
      # Writes available=<bool> to $GITHUB_OUTPUT (the gate every step below checks)
      # and re-exports the effective OPENBAO_ROOT_TOKEN to $GITHUB_ENV. The recovery
      # keys are empty on a first bootstrap — init mints and persists them.
      - name: Ensure OpenBao initialized + unsealed + root token
        id: ensure
        env:
          OPENBAO_ROOT_TOKEN: ${{ secrets.OPENBAO_ROOT_TOKEN }}
          RECOVERY_K1: ${{ secrets.OPENBAO_RECOVERY_KEY_1 }}
          RECOVERY_K2: ${{ secrets.OPENBAO_RECOVERY_KEY_2 }}
          RECOVERY_K3: ${{ secrets.OPENBAO_RECOVERY_KEY_3 }}
        run: llz ci bao-ensure-ready --region "$REGION"

      - name: Pre-flight — verify GitHub secrets-write token for configuration
        if: steps.ensure.outputs.available == 'true'
        env:
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
        run: |
          llz ci require-secret OPENBAO_SECRETS_WRITE_TOKEN \
            --hint "required for OpenBao configuration runs; writes Harbor and pull-robot credentials back to GitHub Actions secrets."

      # HARBOR_URL is the registry hostname images push/pull from (stored in OpenBao
      # as registry_host) — NOT how this job reaches Harbor's API. Not an
      # operator-required input: it defaults to harbor.<cluster_domain> from the
      # tfvars, and vars.HARBOR_URL overrides. Fails only if neither is available.
      - name: Pre-flight — resolve Harbor URL for configuration
        if: steps.ensure.outputs.available == 'true'
        run: llz ci resolve-harbor-url --region "$REGION"

      # ── Configure: mounts, auth, policies, roles ───────────────────────────────
      # All enable commands are idempotent (|| true). Write commands are upserts.
      - name: Configure OpenBao
        if: steps.ensure.outputs.available == 'true'
        run: llz ci bao-configure --region "$REGION"

      # ── Seed: generic OpenBao KV bootstrap paths (data-driven) ─────────────────
      # One step runs every generic seed from the bootstrapSeeds() table in
      # tools/cmd/llz/ci_bao_seed_all.go — add new seeds THERE, not as steps here.
      # A missing source defers per its table mode; a kv-put failure aborts the
      # rest. HA_ROLE drives the github-dispatch-token standby skip;
      # OPENBAO_ROOT_TOKEN comes from $GITHUB_ENV (the ensure step).
      - name: Seed OpenBao KV bootstrap paths
        if: steps.ensure.outputs.available == 'true'
        env:
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci bao-seed-all --region "$REGION"

      # ── Mint + seed: object-storage keys (Loki + Harbor registry) ──────────────
      # Mints the region's scoped keys via the Linode API and seeds
      # secret/loki/object-store + secret/harbor/registry-s3 directly — the
      # credentials never transit GitHub. rotated_at-stamped so the in-cluster
      # linodeCredRotator adopts them. Idempotent: already-seeded paths are skipped,
      # so a re-bootstrap never clobbers a rotator-minted key. obj_cluster comes
      # from the object-storage tfvars — it is NOT derivable from the env name.
      - name: Mint + seed object-storage keys
        if: steps.ensure.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci mint-bootstrap-objkeys --region "$REGION"

      # ── Mint + seed: the narrow in-cluster Linode PAT ───────────────────────────
      # Mints the NARROW in-cluster PAT (label llz-incluster-<region>) using the
      # broad PAT and seeds secret/linode/api-token. Every in-cluster Linode consumer
      # reads this one rotating token; the broad PAT is CI/Terraform-only and must
      # never enter the cluster. Rotated monthly by llz-secret-rotation.yml.
      # Idempotent — an already-seeded path is skipped and never clobbered.
      - name: Mint + seed the in-cluster Linode PAT
        if: steps.ensure.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci mint-bootstrap-pat --region "$REGION"

      # ── Broad-PAT rotator seed (ONLY when the broadPatRotator component is enabled) ─
      # Seeds secret/linode/broad-pat so the in-cluster rotator can mint its successor.
      # Self-gated on the rendered carved App file, so ONLY the one deployment that
      # enables the component ever holds the account-wide broad PAT — every other
      # instance renders no such file and skips. --skip-if-present keeps re-runs from
      # clobbering a value the rotator has since rotated.
      - name: Seed broad-PAT rotator token (when enabled)
        if: steps.ensure.outputs.available == 'true'
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci seed-broad-pat --region "$REGION"

      # ── Standby: replicate the active's Harbor robot credentials ───────────────
      # A standby has no in-cluster Harbor, so it seeds secret/harbor/{robot,
      # pull-robot} from the repo-level HARBOR_* secrets the active's provisioner
      # published. Not-published-yet is a summary note + clean exit (re-run later).
      # Must stay BEFORE the nudge so the force-sync picks the fresh seeds up.
      - name: Seed standby Harbor robot credentials (standby only)
        if: steps.ensure.outputs.available == 'true' && env.HA_ROLE == 'standby'
        env:
          HARBOR_URL:           ${{ vars.HARBOR_URL }}
          EXISTING_ROBOT:       ${{ secrets.HARBOR_ROBOT_NAME }}
          EXISTING_SECRET:      ${{ secrets.HARBOR_PASSWORD }}
          EXISTING_PULL_ROBOT:  ${{ secrets.HARBOR_PULL_ROBOT_NAME }}
          EXISTING_PULL_SECRET: ${{ secrets.HARBOR_PULL_PASSWORD }}
        run: llz ci seed-standby-harbor-robots

      # ── Nudge Argo CD to converge the secrets pipeline now ─────────────────────
      # The openbao ClusterSecretStore could not go Ready until the seeds above
      # landed. nudge-argo force-syncs the owning apps (Argo does NOT auto-retry a
      # sync that terminally failed on the same revision), then bumps a revalidation
      # annotation on the store and waits for Ready — the converge precondition only
      # CI can assert, because only CI knows seeding just finished. Never fails.
      - name: Nudge Argo CD to converge secrets (post-seed)
        if: steps.ensure.outputs.available == 'true'
        continue-on-error: true
        run: llz ci nudge-argo

      # ── Gate: Harbor registry rollout (post-S3-seed) ───────────────────────────
      # harbor-registry sits in CreateContainerConfigError until the harbor-registry-s3
      # Secret exists, which needs the seed above PLUS the es-store-recovery sync —
      # hence checked HERE, not in the earlier Harbor readiness gate. The verb
      # self-reports non-fatally (::warning:: + exit 0) rather than failing; converge
      # below is the hard check, which is why there's no continue-on-error.
      - name: Wait for Harbor registry rollout
        if: steps.ensure.outputs.available == 'true'
        run: |
          if ! kubectl -n harbor get svc harbor-core >/dev/null 2>&1; then
            echo "harbor-core absent — Harbor not deployed here; skipping registry wait." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          llz ci wait-harbor --registry-only

      # ── Extract the standby CA cert for cross-cluster rotation ─────────────────
      # Passes the standby's OpenBao TLS CA out as a job output so provision-peer-ca
      # can establish cross-cluster trust. Skipped for standalone/active (no peer).
      #
      # The CA is deliberately NOT ::add-mask::'d: it is public material (cert, not
      # key), and the runner EMPTIES masked values in JOB outputs — masking it would
      # silently provision an empty ca.crt downstream.
      - name: Extract standby CA cert
        id: secondary_ca
        if: env.HA_ROLE == 'standby'
        # Non-fatal: a standby whose openbao-tls isn't up yet just skips peer-CA
        # provisioning (ca_available=false) rather than failing the bootstrap.
        run: llz ci extract-openbao-ca

      # ── Audit: PVCs that escaped the Kyverno encryption mutation ──────────────
      # The Kyverno policy that rewrites linode-block-storage → block-storage-retain
      # has a 30-90s webhook readiness lag after CRD registration, and races the
      # apl-core PVCs. Anything admitted in that window stays unencrypted forever —
      # Kyverno does NOT background-migrate existing resources. This lists the
      # stragglers as ::warning:: so the operator can delete+recreate them. Does NOT
      # fail the workflow: the cluster works, it is just less secure than intended.
      - name: Audit PVCs against encrypted-Retain StorageClass
        if: steps.ensure.outputs.available == 'true' && env.HA_ROLE != 'standby'
        run: llz ci audit-pvc-storageclass

      # ── Revoke root token ────────────────────────────────────────────────────────
      # Revokes on success AND failure — fail-closed for credential hygiene. The
      # preserve_root_on_failure debug input suppresses it on FAILURE only, so an
      # operator iterating on a broken bootstrap need not burn a quorum-regenerate
      # per attempt. Success always revokes regardless of the flag.
      - name: Revoke root token
        if: |
          always() && (success() || inputs.preserve_root_on_failure != true)
        run: |
          if [ -z "${OPENBAO_ROOT_TOKEN:-}" ]; then
            exit 0
          fi
          llz openbao exec -- token revoke -self \
          && echo "Root token revoked." \
          || echo "::warning::Root token revocation failed — delete OPENBAO_ROOT_TOKEN from the infra-${REGION} environment secrets manually to prevent credential reuse"

      # ── Final convergence gate (formerly the separate `converge` job) ──────────
      # `llz ci converge` is what makes "the workflow passed" mean "the cluster
      # works" (docs/architecture/convergence-contract.md). Note the consequence of
      # it living in THIS job: a converge failure fails bootstrap, so the standby
      # provision-peer-ca job below is skipped rather than run. Intended.

      # PREFLIGHT — clear the verify-llz-image-signature race before the gate. On a
      # freshly built sha the cosign signature can lag the cluster's first admission
      # attempt, failing the platform-bootstrap sync (which Argo will not auto-retry
      # at the same revision). Best-effort probe: it only warns, since the argo-nudge
      # reconciler lane does the re-syncing and converge below is the verdict.
      # Deliberately NOT gated on `available`, unlike the seed steps: an OpenBao that
      # never came up must surface as a convergence FAILURE, not a skipped gate.
      - name: Preflight — confirm the cluster admits the llz CronJob
        run: |
          set -uo pipefail
          # The rendered CronJob manifests that run the in-cluster llz image — the
          # exact workloads Kyverno's autogen-cronjob-verify-llz-keyless rule gates.
          FILES="$(grep -rlE 'ghcr\.io/[A-Za-z0-9._-]+/llz:[A-Za-z0-9._-]+' . \
            --include='*.yaml' --include='*.yml' 2>/dev/null \
            | xargs -r grep -lE '^kind:[[:space:]]*CronJob' 2>/dev/null | sort -u || true)"
          if [ -z "${FILES}" ]; then
            echo "no in-cluster llz CronJob in the instance manifests — nothing to gate; skipping"
            exit 0
          fi
          for FILE in ${FILES}; do
            IMAGE="$(grep -oE 'ghcr\.io/[A-Za-z0-9._-]+/llz:[A-Za-z0-9._-]+' "${FILE}" | head -n1)"
            echo "== preflight ${IMAGE} (${FILE}) =="
            ok=0
            # 8 attempts x 15s (2m). Do NOT cut these retries because "nothing acts
            # on the result" — on a cold bootstrap they are riding out the CronJob's
            # NAMESPACE being created, not a Sigstore lag. 3 attempts reliably
            # reports a false alarm; 2m covers it without the old 5m tail.
            for i in $(seq 1 8); do
              # Kyverno admits the real CronJob — server dry-run runs the autogen-cronjob
              # verifyImages rule (and every other admission policy) without persisting.
              if kubectl apply --dry-run=server -f "${FILE}" >/dev/null 2>/tmp/preflight-admit.err; then
                echo "  Kyverno admits the CronJob (attempt ${i})"; ok=1; break
              fi
              [ "${i}" = 8 ] || { echo "  not admissible yet (attempt ${i}/8) — retrying in 15s"; sleep 15; }
            done
            if [ "${ok}" != 1 ]; then
              echo "::warning::${IMAGE} (${FILE}): Kyverno CronJob dry-run still failing after 8 attempts — $(tr '\n' ' ' </tmp/preflight-admit.err 2>/dev/null | tail -c 300). Not fatal: the argo-nudge lane keeps re-triggering the sync, and converge below is the verdict."
            fi
          done
          # No re-sync nudge here by design: the in-cluster argo-nudge lane
          # re-triggers phase=Failed apps continuously, so a CI one-shot adds
          # nothing. This step is purely the probe; converge below is the verdict.

      # ── Event-pace the harbor tail instead of waiting out the */5 cron ─────────
      # cert-automation's rollout chains on the harbor-robot-provisioner CronJob
      # seeding secret/harbor/robot → ESO sync → rollout, so left to the schedule it
      # is the dominant always-pay tail on the converge budget. Force one tick now.
      # Best-effort (the verb always exits 0); the cron remains the safety net.
      # Skipped on standby (no in-cluster Harbor).
      - name: Kick harbor-robot-provisioner (skip the */5 first-tick wait)
        if: env.HA_ROLE != 'standby'
        continue-on-error: true
        run: llz ci kick-harbor-provisioner

      # --budget 1200 (20m) is NOT "anything longer is a real stall": the worst-case
      # cert-automation tail legitimately runs ~10-15m past the primary converge, and
      # a 10m ceiling flaked on it. 20m absorbs that and still catches a genuine
      # stall well inside the 45m job timeout.
      - name: Wait for cluster to converge
        run: |
          llz ci phase-mark converge
          llz ci converge --budget 1200

      # ── E2E assert suite — independent gates in PARALLEL lanes ─────────────────
      # Release-e2e only (assert_loki=true); normal instance bootstraps skip it.
      # Independent read-mostly checks fanned out as background lanes; the step fails
      # if ANY GATING lane fails. Per-lane rationale is in the sidecar doc. Two
      # constraints before editing: scrape+reconciler is ONE ordered lane on purpose
      # (assert-reconciler reads gauges the scrape assert just proved fresh), and the
      # lanes are collision-free only because the mutating ones use disjoint
      # namespaces and each Prometheus lane port-forwards on local port :0.
      - name: (e2e) assert suite — 6 gates + 2 diagnostics, in parallel lanes
        if: ${{ inputs.assert_loki }}
        run: |
          set -uo pipefail
          dir="$(mktemp -d)"
          lane() { # <name> <cmd…> — run in background, capture log + exit code
            local name="$1"; shift
            { "$@" >"${dir}/${name}.log" 2>&1; echo $? >"${dir}/${name}.rc"; } &
          }
          lane loki              llz ci assert-loki
          lane scrape-reconciler bash -ec 'llz ci assert-scrape-targets && llz ci assert-reconciler'
          lane health-workflow   llz ci assert-health-workflow --region "$REGION"
          lane broad-pat         llz ci assert-broad-pat-rotation --region "$REGION"
          lane wave-vap          llz ci assert-wave-health-vap
          lane instance-custom   llz ci assert-instance-custom
          # Report-only lanes (|| true): diagnostics, not gates. They join the fan-out
          # because they are read-only and were costing serial time after it.
          lane metric-surface    bash -c 'llz ci prom-metrics --match "^(loki_|cortex_|otelcol_|harbor_)" || true'
          lane alert-eval        bash -c 'llz ci alert-eval || true'
          wait
          fail=0
          for n in loki scrape-reconciler health-workflow broad-pat wave-vap instance-custom metric-surface alert-eval; do
            rc="$(cat "${dir}/${n}.rc" 2>/dev/null || echo 1)"
            echo "::group::assert ${n} (rc=${rc})"
            cat "${dir}/${n}.log" 2>/dev/null || true
            echo "::endgroup::"
            if [ "${rc}" != 0 ]; then
              echo "::error::e2e assert '${n}' failed (rc=${rc}) — see its group above"
              fail=1
            fi
          done
          # alert-eval's FIRING/ARMED/DEAD?/BROKEN report is the deliverable.
          {
            echo '### alert-eval — live rule evaluation'
            echo '```'
            cat "${dir}/alert-eval.log" 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${fail}"

      # Snapshot the loki-gateway resolver + nginx logs WHILE the cluster is still
      # up — before the ACL revoke below cuts apiserver access. Every command is
      # `|| true` so it never alters the outcome.
      - name: Capture loki-gateway diagnostics (on convergence failure)
        if: failure()
        run: 'echo "== loki-gateway nginx.conf resolver =="; kubectl -n monitoring get cm loki-gateway -o "jsonpath={.data.nginx\.conf}" 2>/dev/null | grep -i resolver || true; for p in $(kubectl -n monitoring get pods -o name 2>/dev/null | grep loki-gateway); do echo "== $p =="; kubectl -n monitoring logs "$p" -c nginx --tail=50 2>/dev/null || true; kubectl -n monitoring logs "$p" -c nginx --tail=50 --previous 2>/dev/null || true; kubectl -n monitoring describe "$p" 2>/dev/null | tail -30 || true; done'

      # Snapshot Argo Application states + the platform-app-ca chain before teardown.
      # `|| cancelled()` so a cancelled run still captures. This is the ONLY Argo
      # dump in the job — it covers bootstrap-phase failures too, so don't add a
      # second one earlier.
      - name: Diagnose convergence failure (Argo apps + cert-manager CA chain)
        if: failure() || cancelled()
        # Bound the step even though the verb gates on apiserver reachability, so a
        # hung apiserver can't eat the job budget.
        timeout-minutes: 10
        run: llz ci diagnose-argocd || true

      # ── Job tail: timing, ACL revoke, then fail-on-errors ─────────────────────
      # Order matters. Timing runs while cluster access still exists; the ACL revoke
      # passes the kubeconfig so the runner-lease is released via kubectl BEFORE the
      # Linode API call cuts apiserver access; the BOOTSTRAP_ERRORS check is last so
      # cleanup always happens before the job goes red.
      - name: Report bootstrap timing
        if: always()
        continue-on-error: true
        run: llz ci collect-timing --dir "$RUNNER_TEMP/timing" --title "bootstrap (cluster + openbao) timeline" --image-pulls --apl-operator

      - name: Upload bootstrap timing artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: timing-bootstrap-openbao-${{ env.REGION }}
          path: ${{ runner.temp }}/timing/
          if-no-files-found: ignore
          retention-days: 14

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ env.REGION }}
          kubeconfig:   $HOME/.kube/config

      - name: Fail on bootstrap errors
        if: always()
        run: |
          if [ "${BOOTSTRAP_ERRORS:-}" = "true" ]; then
            echo "::error::Bootstrap completed with errors — one or more required secrets are missing. See annotations above."
            exit 1
          fi

  # ── Harbor provisioning — MOVED IN-CLUSTER ──────────────────────────────────
  # There is no `harbor` job any more: the active/standalone path is the in-cluster
  # harbor-robot-provisioner CronJob. Robot rotation is now "delete the robot in the
  # Harbor UI" and the next tick recreates it. The STANDBY half is the "Seed standby
  # Harbor robot credentials" step in the bootstrap job above.

  # ── Provision the standby CA cert in its active peer's cluster ───────────────
  # Runs only after a standby bootstrap that successfully extracted the CA cert.
  # Creates/updates openbao-peer-tls in the active peer's openbao namespace so
  # cross-peer clients can verify TLS without VAULT_SKIP_VERIFY=true. The peer is
  # resolved from the cluster tfvars.
  provision-peer-ca:
    name: Provision standby CA in active peer cluster
    if: >
      needs.resolve.outputs.role == 'standby' &&
      needs.bootstrap.outputs.ca_available == 'true'
    needs: [resolve, bootstrap]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ needs.resolve.outputs.peer }}
    timeout-minutes: 15

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Targets the PEER's region, not this deployment's. Revoked at job end.
      - name: Cluster access (peer kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          region:                ${{ needs.resolve.outputs.peer }}
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}

      - name: Provision openbao-peer-tls Secret in active peer cluster
        env:
          CA_B64: ${{ needs.bootstrap.outputs.ca_b64 }}
        run: llz ci provision-peer-ca

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner (peer)
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ needs.resolve.outputs.peer }}

  # ── Recovery: fetch the standby's CA cert ──────────────────────────────────
  # Dispatch with reprovision_ca_only: true and region = the standby deployment to
  # recover from a failed provision-peer-ca WITHOUT re-running the whole bootstrap.
  # No-op unless the deployment's role is standby.
  fetch-standby-ca:
    name: Fetch standby CA (recovery)
    if: inputs.reprovision_ca_only == true && needs.resolve.outputs.role == 'standby'
    needs: [resolve]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ inputs.region }}
    timeout-minutes: 10
    outputs:
      ca_available: ${{ steps.extract.outputs.ca_available }}
      ca_b64:       ${{ steps.extract.outputs.ca_b64 }}

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Targets the standby (self). Revoked at job end.
      - name: Cluster access (standby kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          region:                ${{ inputs.region }}
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}

      - name: Extract standby CA cert
        id: extract
        # --required: unlike the bootstrap job's twin, an absent openbao-tls is a
        # hard error here — this job exists solely to (re)provision the peer CA.
        run: llz ci extract-openbao-ca --required

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner (standby)
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ inputs.region }}

  # ── Recovery: provision the standby CA in its active peer's cluster ────────
  # Depends on fetch-standby-ca above; runs in the active peer's environment.
  reprovision-peer-ca:
    name: Re-provision standby CA in active peer cluster
    if: >
      inputs.reprovision_ca_only == true &&
      needs.fetch-standby-ca.outputs.ca_available == 'true'
    needs: [resolve, fetch-standby-ca]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ needs.resolve.outputs.peer }}
    timeout-minutes: 10

    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Targets the PEER's region, not this deployment's. Revoked at job end.
      - name: Cluster access (peer kubeconfig + runner ACL)
        uses: ./.github/actions/cluster-access
        with:
          region:                ${{ needs.resolve.outputs.peer }}
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}

      - name: Provision openbao-peer-tls Secret in active peer cluster
        env:
          CA_B64: ${{ needs.fetch-standby-ca.outputs.ca_b64 }}
        run: llz ci provision-peer-ca

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"

      - name: Revoke control-plane ACL for this runner (peer)
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ needs.resolve.outputs.peer }}
