# Reusable (`workflow_call`) Terraform infra pipeline: plan / apply / destroy
# across cluster, vpc, object-storage + the OpenBao bootstrap + converge gate.
# VENDORED into every instance by copier; the thin caller (terraform.yml) invokes
# it locally with `secrets: inherit`. Every job runs in vars.TF_IMAGE and uses
# this instance's OWN ./.github/actions/ composites — no cross-repo fetch.
#
# >> Maintainer rationale, incident history and design notes for this file live
# >> in the TEMPLATE repo at docs/workflows/llz-terraform.md. Edit there.
#
# TRAP: github.event_name / github.ref / github.event.pull_request.* ARE inherited
# across the workflow_call boundary; the dispatch SELECTORS (action / module /
# region / confirm_destroy) are NOT — the caller must forward them as `with:`
# inputs, and the jobs below gate on the `inputs` context.
on:
  workflow_call:
    inputs:
      instance_repo:
        description: "This instance's GitHub repo (<owner>/<name>) — used in operator-facing messages + forwarded to llz-bootstrap-openbao."
        required: true
        type: string
      template-ref:
        description: 'The template release this instance is rendered from — `llz upgrade` re-pins it. Consumed by the assert-image-fresh preflight (cross-checked against the llz baked into vars.TF_IMAGE — no template-repo fetch) and forwarded to llz-bootstrap-openbao.'
        required: false
        type: string
        default: main
      # The plan/apply/destroy selectors — see the TRAP note at the top of the
      # file. Empty strings on push/PR.
      action:
        description: 'Terraform action: plan | apply | destroy (empty on push/PR).'
        required: false
        type: string
        default: ''
      module:
        description: 'Target module: cluster | object-storage | all.'
        required: false
        type: string
        default: ''
      region:
        description: 'Deployment (primary | secondary | staging | lab | e2e) — also the infra-<region> Environment + state-key path.'
        required: false
        type: string
        default: ''
      confirm_destroy:
        description: 'Destroy confirmation token: destroy:<deployment>:<module>.'
        required: false
        type: string
        default: ''
      assert_loki:
        description: 'Forwarded to bootstrap-openbao: after converge, assert Loki is S3-backed (`llz ci assert-loki`). Default false; the release-e2e gate sets it true.'
        required: false
        type: boolean
        default: false
    secrets:
      # All `required: false` on purpose: these are environment-scoped secrets,
      # which cannot satisfy a workflow_call `secrets` contract at call time.
      # Presence is enforced at runtime by `llz ci require-secret`.
      TF_STATE_ACCESS_KEY:
        required: false
      TF_STATE_SECRET_KEY:
        required: false
      LINODE_API_TOKEN:
        required: false
      LINODE_DNS_TOKEN:
        required: false
      APL_VALUES_REPO_TOKEN:
        required: false
      GHCR_READ_TOKEN:
        required: false
      APPS_REPO_REVISION:
        required: false
      OPENBAO_ADDRESS:
        required: false
      OPENBAO_ROOT_TOKEN:
        required: false
      OPENBAO_SECRETS_WRITE_TOKEN:
        required: false

name: llz-terraform (reusable)

permissions:
  contents: read

# Never cancel in-flight infra changes — a partial apply is worse than a queued one.
concurrency:
  group: terraform-infra-${{ inputs.region || 'pr' }}
  cancel-in-progress: false

env:
  # TF_IMAGE, KUBE_IMAGE must be set as GitHub Actions repository variables.
  # No TF_VERSION here on purpose — terraform comes from the image.
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
  TF_IN_AUTOMATION: 'true'

defaults:
  run:
    shell: bash

jobs:

  # ── Push-to-main notice (informational) ─────────────────────────────────────
  # A push to main neither plans nor applies, so every OTHER job in the run is
  # correctly skipped. This job makes that no-op explicit.
  push-noop-notice:
    name: Push to main — no plan/apply (informational)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Explain the no-op
        run: |
          echo "::notice title=No plan/apply on push::Push to main neither plans nor applies. Plans run on pull requests; applies run on workflow_dispatch, which 'llz build <env> --yes' (or 'llz up <env> --yes') fires. The other jobs in this run are skipped by design, not failed."
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ### Terraform — push to `main` (informational)

          A push to `main` **does not plan or apply**, so every other job in this run is *skipped* — by design, not a failure.

          | Goal | Run |
          |---|---|
          | **Apply** a deployment | `llz build <env> --yes` (or `llz up <env> --yes`) |
          | **Preview** a change | open a pull request → `terraform plan` runs per deployment |

          See `docs/quickstart.md` §4.
          SUMMARY

  # ── Discover deployments (the PR-plan matrix source of truth) ────────────────
  # Same reusable workflow that feeds the rotation + scheduled-check matrices, so
  # the PR plan covers exactly the deployments those do.
  discover:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/llz-discover-deployments.yml

  # ── Plan on PRs ─────────────────────────────────────────────────────────────
  # Posts a plan summary; never applies.
  # SECURITY: this job consumes production secrets, so the head-repo check below
  # restricts it to internal PRs — fork PRs must not reach them.
  plan-cluster-pr:
    name: Plan Cluster (PR)
    needs: discover
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      matrix:
        region: ${{ fromJSON(needs.discover.outputs.deployments) }}
    env:
      REGION: ${{ matrix.region }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No render step needed: the per-env tfvars are gitignored artifacts that
      # the terraform-init composite regenerates before init.
      - name: Terraform init — cluster
        uses: ./.github/actions/terraform-init
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      - name: Terraform validate — cluster
        working-directory: terraform-iac-bootstrap/cluster
        run: terraform validate

      - name: Import VPC and subnet if not in state
        working-directory: terraform-iac-bootstrap/cluster
        env:
          LINODE_TOKEN:          ${{ secrets.LINODE_API_TOKEN }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
          REGION:                ${{ matrix.region }}
        run: llz ci tf-import --region "$REGION"
      - name: Terraform plan — cluster
        working-directory: terraform-iac-bootstrap/cluster
        env:
          LINODE_TOKEN:                    ${{ secrets.LINODE_API_TOKEN }}
          TF_VAR_github_token:             ${{ secrets.GITHUB_TOKEN }}
          TF_VAR_github_api_url:           ${{ github.api_url }}
          AWS_ACCESS_KEY_ID:               ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:           ${{ secrets.TF_STATE_SECRET_KEY }}
          REGION:                          ${{ matrix.region }}
        run: |
          TFVARS="${REGION}.tfvars"
          test -f "$TFVARS" || TFVARS="${REGION}.tfvars.example"
          llz ci tf-plan --out "plan-cluster-${REGION}.txt" --title "Cluster plan (${REGION})" \
            -- -var-file="$TFVARS" -out="tfplan-cluster-${REGION}.bin"

  # ── tflint ───────────────────────────────────────────────────────────────────
  # Local HCL only — no provider credentials or remote state needed.
  tf-lint:
    name: Terraform Lint
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: tflint
        run: make tf-lint

  # Checkov IaC security scan — local HCL, no credentials. Gates: `make checkov`
  # exits non-zero on a finding.
  checkov:
    name: Checkov IaC Security Scan
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Checkov
        run: make checkov

      # A SARIF-upload step was removed here — it never produced a file and read as
      # security coverage that did not exist. See the sidecar before re-adding.

  # ── Promotion-pipeline drift (PRs) ───────────────────────────────────────────
  # promote.yml is RENDERED from `promotion_rank` in cluster/<env>.tfvars; this
  # fails a PR that edits a rank without regenerating. Fix: `llz env pipeline`.
  # No-op for instances with <2 ranked deployments.
  promote-pipeline-drift:
    name: Promotion pipeline up to date
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout the instance (tfvars + promote.yml)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify promote.yml matches the promotion_rank ordering
        run: llz env pipeline --check

  # ── Shared VPC (spec.networks) — manual dispatch, environment-approved ───────
  # Normal applies come from release.yml; dispatch here is for infra emergencies.
  # A shared VPC is cross-deployment state (key vpc/<network>), so it is created
  # here, once, before the cluster that attaches to it. Dedicated-VPC deployments
  # (the default) resolve no network and this job no-ops. Linode OBJ has no state
  # locking, hence the serializing concurrency group.
  apply-vpc:
    name: Apply Shared VPC
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.action == 'apply' || inputs.action == 'plan') &&
      (inputs.module == 'cluster' || inputs.module == 'all')
    concurrency:
      group: llz-shared-vpc-apply
      cancel-in-progress: false
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      REGION:                ${{ inputs.region }}
      ACTION:                ${{ inputs.action }}
      LINODE_TOKEN:          ${{ secrets.LINODE_API_TOKEN }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # ── Front-loaded preflights ────────────────────────────────────────────────
      # This is the first job apply-cluster depends on, so these cheap checks fail
      # BEFORE the ~15-min cluster apply. TF_IMAGE (baked llz) and template-ref are
      # pinned independently; skew shows up far downstream as "unknown flag".
      - name: Pre-flight — ci-terraform image matches template-ref
        run: llz ci assert-image-fresh --template-ref "${{ inputs.template-ref }}"

      # Validated here rather than in cluster-bootstrap (which runs AFTER the
      # 15-min cluster apply) so a missing token fails in seconds.
      - name: Pre-flight — verify infra-${{ env.REGION }} env secrets
        env:
          APL_VALUES_REPO_TOKEN:       ${{ secrets.APL_VALUES_REPO_TOKEN }}
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
        run: |
          set -u
          FAIL=0
          llz ci require-secret APL_VALUES_REPO_TOKEN \
            --hint "Fine-grained GitHub PAT (Contents: write) for github.com/${{ inputs.instance_repo }}.git — apl-core's otomi.git.password + the argocd repo Secrets render empty without it; apl-operator can't push and Argo can't clone." || FAIL=1
          llz ci require-secret OPENBAO_SECRETS_WRITE_TOKEN \
            --hint "Fine-grained PAT (github.com) scoped to this repo with Actions: write + Environments: write — used by bootstrap-openbao (GitHub-token seeds + recovery-key/root-token persistence) and the destroy-time GH-secret cleanup." || FAIL=1
          [ "$FAIL" -eq 0 ]

      # PRESENCE (above) is not VALIDITY, and neither is AUTHORIZATION. A token
      # that is set, live, and under-scoped passes the check above and still fails
      # the run — which is exactly what happened: an OPENBAO_SECRETS_WRITE_TOKEN
      # without Environments: write 403'd on the seal-key write six minutes after
      # the cluster came up, and a values-repo credential Argo CD could not fetch
      # with left every gitops-* Application ComparisonErrored ~40 minutes in.
      #
      # bootstrap-openbao runs the same probe, but it `needs: apply-cluster` — so
      # there it lands AFTER the ~15-min cluster apply, and its own comment about
      # failing "in seconds" was only ever true of a standalone dispatch. Probing
      # here, in the first job, is what makes that claim true for the pipeline.
      # It costs a few HTTP round-trips and is not gated on ACTION: a `plan` that
      # would apply with a dead credential should say so now.
      #
      # GH_REPO is what the authorization probes build their paths from (the
      # environment-secret public-key endpoint, the values-repo ref discovery);
      # without it they skip rather than fail, which would quietly return this
      # step to a validity-only check.
      - name: Pre-flight — probe credential validity + scope (fail fast on a dead or under-scoped token)
        env:
          GH_REPO:                     ${{ inputs.instance_repo }}
          LINODE_API_TOKEN:            ${{ secrets.LINODE_API_TOKEN }}
          LINODE_DNS_TOKEN:            ${{ secrets.LINODE_DNS_TOKEN }}
          APL_VALUES_REPO_TOKEN:       ${{ secrets.APL_VALUES_REPO_TOKEN }}
          OPENBAO_SECRETS_WRITE_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
          GHCR_READ_TOKEN:             ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME:               ${{ vars.GHCR_USERNAME }}
          TF_STATE_ACCESS_KEY:         ${{ secrets.TF_STATE_ACCESS_KEY }}
          TF_STATE_SECRET_KEY:         ${{ secrets.TF_STATE_SECRET_KEY }}
          TF_STATE_ENDPOINT:           ${{ vars.TF_STATE_ENDPOINT }}
          TF_STATE_BUCKET:             ${{ vars.TF_STATE_BUCKET }}
        run: llz ci validate-tokens

      # The template is apl-core-6.x-only: the v6 migration dropped the
      # `apl-sops-secrets` placeholder (5.x mounts it optional:false -> apl-operator
      # CreateContainerConfigError) and retired the self-managed ESO (5.x bundles
      # none -> no external-secrets at all). Both are silent until the cluster is up,
      # then surface ~2h in as CreateContainerConfigError pods and an exhausted
      # converge budget. `llz import init` still pins 5.0.0 as its migration target,
      # so an imported instance hits this by default — check the spec pin here,
      # before the ~15-min cluster apply.
      - name: Pre-flight — apl-core chart version is supported
        run: llz ci assert-apl-version --env "$REGION"

      # Resolved from the spec, so no rendered tfvars are needed here. Empty =>
      # dedicated VPC, created by the cluster apply itself — nothing to do.
      - name: Resolve shared VPC for this deployment
        id: net
        run: |
          NET=""
          if [ -f landingzone.yaml ]; then NET="$(llz env vpc "$REGION")"; fi
          echo "net=$NET" >> "$GITHUB_OUTPUT"
          if [ -n "$NET" ]; then
            echo "Deployment '$REGION' attaches to shared VPC '$NET'."
          else
            echo "Deployment '$REGION' uses a dedicated VPC — skipping the shared-VPC root."
          fi

      - name: Terraform init — shared VPC
        if: steps.net.outputs.net != ''
        uses: ./.github/actions/terraform-init
        with:
          module:                vpc
          state-key:             vpc/${{ steps.net.outputs.net }}/terraform.tfstate
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
      - name: Terraform plan — shared VPC
        if: steps.net.outputs.net != ''
        working-directory: terraform-iac-bootstrap/vpc
        run: terraform plan -var-file="${{ steps.net.outputs.net }}.tfvars"
      - name: Terraform apply — shared VPC
        if: steps.net.outputs.net != '' && env.ACTION == 'apply'
        working-directory: terraform-iac-bootstrap/vpc
        run: terraform apply -auto-approve -var-file="${{ steps.net.outputs.net }}.tfvars"

  apply-cluster:
    name: Apply Cluster
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.action == 'apply' || inputs.action == 'plan') &&
      (inputs.module == 'cluster' || inputs.module == 'all')
    needs: [apply-vpc]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      REGION:                          ${{ inputs.region }}
      ACTION:                          ${{ inputs.action }}
      # Phase-timeline log (docs/designs/e2e-instrumentation.md): captures the
      # precise LKE-E create wall-time.
      LLZ_PHASE_LOG:                   /tmp/llz-phases.jsonl
      LINODE_TOKEN:                    ${{ secrets.LINODE_API_TOKEN }}
      TF_VAR_github_token:             ${{ secrets.GITHUB_TOKEN }}
      TF_VAR_github_api_url:           ${{ github.api_url }}
      AWS_ACCESS_KEY_ID:               ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:           ${{ secrets.TF_STATE_SECRET_KEY }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Rendered EXPLICITLY here (unlike the PR plan job) because the preflight
      # below reads <region>.tfvars and runs BEFORE the terraform-init composite
      # that would otherwise render it.
      - name: Render tfvars from the LandingZone spec (spec-driven instances)
        run: |
          if [ -f landingzone.yaml ]; then
            llz render "$REGION" --tfvars-only
          fi

      # Catches account-quota exhaustion BEFORE the apply, rather than as a
      # 30-minute cluster-create hang. NodeBalancers/VPCs are counted
      # account-wide; pvc-* Volumes only in THIS region (--volume-region) because
      # a detached Volume carries no cluster id. See the sidecar doc.
      # Tune via repo vars PREFLIGHT_ORPHAN_THRESHOLD / PREFLIGHT_FAIL_ON_ORPHANS.
      - name: Pre-flight — Linode account capacity / orphan check
        env:
          FAIL_ON_ORPHANS:  ${{ vars.PREFLIGHT_FAIL_ON_ORPHANS || 'true' }}
          ORPHAN_THRESHOLD: ${{ vars.PREFLIGHT_ORPHAN_THRESHOLD || '5' }}
        run: llz ci preflight --fail-on-orphans "$FAIL_ON_ORPHANS" --orphan-threshold "$ORPHAN_THRESHOLD" --volume-region "$REGION"

      - name: Terraform init — cluster
        uses: ./.github/actions/terraform-init
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      - name: Import VPC and subnet if not in state
        working-directory: terraform-iac-bootstrap/cluster
        run: llz ci tf-import --region "$REGION"
      - name: Terraform plan — cluster
        working-directory: terraform-iac-bootstrap/cluster
        run: |
          llz ci tf-plan --out plan.txt --title "Cluster plan" \
            -- -var-file="${REGION}.tfvars" -out=tfplan.bin

      - name: Terraform apply — cluster
        if: env.ACTION == 'apply'
        working-directory: terraform-iac-bootstrap/cluster
        # Wrapped so a duplicate Cloud-Firewall-label create self-heals: the
        # wrapper imports the existing firewall by label and retries rather than
        # failing the provision on a [400] label collision.
        run: |
          llz ci phase-mark tf-apply-cluster
          llz ci tf-apply --plan tfplan.bin --var-file "${REGION}.tfvars"
          llz ci phase-mark tf-apply-done

      - name: Show cluster API endpoints
        if: env.ACTION == 'apply'
        working-directory: terraform-iac-bootstrap/cluster
        run: |
          echo "Cluster API endpoints:"
          llz ci tf-output api_endpoints --json

      # Best-effort instrumentation; never affects the apply outcome.
      - name: Report cluster-create timing
        if: always() && env.ACTION == 'apply'
        continue-on-error: true
        run: llz ci collect-timing --dir "$RUNNER_TEMP/timing" --title "apply-cluster (LKE-E create) timing"

      - name: Upload create timing artifact
        if: always() && env.ACTION == 'apply'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: timing-apply-cluster-${{ env.REGION }}
          path: ${{ runner.temp }}/timing/
          if-no-files-found: ignore
          retention-days: 14

  # ── Chain: bootstrap (cluster + OpenBao) after the cluster is up ─────────────
  # A single `module=all` apply walks buckets → cluster → this job. With
  # bootstrap_cluster: true, ONE job does the in-cluster bootstrap, the OpenBao
  # init/unseal/seed + ESO sync, and the final `llz ci converge` gate.
  # llz-bootstrap-openbao.yml is still dispatchable standalone for retries.
  bootstrap-openbao:
    name: Bootstrap OpenBao (${{ inputs.region }})
    # always() + explicit needs.*.result: apply-cluster must have SUCCEEDED,
    # apply-object-storage may be success OR skipped (a FAILED one still blocks).
    # apply ONLY, never plan — bootstrap_cluster consumes a LIVE cluster.
    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'apply' &&
      (inputs.module == 'cluster' || inputs.module == 'all') &&
      needs.apply-cluster.result == 'success' &&
      (needs.apply-object-storage.result == 'success' || needs.apply-object-storage.result == 'skipped')
    # apply-cluster => the LKE-E cluster exists; apply-object-storage => the S3
    # buckets exist before mint-bootstrap-objkeys mints scoped keys against them.
    needs: [apply-cluster, apply-object-storage]
    uses: ./.github/workflows/llz-bootstrap-openbao.yml
    with:
      region: ${{ inputs.region }}
      instance_repo: ${{ inputs.instance_repo }}
      template-ref: ${{ inputs.template-ref }}
      assert_loki: ${{ inputs.assert_loki }}
      bootstrap_cluster: true
    # Forwards repo + environment-scoped secrets; the callee declares the same
    # `environment:` so env-scoped secrets resolve at runtime.
    secrets: inherit

  # ── Destroy (manual dispatch — requires environment approval) ───────────────
  # Gated on action == 'destroy', wholly separate from the apply path so an apply
  # run cannot accidentally destroy. Order: pre-destroy-cluster (unwedge +
  # GH-secret cleanup, while the cluster is still reachable) → plan-destroy-cluster
  # (informational) → destroy-cluster. There is no cluster-bootstrap TF workspace
  # to destroy — those resources disappear with the LKE cluster.
  pre-destroy-cluster:
    name: Pre-DESTROY cleanup (unwedge + secrets)
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      (inputs.module == 'cluster' || inputs.module == 'all')
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      REGION:          ${{ inputs.region }}
      CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
    steps:
      # Checkout must precede the destroy-confirm gate: it supplies the
      # cluster/<region>.tfvars label source and the confirm token.
      - name: Checkout the instance
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate destroy confirmation
        run: llz ci assert-destroy-confirm "$REGION" "cluster" "$CONFIRM_DESTROY"

      # So destroy-unwedge below can resolve the cluster label.
      - name: Render tfvars from the spec
        run: llz render "${REGION}" --tfvars-only

      # The cleanups below need control-plane access. fail-on-missing false keeps
      # an already-gone cluster a clean no-op. Revoked at job end.
      - name: Open control-plane ACL for this runner
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:            open
          linode-token:    ${{ secrets.LINODE_API_TOKEN }}
          region:          ${{ env.REGION }}
          fail-on-missing: 'false'

      # Clears Argo/discovery/CNPG finalizer deadlocks while the cluster is still
      # reachable. Best-effort — the DESTROY Cluster job reaps in-cluster
      # resources regardless, so this must never block teardown.
      - name: Unwedge namespace finalizers before destroy
        continue-on-error: true
        working-directory: terraform-iac-bootstrap/cluster
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci destroy-unwedge --region "$REGION"

      # A destroyed cluster's stale secrets (revoked root token, unseal keys,
      # Harbor creds) would otherwise poison the next bootstrap. Best-effort
      # per-secret; an unset GH_TOKEN is a no-op.
      - name: Clear cluster-scoped OpenBao/Harbor env secrets
        env:
          GH_TOKEN: ${{ secrets.OPENBAO_SECRETS_WRITE_TOKEN }}
        run: llz ci clear-cluster-secrets --env "infra-${REGION}"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ env.REGION }}

  plan-destroy-cluster:
    name: Plan DESTROY Cluster
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      (inputs.module == 'cluster' || inputs.module == 'all')
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      REGION:                          ${{ inputs.region }}
      CONFIRM_DESTROY:                 ${{ inputs.confirm_destroy }}
      LINODE_TOKEN:                    ${{ secrets.LINODE_API_TOKEN }}
      TF_VAR_github_token:             ${{ secrets.GITHUB_TOKEN }}
      TF_VAR_github_api_url:           ${{ github.api_url }}
      AWS_ACCESS_KEY_ID:               ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY:           ${{ secrets.TF_STATE_SECRET_KEY }}
    steps:
      # Checkout must precede the destroy-confirm gate — it supplies the TF roots
      # and the confirm token.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate destroy confirmation
        run: llz ci assert-destroy-confirm "$REGION" "cluster" "$CONFIRM_DESTROY"

      - name: Terraform init — cluster
        uses: ./.github/actions/terraform-init
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      - name: Import VPC and subnet if not in state
        working-directory: terraform-iac-bootstrap/cluster
        run: llz ci tf-import --region "$REGION" --nonfatal

      - name: Terraform plan destroy — cluster
        working-directory: terraform-iac-bootstrap/cluster
        run: |
          llz ci tf-plan --out destroy-plan.txt --title "Destroy plan (review before approving destroy job)" \
            -- -destroy -var-file="${REGION}.tfvars"

  destroy-cluster:
    name: DESTROY Cluster
    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      (inputs.module == 'cluster' || inputs.module == 'all')
    # always() above: pre-destroy-cluster is best-effort and allowed to fail
    # (cluster unreachable) — the destroy must still proceed.
    needs: [plan-destroy-cluster, pre-destroy-cluster]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      REGION:                ${{ inputs.region }}
      CONFIRM_DESTROY:       ${{ inputs.confirm_destroy }}
      LINODE_TOKEN:          ${{ secrets.LINODE_API_TOKEN }}
      TF_VAR_github_token:   ${{ secrets.GITHUB_TOKEN }}
      TF_VAR_github_api_url: ${{ github.api_url }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate destroy confirmation
        id: confirm
        run: llz ci assert-destroy-confirm "$REGION" "cluster" "$CONFIRM_DESTROY"

      - name: Terraform init — cluster
        uses: ./.github/actions/terraform-init
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      - name: Import VPC and subnet if not in state
        working-directory: terraform-iac-bootstrap/cluster
        run: llz ci tf-import --region "$REGION" --nonfatal

      # MUST run before the destroy deletes these ids. The sweeps below scope to
      # THIS cluster, never the region — co-located deployments share a region and
      # the Volume tag, so a region-wide filter never converges and can delete a
      # live peer's resources.
      - name: Capture LKE cluster id + pvc Volume ids (for the sweeps)
        run: llz ci teardown-capture --region "$REGION"

      - name: Terraform destroy — cluster
        working-directory: terraform-iac-bootstrap/cluster
        run: |
          llz ci tf-destroy --var-file="${REGION}.tfvars"

      # Fallback for when Terraform couldn't reach or import the cluster: deletes
      # it by label, then the node firewall. The VPC is deliberately NOT deleted
      # here — see the dedicated step at the END of this job.
      - name: Force-delete remaining Linode resources via API
        # Gate shared by every sweep below: always() so it runs even if the
        # destroy failed mid-way, but only once the confirm PASSED — a failed
        # confirm tore nothing down, so there is nothing to sweep.
        if: always() && steps.confirm.outcome == 'success'
        run: llz --yes ci teardown-force-delete --region "$REGION"

      # ── Authoritative orphan-Volume sweep ──────────────────────────────────
      # block-storage-retain is reclaimPolicy: Retain, so CSI NEVER deletes its
      # Volumes — only this API sweep does. It must run AFTER the cluster delete,
      # where the pvc-* Volumes are finally detached.
      - name: Sweep orphaned Block Storage Volumes
        if: always() && steps.confirm.outcome == 'success'
        run: |
          set -eu
          # No tracked ids => the cluster was already gone, and any pvc-* Volumes
          # left in the region belong to a live co-located peer. Do nothing.
          if [ -z "${CLUSTER_PVC_VOLUME_IDS:-}" ]; then
            echo "no cluster pvc-* Volumes were tracked before destroy — nothing to sweep."
            exit 0
          fi
          # Detach is async as the LKE Linodes tear down, so --wait-detach polls
          # the TRACKED ids only. --require-empty FAILS the job if any survive:
          # a leaked Volume would otherwise sail past a green destroy and stall
          # the next apply's preflight on the account quota.
          llz --yes ci reap-volumes --volume-ids "$CLUSTER_PVC_VOLUME_IDS" --wait-detach 600 \
            --require-empty --attempts 4 --retry-delay 30

      # ── Authoritative orphan-NodeBalancer sweep ────────────────────────────
      # This destroy path deliberately does NOT gracefully delete LoadBalancer
      # Services first, so the CCM never issues its own NodeBalancer DELETE and
      # LKE cluster-delete has been seen to leak one (billing + a held IPv4).
      # Deletes any survivor carrying the cluster's CCM tag (lke<id>).
      - name: Sweep orphaned NodeBalancers
        if: always() && steps.confirm.outcome == 'success'
        run: |
          set -eu
          if [ -z "${LKE_CLUSTER_ID:-}" ]; then
            echo "::warning::LKE cluster id was not captured before destroy (cluster may have already been gone) — skipping the NodeBalancer sweep to avoid an unscoped delete. Finish manually once you know the id: LINODE_TOKEN=<token> llz --yes ci reap-nodebalancers --cluster-id <id>"
            exit 0
          fi
          # --require-empty FAILS the job if any NodeBalancer still carries this
          # cluster's CCM tag after the sweep.
          llz --yes ci reap-nodebalancers --cluster-id "$LKE_CLUSTER_ID" \
            --require-empty --attempts 4 --retry-delay 30

      # ── Delete the cluster VPC (LAST — after the NB + Volume sweeps) ────────
      # ORDER IS LOAD-BEARING: a VPC deletes only once nothing is parked in its
      # subnet, so NodeBalancers and node Linodes must be gone first or it 409s.
      # llz reads LKE_CLUSTER_ID from the env (exported by teardown-capture)
      # rather than taking a new flag, so a stale baked llz degrades instead of
      # dying on "unknown flag". Retries ride out the async-release window.
      - name: Delete cluster VPC
        if: always() && steps.confirm.outcome == 'success'
        run: llz --yes ci teardown-delete-vpc --region "$REGION" --require-deleted

      # ── Reap the deployment's minted Linode credentials (account-scoped) ────
      # These carry no cluster tag, so no sweep above touches them; left alone
      # they accrete toward the account's 100-key / 100-PAT caps. Exact-label
      # match on THIS env only — never the broad token the job runs under.
      - name: Reap this deployment's minted obj-keys + in-cluster PAT
        if: always() && steps.confirm.outcome == 'success'
        env:
          LINODE_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz --yes ci reap-objkeys --env "$REGION" || echo "::warning::reap-objkeys did not fully complete — check the account for leftover platform-*-${REGION} keys / llz-incluster-${REGION} PATs"

      # ── Final orphan gate (fail the destroy if anything is left behind) ─────
      # The sweeps above no-op when the cluster was ALREADY gone, so without this
      # the destroy goes GREEN while leaving orphans that stall the next apply.
      # Re-counts with the SAME census the apply preflight uses and FAILS if any
      # remain. Deletes nothing — clear survivors with `llz reap`.
      - name: Assert no orphaned resources remain
        if: always() && steps.confirm.outcome == 'success'
        env:
          ORPHAN_THRESHOLD: ${{ vars.PREFLIGHT_ORPHAN_THRESHOLD || '5' }}
        run: llz ci assert-no-orphans --threshold "$ORPHAN_THRESHOLD" --volume-region "$REGION" --attempts 5 --retry-delay 30

  # ── Apply / plan / destroy object-storage module ────────────────────────────
  # Creates the Loki + Harbor-registry S3 BUCKETS only. The scoped access keys
  # are NOT TF-managed — bootstrap-openbao's `llz ci mint-bootstrap-objkeys`
  # mints and seeds them; the in-cluster linodeCredRotator rotates them.
  apply-object-storage:
    name: Apply Object Storage (${{ inputs.region }})
    # Deliberately runs on module=cluster too: Loki and Harbor always need their
    # buckets, and a cluster-only rebuild that skipped this silently lost Loki
    # chunks and Harbor registry writes. Safe because the apply is idempotent and
    # lives in its OWN tf state — a cluster destroy never touches the buckets.
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.action == 'apply' || inputs.action == 'plan') &&
      (inputs.module == 'cluster' || inputs.module == 'object-storage' || inputs.module == 'all')
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      REGION:                ${{ inputs.region }}
      ACTION:                ${{ inputs.action }}
      LINODE_TOKEN:          ${{ secrets.LINODE_API_TOKEN }}
      AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
    steps:
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Terraform init — object-storage
        uses: ./.github/actions/terraform-init
        with:
          module: object-storage
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      - name: Terraform plan — object-storage
        working-directory: terraform-iac-bootstrap/object-storage
        run: |
          llz ci tf-plan --out plan.txt --title "Object Storage plan (${REGION})" --lines 40 \
            -- -var-file="${REGION}.tfvars" -out=tfplan.bin

      - name: Terraform apply — object-storage
        if: env.ACTION == 'apply'
        working-directory: terraform-iac-bootstrap/object-storage
        run: terraform apply -auto-approve tfplan.bin

      # No credential-stash step here by design — see the sidecar doc.
      - name: Bucket summary
        if: env.ACTION == 'apply'
        shell: bash
        working-directory: terraform-iac-bootstrap/object-storage
        run: |
          set -euo pipefail
          BUCKETS=$(llz ci tf-output bucket_names --json)
          HARBOR_BUCKET=$(llz ci tf-output harbor_registry_bucket)
          {
            echo "### Object Storage buckets provisioned"
            echo ""
            echo "**Loki buckets:**"
            echo '```json'
            printf '%s\n' "$BUCKETS"
            echo '```'
            echo ""
            echo "**Harbor registry bucket:** \`${HARBOR_BUCKET}\`"
            echo ""
            echo "**Next step:** run \`bootstrap-openbao.yml\` → \`${REGION}\` — its"
            echo "mint-bootstrap-objkeys step mints the scoped keys and seeds"
            echo "\`secret/loki/object-store\` + \`secret/harbor/registry-s3\` in OpenBao."
          } >> "$GITHUB_STEP_SUMMARY"

  plan-destroy-object-storage:
    name: Plan DESTROY Object Storage (${{ inputs.region }})
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      (inputs.module == 'object-storage' || inputs.module == 'all')
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      REGION:          ${{ inputs.region }}
      CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
    steps:
      # Checkout must precede the destroy-confirm gate — it supplies the TF roots
      # and the confirm token.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate destroy confirmation
        run: llz ci assert-destroy-confirm "$REGION" "object-storage" "$CONFIRM_DESTROY"

      - name: Terraform init — object-storage
        uses: ./.github/actions/terraform-init
        with:
          module: object-storage
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      - name: Terraform plan destroy — object-storage
        working-directory: terraform-iac-bootstrap/object-storage
        env:
          LINODE_TOKEN:          ${{ secrets.LINODE_API_TOKEN }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: |
          llz ci tf-plan --out destroy-plan.txt --title "Object Storage destroy plan (review before approving destroy job)" --lines 40 \
            -- -destroy -var-file="${REGION}.tfvars"

  destroy-object-storage:
    name: DESTROY Object Storage (${{ inputs.region }})
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      (inputs.module == 'object-storage' || inputs.module == 'all')
    needs: [plan-destroy-object-storage]
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    environment: infra-${{ inputs.region }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      REGION:          ${{ inputs.region }}
      CONFIRM_DESTROY: ${{ inputs.confirm_destroy }}
    steps:
      # Checkout must precede the destroy-confirm gate — it supplies the TF roots
      # and the confirm token.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate destroy confirmation
        run: llz ci assert-destroy-confirm "$REGION" "object-storage" "$CONFIRM_DESTROY"

      - name: Terraform init — object-storage
        uses: ./.github/actions/terraform-init
        with:
          module: object-storage
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}

      # The Linode provider has no force_destroy, so a non-empty bucket fails the
      # destroy with "bucket is not empty" — drain first. Uses s5cmd (static Go
      # binary) because TF_IMAGE ships neither awscli nor python+pip. Tolerant by
      # design: a failed drain only warns, and TF destroy then names the bucket.
      - name: Drain S3 buckets before destroy
        working-directory: terraform-iac-bootstrap/object-storage
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: |
          set -uo pipefail

          # Pinned version + sha256 verified BEFORE extract/execute — this binary
          # handles the loki/harbor access keys, so a swapped tarball must not run.
          # When bumping S5CMD_VER, refresh S5CMD_TAR_SHA256 with
          # `curl -fsSL <url> | sha256sum`.
          S5CMD=/tmp/s5cmd
          S5CMD_VER=2.2.2
          S5CMD_TAR_SHA256=a15f83d2a6dc091e43b2a120f29f8f6c86d146c381766c0197ec75d7985af2b6
          if [ ! -x "$S5CMD" ]; then
            echo "downloading s5cmd v${S5CMD_VER}..."
            # --retry rides out CDN blips; deliberately NOT --retry-all-errors,
            # so a real 404 still fails fast.
            curl -fsSL --retry 5 --retry-delay 5 --retry-connrefused \
              "https://github.com/peak/s5cmd/releases/download/v${S5CMD_VER}/s5cmd_${S5CMD_VER}_Linux-64bit.tar.gz" \
              -o /tmp/s5cmd.tar.gz
            echo "${S5CMD_TAR_SHA256}  /tmp/s5cmd.tar.gz" | sha256sum -c - || {
              echo "::error::s5cmd tarball sha256 mismatch — refusing to execute. Either the pinned hash is stale (bump after re-verifying upstream) or the artifact is tampered with."
              rm -f /tmp/s5cmd.tar.gz
              exit 1
            }
            tar -xzC /tmp -f /tmp/s5cmd.tar.gz s5cmd
            chmod 0755 "$S5CMD"
            rm -f /tmp/s5cmd.tar.gz
          fi
          "$S5CMD" version

          # Read ALL outputs as one JSON blob. NOT `terraform output -raw`: on
          # empty state that leaks TF's "Warning: No outputs found" text into the
          # captured value, which then corrupts bucket names and endpoint URLs.
          # `-json` returns a clean `{}` instead.
          OUTPUTS_JSON="$(terraform output -json 2>/dev/null || printf '{}')"

          read_output() {
            printf '%s' "$OUTPUTS_JSON" | jq -r --arg k "$1" '.[$k].value // empty'
          }

          ENDPOINT="$(read_output s3_endpoint)"
          if [ -z "$ENDPOINT" ]; then
            echo "::warning::no s3_endpoint in state — assuming module already destroyed; skipping drain"
            exit 0
          fi

          # Mask keys before they show up in any echo or s5cmd error trace.
          mask() { [ -n "$1" ] && echo "::add-mask::$1"; }

          drain_bucket() {
            local label="$1" ak="$2" sk="$3" bucket="$4"
            if [ -z "$ak" ] || [ -z "$sk" ] || [ -z "$bucket" ]; then
              echo "skip $label: key or bucket already destroyed in a prior run"
              return 0
            fi
            echo "draining s3://$bucket ($label)"
            # AWS_REGION must be non-empty for sigv4 signing even though Linode
            # OBJ ignores the value. `s3://bucket/*` is recursive in s5cmd.
            AWS_ACCESS_KEY_ID="$ak" AWS_SECRET_ACCESS_KEY="$sk" AWS_REGION=us-east-1 \
              "$S5CMD" --endpoint-url "$ENDPOINT" rm "s3://${bucket}/*" \
              || echo "::warning::drain of $bucket exited non-zero (may already be empty, or terraform destroy will surface the real failure)"
          }

          # Credentials: a TEMPORARY scoped key minted around this sweep (the
          # Loki/Harbor keys are not TF-managed, so there are no key outputs).
          # temp-objkey create writes TEMP_OBJKEY_* to $GITHUB_ENV for the
          # always() delete step; this shell must read them back OUT of that file
          # because env-file writes only apply to LATER steps.
          BUCKET_LIST=""
          for b in chunks ruler admin; do
            bucket="$(printf '%s' "$OUTPUTS_JSON" | jq -r --arg k "$b" '.bucket_names.value[$k] // empty')"
            [ -n "$bucket" ] && BUCKET_LIST="${BUCKET_LIST:+$BUCKET_LIST,}$bucket"
          done
          HARBOR_BUCKET="$(read_output harbor_registry_bucket)"
          [ -n "$HARBOR_BUCKET" ] && BUCKET_LIST="${BUCKET_LIST:+$BUCKET_LIST,}$HARBOR_BUCKET"
          if [ -z "$BUCKET_LIST" ]; then
            echo "no buckets left in state — nothing to drain."
            exit 0
          fi
          if ! llz ci temp-objkey create --region "$REGION" --endpoint "$ENDPOINT" --buckets "$BUCKET_LIST"; then
            echo "::warning::temp drain key mint failed — skipping drain; terraform destroy will surface a non-empty-bucket failure if one matters"
            exit 0
          fi
          TEMP_AK="$(grep '^TEMP_OBJKEY_ACCESS=' "$GITHUB_ENV" | tail -1 | cut -d= -f2-)"
          TEMP_SK="$(grep '^TEMP_OBJKEY_SECRET=' "$GITHUB_ENV" | tail -1 | cut -d= -f2-)"
          mask "$TEMP_SK"

          # Loki — 3 buckets; Harbor registry — 1. All under the temp key.
          for b in chunks ruler admin; do
            bucket="$(printf '%s' "$OUTPUTS_JSON" | jq -r --arg k "$b" '.bucket_names.value[$k] // empty')"
            drain_bucket "loki/$b" "$TEMP_AK" "$TEMP_SK" "$bucket"
          done
          drain_bucket "harbor-registry" "$TEMP_AK" "$TEMP_SK" "$HARBOR_BUCKET"

          echo "drain pass complete."

      # Revoke the temp drain key regardless of drain outcome. No-op if the
      # create was skipped.
      - name: Delete temporary drain key
        if: always()
        env:
          LINODE_API_TOKEN: ${{ secrets.LINODE_API_TOKEN }}
        run: llz ci temp-objkey delete

      - name: Terraform destroy — object-storage
        working-directory: terraform-iac-bootstrap/object-storage
        env:
          LINODE_TOKEN:          ${{ secrets.LINODE_API_TOKEN }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: |
          llz ci tf-destroy --var-file="${REGION}.tfvars"
