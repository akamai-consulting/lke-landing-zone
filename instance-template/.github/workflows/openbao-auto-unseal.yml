name: OpenBao Auto-Unseal

# Thin caller for the reusable LLZ workflow — the unseal-loop body, the
# fetch-kubeconfig action, and the `llz ci bao-status`/`bao-unseal`
# probes all live in the template and are sourced there (see docs/templatization-plan.md §"Keeping
# instances in sync"). This stub owns only the trigger surface: the 10-minute
# `schedule:` and the per-workflow concurrency. ADOPTERS: repoint the `uses:`
# org to your fork and pin @<ref> + template-ref to a template release tag
# (Renovate keeps both current — instance-template/renovate.json).
#
# MAIN-ONLY GUARANTEE: `schedule:` triggers only execute on the default branch
# per GH's own rules, so the automatic path is main-only by construction. The
# reusable workflow additionally carries an `if: github.ref == 'refs/heads/main'`
# job guard (github.ref is inherited from this caller) as defense-in-depth. The
# real control is the infra-<region> environment branch policy, which `llz tokens`
# / `llz secrets push` lock to main-only when they provision each env.

on:
  schedule:
    # Every 10 minutes. retry_join's max interval is 30s and a cold
    # reseal-to-quorum cycle completes in <2min, so 10m is "fast enough
    # to keep humans out of the loop, slow enough to amortize runner cost".
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      region:
        # Free-form deployment string, NOT a fixed choice: deployments are
        # dynamic (`llz env add`); "all" (default) unseals every deployment.
        description: 'Deployment to unseal (matrix override; "all" = every deployment, or a single deployment name)'
        required: false
        type: string
        default: all

permissions:
  contents: read

# Per-region concurrency. cancel-in-progress: false because an in-flight
# unseal of a follower must not be interrupted mid-quorum.
concurrency:
  group: openbao-auto-unseal-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  call:
    # Pinned to an immutable LLZ template release tag (not @main) so updates
    # arrive as reviewable Renovate PRs. ADOPTERS: repoint the org to your fork.
    uses: <@ upstream_org @>/lke-landing-zone/.github/workflows/llz-openbao-auto-unseal.yml@<@ llz_version @>
    with:
      # Empty on `schedule` (inputs is null) → the reusable workflow defaults to
      # "all"; a dispatch can narrow to a single deployment.
      region: ${{ inputs.region || 'all' }}
      # renovate: datasource=github-tags depName=<@ upstream_org @>/lke-landing-zone
      template-ref: <@ llz_version @>
    secrets: inherit
