name: Terraform Infrastructure

# Thin caller for the LOCAL reusable workflow llz-terraform.yml — the full
# pipeline body (plan / apply / destroy across cluster, cluster-bootstrap,
# object-storage + OpenBao bootstrap + converge gate) lives in
# .github/workflows/llz-terraform.yml, which copier delivers into THIS repo
# alongside this stub. Because that reusable is same-repo, `secrets: inherit`
# actually delivers this instance's repo + environment secrets — unlike the old
# cross-org `uses:` form, where inheritance silently arrived empty for any adopter
# whose org differs from the template's (#200/#201). The STEP logic stays central:
# the reusable runs in the `llz` container image and calls the terraform-init /
# fetch-kubeconfig composite actions from <upstream_org>/lke-landing-zone at a
# pinned tag (public, no secrets crossing the boundary).
# The dispatch inputs below are FORWARDED to the reusable as explicit
# workflow_call inputs (`with:`) — a reusable workflow's github.event.inputs is
# empty across the workflow_call boundary, so it reads them via `inputs`.
# ADOPTERS: no fork needed for secrets — the job graph is local. `upstream_org` /
# `llz_version` (the composite-action + image source, Renovate-pinned via
# instance-template/renovate.json) point at the template; fork only if you want to
# own those artifacts too.

on:
  push:
    branches: [main, master]
    paths:
      - 'terraform-iac-bootstrap/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'terraform-iac-bootstrap/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      module:
        description: 'Which module to target'
        required: true
        type: choice
        options:
          - cluster
          - object-storage
          - all
      region:
        # NOTE: input name kept as `region` for backwards compatibility with
        # existing state-key paths (cluster/<deployment>/terraform.tfstate)
        # and GitHub Environment names (infra-<deployment>). The value is
        # really a *deployment*.
        #
        # Free-form string, NOT a fixed `choice` list: deployments are created
        # dynamically by `llz env add` (the docs stress there is no hardcoded env
        # list), so a choice input would reject any env an adopter adds (e.g.
        # `myteam-dev`). Must match a deployment you scaffolded
        # (^[a-z][a-z0-9-]{1,30}$) with a tfvars set + infra-<deployment> Environment.
        description: 'Deployment to act on, e.g. primary | secondary | staging | lab | e2e (must have a tfvars set + infra-<deployment> Environment)'
        required: true
        type: string
      confirm_destroy:
        description: 'Required for destroy: destroy:<deployment>:cluster | destroy:<deployment>:object-storage'
        required: false
        type: string
      assert_loki:
        description: 'After converge, assert Loki is S3-backed (llz ci assert-loki). Default false; the release-e2e gate dispatches with this true so the check runs inside the bootstrap converge instead of a separate health pass.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  call:
    # LOCAL reusable (copier-delivered into this repo), so `secrets: inherit` is
    # same-repo and resolves this instance's repo + environment secrets (#201).
    uses: <@ upstream_org @>/lke-landing-zone/.github/workflows/llz-terraform.yml@<@ llz_version @>
    with:
      instance_repo: <@ instance_repo @>
      # renovate: datasource=github-tags depName=<@ upstream_org @>/lke-landing-zone
      template-ref: <@ llz_version @>
      # Forward the workflow_dispatch selectors so the reusable can read them via
      # `inputs` (github.event.inputs does not cross the workflow_call boundary).
      # Empty on push/PR, which leaves the action-gated jobs skipped.
      action: ${{ inputs.action }}
      module: ${{ inputs.module }}
      region: ${{ inputs.region }}
      confirm_destroy: ${{ inputs.confirm_destroy }}
      # Default false via the reusable's input; release-e2e's provision dispatch
      # passes assert_loki=true so the E2E Loki assertion runs in the converge job.
      assert_loki: ${{ inputs.assert_loki || false }}
    secrets: inherit
