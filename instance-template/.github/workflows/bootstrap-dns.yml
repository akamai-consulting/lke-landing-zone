name: Bootstrap DNS

# Thin caller for the reusable LLZ workflow — the body (apply the llz-letsencrypt
# DNS-01 ClusterIssuers from apl-values/_shared/manifest/dns), the
# fetch-kubeconfig action, and the llz CLI all live in the template and are
# sourced there (see docs/templatization-plan.md §"Keeping instances in sync").
# The reusable workflow also checks THIS instance back out (for
# apl-values/_shared/manifest/dns), so the only thing copied here is this stub +
# your own overlays.
# ADOPTERS: repoint the `uses:` org to your fork and pin @<ref> + template-ref to
# a template release tag (Renovate keeps both current — instance-template/renovate.json).
#
# DNS-01 challenges are solved by apl-core's cert-manager-webhook-linode (API
# group `acme.slicen.me`), which holds its own Linode API token; this workflow
# only applies the ClusterIssuers that target that webhook. Re-running is a safe,
# idempotent kubectl apply.
#
# Pre-requisites:
#   • Cluster reachable + apl-core cert-manager (with cert-manager-webhook-linode) deployed
# Required infra-<region> secrets: TF_STATE_ACCESS_KEY, TF_STATE_SECRET_KEY,
# LINODE_API_TOKEN.

on:
  workflow_dispatch:
    inputs:
      region:
        # Free-form string, not a fixed `choice`: deployments are dynamic
        # (`llz env add`), so a hardcoded list would reject adopter envs. Must
        # match an infra-<deployment> Environment in this repo.
        description: 'Deployment, e.g. primary | secondary | staging | lab (must have an infra-<deployment> Environment)'
        required: true
        type: string

permissions:
  contents: read

# Same group as the OpenBao bootstrap so a DNS seed cannot race a concurrent
# re-bootstrap that's touching the same KV mount or the same root token.
concurrency:
  group: openbao-bootstrap-${{ inputs.region }}
  cancel-in-progress: false

jobs:
  call:
    # Pinned to an immutable LLZ template release tag (not @main) so updates
    # arrive as reviewable Renovate PRs. ADOPTERS: repoint the org to your fork.
    uses: <@ upstream_org @>/lke-landing-zone/.github/workflows/llz-bootstrap-dns.yml@<@ llz_version @>
    with:
      region: ${{ inputs.region }}
      # renovate: datasource=github-tags depName=<@ upstream_org @>/lke-landing-zone
      template-ref: <@ llz_version @>
    secrets: inherit
