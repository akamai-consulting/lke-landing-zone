name: Bootstrap DNS

# Thin caller for the reusable LLZ workflow — the body (seed the Linode DNS-01
# token into OpenBao at secret/certmanager/dns01, force-refresh the ESO
# ExternalSecret, wait for the K8s Secret), the fetch-kubeconfig action, and the
# llz CLI (`llz ci require-secret` gate + `llz openbao exec` passthrough) all live in the template and are sourced there
# (see docs/templatization-plan.md §"Keeping instances in sync"). The reusable
# workflow also checks THIS instance back out (for apl-values/_shared/manifest/dns),
# so the only thing copied here is this stub + your own overlays.
# ADOPTERS: repoint the `uses:` org to your fork and pin @<ref> + template-ref to
# a template release tag (Renovate keeps both current — instance-template/renovate.json).
#
# Pre-requisites:
#   • OpenBao initialized + unsealed + KV v2 mounted at `secret/` (bootstrap-openbao.yml)
#   • ESO + ClusterSecretStore `openbao` Ready (implied by the above)
# Required infra-<region> secrets: LINODE_DNS_TOKEN, OPENBAO_ROOT_TOKEN,
# TF_STATE_ACCESS_KEY, TF_STATE_SECRET_KEY (delete OPENBAO_ROOT_TOKEN after the run).

on:
  workflow_dispatch:
    inputs:
      region:
        # Free-form string, not a fixed `choice`: deployments are dynamic
        # (`llz env add`), so a hardcoded list would reject adopter envs. Must
        # match an infra-<deployment> Environment in this repo.
        description: 'Deployment, e.g. primary | secondary | staging | lab (must have an infra-<deployment> Environment)'
        required: true
        type: string

permissions:
  contents: read

# Same group as the OpenBao bootstrap so a DNS seed cannot race a concurrent
# re-bootstrap that's touching the same KV mount or the same root token.
concurrency:
  group: openbao-bootstrap-${{ inputs.region }}
  cancel-in-progress: false

jobs:
  call:
    # Pinned to an immutable LLZ template release tag (not @main) so updates
    # arrive as reviewable Renovate PRs. ADOPTERS: repoint the org to your fork.
    uses: <@ upstream_org @>/lke-landing-zone/.github/workflows/llz-bootstrap-dns.yml@<@ llz_version @>
    with:
      region: ${{ inputs.region }}
      # Which forge hosts this instance — gates the GHE CI workarounds (e.g. the
      # fix-workspace-perms step on self-hosted runners) in the reusable workflow.
      forge_flavor: <@ forge_flavor @>
      # renovate: datasource=github-tags depName=<@ upstream_org @>/lke-landing-zone
      template-ref: <@ llz_version @>
    secrets: inherit
