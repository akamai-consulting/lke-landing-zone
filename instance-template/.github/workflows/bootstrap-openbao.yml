name: Bootstrap OpenBao

# Thin caller for the LOCAL reusable llz-bootstrap-openbao.yml — the full body
# (init, unseal, configure, secondary-CA reprovision, secret seeding) and the
# composite actions it calls are copier-delivered into THIS repo (vendored,
# ADR 0003); the llz CLI is baked into vars.TF_IMAGE. The reusable checks this
# instance back out (its terraform-iac-bootstrap TF state).
# ADOPTERS: nothing to repoint — every `uses:` is a repo-local ./ path, and
# `llz upgrade` re-pins template-ref with each template release.
#
# Operators dispatch this directly. The terraform.yml pipeline reaches OpenBao
# bootstrap through llz-terraform's own bootstrap-openbao job (which calls
# llz-bootstrap-openbao directly), not through this stub.

on:
  workflow_dispatch:
    inputs:
      region:
        # NOTE: input name kept as `region` for backwards compatibility with
        # existing state-key paths and GitHub Environment names (infra-<deployment>).
        # The value is really a *deployment*.
        #
        # Free-form string, NOT a fixed `choice` list — mirrors terraform.yml.
        # Deployments are created dynamically by `llz env add` (there is no
        # hardcoded env list), so a choice input would reject any env an adopter
        # adds (e.g. `e2e`, `myteam-dev`). Must match a deployment you scaffolded
        # (^[a-z][a-z0-9-]{1,30}$) with a tfvars set + infra-<deployment> Environment.
        description: 'Deployment to act on, e.g. primary | secondary | staging | lab | e2e (must have a tfvars set + infra-<deployment> Environment)'
        required: true
        type: string
      reprovision_ca_only:
        description: 'Re-provision secondary CA in primary cluster only (skips full bootstrap)'
        required: false
        type: boolean
        default: false
      preserve_root_on_failure:
        description: >
          DEBUG ONLY. Skip the post-bootstrap root-token revoke when the
          bootstrap FAILS, so the operator can iterate without burning a
          fresh quorum-regenerate per retry. Default false (revoke runs
          unconditionally — security-safe default). Successful bootstraps
          always revoke regardless of this flag.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# NO workflow-level `concurrency` here, on purpose. Serialization of re-bootstraps
# (so two runs can't race the same KV mount / root token) is owned by the reusable
# llz-bootstrap-openbao.yml, whose own `concurrency: openbao-bootstrap-<region>`
# gates EVERY invocation — this stub and terraform.yml's bootstrap-openbao job alike.
# Repeating that SAME group on this top-level caller DEADLOCKS: GitHub cancels the
# run at startup with "a deadlock was detected for concurrency group
# 'openbao-bootstrap-<region>' between a top level workflow and 'call'" (the parent
# holds the group its own `call` job then needs). A caller must never share a
# concurrency group with the reusable it calls.

jobs:
  call:
    # Calls the LOCAL reusable ./.github/workflows/llz-bootstrap-openbao.yml (copier-delivered
    # into this repo) so `secrets: inherit` is same-repo and actually resolves
    # (#201). No fork needed for secrets; upstream_org/llz_version only source the
    # composite actions + image.
    uses: ./.github/workflows/llz-bootstrap-openbao.yml
    with:
      region:                   ${{ inputs.region }}
      reprovision_ca_only:      ${{ inputs.reprovision_ca_only || false }}
      preserve_root_on_failure: ${{ inputs.preserve_root_on_failure || false }}
      instance_repo:            <@ instance_repo @>
      # renovate: datasource=github-tags depName=<@ upstream_org @>/lke-landing-zone
      template-ref:             <@ llz_version @>
    secrets: inherit
