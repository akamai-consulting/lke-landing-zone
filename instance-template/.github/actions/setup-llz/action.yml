name: setup-llz
description: >
  Install the llz binary built from the pinned template ref onto PATH. Consumes
  the run-scoped `llz` artifact the build-llz job uploads, so every job runs the
  llz that MATCHES the workflow's template-ref — not whatever is baked into the
  CI image. That removes the workflow-vs-baked-binary drift (the "llz: unknown
  flag" class) by construction; the image carries tools only. Run it once per
  job, after the template checkout.
inputs:
  artifact:
    description: Name of the run-scoped artifact holding the llz binary (from build-llz).
    required: false
    default: llz
runs:
  using: composite
  steps:
    - name: Download llz built from the template ref
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.artifact }}
        path: ${{ runner.temp }}/llz-bin
    - name: Install llz on PATH
      shell: bash
      run: |
        install -m 0755 "${RUNNER_TEMP}/llz-bin/llz" /usr/local/bin/llz
        llz version 2>/dev/null || true
