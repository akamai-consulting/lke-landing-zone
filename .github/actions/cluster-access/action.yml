name: Cluster access (kubeconfig + runner ACL)
description: >
  The shared job preamble for any job that talks to a deployment's LKE cluster:
  fetch the kubeconfig from Terraform state and open this hosted runner's
  dynamic egress IP in the LKE-E control-plane ACL. Wraps the fetch-kubeconfig
  and lke-runner-acl actions in the order every cluster-facing job repeats.
  `llz` itself is baked into the TF_IMAGE these jobs run in
  (dockerfiles/terraform/Dockerfile) — already on PATH, no install step.

  Sibling actions (fetch-kubeconfig, lke-runner-acl) live in THIS repo, but a
  composite action's `uses: ./<path>` resolves against $GITHUB_WORKSPACE — the
  CALLER's checkout — NOT this action's repo (a long-standing GitHub Actions
  limitation). The caller is an instance repo that does not carry .github/actions at
  all, so a bare `./.github/actions/<name>` is not present there and fails
  with "Can't find action.yml". So this action checks out its OWN repo at the caller-
  supplied `template-ref` input (the same ref the caller pinned the
  `uses:@<ref>` to) into ./_llz-template and references the siblings from there. This
  keeps the #201-Phase-2 cross-org model (the caller still needs nothing checked out —
  this action is self-sufficient), just with the sibling deps fetched by this action.

  A composite action has no post-job hook, so the caller MUST pair this with a
  trailing lke-runner-acl step (mode: revoke, if: always()) passing the same
  linode-token (the caller's secrets.LINODE_API_TOKEN) and region this action
  received — see any llz-* workflow's revoke step, e.g. llz-cluster-health.yml.
  (Don't write the brace-wrapped secrets expression here: an action manifest is
  template-validated and a composite action has no secrets context, so it fails
  to load.)

inputs:
  template-ref:
    description: >
      The template ref this action's sibling composite actions are fetched at — the
      SAME ref the caller pinned this action's `uses:@<ref>` to. A
      composite `uses: ./<path>` resolves against the caller's workspace (not this
      action's repo), and the caller is an instance repo that excludes .github/actions,
      so this action checks out its own repo at this ref to reach the siblings. Pass the
      caller's llz_version verbatim; a mismatch fetches sibling actions from the wrong
      commit. (An explicit input, not github.action_ref, which is unreliable in composite
      actions.)
    required: true
  aws-access-key-id:
    description: AWS access key for the S3 state backend (kubeconfig is read from Terraform state).
    required: true
  aws-secret-access-key:
    description: AWS secret key for the S3 state backend.
    required: true
  linode-token:
    description: Linode API token used to open this runner's egress IP in the control-plane ACL.
    required: true
  region:
    description: Deployment key (e.g. primary, secondary, e2e). Names the state key and resolves the cluster for the ACL.
    required: true
  github-token:
    description: >
      Token for first-party git:: Terraform module sources (the kubeconfig
      fetch runs `terraform init`). Defaults to the workflow token; the
      first-party modules are public, so the default suffices.
    required: false
    default: ${{ github.token }}
  kubeconfig-path:
    description: Path to write the kubeconfig file ($HOME/$RUNNER_TEMP expand at run time).
    required: false
    default: $HOME/.kube/config
  allow-missing:
    description: >
      Passed through to fetch-kubeconfig. When 'true' and the cluster has no
      kubeconfig_raw output yet, this action sets available=false and skips the
      ACL open instead of failing; gate downstream cluster steps on the
      `available` output.
    required: false
    default: 'false'
  register-runner-lease:
    description: >
      When 'true', also lease this runner's IP in the firewall-runner-acl
      ConfigMap so the EAA firewall-controller preserves it across reconciles —
      set it for jobs whose kubectl phase outlasts one reconcile interval (~10m),
      notably the convergence gate. The paired revoke step must pass the same
      kubeconfig to release the lease. Default 'false': short jobs use the
      Linode-API-only ACL open and need no ConfigMap access.
    required: false
    default: 'false'

outputs:
  available:
    description: "'true' if the kubeconfig was fetched; 'false' if allow-missing=true and the output was absent."
    value: ${{ steps.kubeconfig.outputs.available }}

runs:
  using: composite
  steps:
    # Bring the sibling composite actions into the caller's workspace: this action
    # is invoked cross-org from an instance repo (which excludes .github/actions), and
    # a composite `uses: ./<path>` resolves against $GITHUB_WORKSPACE, not this action's
    # repo — so the siblings must physically exist under the workspace. Check out this
    # action's own repo at inputs.template-ref (= the `@<ref>` the caller pinned) into
    # ./_llz-template; the steps below reference the siblings from there. The org is
    # hardcoded (no forks — like every other upstream ref; and this file is never
    # copier-rendered, so a token wouldn't resolve). Isolated subdir (path:) so the
    # caller's own checkout is untouched; persist-credentials:false — the siblings take
    # any git token they need as an input.
    - name: Check out the template for the sibling composite actions
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: akamai-consulting/lke-landing-zone
        ref: ${{ inputs.template-ref }}
        path: _llz-template
        persist-credentials: false
    - name: Fetch kubeconfig from Terraform state
      id: kubeconfig
      uses: ./_llz-template/.github/actions/fetch-kubeconfig
      with:
        aws-access-key-id:     ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        github-token:          ${{ inputs.github-token }}
        kubeconfig-path:       ${{ inputs.kubeconfig-path }}
        region:                ${{ inputs.region }}
        allow-missing:         ${{ inputs.allow-missing }}

    # Open this hosted-runner's dynamic egress IP in the LKE-E control-plane
    # ACL so kubectl is permitted; the caller's paired revoke step (if: always())
    # closes it at job end. Skipped when allow-missing tolerated a torn-down
    # cluster — there is nothing to ACL.
    - name: Open control-plane ACL for this runner
      if: steps.kubeconfig.outputs.available == 'true'
      uses: ./_llz-template/.github/actions/lke-runner-acl
      with:
        mode:         open
        linode-token: ${{ inputs.linode-token }}
        region:       ${{ inputs.region }}
        # Only lease in the ConfigMap when the caller opted in (long-running
        # kubectl jobs); empty kubeconfig keeps the Linode-API-only behaviour.
        kubeconfig:   ${{ inputs.register-runner-lease == 'true' && inputs.kubeconfig-path || '' }}
