# Secret-scan gate: run gitleaks over the full git history on every PR and every
# push to main. Deliberately a STANDALONE workflow with no `paths:` filter —
# unlike lint.yml, a leaked credential can land in any file (a doc, a test
# fixture, a script), so the scan must run regardless of which paths a change
# touches. Findings fail the job (gitleaks exits non-zero), which is what makes
# this a merge gate rather than advisory.
#
# The .gitleaks.toml at the repo root carries the allowlists (placeholder syntax
# in runbooks, vendored actions, the HashiCorp GPG key); `make gitleaks` honours
# it automatically. Pure tooling — no private CI image — so this runs on fork
# PRs too.
name: Secret scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    shell: bash

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks `detect` scans the commit history, so fetch all of it —
          # the default shallow checkout would scan only the tip commit.
          fetch-depth: 0

      - name: Install pinned gitleaks
        run: make install-gitleaks

      - name: Add ~/.local/bin to PATH
        run: echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: gitleaks secret scan
        run: make gitleaks
