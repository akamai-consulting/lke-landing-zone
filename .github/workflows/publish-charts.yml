name: Publish Helm Charts

# Packages every first-party Helm chart under kubernetes-charts/ and pushes it to GHCR as
# an OCI artifact (oci://ghcr.io/<repo-owner>/charts/<chart>:<version>).
#
# Why GHCR (not the in-cluster Harbor): the charts the bootstrap itself consumes
# (cluster-foundation, cert-automation, …) must come from a registry that
# exists BEFORE the cluster does. Harbor runs *inside* the cluster, so it can't
# serve the charts that stand the cluster up. See docs/templatization-plan.md §9.
#
# Versioning is immutable-by-convention: a chart is published only if its
# Chart.yaml `version:` has not already been pushed. To release a change, bump
# the chart's `version:` — never overwrite an existing tag. The monorepo's Argo
# Applications reference a pinned `targetRevision: X.Y.Z`, so an overwritten tag
# would silently mutate every consumer.

on:
  push:
    branches: [main, master]
    paths:
      - 'kubernetes-charts/**'
      - '.github/workflows/publish-charts.yml'
  workflow_dispatch:
    inputs:
      chart:
        description: 'Single chart to publish (directory name under kubernetes-charts/), or "all"'
        required: true
        default: all
        type: string

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  HELM_VERSION: "3.17.3"
  # OCI repository prefix. Charts land at oci://ghcr.io/<repo-owner>/charts/<chart>.
  CHARTS_REPO_PATH: charts

jobs:
  publish:
    name: Package & push charts
    runs-on: ubuntu-latest
    # packages: write lets the built-in GITHUB_TOKEN push to GHCR — no PAT needed.
    permissions:
      contents: read
      packages: write
      # Keyless cosign signing of each pushed chart — see build-images.yml.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve GHCR namespace
        id: ns
        # GHCR paths must be lowercase; derive the namespace from the repo owner so
        # charts always land in this repo's org (akamai-consulting), and in an
        # adopter's own org after they fork — never a hardcoded personal account.
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v${{ env.HELM_VERSION }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR (Helm OCI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | helm registry login "$REGISTRY" \
            -u "$GH_ACTOR" --password-stdin

      # cosign pushes the .sig artifact to GHCR via docker/registry creds
      # (~/.docker/config.json) — NOT helm's registry login above — so without a
      # docker login the sign step 401s ("exit status 1"). build-images.yml does the
      # same. Keyless (Fulcio/Rekor) still uses the job's id-token; this is only the
      # registry-write auth for storing the signature.
      - name: Log in to GHCR (docker — for cosign .sig push)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go (to build llz)
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Build llz onto PATH
        run: cd tools && go build -buildvcs=false -o /usr/local/bin/llz ./cmd/llz

      # The package/push/sign loop — the immutability + re-sign guard, digest
      # parsing, and transient-failure retry — is unit-tested Go
      # (tools/cmd/llz/ci_publish_charts.go). This step is glue: helm/cosign are on
      # PATH (installed above) and `helm registry login` already ran.
      - name: Package + push + sign charts
        env:
          # workflow_dispatch passes a single chart name (or "all"); push events
          # default to "all".
          SELECTED_CHART: ${{ github.event.inputs.chart || 'all' }}
          GHCR_OWNER: ${{ steps.ns.outputs.owner }}
        run: llz ci publish-charts --selected "$SELECTED_CHART" --owner "$GHCR_OWNER" --registry "$REGISTRY" --repo-path "$CHARTS_REPO_PATH"

      - name: Logout
        if: always()
        run: helm registry logout "$REGISTRY" || true
