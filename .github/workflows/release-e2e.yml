name: Release E2E — run the forge lanes (github.com always; all on release)

# Thin driver over release-e2e-lane.yml (the actual instantiate → provision →
# teardown → gate pipeline, one forge per invocation).
#
# WHY a driver + reusable lane, not a matrix over the pipeline's jobs: the LKE-E
# clusters are quota-bound — we cannot stand two up side by side. Each lane must
# run to completion (through its OWN teardown, so its cluster is gone) before the
# next lane provisions. A `max-parallel: 1` matrix over a reusable-workflow call
# gives exactly that: the whole github.com lane finishes before the GHES lane
# begins. (A matrix over the individual jobs would let teardown[A] and
# provision[B] overlap — two clusters at once.)
#
# Lane selection:
#   • release (prereleased) → BOTH lanes, sequentially: github.com then GHES.
#   • workflow_dispatch      → the single `forge` chosen (default github.com), so a
#                              human can exercise one lane (incl. GHES) in isolation.
# The GHES lane needs the E2E_GHES_* vars/secrets documented in the lane file; on a
# repo without them a release run's GHES leg fails its require-config check (the
# github.com leg, having already finished, is unaffected).

on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      forge:
        description: 'Which lane to run (dispatch only; release always runs all).'
        required: false
        type: choice
        options: [github, github-enterprise-server]
        default: github
      dry_run:
        description: 'Instantiate + plan only (no real apply / validate / destroy).'
        required: false
        type: boolean
        default: true
      keep_cluster:
        description: 'On a full run, SKIP teardown so the cluster survives for debugging (keeps billing). Ignored on dry_run / release.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# One E2E run at a time across ALL lanes — a global safety net on top of the
# in-run max-parallel:1 sequencing, so two separately-triggered runs can never
# race the shared Linode account either.
concurrency:
  group: release-e2e
  cancel-in-progress: false

jobs:
  lanes:
    name: e2e lane (${{ matrix.forge }})
    strategy:
      # Quota: exactly one live cluster at a time. Run the lanes strictly
      # one-after-another; a failing lane does not skip the next (fail-fast off).
      max-parallel: 1
      fail-fast: false
      matrix:
        # release → both lanes (github.com first); dispatch → the chosen one.
        forge: ${{ fromJSON(github.event_name == 'release' && '["github","github-enterprise-server"]' || format('["{0}"]', inputs.forge)) }}
    uses: ./.github/workflows/release-e2e-lane.yml
    # A CALLED workflow's jobs can never hold more than the calling job's token,
    # so this must be the union of what the lane's jobs ask for — the lane's
    # instantiate job needs actions:write (dispatch terraform.yml in the instance
    # repo) + packages:read (pull the ci-image). Left at the workflow default of
    # contents:read, the lane's request is an escalation and GitHub fails the run
    # at startup (startup_failure, before any job logs exist).
    permissions:
      contents: read
      packages: read
      actions: write
    with:
      forge: ${{ matrix.forge }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      keep_cluster: ${{ github.event_name == 'workflow_dispatch' && inputs.keep_cluster || false }}
    secrets: inherit
