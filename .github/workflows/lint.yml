# Lint + validate everything the template ships, in one workflow (merges the
# former kubernetes.yml + terraform.yml):
#  - Helm charts: render then kube-linter / kubeconform / server-side dry-run,
#    plus ExternalSecret-path and ArgoCD-Application semantic checks.
#  - Terraform: tflint + checkov over the reusable modules, and instantiate +
#    validate over the instance roots.
# Every scan validates the RENDERED / INSTANTIATED template content — never a
# raw apl-values/ tree (those manifests were helmified into kubernetes-charts/).
on:
  pull_request:
    branches: [main, master]
    paths:
      - 'kubernetes-charts/**'
      - 'terraform-modules/**'
      - 'instance-template/terraform-iac-bootstrap/**'
      - 'instance-template/.github/workflows/bootstrap-openbao.yml'
      - 'instance-template/.template-manifest'
      - 'instance-template/.template-workflows.lock'
      - 'template-scripts/**'
      - '.kube-linter.yaml'
      - '.checkov.yaml'
      - '.tflintrc.hcl'
      - 'Makefile'
      - 'tools/**'
      - '.github/workflows/**'
      - 'instance-template/.github/**'
      - '.untestable-budget.yaml'
  push:
    branches: [main, master]
    paths:
      - 'kubernetes-charts/**'
      - 'terraform-modules/**'
      - 'instance-template/terraform-iac-bootstrap/**'
      - 'instance-template/.github/workflows/bootstrap-openbao.yml'
      - 'instance-template/.template-manifest'
      - 'instance-template/.template-workflows.lock'
      - 'template-scripts/**'
      - '.kube-linter.yaml'
      - '.checkov.yaml'
      - '.tflintrc.hcl'
      - 'Makefile'
      - 'tools/**'
      - '.github/workflows/**'
      - 'instance-template/.github/**'
      - '.untestable-budget.yaml'
  workflow_dispatch:

name: Lint

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  KIND_VERSION: v0.25.0
  HELM_VERSION: "3.17.3"
  KUBECTL_VERSION: "1.31.0"
  YQ_VERSION: "4.44.3"
  # Operator versions used only for offline CRD installs in the dry-run job.
  # Apl-core itself owns these in production — match its bundled versions so
  # the dry-run validates against the same CRD schemas the cluster will use.
  ARGOCD_HELM_VERSION: "7.8.0"
  CERT_MANAGER_VERSION: "v1.16.3"
  # apl-core 6.x bundles external-secrets 2.4.1, whose CRDs serve
  # external-secrets.io/v1 (the old 0.12.1 chart served only v1beta1/v1alpha1).
  # Our manifests moved to v1 for apl-core 6.x, so the dry-run must install a v1-
  # serving CRD or every ExternalSecret/ClusterSecretStore fails "no matches for
  # kind … in version external-secrets.io/v1". Keep this matched to apl-core's bundle.
  ESO_HELM_VERSION: "2.4.1"
  # Match the chart versions referenced from
  # platform-apl/manifest/argo-{events,workflows}/argocd/applications/.
  ARGO_WORKFLOWS_HELM_VERSION: "0.42.3"
  ARGO_EVENTS_HELM_VERSION: "2.4.13"
  # Istio Gateway + VirtualService CRDs needed by per-env ingress trees.
  ISTIO_VERSION: "1.23.0"
  # kube-prometheus-stack CRDs (PrometheusRule, ServiceMonitor, PodMonitor)
  # used by the rendered OpenBao ServiceMonitor.
  KUBE_PROMETHEUS_STACK_VERSION: "61.7.2"
  # Full Kyverno install (controller + webhooks, not just CRDs) for the
  # policy-admission gate in the dry-run job. Version approximates apl-core's
  # bundle; the check this guards — Kyverno's validate-policy webhook rejecting
  # a malformed ClusterPolicy — is stable across recent versions.
  KYVERNO_HELM_VERSION: "3.4.4"
  # Terraform jobs.
  TF_IN_AUTOMATION: 'true'

defaults:
  run:
    shell: bash

jobs:

  # ── Kubernetes ───────────────────────────────────────────────────────────────
  # Single source of truth via `make lint-k8s` (= $(LINT_K8S) + shellcheck in
  # the Makefile): renders the first-party charts once, then runs kube-linter,
  # kubeconform, the sync-wave / placeholder / ExternalSecret-path /
  # ArgoCD-Application semantic checks, helm lint/template, Chart.lock drift,
  # the PrometheusRule promtool gate (`llz ci check-prom-rules`), Argo
  # CronWorkflow lint, and shellcheck. The kind server-side dry-run is the one
  # k8s check that needs a cluster — separate job.
  kubernetes:
    name: Kubernetes lint
    # Run on push always; on PRs only from the same repo (fork PRs can't pull the
    # private KUBE_IMAGE and must not run with repo context).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # GITHUB_TOKEN needs packages:read to pull the private CI image from GHCR.
      packages: read
    container:
      # Fall back to the image build-images.yml publishes under this repo's owner
      # when KUBE_IMAGE isn't set, so CI works on a fresh fork with no repo
      # variables. (Owner must be lowercase for GHCR — true for org logins.)
      image: ${{ vars.KUBE_IMAGE || format('ghcr.io/{0}/ci-kubernetes:1.31.0', github.repository_owner) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Add /usr/local/bin to PATH
        run: echo "PATH=/usr/local/bin:${PATH}" >> "$GITHUB_ENV"

      # `make lint-k8s` runs `externalsecret-paths-check`, which calls `llz ci
      # externalsecret-paths`. The published ci-kubernetes image bakes llz
      # (dockerfiles/Dockerfile (ci-kubernetes target)), but a PR that changes tools/ runs
      # before that image is rebuilt — and the image carries no Go toolchain, so
      # the Makefile's `go run` fallback can't fire either. Set up Go and build
      # llz onto PATH so the check runs regardless of the image's age; once the
      # rebuilt image carries llz this is a fast, redundant no-op.
      - name: Set up Go and build llz onto PATH
        uses: ./.github/actions/setup-llz
        with:
          install-path: /usr/local/bin/llz

      - name: Render + lint/validate charts, manifests, and scripts
        run: make lint-k8s

  # ── Server-side dry-run ──────────────────────────────────────────────────────
  # Spins up a kind cluster, installs the CRDs for every operator the apl-core
  # bundle ships in the cluster, and runs kubectl apply --dry-run=server against
  # each per-env apl-values manifest tree. This catches integration errors that
  # kustomize-build alone misses: CRD-schema violations, immutable-field changes,
  # and duplicate-key issues at the apply layer.
  #
  # CRDs installed mirror what apl-core ships:
  #   ArgoCD (Application, AppProject)
  #   cert-manager (Certificate, ClusterIssuer)
  #   External Secrets Operator (ClusterSecretStore, ExternalSecret)
  #   Argo Workflows (Workflow, WorkflowTemplate, CronWorkflow)
  #   Argo Events (EventBus, EventSource, Sensor)
  #   Istio base (Gateway, VirtualService)
  dry-run:
    name: Server-side dry-run (kind)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v${{ env.HELM_VERSION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: v${{ env.KUBECTL_VERSION }}

      - name: Install yq
        uses: dcarbone/install-yq-action@4075b4dca348d74bd83f2bf82d30f25d7c54539b # v1.3.1
        with:
          version: v${{ env.YQ_VERSION }}

      # helm/kind-action installs kind (KIND_VERSION) and stands up the cluster in
      # one step; the ephemeral runner is torn down afterward, so no explicit
      # delete is needed.
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          cluster_name: k8s-ci
          wait: 60s

      - name: Add Helm repos
        env:
          R: template-scripts/ci/with-retry.sh
        run: |
          set -euo pipefail
          # Retry transient upstream index-fetch blips (helm has no native --retry).
          make helm-repos   # already retries its adds/update internally
          # Istio chart repo isn't in the shared helm-repos target — it's only
          # needed here for Gateway/VirtualService CRD installs in dry-run.
          $R helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
          # Kyverno: full install (not just CRDs) for the policy-admission gate below.
          $R helm repo add kyverno https://kyverno.github.io/kyverno/ --force-update
          $R helm repo update

      - name: Install CRDs
        env:
          R: template-scripts/ci/with-retry.sh
        run: |
          set -euo pipefail
          # Retry transient chart-pull blips. with-retry.sh is pipe-safe as a source:
          # it buffers helm's stdout and emits it only on the successful attempt, so a
          # failed attempt's partial render never reaches `yq | kubectl`.

          echo "ArgoCD CRDs (argo-cd ${ARGOCD_HELM_VERSION})..."
          # argo-cd places CRDs in templates/ not crds/, so helm show crds returns
          # nothing. Use helm template --include-crds and filter with yq.
          $R helm template argocd argo/argo-cd --version "$ARGOCD_HELM_VERSION" \
            --include-crds \
            | yq 'select(.kind == "CustomResourceDefinition")' \
            | kubectl apply -f -

          echo "cert-manager CRDs (${CERT_MANAGER_VERSION})..."
          $R helm template cert-manager jetstack/cert-manager --version "${CERT_MANAGER_VERSION#v}" \
            --include-crds --set crds.enabled=true \
            | yq 'select(.kind == "CustomResourceDefinition")' \
            | kubectl apply -f -

          echo "External Secrets Operator CRDs (${ESO_HELM_VERSION})..."
          # ESO puts CRDs in templates/ (not crds/) — helm show crds returns nothing.
          # Render with --set crds.create=true to ensure the conditional fires.
          # The 2.4.x clustersecretstores/secretstores CRDs exceed kubectl's
          # 262144-byte limit on the last-applied-configuration annotation, so a
          # client-side apply errors "metadata.annotations: Too long". Server-side
          # apply doesn't use that annotation — required here (same as kube-prometheus
          # below).
          $R helm template eso external-secrets/external-secrets --version "$ESO_HELM_VERSION" \
            --set crds.create=true \
            | yq 'select(.kind == "CustomResourceDefinition")' \
            | kubectl apply --server-side=true --force-conflicts -f -

          echo "Istio base CRDs (istio/base ${ISTIO_VERSION})..."
          $R helm template istio-base istio/base --version "$ISTIO_VERSION" --include-crds \
            | yq 'select(.kind == "CustomResourceDefinition")' \
            | kubectl apply -f -

          echo "Argo Workflows CRDs (${ARGO_WORKFLOWS_HELM_VERSION})..."
          # argo-workflows ships CRDs in templates/ (not crds/, gated by crds.install
          # which defaults to true) — helm show crds returns nothing. Use
          # `helm template --include-crds` and yq filter, same pattern as argocd/eso above.
          # Installs: workflows, workflowtemplates, cronworkflows, clusterworkflowtemplates,
          # workflowtaskresults, workflowtasksets, workflowartifactgctasks, workfloweventbindings.
          # Referenced from platform-apl/manifest/cert-automation/
          # haproxy-rebuild-workflowtemplate.yaml.
          $R helm template argo-workflows argo/argo-workflows --version "$ARGO_WORKFLOWS_HELM_VERSION" \
            --include-crds \
            | yq 'select(.kind == "CustomResourceDefinition")' \
            | kubectl apply -f -

          echo "Argo Events CRDs (${ARGO_EVENTS_HELM_VERSION})..."
          # argo-events ships CRDs in templates/ (not crds/) so helm show crds
          # returns nothing — use `helm template --include-crds` and yq filter,
          # same pattern as argocd/eso above.
          # Installs: eventbus, eventsources, sensors. Referenced from
          # platform-apl/manifest/cert-automation/{argo-eventbus,argo-eventsource,argo-sensor}.yaml.
          $R helm template argo-events argo/argo-events --version "$ARGO_EVENTS_HELM_VERSION" \
            --include-crds \
            | yq 'select(.kind == "CustomResourceDefinition")' \
            | kubectl apply -f -

          echo "kube-prometheus-stack CRDs (${KUBE_PROMETHEUS_STACK_VERSION})..."
          # The chart ships CRDs in crds/ — helm show crds returns them.
          # Four of these CRDs (alertmanagers, prometheusagents, prometheuses,
          # thanosrulers) exceed kubectl's 262144-byte annotation limit on
          # `kubectl.kubernetes.io/last-applied-configuration`, so client-side
          # apply errors with "metadata.annotations: Too long".
          # Server-side apply doesn't use that annotation — required here.
          helm show crds prometheus-community/kube-prometheus-stack \
            --version "$KUBE_PROMETHEUS_STACK_VERSION" \
            | kubectl apply --server-side=true --force-conflicts -f -

          echo "Waiting for all CRDs to be established..."
          kubectl wait crd --all --for=condition=established --timeout=90s

      - name: Render charts
        # Materialize the first-party charts as plain manifests — the landing
        # zone ships its workloads as charts (templatization §5), so the dry-run
        # validates this rendered output, not a raw apl-values/ tree.
        run: make render-charts

      - name: Validate rendered ArgoCD Applications
        # Semantic checks (e.g. duplicate Helm parameters) on the generated
        # Applications; render-charts already ran above so this is a no-op render.
        run: make argocd-rendered-apps-check

      - name: Create namespaces
        run: |
          set -euo pipefail
          # The charts create the namespaces their workloads land in
          # (cluster-foundation's set + cert-automation's own). Apply just the
          # rendered Namespace objects so namespaced-resource dry-runs resolve.
          yq 'select(.kind == "Namespace")' rendered/*.yaml \
            | kubectl apply -f -
          # argocd, cert-manager, harbor, and istio-system are owned by apl-core;
          # the rendered charts place resources in (argocd) or attach
          # NetworkPolicies/RBAC to (the rest) them. Stub them so namespaced
          # dry-runs resolve. (kube-system already exists in the kind cluster.)
          for ns in argocd cert-manager harbor istio-system; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Server-side dry-run of the rendered charts
        run: kubectl apply --dry-run=server -f rendered/

      # ── VAP admission gate (llz-wave-health-guard) ───────────────────────────
      # Apply the wave-health ValidatingAdmissionPolicy (the kind apiserver COMPILES
      # its CEL — a syntax error fails here, which kubeconform + the Go allowlist test
      # can't catch) and assert enforcement with a label-scoped Deny binding: an
      # unvetted negative-wave kind is denied; allowlisted + argoproj.io (child-App)
      # kinds pass. Needs the Argo Events CRDs installed above (EventBus probe).
      # Before the Kyverno gate so no live controller perturbs it.
      - name: Wave-health VAP admission gate
        run: template-scripts/ci/vap-admission-check.sh

      # ── Kyverno policy-admission gate ────────────────────────────────────────
      # A CRD-schema dry-run does NOT catch what Kyverno's validate-policy
      # webhook rejects: the 2026-07-04 bootstrap wedge #2 was ClusterPolicies
      # mixing spec.mutateExistingOnPolicyUpdate with target-less admission
      # rules — schema-valid, webhook-denied — which wedged the platform-
      # bootstrap sync at wave -15 on a real cluster (PR #142). Install the
      # REAL Kyverno controller and apply (not dry-run — webhook execution
      # must be unconditional) the shipped ClusterPolicies against it.
      # Deliberately LAST: a live admission controller must not perturb the
      # dry-run steps above (e.g. verifyImages intercepting rendered CronJobs).
      - name: Kyverno policy-admission gate (shipped ClusterPolicies)
        run: |
          set -euo pipefail
          helm install kyverno kyverno/kyverno \
            --namespace kyverno --create-namespace \
            --version "$KYVERNO_HELM_VERSION" \
            --wait --timeout 5m
          echo "Applying platform-apl/components/imageSignature against the validate-policy webhook..."
          kubectl kustomize platform-apl/components/imageSignature \
            | kubectl apply --server-side=true -f -



  # ── Scaffold + validate apl-values ───────────────────────────────────────────
  # Reproduces the real per-env scaffold path (`llz env add`) and runs
  # `llz ci validate-apl-values` on the rendered values — two checks that were
  # previously Release-E2E-ONLY, each catchable in seconds with no cloud (both
  # classes burned multiple ~50-min e2e runs in the week of 2026-07-02):
  #   • runtime-placeholder var-contract — a values.yaml ${...} not in the
  #     secrets-only set `llz ci bootstrap-cluster` fills can't be rendered (the
  #     ${apl_values_repo_url} class that failed a 2026-07-02 apply).
  #   • apl-core chart schema via `helm template apl/apl` — the same JSON-Schema
  #     validation bootstrap-cluster's `helm upgrade` runs at apply time; catches required/renamed/
  #     mistyped keys (the apl-core v6 `apps.loki: adminPassword is required` class).
  # Needs Go (build a FRESH llz — a tools/ PR predates the image rebuild) and Helm
  # (the schema check); the var-contract check is pure Go, no terraform.
  scaffold:
    name: Scaffold + validate apl-values
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go (build llz — the scaffolder)
        uses: ./.github/actions/setup-llz
      - name: Install Helm (apl-core schema validation)
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v${{ env.HELM_VERSION }}
      - name: Install kubectl (kustomize-build the rendered overlays)
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: v${{ env.KUBECTL_VERSION }}
      - name: Scaffold a throwaway env and validate its apl-values
        run: make scaffold-check

  # ── Instantiate (copier render) ──────────────────────────────────────────────
  # Renders instance-template/ into a throwaway instance with the REAL copier and
  # asserts no unrendered `<@ … @>` tokens survived, the required per-instance
  # structure is present, and the rendered workflows pass actionlint. Copier-
  # templating bugs — an unrendered `<@ forge_flavor @>` (Jun 17) or a copier
  # EXPRESSION `<@ instance_repo.split('/')[-1] @>` the raw-cp/sed render can't do
  # (Jun 24) — burned e2e runs across the early history; release-e2e's Instantiate
  # only catches them AFTER dispatching a provision. This catches them in seconds,
  # no cloud. Distinct from `scaffold` (that renders apl-values via `llz render` +
  # validates the apl-core schema; this renders the whole instance via copier).
  # SKIP_TF=1: the rendered TF roots' `terraform validate` is already covered by
  # the `terraform` job (tf-validate-roots).
  instantiate:
    name: Instantiate (copier render)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # git describe --tags (llz_version) + copier's `--vcs-ref HEAD` need the
          # full history + tags, not the default shallow clone.
          fetch-depth: 0
      - name: Set up Go and build llz
        uses: ./.github/actions/setup-llz
        with:
          install-path: /usr/local/bin/llz
      - name: Install copier + actionlint
        run: |
          set -euo pipefail
          pipx install copier
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Instantiate the template + assert render + structure + actionlint
        run: SKIP_TF=1 template-scripts/ci/instance-test.sh

  # ── Terraform ────────────────────────────────────────────────────────────────
  # Single source of truth via `make lint-tf` (= $(LINT_TF) in the Makefile):
  # tflint + checkov over the reusable modules, then instantiate + validate the
  # instance roots (rewrites published git:: module sources to in-repo paths;
  # init -backend=false + validate — no tags, backend, or cloud credentials).
  terraform:
    name: Terraform lint
    # Run on push always; on PRs only from the same repo (fork PRs can't pull the
    # private TF_IMAGE and must not run with repo context).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # GITHUB_TOKEN needs packages:read to pull the private CI image from GHCR.
      packages: read
    container:
      # Fall back to the image build-images.yml publishes under this repo's owner
      # when TF_IMAGE isn't set, so CI works on a fresh fork with no repo
      # variables. (Owner must be lowercase for GHCR — true for org logins.)
      image: ${{ vars.TF_IMAGE || format('ghcr.io/{0}/ci-terraform:1.9.8', github.repository_owner) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go (source llz for template-manifest gate)
        uses: ./.github/actions/setup-llz

      - name: tflint + checkov + validate instance roots
        run: make lint-tf

      # (An "Upload Checkov SARIF report" step ran here, uploading results_*.sarif.
      # `make checkov` never passed -o sarif or an output path, so that file was
      # never produced; if-no-files-found: ignore kept the step permanently green,
      # and nothing downloaded the artifact or fed it to codeql-action/upload-sarif.
      # It read as security coverage and was none. Checkov itself still GATES —
      # the make target exits non-zero on a finding, which is what actually
      # enforces. Re-add this only together with `-o sarif --output-file-path` and
      # a real consumer.)

  # ── Go tests + coverage ──────────────────────────────────────────────────────
  # `make coverage` runs `go test` across the tools module, then enforces the
  # per-package statement-coverage floors in COVERAGE_MINS (Makefile) via
  # `llz ci check-coverage` — the build fails if any gated
  # package drops below its floor. Pure Go: no private CI image, so unlike the
  # k8s/terraform jobs this runs on plain ubuntu-latest and on fork PRs too.
  go-tests:
    name: Go tests + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-llz

      # gofmt + vet. `make lint` runs these, but no CI job invokes plain `make
      # lint` — the workflows call the decomposed lint-k8s / lint-tf / coverage
      # entrypoints, none of which reach fmt-check or vet. So both were
      # unenforced, and four files had already drifted out of gofmt. Runs before
      # the test step: formatting is the cheapest thing to fail on.
      - name: gofmt + go vet
        run: make fmt-check vet

      - name: Test + enforce per-package coverage thresholds
        run: make coverage

      # Design-principle gate: fail when inline-bash / shell / python logic
      # exceeds .untestable-budget.yaml — the prompt to convert logic into the
      # unit-tested llz CLI rather than grow untestable CI shell. Runs here (not
      # in the container jobs) because it needs only the Go toolchain, already
      # set up above; `make untestable-loc-check` falls back to `go run`.
      - name: Untestable-LOC budget gate
        run: make untestable-loc-check

      # Guard: every container-job `run:` step must resolve to bash, not the
      # container's /bin/sh (dash). A missing default silently broke the scheduled
      # discover → auto-unseal / scheduled-checks / secret-rotation workflows
      # (`set -o pipefail` → "Illegal option" under dash). Fails lint if it recurs.
      - name: Workflow shell-default guard
        working-directory: tools
        run: go run ./cmd/llz ci check-workflow-shells --dir ../.github/workflows
