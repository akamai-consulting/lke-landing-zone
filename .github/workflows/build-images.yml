name: Build Container Images

on:
  push:
    # Rebuild on EVERY push to main — no path filter. The ci images bake the
    # `llz` binary stamped with `dev-<github.sha>` (--build-arg LLZ_VERSION), and
    # `llz ci assert-image-fresh` (run by release-e2e.yml + the instance dispatch
    # preflight) hard-fails when the `:latest` image's baked sha doesn't match the
    # checked-out template-ref. A path filter on dockerfiles/tools meant any main
    # merge that DIDN'T touch those paths (a chart-only or docs-only change) left
    # `:latest` stamped at an older sha, so the next e2e tripped the freshness
    # guard ("image/template skew"). Building on every main push keeps `:latest`'s
    # baked sha == HEAD; the LLZ_VERSION build-arg cache-busts the `go build` layer
    # so the sha is genuinely re-stamped, while unchanged source layers stay cached
    # (a no-op rebuild is mostly cache hits + a re-tag/push).
    branches: [main, master]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday rebuild
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build'
        required: true
        default: all
        type: choice
        options: [terraform, kubernetes, devcontainer, llz, all]
      sha:
        description: 'Full commit SHA to build (default: the dispatched ref HEAD). release-e2e passes the exact commit under test so the sha-<> tag it waits on matches even if the branch HEAD has since moved — `gh workflow run --ref` can only name a branch, so without this a build races HEAD.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

# Serialize builds per ref. Because this runs on EVERY main push (see above), two
# merges in quick succession otherwise race the same mutable `:latest` tag and the
# same `--cache-to type=gha,scope=<image>` entry — and the later-FINISHING run wins
# `:latest`, which may be the OLDER commit. That reintroduces exactly the
# `:latest`-vs-HEAD skew the no-path-filter design above exists to prevent, just
# through a different door.
#
# cancel-in-progress MUST stay false: cancelling a mid-flight build would leave
# that commit's `sha-<>` tag unpublished, which `llz ci pin-instance-images
# --build-if-missing` then has to re-trigger from scratch (and may be actively
# waiting on). Serialize; never cancel.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # The commit to build: a caller-supplied sha (release-e2e) pins the exact commit
  # so its sha-<> tag matches even when the branch HEAD moved after dispatch; else
  # the dispatched ref HEAD / pushed commit. (For a push event `inputs` is empty →
  # falls back to github.sha.)
  SHA: ${{ inputs.sha || github.sha }}

jobs:
  # ── Which images to build ────────────────────────────────────────────────────
  # The four images are built by ONE matrix job below; this computes which rows it
  # runs. It exists because `matrix` is NOT an available context in a job-level
  # `if:` (actionlint: "available contexts are github, inputs, needs, vars"), so
  # the per-image dispatch filter cannot live on the build job itself.
  plan:
    name: Plan image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - name: Pick the images to build
        id: pick
        env:
          # Non-dispatch triggers (push, schedule) always build everything.
          WANT: ${{ github.event_name == 'workflow_dispatch' && inputs.image || 'all' }}
        run: |
          set -euo pipefail
          ALL='[
            {"key":"terraform","image":"ci-terraform","target":"ci-terraform","version":"1.9.8"},
            {"key":"kubernetes","image":"ci-kubernetes","target":"ci-kubernetes","version":"1.31.0"},
            {"key":"devcontainer","image":"devcontainer","target":"devcontainer","version":""},
            {"key":"llz","image":"llz","target":"llz","version":""}
          ]'
          if [ "${WANT}" = "all" ]; then
            SEL="${ALL}"
          else
            SEL="$(printf '%s' "${ALL}" | jq -c --arg k "${WANT}" '[.[] | select(.key == $k)]')"
          fi
          if [ "$(printf '%s' "${SEL}" | jq 'length')" -eq 0 ]; then
            echo "::error::no image matches '${WANT}' — expected one of terraform|kubernetes|devcontainer|llz|all"
            exit 1
          fi
          printf 'matrix=%s\n' "$(printf '%s' "${SEL}" | jq -c '{include: .}')" >> "$GITHUB_OUTPUT"

  # ── Build + sign, one row per image ──────────────────────────────────────────
  # Was four jobs (build-terraform/-kubernetes/-devcontainer/-llz) that a
  # normalized diff showed to be identical except for THREE things: the dispatch
  # key, the image name, and an optional version tag. Everything else — platforms,
  # --provenance/--sbom, the tools-src build context, the gha cache scopes, and the
  # keyless cosign signature — was duplicated four times, so every change to the
  # build or signing recipe was four edits with three chances to miss one.
  build:
    name: Build ${{ matrix.image }}
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      # One image failing must not cancel the others — they are independent
      # publishes, and a partial set is more useful than none.
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.SHA }} # build the requested commit, not just the ref HEAD

      - name: Resolve GHCR namespace
        id: ns
        run: echo "repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          # All rows run in parallel and each pull the same binfmt image, which
          # setup-qemu-action otherwise caches under one fixed GHA key — so they
          # race to reserve it and log "another job may be creating this cache".
          # The image is tiny; skip caching it.
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # --provenance/--sbom attach SLSA provenance + an SBOM as OCI attestations in
      # the pushed index; --metadata-file captures the digest so the signature below
      # binds to the exact manifest that was pushed, not to a tag that could move.
      # The tools module is supplied via --build-context tools-src=tools so the
      # Dockerfile's llz stage can build without broadening the primary context.
      - name: Build and push ${{ matrix.image }}
        id: build
        env:
          REPO:    ${{ steps.ns.outputs.repo }}
          IMAGE:   ${{ matrix.image }}
          TARGET:  ${{ matrix.target }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          # The version tag is per-image and optional (ci-terraform pins the
          # terraform version, ci-kubernetes the kubectl one; devcontainer and llz
          # carry none), so it is appended rather than templated inline.
          TAGS=(--tag "${REPO}/${IMAGE}:latest" --tag "${REPO}/${IMAGE}:sha-${SHA}")
          [ -n "${VERSION}" ] && TAGS+=(--tag "${REPO}/${IMAGE}:${VERSION}")
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --provenance=true \
            --sbom=true \
            --metadata-file /tmp/build-meta.json \
            --build-context tools-src=tools \
            --build-arg "LLZ_VERSION=dev-${SHA}" \
            "${TAGS[@]}" \
            --cache-from "type=gha,scope=${IMAGE}" \
            --cache-to   "type=gha,scope=${IMAGE},mode=max" \
            --file dockerfiles/Dockerfile --target "${TARGET}" \
            dockerfiles
          echo "digest=$(jq -r '."containerimage.digest"' /tmp/build-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Sign ${{ matrix.image }} (keyless)
        env:
          IMAGE:  ${{ steps.ns.outputs.repo }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --use-signing-config=false --new-bundle-format=false "${IMAGE}@${DIGEST}"
