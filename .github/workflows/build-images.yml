name: Build Container Images

on:
  push:
    # Rebuild on EVERY push to main — no path filter. The ci images bake the
    # `llz` binary stamped with `dev-<github.sha>` (--build-arg LLZ_VERSION), and
    # `llz ci assert-image-fresh` (run by release-e2e.yml + the instance dispatch
    # preflight) hard-fails when the `:latest` image's baked sha doesn't match the
    # checked-out template-ref. A path filter on dockerfiles/tools meant any main
    # merge that DIDN'T touch those paths (a chart-only or docs-only change) left
    # `:latest` stamped at an older sha, so the next e2e tripped the freshness
    # guard ("image/template skew"). Building on every main push keeps `:latest`'s
    # baked sha == HEAD; the LLZ_VERSION build-arg cache-busts the `go build` layer
    # so the sha is genuinely re-stamped, while unchanged source layers stay cached
    # (a no-op rebuild is mostly cache hits + a re-tag/push).
    branches: [main, master]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday rebuild
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build'
        required: true
        default: all
        type: choice
        options: [terraform, kubernetes, devcontainer, llz, all]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-terraform:
    name: Build ci-terraform
    # The Dockerfile builds `llz` from the Go tools module, supplied via
    # `--build-context tools-src=tools`, so there is no separate builder image to
    # depend on.
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.image == 'terraform' ||
      inputs.image == 'all'
    runs-on: ubuntu-latest
    # packages: write lets the built-in GITHUB_TOKEN push to GHCR — no PAT needed.
    permissions:
      contents: read
      packages: write
      # Keyless cosign signing trades this OIDC token to Fulcio for a
      # short-lived signing cert; the signature + the cert's workflow identity
      # are recorded in the public Rekor transparency log (only the image digest
      # and identity — never image content).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve GHCR namespace
        id: ns
        # GHCR paths must be lowercase; derive the namespace from the repo owner so
        # images always land in this repo's org (akamai-consulting), and in an
        # adopter's own org after they fork — never a hardcoded personal account.
        run: echo "repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          # All three build jobs run in parallel and each pull the same binfmt
          # image, which setup-qemu-action otherwise caches under one fixed GHA
          # key — so the jobs race to reserve it and log a "another job may be
          # creating this cache" warning. The image is tiny; skip caching it.
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and push ci-terraform
        id: build
        # --build-context tools-src=tools exposes the Go tools module to the
        # Dockerfile's `llz` build stage without broadening the primary
        # build context. The gha cache is wired up by setup-buildx-action above.
        # --provenance/--sbom attach SLSA provenance + an SBOM as OCI
        # attestations in the pushed image index; --metadata-file captures the
        # pushed manifest-list digest so the next step signs by digest (immune to
        # tag re-pointing).
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --provenance=true \
            --sbom=true \
            --metadata-file /tmp/build-meta.json \
            --build-context tools-src=tools \
            --build-arg LLZ_VERSION=dev-${{ github.sha }} \
            --tag ${{ steps.ns.outputs.repo }}/ci-terraform:1.9.8 \
            --tag ${{ steps.ns.outputs.repo }}/ci-terraform:latest \
            --tag ${{ steps.ns.outputs.repo }}/ci-terraform:sha-${{ github.sha }} \
            --cache-from type=gha,scope=ci-terraform \
            --cache-to   type=gha,scope=ci-terraform,mode=max \
            dockerfiles/terraform
          echo "digest=$(jq -r '."containerimage.digest"' /tmp/build-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Sign ci-terraform (keyless)
        # Sign the manifest-list by digest. Keyless: cosign uses the job's OIDC
        # token (id-token: write) + Fulcio/Rekor public-good instances, so no
        # signing key is stored. The Kyverno verifyImages policy in
        # instance-template verifies this same identity at admission.
        #
        # --use-signing-config=false --new-bundle-format=false: force legacy
        # `sha256-<digest>.sig` tag storage. cosign v3.x (installed above) defaults
        # to the new Sigstore-bundle format stored via the OCI 1.1 referrers API,
        # which produces NO `.sig` tag — GHCR serves referrers flakily (303) and
        # Kyverno's keyless verifyImages reads the legacy `.sig` tag, so a
        # bundle-format signature is undiscoverable → admission fails "no signatures
        # found" and the in-cluster llz CronJobs are blocked. --use-signing-config
        # must be false too: v3 defaults it true and then REJECTS --new-bundle-format
        # =false. Verified: this pair yields the same simplesigning `.sig` manifest
        # cosign v2 produced. See the verify-llz-image-signature policy.
        env:
          IMAGE: ${{ steps.ns.outputs.repo }}/ci-terraform
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --use-signing-config=false --new-bundle-format=false "${IMAGE}@${DIGEST}"

  build-kubernetes:
    name: Build ci-kubernetes
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.image == 'kubernetes' ||
      inputs.image == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Keyless cosign signing trades this OIDC token to Fulcio for a
      # short-lived signing cert; the signature + the cert's workflow identity
      # are recorded in the public Rekor transparency log (only the image digest
      # and identity — never image content).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve GHCR namespace
        id: ns
        run: echo "repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          # See build-terraform: avoid the parallel binfmt cache-reserve race.
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and push ci-kubernetes
        id: build
        # --build-context tools-src=tools exposes the Go tools module to the
        # Dockerfile's llz build stage (the image bakes `llz` for the Makefile's
        # externalsecret-paths-check), exactly like ci-terraform/devcontainer.
        # --provenance/--sbom + --metadata-file: see ci-terraform above.
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --provenance=true \
            --sbom=true \
            --metadata-file /tmp/build-meta.json \
            --build-context tools-src=tools \
            --build-arg LLZ_VERSION=dev-${{ github.sha }} \
            --tag ${{ steps.ns.outputs.repo }}/ci-kubernetes:1.31.0 \
            --tag ${{ steps.ns.outputs.repo }}/ci-kubernetes:latest \
            --tag ${{ steps.ns.outputs.repo }}/ci-kubernetes:sha-${{ github.sha }} \
            --cache-from type=gha,scope=ci-kubernetes \
            --cache-to   type=gha,scope=ci-kubernetes,mode=max \
            dockerfiles/kubernetes
          echo "digest=$(jq -r '."containerimage.digest"' /tmp/build-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Sign ci-kubernetes (keyless)
        # Keyless cosign sign by digest — see ci-terraform above.
        env:
          IMAGE: ${{ steps.ns.outputs.repo }}/ci-kubernetes
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --use-signing-config=false --new-bundle-format=false "${IMAGE}@${DIGEST}"

  build-devcontainer:
    name: Build devcontainer
    # The adopter-workstation image consumed by instances' .devcontainer/. Like
    # ci-terraform it bakes a Go binary from the tools/ module (the `llz` CLI,
    # supplied via `--build-context tools-src=tools`); every other tool is fetched
    # by digest at build time.
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.image == 'devcontainer' ||
      inputs.image == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Keyless cosign signing trades this OIDC token to Fulcio for a
      # short-lived signing cert; the signature + the cert's workflow identity
      # are recorded in the public Rekor transparency log (only the image digest
      # and identity — never image content).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve GHCR namespace
        id: ns
        run: echo "repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          # See build-terraform: avoid the parallel binfmt cache-reserve race.
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and push devcontainer
        id: build
        # --build-context tools-src=tools exposes the Go tools module to the
        # Dockerfile's llz build stage. LLZ_VERSION stamps main.version so the
        # baked-in `llz version` is traceable to this build. Adopters pin :latest
        # to a :sha-... tag in .devcontainer/devcontainer.json for reproducibility.
        # --provenance/--sbom + --metadata-file: see ci-terraform above.
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --provenance=true \
            --sbom=true \
            --metadata-file /tmp/build-meta.json \
            --build-context tools-src=tools \
            --build-arg LLZ_VERSION=dev-${{ github.sha }} \
            --tag ${{ steps.ns.outputs.repo }}/devcontainer:latest \
            --tag ${{ steps.ns.outputs.repo }}/devcontainer:sha-${{ github.sha }} \
            --cache-from type=gha,scope=devcontainer \
            --cache-to   type=gha,scope=devcontainer,mode=max \
            dockerfiles/devcontainer
          echo "digest=$(jq -r '."containerimage.digest"' /tmp/build-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Sign devcontainer (keyless)
        # Keyless cosign sign by digest — see ci-terraform above.
        env:
          IMAGE: ${{ steps.ns.outputs.repo }}/devcontainer
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --use-signing-config=false --new-bundle-format=false "${IMAGE}@${DIGEST}"

  build-llz:
    name: Build llz (slim in-cluster image)
    # Slim distroless image carrying ONLY the static llz binary, for workloads
    # that run llz IN the cluster (the Linode credential rotator CronJob, and the
    # volume-labeler once it moves off the alpine/k8s shell script). Bakes llz from
    # the tools/ module via `--build-context tools-src=tools`, like the CI images.
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.image == 'llz' ||
      inputs.image == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Keyless cosign signing trades this OIDC token to Fulcio for a
      # short-lived signing cert; the signature + the cert's workflow identity
      # are recorded in the public Rekor transparency log (only the image digest
      # and identity — never image content).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve GHCR namespace
        id: ns
        run: echo "repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          # See build-terraform: avoid the parallel binfmt cache-reserve race.
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Build and push llz
        id: build
        # --build-context tools-src=tools exposes the Go tools module to the
        # Dockerfile's llz build stage. In-cluster consumers pin :latest to a
        # :sha-... tag for reproducibility (same convention as devcontainer).
        # --provenance/--sbom + --metadata-file: see ci-terraform above. This is
        # the one image that runs IN the cluster (credential-rotator CronJob),
        # so its signature is what the Kyverno verifyImages policy enforces.
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --provenance=true \
            --sbom=true \
            --metadata-file /tmp/build-meta.json \
            --build-context tools-src=tools \
            --build-arg LLZ_VERSION=dev-${{ github.sha }} \
            --tag ${{ steps.ns.outputs.repo }}/llz:latest \
            --tag ${{ steps.ns.outputs.repo }}/llz:sha-${{ github.sha }} \
            --cache-from type=gha,scope=llz \
            --cache-to   type=gha,scope=llz,mode=max \
            dockerfiles/llz
          echo "digest=$(jq -r '."containerimage.digest"' /tmp/build-meta.json)" >> "$GITHUB_OUTPUT"

      - name: Sign llz (keyless)
        # Keyless cosign sign by digest — see ci-terraform above.
        env:
          IMAGE: ${{ steps.ns.outputs.repo }}/llz
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --use-signing-config=false --new-bundle-format=false "${IMAGE}@${DIGEST}"
