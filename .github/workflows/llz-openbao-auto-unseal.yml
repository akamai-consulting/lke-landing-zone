name: llz-openbao-auto-unseal (reusable)

# Reusable (`workflow_call`) version of the self-converging OpenBao unseal loop.
# Surface-reduction pattern (docs/templatization-plan.md §"Keeping instances in
# sync"): an instance ships a thin caller stub (which owns the `schedule:` and
# concurrency) instead of copying this body, the fetch-kubeconfig action, AND
# the `llz ci bao-status`/`bao-unseal` probes (llz is baked into TF_IMAGE) —
# all sourced here from one checkout of the LLZ template. The caller forwards `region`; `github.ref` /
# `github.event_name` are inherited from the caller, so the main-only guard and
# the dispatch-narrowing matrix below behave exactly as before.
#
# WHY THIS EXISTS:
#   OpenBao pods come up sealed after every restart (Shamir, no auto-unseal
#   provider). The cold-bootstrap cert-watcher race and the ~80-day CA renewal
#   both reseal them; without this loop the cluster stays sealed until an
#   operator notices and re-dispatches bootstrap-openbao.yml.
#
# WHAT THIS DOES:
#   Polls each region. If the cluster is initialized AND any pod is sealed,
#   submits the 3 unseal keys to every pod (idempotent) and re-verifies. The
#   seal-detect and unseal steps are the same `llz ci bao-status` /
#   `llz ci bao-unseal` commands bootstrap-openbao.yml runs.
#
# WHAT THIS DELIBERATELY DOES NOT DO:
#   - Initialize a fresh cluster (no `bao operator init`).
#   - Touch OPENBAO_ROOT_TOKEN, or write any GitHub Actions secrets.
#   - Configure OpenBao mounts/auth/policies — purely an unseal loop.

on:
  workflow_call:
    inputs:
      region:
        description: 'Deployment to unseal: "all" (default — every deployment from the instance tfvars), or a single deployment name to narrow on dispatch.'
        required: false
        type: string
        default: all
      template-ref:
        description: 'LLZ template ref to source the unseal script + fetch-kubeconfig action from. Pin to the same tag as this workflow''s @<ref>.'
        required: false
        type: string
        default: main
    # All required: false. These are infra-<env> ENVIRONMENT secrets, resolved by
    # the auto-unseal job via its `environment: infra-<region>` block — NOT passed
    # across the workflow_call boundary. `secrets: inherit` only forwards repo/org
    # secrets, so declaring these `required: true` makes GitHub reject the whole
    # call (every job, before any step) whenever they aren't repo-level — which is
    # the normal case, and ALWAYS the case before the first cluster is bootstrapped
    # (the unseal keys don't exist yet). false lets the call through; the job then
    # no-ops on a missing cluster (allow-missing → available=false).
    secrets:
      TF_STATE_ACCESS_KEY:
        required: false
      TF_STATE_SECRET_KEY:
        required: false
      LINODE_API_TOKEN:
        description: 'Linode API token used to open/revoke this runner''s egress IP in the LKE-E control-plane ACL for the kubectl steps.'
        required: false
      OPENBAO_UNSEAL_KEY_1:
        required: false
      OPENBAO_UNSEAL_KEY_2:
        required: false
      OPENBAO_UNSEAL_KEY_3:
        required: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ── Discover deployments (the unseal matrix source of truth) ─────────────────
  # Every deployment runs an OpenBao that comes up sealed after a restart —
  # standalone and HA members alike — so the unseal loop fans out over the full
  # deployment set (the shared llz-discover-deployments.yml reusable workflow),
  # not a fixed primary/secondary pair. Main-only, matching the auto-unseal gate.
  discover:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/llz-discover-deployments.yml

  auto-unseal:
    name: Auto-Unseal (${{ matrix.region }})
    needs: discover
    runs-on: ubuntu-latest
    # Defense-in-depth: the caller's schedule trigger is already main-only, but
    # this `if:` (github.ref is inherited from the caller) prevents an attacker
    # who got commit access on a feature branch from re-dispatching against
    # infra-<region>'s secret bundle. The job won't start at all on non-main
    # refs, so the environment is never selected and OPENBAO_UNSEAL_KEY_* never
    # resolve.
    if: github.ref == 'refs/heads/main'
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ matrix.region }}
    timeout-minutes: 10
    # If one region's cluster is gone (allow-missing=true short-circuits the
    # kubeconfig fetch) or unreachable, don't fail the other region's job.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # All deployments on schedule (discovered from the instance tfvars); a
        # dispatch can narrow to one via the `region` input. `inputs.region ==
        # 'all'` (the default) keeps every deployment.
        region: ${{ (github.event_name == 'workflow_dispatch' && inputs.region != 'all') && fromJSON(format('["{0}"]', inputs.region)) || fromJSON(needs.discover.outputs.deployments) }}
    env:
      TF_VERSION:          '1.9.8'
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ matrix.region }}
    steps:
      # Dual checkout (Option A): the caller instance at the workspace root (so
      # the fetch-kubeconfig action's `terraform-iac-bootstrap/cluster`
      # working-dir resolves against the instance's TF roots) + the LLZ template
      # into _llz-template/ for the fetch-kubeconfig action and unseal script.
      - name: Checkout the instance (TF roots)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Checkout LLZ template (action + script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: akamai-consulting/lke-landing-zone
          github-server-url: https://github.com
          ref: ${{ inputs.template-ref }}
          token: ${{ github.token }}
          path: _llz-template

      # Fetch the kubeconfig, open this hosted-runner's egress IP in the
      # control-plane ACL before the kubectl unseal calls (revoked at job end,
      # if: always()), and install llz. allow-missing: if the region's cluster
      # has been destroyed (orphan state, or one half of a DR pair not yet
      # provisioned), `kubeconfig_raw` is absent and the action sets
      # available=false instead of failing — the ACL open + llz install are
      # skipped internally, subsequent steps short-circuit and the job is a no-op.
      - name: Cluster access (kubeconfig + runner ACL + llz)
        id: kubeconfig
        uses: ./_llz-template/instance-template/.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ matrix.region }}
          allow-missing:         'true'

      # No cluster for this deployment yet (fresh instance, or DR peer not
      # provisioned): cluster-access set available=false. Make the no-op explicit
      # so a green-but-empty scheduled run isn't mistaken for a problem.
      - name: No cluster yet — nothing to unseal
        if: always() && steps.kubeconfig.outputs.available != 'true'
        run: |
          echo "::notice title=No-op (no cluster yet)::OpenBao auto-unseal for ${REGION} is a no-op until your first cluster is built — run 'llz build ${REGION} --yes' (or 'llz up ${REGION} --yes'). Nothing to unseal."
          echo "### OpenBao auto-unseal — no-op: no cluster for ${REGION} yet. Build it ('llz build ${REGION} --yes') and the unseal loop starts automatically." >> "$GITHUB_STEP_SUMMARY"

      # ── Seal state detection — the SAME `llz ci bao-status` probe
      # bootstrap-openbao.yml branches on (formerly a verbatim-copy inline
      # step that had to be edited in both places).
      - name: Check OpenBao status
        id: bao_status
        if: steps.kubeconfig.outputs.available == 'true'
        run: llz ci bao-status

      # Pre-init clusters (fresh apply that hasn't been bootstrapped yet)
      # belong to bootstrap-openbao.yml's first-init branch, not here. Log
      # and exit cleanly — the operator dispatches bootstrap-openbao.yml
      # when they're ready to provision.
      - name: Skip — cluster not yet initialized
        if: steps.kubeconfig.outputs.available == 'true' && steps.bao_status.outputs.initialized == 'false'
        run: |
          echo "::notice::OpenBao on ${REGION} is not initialized — dispatch bootstrap-openbao.yml to provision. Skipping auto-unseal."

      # Already-fully-unsealed steady state. Common case, also a no-op.
      - name: Skip — all pods already unsealed
        if: steps.kubeconfig.outputs.available == 'true' && steps.bao_status.outputs.initialized == 'true' && steps.bao_status.outputs.sealed == 'false'
        run: |
          echo "All 3 OpenBao pods on ${REGION} report sealed=false — no action."

      # ── The unseal loop — shared with bootstrap-openbao.yml's Branch B
      # "Unseal all pods (already initialized, sealed)" step via
      # `llz ci bao-unseal` (single source of truth; no more verbatim copy to
      # keep in sync). 3-keys-x-3-pods is idempotent: `bao operator unseal`
      # against an unsealed pod reports "Vault is unsealed" and exits 0;
      # against a sealed pod advances the counter.
      - name: Unseal all pods (already initialized, sealed)
        if: steps.kubeconfig.outputs.available == 'true' && steps.bao_status.outputs.initialized == 'true' && steps.bao_status.outputs.sealed == 'true'
        env:
          UNSEAL_K1: ${{ secrets.OPENBAO_UNSEAL_KEY_1 }}
          UNSEAL_K2: ${{ secrets.OPENBAO_UNSEAL_KEY_2 }}
          UNSEAL_K3: ${{ secrets.OPENBAO_UNSEAL_KEY_3 }}
        run: llz ci bao-unseal

      # Re-verify with the same probe. If a pod is still sealed after we
      # submitted 3/3 keys to it, something is wrong (key mismatch, OpenBao
      # quorum issue, or a pod was restarting mid-loop and re-sealed). Warn
      # rather than error so the next scheduled run gets another shot — and
      # so that one bad region doesn't burn the schedule for the other.
      - name: Re-verify after unseal
        id: reverify
        if: steps.kubeconfig.outputs.available == 'true' && steps.bao_status.outputs.initialized == 'true' && steps.bao_status.outputs.sealed == 'true'
        run: llz ci bao-status

      - name: Report re-verify result
        if: steps.kubeconfig.outputs.available == 'true' && steps.bao_status.outputs.initialized == 'true' && steps.bao_status.outputs.sealed == 'true'
        env:
          STILL_SEALED: ${{ steps.reverify.outputs.sealed }}
        run: |
          set -euo pipefail
          {
            printf '## OpenBao Auto-Unseal — %s — %s\n\n' \
              "$REGION" "$(date -u +%Y-%m-%dT%H:%MZ)"
            if [ "$STILL_SEALED" = "false" ]; then
              printf 'All 3 pods unsealed after auto-unseal cycle.\n'
            else
              printf 'WARNING: pods still sealed after auto-unseal cycle (per-pod state in the re-verify step log).\n'
              # shellcheck disable=SC2016
              # `{1,2,3}` is literal text in the printf format string, not
              # bash brace expansion. The single quotes are intentional.
              printf '\nNext scheduled run will retry in ~10 minutes. If still sealed after several cycles, run `bootstrap-openbao.yml` and check `OPENBAO_UNSEAL_KEY_{1,2,3}` on `infra-%s`.\n' "$REGION"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$STILL_SEALED" != "false" ]; then
            echo "::warning::OpenBao pod(s) on ${REGION} still sealed after auto-unseal — retrying next scheduled run."
          fi

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./_llz-template/instance-template/.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ matrix.region }}
