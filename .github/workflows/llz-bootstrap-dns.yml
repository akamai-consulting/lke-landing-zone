name: llz-bootstrap-dns (reusable)

# Reusable (`workflow_call`) version of the DNS-01 ClusterIssuer apply.
#
# Applies the llz-letsencrypt DNS-01 ClusterIssuers
# (apl-values/_shared/manifest/dns) to a region's cluster. DNS-01 challenges are
# solved by apl-core's cert-manager-webhook-linode (API group `acme.slicen.me`),
# which holds its own Linode API token — the landing zone neither seeds an
# OpenBao path nor materializes a solver Secret. This tree is split out of the
# main manifest kustomization so the ClusterIssuers can be (re)applied
# independently.
#
# Surface-reduction pattern (docs/templatization-plan.md §"Keeping instances in
# sync"). Dual checkout (Option A): the caller instance sits at the workspace
# root — so the fetch-kubeconfig action's `terraform-iac-bootstrap/cluster`
# working-dir resolves AND the apl-values/_shared/manifest/dns kustomize tree is
# present — while the LLZ template is checked out into _llz-template/ for the
# fetch-kubeconfig action. The instance therefore copies neither the action nor
# the scripts — only this caller + its own overlays. The caller forwards `region`.
#
# Effect:
#   • Applies apl-values/_shared/manifest/dns (the llz-letsencrypt ClusterIssuers)
#     to the target region's cluster

on:
  workflow_call:
    inputs:
      region:
        description: 'Deployment (matches an infra-<region> Environment in the caller repo)'
        required: true
        type: string
      template-ref:
        description: 'LLZ template ref to source the fetch-kubeconfig action + scripts from. Pin to the same tag as this workflow''s @<ref>.'
        required: false
        type: string
        default: main
    secrets:
      TF_STATE_ACCESS_KEY:
        required: true
      TF_STATE_SECRET_KEY:
        required: true
      LINODE_API_TOKEN:
        description: 'Linode API token used to open/revoke this runner''s egress IP in the LKE-E control-plane ACL for the kubectl steps.'
        required: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  apply-dns:
    name: Apply DNS-01 ClusterIssuers (${{ inputs.region }})
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.TF_IMAGE }}
    permissions:
      contents: read
    environment: infra-${{ inputs.region }}
    timeout-minutes: 10
    env:
      TF_STATE_BUCKET:     ${{ vars.TF_STATE_BUCKET }}
      AWS_ENDPOINT_URL_S3: ${{ vars.TF_STATE_ENDPOINT }}
      REGION:              ${{ inputs.region }}

    steps:
      # Instance at the workspace root (fetch-kubeconfig's terraform-iac-bootstrap/
      # working-dir + the apl-values tree); template into _llz-template/.
      - name: Checkout the instance (TF roots + apl-values overlays)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Checkout LLZ template (action + scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: akamai-consulting/lke-landing-zone
          github-server-url: https://github.com
          ref: ${{ inputs.template-ref }}
          token: ${{ github.token }}
          path: _llz-template

      # ── Cluster access ──────────────────────────────────────────────────────────
      # Fetch the kubeconfig, open this hosted-runner's dynamic egress IP in the
      # LKE-E control-plane ACL before any kubectl (revoked at job end,
      # if: always()), and install llz.
      - name: Cluster access (kubeconfig + runner ACL + llz)
        uses: ./_llz-template/instance-template/.github/actions/cluster-access
        with:
          aws-access-key-id:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.TF_STATE_SECRET_KEY }}
          github-token:          ${{ github.token }}
          kubeconfig-path:       $HOME/.kube/config
          linode-token:          ${{ secrets.LINODE_API_TOKEN }}
          region:                ${{ inputs.region }}

      # ── Apply the DNS kustomize tree (llz-letsencrypt ClusterIssuers) ─────────
      # The dns/ tree is split out of the shared manifest kustomization
      # (apl-values/_shared/manifest/kustomization.yaml does NOT include dns/) so
      # the llz-letsencrypt ClusterIssuers can be (re)applied independently. The
      # dns/ tree is instance-wide (DRY — one copy under _shared, applied to every
      # region's cluster); ${REGION} selects the target cluster's kubeconfig, not
      # a per-env manifest copy.
      - name: Apply DNS kustomize tree
        run: |
          set -euo pipefail
          kubectl apply -k "apl-values/_shared/manifest/dns"
          echo "DNS kustomize tree applied (llz-letsencrypt ClusterIssuers)."

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Write run summary
        if: always()
        run: |
          {
            printf '## DNS bootstrap (%s)\n\n' "$REGION"
            printf -- "- Applied \`apl-values/_shared/manifest/dns\` (llz-letsencrypt ClusterIssuers) to the %s cluster\n" "$REGION"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Revoke control-plane ACL for this runner
        if: always()
        uses: ./_llz-template/instance-template/.github/actions/lke-runner-acl
        with:
          mode:         revoke
          linode-token: ${{ secrets.LINODE_API_TOKEN }}
          region:       ${{ inputs.region }}
