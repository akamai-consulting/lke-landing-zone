name: Release llz binaries

# Builds the `llz` adopter CLI (tools/cmd/llz) as static, multi-platform binaries
# and attaches them to a GitHub Release, so adopters can `curl` one for their
# platform without a Go toolchain (see docs/quickstart.md install snippet).
#
# Trigger: `released` — a full release `vX.Y.Z` is published, OR a pre-release is
# promoted to one (see terraform-modules/RELEASING.md). This fires only AFTER the
# e2e gate: the candidate is published as a pre-release (release-e2e.yml runs on
# `prereleased`), and a human promotes it once e2e is green — that promotion is the
# `released` event. We key off the release event (not a tag push) because a release
# created with the built-in GITHUB_TOKEN would suppress downstream runs; the human
# promoting it is what arms the fan-out. The release's tag semver is stamped into
# the binary via -ldflags (main.version); this job attaches the binaries to the
# now-full release.
#
# Assets: llz-<os>-<arch> for {darwin,linux} x {amd64,arm64}, plus SHA256SUMS.

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Build
        working-directory: tools
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          # $GITHUB_REF is a trusted built-in (refs/tags/vX.Y.Z); derive the
          # semver and stamp it into main.version.
          VER="${GITHUB_REF##*/}"
          [[ "$GITHUB_REF" == refs/tags/v* ]] || VER="dev"
          out="llz-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "-s -w -X main.version=${VER}" -o "../${out}" ./cmd/llz
          echo "asset=${out}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.asset }}
          path: ${{ env.asset }}
          if-no-files-found: error

  release:
    name: Attach binaries to the release
    needs: build
    # Only the real release event has a release to attach to; a manual dispatch
    # just exercises the matrix build (artifacts only).
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents: write lets the built-in GITHUB_TOKEN upload assets to the release.
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum llz-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attach binaries to the published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The release already exists (this job runs on its publication); --clobber
        # makes re-runs idempotent.
        run: gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber dist/llz-* dist/SHA256SUMS

  functional:
    name: Documented install flow (against the published release)
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Build llz
        run: cd tools && go build -o ../bin/llz ./cmd/llz

      - name: Functional + install/self-update flow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLZ_FUNCTIONAL_REPO: ${{ github.repository }}
          # Validate the documented install path (gh release download + checksum +
          # `llz self-update`) against the now-published full release. Runs here, not
          # in release-e2e.yml, because `needs: release` guarantees the binaries are
          # attached first — no cross-workflow race, and the full release exists by
          # definition (this fires on `released`).
          LLZ_FUNCTIONAL_NET: "1"
        run: template-scripts/ci/llz-functional.sh
