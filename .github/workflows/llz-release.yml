name: Release llz binaries

# Builds the `llz` adopter CLI (tools/cmd/llz) as static, multi-platform binaries
# and attaches them to a GitHub Release, so adopters can `curl` one for their
# platform without a Go toolchain (see docs/quickstart.md install snippet).
#
# Trigger: `released` — a full release `vX.Y.Z` is published, OR a pre-release is
# promoted to one (see terraform-modules/RELEASING.md). This fires only AFTER the
# e2e gate: the candidate is published as a pre-release (release-e2e.yml runs on
# `prereleased`), and a human promotes it once e2e is green — that promotion is the
# `released` event. We key off the release event (not a tag push) because a release
# created with the built-in GITHUB_TOKEN would suppress downstream runs; the human
# promoting it is what arms the fan-out. The release's tag semver is stamped into
# the binary via -ldflags (main.version); this job attaches the binaries to the
# now-full release.
#
# Assets: llz-<os>-<arch> for {darwin,linux} x {amd64,arm64}, plus SHA256SUMS.

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: ./.github/actions/setup-llz

      - name: Build
        working-directory: tools
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          # $GITHUB_REF is a trusted built-in (refs/tags/vX.Y.Z); derive the
          # semver and stamp it into main.version.
          VER="${GITHUB_REF##*/}"
          [[ "$GITHUB_REF" == refs/tags/v* ]] || VER="dev"
          out="llz-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags "-s -w -X main.version=${VER}" -o "../${out}" ./cmd/llz
          echo "asset=${out}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.asset }}
          path: ${{ env.asset }}
          if-no-files-found: error

  release:
    name: Attach binaries to the release
    needs: build
    # Only the real release event has a release to attach to; a manual dispatch
    # just exercises the matrix build (artifacts only).
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents: write lets the built-in GITHUB_TOKEN upload assets to the release.
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum llz-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attach binaries to the published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The release already exists (this job runs on its publication); --clobber
        # makes re-runs idempotent.
        run: gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber dist/llz-* dist/SHA256SUMS

  # ── Publish the release-version container tag ────────────────────────────────
  # build-images.yml only ever pushes :latest and :sha-<SHA> (the llz image has no
  # static `version` in its matrix). Nothing published :vX.Y.Z — so an instance
  # pinned to a release rendered ghcr.io/…/llz:v0.0.28 into its carved apps and
  # got a 404 / ImagePullBackOff (see llzImageTagFor in tools/cmd/llz/render.go).
  #
  # RETAG rather than rebuild: the sha- image for this commit is the artifact
  # release-e2e already validated, so pointing the version tag at the same
  # manifest keeps the release byte-identical to what was tested. `imagetools
  # create` copies the multi-arch index, preserving both platforms + provenance.
  image-tag:
    name: Retag the llz image as ${{ github.event.release.tag_name }}
    # Only a real release has a version to publish; a dispatch run has no tag.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Point the version tag at this commit's image
        env:
          OWNER: ${{ github.repository_owner }}
          SHA:   ${{ github.sha }}
          VER:   ${{ github.event.release.tag_name }}
        # Fails loudly if the sha- image is missing (a release cut from a commit
        # whose build-images run never completed) — better than a silent 404 that
        # only surfaces as an ImagePullBackOff in an adopter's cluster.
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "ghcr.io/${OWNER}/llz:${VER}" "ghcr.io/${OWNER}/llz:sha-${SHA}"
          docker buildx imagetools inspect "ghcr.io/${OWNER}/llz:${VER}" >/dev/null

  functional:
    name: Documented install flow (against the published release)
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go and build llz
        uses: ./.github/actions/setup-llz
        with:
          install-path: ${{ github.workspace }}/bin/llz

      - name: Functional + install/self-update flow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLZ_FUNCTIONAL_REPO: ${{ github.repository }}
          # Validate the documented install path (gh release download + checksum +
          # `llz self-update`) against the now-published full release. Runs here, not
          # in release-e2e.yml, because `needs: release` guarantees the binaries are
          # attached first — no cross-workflow race, and the full release exists by
          # definition (this fires on `released`).
          LLZ_FUNCTIONAL_NET: "1"
        run: template-scripts/ci/llz-functional.sh
