[extend]
useDefault = true

# Research prototype material: contains self-signed TLS certs generated for
# local load-test deployments.  These keys have never been used in production.
[[allowlists]]
id          = "research-materials"
description = "Research prototype certs and test keys"
paths       = ['''research-materials/''']

# Vendored third-party GitHub Actions — not our code.
[[allowlists]]
id          = "vendored-actions"
description = "Vendored GitHub Actions"
paths       = ['''\.github/actions/vendor/''']

# HashiCorp's public GPG signing key — used to verify Terraform release
# signatures and intentionally committed to the repo.
[[allowlists]]
id          = "hashicorp-gpg"
description = "HashiCorp public signing key for Terraform verification"
paths       = ['''\.github/actions/setup-terraform/hashicorp\.gpg\.asc''']

# False-positive: shell-snippet placeholder syntax in operator runbooks.
# Gitleaks' generic-api-key heuristic captures the substring
# `token> REGION=...` and treats the literal `REGION=us-ord` as a secret —
# the actual sensitive part is the `<token>` placeholder, which is exactly
# that, a placeholder. Match only the exact `<…token> REGION=` shape so
# this allowlist doesn't accidentally silence real secrets that happen to
# share one of those words.
#
# Pattern is intentionally narrow:
#   <token> REGION=us-ord ...
#   <work-account token> REGION=us-ord ...
#   <your-token> REGION=us-ord ...
[[allowlists]]
id           = "shell-token-placeholder-region-env"
description  = "Bash placeholder <token> followed by REGION env var assignment"
regexTarget  = "match"
regexes      = ['''token>\s+REGION=''']

# False-positive: the linode object-key CI command (ci_temp_objkey.go) writes the
# minted key to GITHUB_ENV via `"TEMP_OBJKEY_SECRET="+secret`. Gitleaks'
# generic-api-key heuristic captures that Go string LITERAL — the env-var NAME
# concatenated with the runtime value — as if it were a hardcoded credential. The
# value only ever lives in the `secret`/`access` variables at runtime, never in
# source. Match just the exact var-name literal so a real secret can't hide here.
[[allowlists]]
id           = "temp-objkey-env-var-name-literals"
description  = "GITHUB_ENV var-name literals in ci_temp_objkey.go (names, not secrets)"
regexTarget  = "match"
regexes      = ['''TEMP_OBJKEY_(ACCESS|SECRET)=''']

# False-positive: generic-api-key matches the `keyRotationDays: DEPRECATED/ignored`
# note in the landing-zone spec doc (the `key…` word plus following prose). It is
# documentation in a spec example, not a credential. Narrow to that exact phrase.
[[allowlists]]
id           = "spec-keyrotationdays-doc-note"
description  = "keyRotationDays deprecation note in docs/landing-zone-spec.md"
regexTarget  = "match"
regexes      = ['''keyRotationDays:\s+DEPRECATED''']

# False-positive: `openbaoKey:` in a managed-apps app manifest names an OpenBao
# path (an ESO remoteRef), NOT a secret value — the credential itself is fetched
# at runtime and never committed. gitleaks' generic-api-key heuristic sees
# `…Key: <value>` and guesses. Match only the exact `openbaoKey: <path>` shape
# (regexTarget=match, NOT path-scoped) so a real secret on any other line/file is
# still caught — a `paths` glob would OR-allowlist the whole file and hide them.
# (Kept in sync with instance-template/.gitleaks.toml.)
[[allowlists]]
id           = "managed-apps-openbao-key-ref"
description  = "openbaoKey is a vault path reference, not a secret"
regexTarget  = "match"
regexes      = ['''openbaoKey:\s*\S+''']
