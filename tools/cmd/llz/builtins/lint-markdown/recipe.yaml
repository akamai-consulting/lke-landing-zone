schemaVersion: 2
name: lint-markdown
short: markdownlint config + check for docs hygiene (built-in, opt-in)
kind: tool
optional: true
files:
  - {src: markdownlint.json, dst: .markdownlint.json}
# markdownlint-cli expands the glob itself (no shell), and auto-discovers the scaffolded
# .markdownlint.json — the same config→check hookDep as lint-yaml.
check:
  - {name: markdownlint, argv: [markdownlint, "**/*.md"]}
