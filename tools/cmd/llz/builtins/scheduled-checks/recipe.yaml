schemaVersion: 2
name: scheduled-checks
short: scheduled credential/cluster audits + a PAT-expiry health probe (built-in, opt-in)
kind: tool
optional: true
# HookCI + TriggerSchedule: a `schedule:` cron emits each step into the generated
# llz-extensions-scheduled.yml (separate from the converge-anchored workflow).
ci:
  - {name: cred-audit, schedule: "0 6 * * 1", argv: [llz, ci, cred-audit]}
  - {name: cluster-health, schedule: "*/30 * * * *", argv: [llz, ci, health]}
# HookHealth: report-only, surfaced by `llz doctor` / `llz status` — never a gate.
health:
  - {name: pat-expiry, argv: [llz, ci, gh-pat-expiry]}
