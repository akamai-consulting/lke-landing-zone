# gitlab-ci/secret-rotation.yml — GitLab analog of .github/workflows/llz-secret-rotation.yml. Best-effort, not validated against live GitLab.
#
# Monthly out-of-band rotation for the two policy-tracked credentials (the
# lke-admin token per region, and the shared LINODE_API_TOKEN PAT), plus the
# TF-state Object-Storage key pair. Mirrors the github.com reusable workflow's
# job topology and calls the SAME `llz …` commands baked into $LLZ_TF_IMAGE.
#
# ── Drivers (set as pipeline variables on a manual/scheduled run) ─────────────
#   LLZ_SCOPE         — what to rotate on a manual `web` run: lke-admin | linode-pat
#                       | tf-state | all. Mirrors the GHA `scope` dispatch input.
#                       Ignored on schedule (schedule rotates everything).
#   REGION            — region for the lke-admin rotation (analog of the GHA
#                       `region` input + the infra-<region> environment + tfstate
#                       key path). lke-admin scope only.
#   LLZ_INSTANCE_REPO — this instance's repo (<owner>/<name>) for `gh secret set`
#                       targeting (analog of the GHA `instance_repo` input).
#   CONFIRM           — emergency-rotation confirmation token (manual only).
#
# ── Apply gates (mutating jobs are `when: manual` AND gated on these) ─────────
#   PAT_APPLY              — arm Linode PAT create+propagate?         (else dry-run)
#   REVOKE_APPLY           — arm Linode PAT revoke-old?               (else dry-run)
#   TF_STATE_APPLY         — arm TF-state OBJ key create?            (else dry-run)
#   TF_STATE_REVOKE_APPLY  — arm TF-state OBJ key revoke-old?        (else dry-run)
#   On a `schedule` pipeline these all default to "true" (see job variables).
#
# Region-scoped jobs bind the infra-$REGION GitLab environment (the approval/soak
# gate, analog of the GH infra-<region> Environments) and open/revoke this
# runner's control-plane ACL around any kubectl. The repo-level secret jobs
# (PAT + tf-state key create/revoke) need no environment and no ACL.

# Stages preserve the GHA `needs:` chain: setup routes first, then the per-scope
# create/rotate jobs, then PAT propagation (needs create), then the drains.
stages:
  - setup
  - rotate
  - propagate
  - revoke

# ── Setup: resolve scope + validate emergency confirmation (analog of `setup`) ─
# The GHA `setup` job's single step is `llz ci rotation-plan`; downstream jobs
# here are gated by GitLab `rules:` on $LLZ_SCOPE / $CI_PIPELINE_SOURCE rather
# than by consuming routing outputs, but the routing plan is still emitted for
# the audit log and to fail fast on a bad emergency confirmation.
rotation-setup:
  extends: .llz-base
  stage: setup
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - llz ci rotation-plan

# ── Rotate lke-admin → TF state refresh → health gate (analog of `rotate`) ────
# Region-scoped: binds infra-$REGION and opens/revokes this runner's ACL.
# Mutating, so `when: manual` on a web run and gated on $CONFIRM; runs
# automatically on a schedule.
rotate-lke-admin:
  extends: .llz-base
  stage: rotate
  needs:
    - job: rotation-setup
  rules:
    # Scheduled monthly run: rotate lke-admin across the configured region(s).
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Manual emergency rotation: requires scope=lke-admin (or all) AND a
    # non-empty confirmation token (analog of the GHA `confirm` input).
    - if: $CI_PIPELINE_SOURCE == "web" && ($LLZ_SCOPE == "lke-admin" || $LLZ_SCOPE == "all") && $CONFIRM != ""
      when: manual
  environment:
    name: infra-$REGION
  variables:
    LLZ_MODULE: cluster
  script:
    # Open this runner's egress IP in the LKE-E control-plane ACL (analog of the
    # cluster-access composite action), init the cluster TF root, then rotate.
    - llz ci runner-acl --mode open --region "$REGION"
    - !reference [.llz-tf-init, script]
    - llz ci wait-cluster-ready --timeout 900 --interval 10
    # The rotation prints its JSON audit record and hard-asserts LKE-Enterprise.
    - llz credentials lke-admin rotate --apply
    # delete-kubeconfig regenerates the kubeconfig; refresh-only re-reads the
    # new one from the LKE API into TF state (the single propagation point).
    - terraform -chdir="terraform-iac-bootstrap/${LLZ_MODULE}" apply -refresh-only -auto-approve -var-file="${REGION}.tfvars"
    # Bounded post-rotation health gate against the refreshed kubeconfig.
    - llz ci wait-cluster-ready --timeout 360 --interval 15
  after_script:
    # Always revoke this runner's ACL entry (analog of the `if: always()` revoke).
    - llz ci runner-acl --mode revoke --region "$REGION" || true

# ── Linode PAT: create new + update repo-level secret (analog of create-linode-pat) ─
# Repo-level secret: no environment, no ACL. The linode-credentials composite
# (credential-type: pat, operation: create) runs `llz credentials pat create …`
# then `gh secret set LINODE_API_TOKEN`; we call those directly here.
create-linode-pat:
  extends: .llz-base
  stage: rotate
  needs:
    - job: rotation-setup
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Manual: scope must select the PAT (or all) AND PAT_APPLY must arm it.
    - if: $CI_PIPELINE_SOURCE == "web" && ($LLZ_SCOPE == "linode-pat" || $LLZ_SCOPE == "all")
      when: manual
  variables:
    # On a schedule, arm the rotation by default (analog of setup's pat-apply=true
    # on the monthly path); override to "false" for a dry-run.
    PAT_APPLY: "true"
    # gh secret set targets the instance repo (analog of the GHA GH_REPO env).
    GH_REPO: $LLZ_INSTANCE_REPO
    PAT_LABEL: "gha-platform-platform_LINODE_API_TOKEN"
    # Scopes must cover a full apply AND a full destroy (incl. orphan sweeps) —
    # identical to the github.com `scopes:` input.
    PAT_SCOPES: "linodes:read_write object_storage:read_write lke:read_write firewall:read_write vpc:read_write volumes:read_write nodebalancers:read_write events:read_only account:read_write"
    PAT_VALIDITY_DAYS: "90"
  script:
    - |
      OUT_FILE="$(mktemp)"
      llz credentials pat create \
        --label "$PAT_LABEL" \
        --scopes "$PAT_SCOPES" \
        --validity-days "$PAT_VALIDITY_DAYS" \
        > "$OUT_FILE"
      if [ "${PAT_APPLY}" = "true" ]; then
        NEW_TOKEN=$(jq -r '.new_token // empty' < "$OUT_FILE")
        if [ -z "$NEW_TOKEN" ]; then
          echo "create returned no new_token — see step log"; jq -c '.' < "$OUT_FILE" >&2; rm -f "$OUT_FILE"; exit 1
        fi
        # Update the repo-level CI/CD variable via the GitLab API (the analog of
        # the github.com `gh secret set LINODE_API_TOKEN`). gh targets github.com,
        # so for GitLab we PUT/POST the masked project variable instead.
        glab variable set LINODE_API_TOKEN --masked --value "$NEW_TOKEN" -R "$GH_REPO"
        echo "Updated repo-level LINODE_API_TOKEN."
      else
        echo "DRY-RUN: not creating a PAT or setting the CI/CD variable"
      fi
      rm -f "$OUT_FILE"

# ── Linode PAT: propagate to each region's OpenBao (analog of propagate-linode-pat) ─
# needs create-linode-pat (the GHA `needs: [setup, create-linode-pat, discover]`
# chain). Region-scoped: binds infra-$REGION and opens/revokes the ACL around
# `llz ci propagate-pat`.
propagate-linode-pat:
  extends: .llz-base
  stage: propagate
  needs:
    - job: create-linode-pat
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web" && ($LLZ_SCOPE == "linode-pat" || $LLZ_SCOPE == "all")
      when: manual
  environment:
    name: infra-$REGION
  variables:
    # Only propagate once the new PAT is actually live (analog of the GHA
    # pat-apply gate on the propagate matrix).
    PAT_APPLY: "true"
  script:
    # Open this runner's egress IP in the control-plane ACL before kubectl
    # (analog of the cluster-access action), then write secret/linode/api-token.
    - llz ci runner-acl --mode open --region "$REGION"
    - llz ci propagate-pat
  after_script:
    - llz ci runner-acl --mode revoke --region "$REGION" || true

# ── Linode PAT: drain old PATs (analog of revoke-linode-pat) ──────────────────
# Repo-level: no environment, no ACL. Mirrors the composite's
# `llz credentials pat revoke-old --label … --grace-days …`.
revoke-linode-pat:
  extends: .llz-base
  stage: revoke
  needs:
    - job: rotation-setup
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Manual: scope selects the PAT (or all) AND REVOKE_APPLY arms the drain.
    - if: $CI_PIPELINE_SOURCE == "web" && ($LLZ_SCOPE == "linode-pat" || $LLZ_SCOPE == "all")
      when: manual
  variables:
    REVOKE_APPLY: "true"
    PAT_LABEL: "gha-platform-platform_LINODE_API_TOKEN"
    PAT_GRACE_DAYS: "7"
  script:
    - |
      if [ "${REVOKE_APPLY}" = "true" ]; then
        llz credentials pat revoke-old --label "$PAT_LABEL" --grace-days "$PAT_GRACE_DAYS"
      else
        echo "DRY-RUN: REVOKE_APPLY != true — not revoking any PATs"
      fi

# ── TF-state OBJ key: create new pair + update repo-level secrets (analog of create-tf-state-key) ─
# Repo-level: no environment, no ACL. Mirrors the composite's
# `llz credentials obj-key create …` + the two `gh secret set` calls (secret
# half FIRST, access half SECOND — same ordering as the github.com action).
create-tf-state-key:
  extends: .llz-base
  stage: rotate
  needs:
    - job: rotation-setup
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Manual: scope selects tf-state (or all) AND TF_STATE_APPLY arms it.
    - if: $CI_PIPELINE_SOURCE == "web" && ($LLZ_SCOPE == "tf-state" || $LLZ_SCOPE == "all")
      when: manual
  variables:
    TF_STATE_APPLY: "true"
    GH_REPO: $LLZ_INSTANCE_REPO
    OBJ_LABEL: "gha-platform-platform_TF_STATE_KEY"
    OBJ_BUCKET_CLUSTER: "us-ord-10"
    OBJ_BUCKET_PERMISSIONS: "read_write"
  script:
    - |
      OUT_FILE="$(mktemp)"
      llz credentials obj-key create \
        --label "$OBJ_LABEL" \
        --bucket-cluster "$OBJ_BUCKET_CLUSTER" \
        --bucket-name "$TF_STATE_BUCKET" \
        --bucket-permissions "$OBJ_BUCKET_PERMISSIONS" \
        > "$OUT_FILE"
      if [ "${TF_STATE_APPLY}" = "true" ]; then
        NEW_ACCESS=$(jq -r '.new_access_key // empty' < "$OUT_FILE")
        NEW_SECRET=$(jq -r '.new_secret_key // empty' < "$OUT_FILE")
        if [ -z "$NEW_ACCESS" ] || [ -z "$NEW_SECRET" ]; then
          echo "create returned no access_key / secret_key — see step log"; jq -c '.' < "$OUT_FILE" >&2; rm -f "$OUT_FILE"; exit 1
        fi
        # Secret-half FIRST, access-half SECOND (matches the github.com action):
        # a run that reads (new_access, old_secret) fails to auth — the safer
        # mode, since the previous key is still live until the daily drain.
        glab variable set TF_STATE_SECRET_KEY --masked --value "$NEW_SECRET" -R "$GH_REPO"
        glab variable set TF_STATE_ACCESS_KEY --masked --value "$NEW_ACCESS" -R "$GH_REPO"
        echo "Updated repo-level TF_STATE_ACCESS_KEY + TF_STATE_SECRET_KEY."
      else
        echo "DRY-RUN: not creating an OBJ key or setting the CI/CD variables"
      fi
      rm -f "$OUT_FILE"

# ── TF-state OBJ key: drain old keys (analog of revoke-tf-state-key) ──────────
# Repo-level: no environment, no ACL. Mirrors the composite's
# `llz credentials obj-key revoke-old --label … --keep-newest …`.
revoke-tf-state-key:
  extends: .llz-base
  stage: revoke
  needs:
    - job: rotation-setup
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Manual: scope selects tf-state (or all) AND TF_STATE_REVOKE_APPLY arms it.
    - if: $CI_PIPELINE_SOURCE == "web" && ($LLZ_SCOPE == "tf-state" || $LLZ_SCOPE == "all")
      when: manual
  variables:
    TF_STATE_REVOKE_APPLY: "true"
    OBJ_LABEL: "gha-platform-platform_TF_STATE_KEY"
    OBJ_KEEP_NEWEST: "2"
  script:
    - |
      if [ "${TF_STATE_REVOKE_APPLY}" = "true" ]; then
        llz credentials obj-key revoke-old --label "$OBJ_LABEL" --keep-newest "$OBJ_KEEP_NEWEST"
      else
        echo "DRY-RUN: TF_STATE_REVOKE_APPLY != true — not revoking any OBJ keys"
      fi
