# akamai-functions — the REUSABLE delivery machinery for building a Rust/Spin app and
# deploying it to Akamai (Fermyon Wasm Functions). It is app-agnostic: it ships the CI
# pipeline, the composite deploy action, the deploy script, the toolchain, and the
# Fermyon deploy secret — NOT any specific workload. The Spin app(s) (e.g. the OHTTP
# gateway/relay) are the operator's own code, brought separately; the operator points
# SPIN_MANIFEST at their spin.toml. Workload dashboards/alerts come via `llz extension
# new --kind observability`. (Modeled on the functions/ohttp prototype, with the
# ohttp-specific bits factored out.)
schemaVersion: 2
name: akamai-functions
short: build + deploy a Rust/Spin app to Akamai Fermyon Wasm Functions (external candidate)
kind: tool
stage: app

# Configure — operator points these at their app; seed wires the secret into OpenBao + GH env.
vars:
  - {name: SPIN_MANIFEST, default: spin.toml}   # path to the app's spin.toml
  - {name: APP_SUFFIX, default: "-lab"}          # env suffix on app names (-lab/-staging/"")
secrets:
  - {name: FERMYON_CLOUD_TOKEN, required: true, bao: "secret/akamai#fermyon_cloud_token", ghEnv: infra-prod}
  - {name: GHCR_PAT, required: true, ghEnv: infra-prod}   # pulls the private ci-rust toolchain image

# Tools — the full local build + quality toolchain (CI uses the pinned container; locally,
# `llz extension provision` installs these via mise and doctor flags any that are missing,
# so a quality gate can't silently skip). cargo-* gates: coverage (tarpaulin), mutation
# (mutants), supply chain (audit/deny/machete), API stability (semver-checks).
tools:
  - {name: spin, via: "aqua:fermyon/spin", version: "3.1.0"}
  - {name: cargo, via: "rust", version: "1.82.0"}
  - {name: cargo-tarpaulin, via: "cargo:cargo-tarpaulin", version: "0.31.2"}
  - {name: cargo-mutants, via: "cargo:cargo-mutants", version: "24.9.0"}
  - {name: cargo-audit, via: "cargo:cargo-audit", version: "0.21.0"}
  - {name: cargo-deny, via: "aqua:EmbarkStudios/cargo-deny", version: "0.16.2"}
  - {name: cargo-machete, via: "cargo:cargo-machete", version: "0.7.0"}
  - {name: cargo-semver-checks, via: "aqua:obi1kenobi/cargo-semver-checks", version: "0.38.0"}
  - {name: shellcheck, via: "aqua:koalaman/shellcheck", version: "0.10.0"}

# Scaffold — the delivery machinery + the reusable Rust quality bar: CI pipeline (fmt,
# clippy, test, COVERAGE, MUTATION, audit/deny/machete, semver, shellcheck → build → deploy),
# the quality dispatcher, the deploy action/script, and mutants/deny configs. No app code.
files:
  - {src: files, dst: .}
