# akamai-functions — the REUSABLE delivery machinery for building a Rust/Spin app and
# deploying it to Akamai (Fermyon Wasm Functions). App-agnostic: it ships the CI pipeline,
# the composite deploy action, the deploy script, the toolchain, and the Fermyon deploy
# secret — NOT any workload. The Spin app(s) are the operator's own code; point
# SPIN_MANIFEST at their spin.toml. (Modeled on the functions/ohttp prototype.)
#
# stage: app — this is the Application-Code delivery layer. Its gates are DECLARED here
# (validate: below) so they are typed + visible in `llz extension lifecycle` / `stages`,
# but because App-stage is not platform-gated they are SKIPPED by `llz lint` / `llz
# validate` (the platform gate, which owns IaC + Kube-Infra) and RUN instead by the app's
# own scaffolded CI. The validate: step names are the SINGLE SOURCE for the workflow's
# quality matrix (rendered via `target: <@ .validate_targets @>`); quality.sh implements
# each target's commands.
schemaVersion: 3
name: akamai-functions
short: build + deploy a Rust/Spin app to Akamai Fermyon Wasm Functions (external candidate)
kind: tool
stage: app

# Render var — the SINGLE source for the deploy GH Environment. It is substituted into the
# scaffolded workflow's `environment:` at apply time AND into the secrets' ghEnv seed
# targets below (`<@ .gh_env @>`), so there is one value, not a duplicated literal.
vars:
  - {name: gh_env, default: infra-prod, doc: "GitHub Environment the deploy job + secret seeding target"}

# Configure — operator points these at their app; seed wires secrets into OpenBao + GH env
# and pushes ghVars: to the repo's GitHub Actions variables.
#
# secrets: are sensitive (read from env at seed time, never stored). ghVars: are the
# NON-secret GitHub Actions variables the scaffolded workflow reads as `${{ vars.* }}` at
# runtime — a distinct category from render `vars:` (which substitute into file bodies at
# apply time; this kit's workflow is shipped verbatim, so it has none). Declaring ghVars:
# is what lets `doctor` warn when RUST_IMAGE/GHCR_USER are unset and lets `seed` push the
# defaults — and it is what makes `image: ${{ vars.RUST_IMAGE }}` pass the workflow
# image-pin lint (a declared ghVar is an operator-owned, reviewable image source).
ghVars:
  - {name: RUST_IMAGE, required: true, image: true, doc: "digest-pinned ci-rust toolchain image the CI jobs run in (…@sha256:…)"}
  - {name: GHCR_USER, required: true, doc: "GHCR username used to pull the private RUST_IMAGE"}
  - {name: SPIN_MANIFEST, default: spin.toml, doc: "path to the app's spin.toml"}
  - {name: APP_SUFFIX, default: "-lab", doc: "env suffix on app names (-lab/-staging/\"\")"}
secrets:
  # ghEnv resolves the gh_env render var — single-sourced with the workflow's environment.
  - {name: FERMYON_CLOUD_TOKEN, required: true, bao: "secret/akamai#fermyon_cloud_token", ghEnv: "<@ .gh_env @>"}
  - {name: GHCR_PAT, required: true, ghEnv: "<@ .gh_env @>"}   # pulls the private ci-rust toolchain image

# Tools — the full local build + quality toolchain. `llz extension provision` installs
# these via mise and doctor flags any that are missing, so an App-stage gate (declared
# below) can't silently skip for want of its tool.
tools:
  - {name: spin, via: "aqua:fermyon/spin", version: "3.1.0"}
  - {name: cargo, via: "rust", version: "1.82.0"}
  - {name: cargo-tarpaulin, via: "cargo:cargo-tarpaulin", version: "0.31.2"}
  - {name: cargo-mutants, via: "cargo:cargo-mutants", version: "24.9.0"}
  - {name: cargo-audit, via: "cargo:cargo-audit", version: "0.21.0"}
  - {name: cargo-deny, via: "aqua:EmbarkStudios/cargo-deny", version: "0.16.2"}
  - {name: cargo-machete, via: "cargo:cargo-machete", version: "0.7.0"}
  - {name: cargo-semver-checks, via: "aqua:obi1kenobi/cargo-semver-checks", version: "0.38.0"}
  - {name: shellcheck, via: "aqua:koalaman/shellcheck", version: "0.10.0"}

# Gate — the App-Code quality bar, declared as typed validate: steps over the whole
# workspace. App-stage ⇒ the platform gate SKIPS these (they don't run in `llz lint`/
# `validate`). They are the SINGLE SOURCE for the gate: the scaffolded workflow's matrix is
# rendered from these step names (`target: <@ .validate_targets @>`), so adding/removing a
# gate here changes the CI matrix too — no hand-copied list to drift. quality.sh implements
# each target's commands; this block names them.
validate:
  - {name: fmt-check, argv: [scripts/app/quality.sh, fmt-check]}
  - {name: clippy, argv: [scripts/app/quality.sh, clippy]}
  - {name: test, argv: [scripts/app/quality.sh, test]}
  - {name: coverage, argv: [scripts/app/quality.sh, coverage]}   # cargo-tarpaulin --fail-under 90
  - {name: mutants, argv: [scripts/app/quality.sh, mutants]}     # cargo-mutants (mutation testing)
  - {name: audit, argv: [scripts/app/quality.sh, audit]}
  - {name: deny, argv: [scripts/app/quality.sh, deny]}
  - {name: machete, argv: [scripts/app/quality.sh, machete]}
  - {name: semver, argv: [scripts/app/quality.sh, semver]}
  - {name: shellcheck, argv: [scripts/app/quality.sh, shellcheck]}

# Scaffold — the delivery machinery + the reusable quality bar: CI pipeline (the quality
# matrix → build → deploy), the quality dispatcher, and the deploy action/script. No app
# code. The CI workflow + scripts are `managed` (the kit owns them; re-rendered on upgrade,
# and `--check` flags hand-edits). The starter quality configs are `seed` (write-once):
# operators tune deny/mutants for their crates, so apply lays them down once and then
# leaves them alone forever.
files:
  - {src: files/.github, dst: .github}                       # workflow + composite action (managed)
  - {src: files/scripts, dst: scripts}                       # quality.sh + deploy-cloud.sh (managed)
  - {src: files/deny.toml, dst: deny.toml, mode: seed}       # starter supply-chain policy (operator-owned)
  - {src: files/mutants.toml, dst: mutants.toml, mode: seed} # starter mutation config (operator-owned)
